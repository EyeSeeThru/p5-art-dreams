<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>waveform-bloom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// waveform-bloom — Oscillating flower pattern with gradient harmonics
let t = 0;
const petals = 12;
const rings = 8;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
}

function draw() {
  background(250, 30, 5, 0.15);
  
  translate(width / 2, height / 2);
  
  let maxR = min(width, height) * 0.45;
  
  for (let r = 1; r <= rings; r++) {
    let ringR = (r / rings) * maxR;
    let ringHue = (t * 20 + r * 30) % 360;
    
    for (let i = 0; i < petals * r; i++) {
      let angle = (TWO_PI / (petals * r)) * i - t * 0.3;
      let offset = sin(t * 2 + r * 0.5 + i * 0.1) * 20;
      let size = map(r, 1, rings, 8, 40) + offset * 0.3;
      
      let x = cos(angle) * ringR;
      let y = sin(angle) * ringR;
      
      let pulse = sin(t * 3 + r * 0.3) * 0.3 + 0.7;
      let alpha = map(r, 1, rings, 0.9, 0.5) * pulse;
      
      fill(ringHue % 360, 70, 90, alpha);
      ellipse(x, y, size, size * 0.8);
    }
  }
  
  // Center glow
  let centerSize = 60 + sin(t * 4) * 20;
  let centerHue = (t * 30) % 360;
  
  for (let i = 5; i > 0; i--) {
    let glowSize = centerSize + i * 15;
    let glowAlpha = 0.1 / i;
    fill(centerHue, 60, 100, glowAlpha);
    ellipse(0, 0, glowSize, glowSize);
  }
  
  fill(centerHue, 40, 100, 0.9);
  ellipse(0, 0, centerSize * 0.5, centerSize * 0.5);
  
  t += 0.016;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
