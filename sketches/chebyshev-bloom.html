<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chebyshev Bloom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let t = 0;
let particles = [];
const NUM_PARTICLES = 800;

function chebyshevT(n, x) {
  return Math.cos(n * Math.acos(Math.max(-1, Math.min(1, x))));
}

function chebyshevU(n, x) {
  if (Math.abs(x) > 0.995) return 0;
  return Math.sin((n + 1) * Math.acos(x)) / Math.sqrt(1 - x * x);
}

function polarChebyshev(r, theta, n) {
  let x = r * Math.cos(theta);
  let y = r * Math.cos(n * theta);
  return { x, y: r * Math.sin(theta) };
}

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    let angle = random(TWO_PI);
    let r = random(1.5, 3.5);
    this.x = cos(angle) * r;
    this.y = sin(angle) * r;
    this.prevX = this.x;
    this.prevY = this.y;
    this.life = random(150, 400);
    this.maxLife = this.life;
    this.n = floor(random(2, 8));
    this.phase = random(TWO_PI);
    this.speed = random(0.008, 0.02);
  }

  update() {
    this.prevX = this.x;
    this.prevY = this.y;

    let r = dist(0, 0, this.x, this.y);
    let theta = atan2(this.y, this.x);

    let n = this.n + sin(t * 0.3 + this.phase) * 1.5;

    let tn = chebyshevT(this.n, constrain(r * 0.5, -1, 1));
    let offset = tn * 0.15;

    theta += offset * sin(t * this.speed * 50 + this.phase);
    r += sin(t * this.speed * 30 + r * 2) * 0.01;

    this.x = cos(theta) * r;
    this.y = sin(theta) * r;

    this.life--;

    if (this.life <= 0 || r > 5 || r < 0.1) {
      this.reset();
    }
  }

  draw() {
    let alpha = map(this.life, 0, this.maxLife, 0, 180);
    let hue = map(this.n, 2, 8, 280, 400) % 360;
    if (hue > 360) hue = hue - 360;

    stroke(hue, 80, 70, alpha);
    strokeWeight(1.2);
    line(this.prevX * 100, this.prevY * 100, this.x * 100, this.y * 100);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 255);
  background(0, 0, 5);

  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  background(0, 0, 5, 15);

  translate(width / 2, height / 2);

  noFill();
  stroke(280, 60, 40, 30);
  strokeWeight(0.5);
  for (let r = 0.5; r < 4; r += 0.5) {
    circle(0, 0, r * 200);
  }

  stroke(320, 70, 60, 40);
  strokeWeight(1);
  beginShape();
  for (let a = 0; a < TWO_PI; a += 0.05) {
    let r = 1 + 0.5 * sin(6 * a + t);
    let x = r * cos(a) * 100;
    let y = r * sin(a) * 100;
    vertex(x, y);
  }
  endShape(CLOSE);

  for (let p of particles) {
    p.update();
    p.draw();
  }

  noStroke();
  fill(0, 0, 100, 0);
  circle(0, 0, 20);

  fill(300, 80, 80, 150 + sin(t * 3) * 50);
  circle(0, 0, 8);

  t += 0.02;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
