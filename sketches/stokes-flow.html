<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stokes Flow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Stokes Flow - Viscous fluid at low Reynolds number
// Demonstrates creeping flow with particles following streamlines

let particles = [];
let numParticles = 800;
let flowField = [];
let cols, rows;
let scale = 15;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  cols = floor(width / scale);
  rows = floor(height / scale);
  
  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push(new Particle());
  }
  
  background(0);
}

function draw() {
  // Semi-transparent background for trails
  background(240, 8, 3, 0.08);
  
  // Update flow field (oscillating with time)
  updateFlowField();
  
  // Update and draw particles
  for (let p of particles) {
    p.follow();
    p.update();
    p.edges();
    p.show();
  }
  
  time += 0.008;
}

function updateFlowField() {
  // Create a time-varying Stokes flow pattern
  // Uses a combination of sin/cos to create smooth, laminar flow
  let xoff = 0;
  for (let i = 0; i < cols; i++) {
    let yoff = 0;
    for (let j = 0; j < rows; j++) {
      let index = i + j * cols;
      
      // Stokes flow: primarily horizontal with vertical perturbations
      // Creates smooth, laminar streamlines
      let angle = noise(xoff * 0.5, yoff * 0.5, time) * TWO_PI * 0.5;
      
      // Add a swirling component
      let swirl = sin(xoff * 0.3 + time * 0.5) * cos(yoff * 0.3 + time * 0.3);
      angle += swirl * 0.8;
      
      // Main flow direction (left to right)
      let flowX = 1 + cos(angle) * 0.5;
      let flowY = sin(angle) * 0.8;
      
      // Add wave motion
      flowY += sin(xoff * 0.2 + time) * 0.3;
      
      // Damping near boundaries
      let damp = 1;
      let px = i / cols;
      let py = j / rows;
      if (px < 0.1 || px > 0.9) damp *= px < 0.1 ? px * 10 : (1 - px) * 10;
      if (py < 0.1 || py > 0.9) damp *= py < 0.1 ? py * 10 : (1 - py) * 10;
      
      flowField[index] = createVector(flowX * damp, flowY * damp);
      
      yoff += 0.1;
    }
    xoff += 0.1;
  }
}

class Particle {
  constructor() {
    this.pos = createVector(random(width), random(height));
    this.vel = createVector(0, 0);
    this.acc = createVector(0, 0);
    this.maxSpeed = 2;
    this.prevPos = this.pos.copy();
    this.hue = random(180, 280);
    this.size = random(2, 5);
    this.life = 255;
  }
  
  follow() {
    let x = floor(this.pos.x / scale);
    let y = floor(this.pos.y / scale);
    let index = x + y * cols;
    
    if (flowField[index]) {
      let force = flowField[index].copy();
      force.mult(0.1);
      this.applyForce(force);
    }
  }
  
  applyForce(force) {
    this.acc.add(force);
  }
  
  update() {
    this.vel.add(this.acc);
    this.vel.limit(this.maxSpeed);
    this.pos.add(this.vel);
    this.acc.mult(0);
    
    // Color based on velocity
    this.hue = map(this.vel.mag(), 0, this.maxSpeed, 200, 320);
    this.hue = constrain(this.hue, 180, 340);
  }
  
  edges() {
    // Wrap around horizontally
    if (this.pos.x > width) {
      this.pos.x = 0;
      this.prevPos = this.pos.copy();
    }
    if (this.pos.x < 0) {
      this.pos.x = width;
      this.prevPos = this.pos.copy();
    }
    
    // Wrap vertically with reset
    if (this.pos.y > height || this.pos.y < 0) {
      this.pos.y = random(height);
      this.pos.x = 0;
      this.prevPos = this.pos.copy();
    }
  }
  
  show() {
    let speed = this.vel.mag();
    let brightness = map(speed, 0, this.maxSpeed, 40, 100);
    let saturation = map(speed, 0, this.maxSpeed, 30, 90);
    
    stroke(this.hue, saturation, brightness, 0.7);
    strokeWeight(this.size);
    point(this.pos.x, this.pos.y);
    
    // Draw trails for faster particles
    if (speed > 0.5) {
      strokeWeight(this.size * 0.5);
      stroke(this.hue, saturation * 0.7, brightness * 0.8, 0.3);
      line(this.prevPos.x, this.prevPos.y, this.pos.x, this.pos.y);
    }
    
    this.prevPos = this.pos.copy();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / scale);
  rows = floor(height / scale);
  flowField = [];
}
</script>
</body>
</html>
