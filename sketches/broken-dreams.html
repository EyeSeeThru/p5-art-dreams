<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Broken Dreams</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #040202; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Broken Dreams — Shattered Fragments in Darkness
// Artistic, melancholic, emotionally evocative
// Red shards drifting through void

let fragments = [];
let numFragments = 35;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Create shattered fragments
  for (let i = 0; i < numFragments; i++) {
    fragments.push(createFragment());
  }
}

function createFragment() {
  let centerX = width / 2 + random(-300, 300);
  let centerY = height / 2 + random(-250, 250);

  // Irregular polygon vertices (shattered piece shape)
  let vertices = [];
  let numVertices = floor(random(4, 8));
  let baseSize = random(15, 50);

  for (let i = 0; i < numVertices; i++) {
    let angle = (TWO_PI / numVertices) * i + random(-0.3, 0.3);
    let r = baseSize * random(0.5, 1.2);
    vertices.push({
      x: cos(angle) * r,
      y: sin(angle) * r
    });
  }

  return {
    // Position
    x: centerX,
    y: centerY,
    // Orbit around a center point
    orbitX: centerX,
    orbitY: centerY,
    orbitRadius: random(20, 150),
    orbitSpeed: random(0.002, 0.008) * random([-1, 1]),
    orbitPhase: random(TWO_PI),
    // Rotation
    angle: random(TWO_PI),
    rotationSpeed: random(-0.02, 0.02),
    // Size
    scale: random(0.3, 1),
    baseSize: baseSize,
    // Color
    hue: random(345, 360) % 360, // Deep red
    brightness: random(30, 55),
    alpha: random(40, 75),
    // Motion
    vx: random(-0.3, 0.3),
    vy: random(-0.3, 0.3),
    // Wobble
    wobblePhase: random(TWO_PI),
    wobbleSpeed: random(0.01, 0.03),
    // Vertices
    vertices: vertices,
    // Edge glow
    edgeAlpha: random(20, 50)
  };
}

function draw() {
  // Dark background with subtle movement
  background(0, 20, 2);

  time += 0.01;

  // Subtle background particles (very dim)
  drawBackgroundDust();

  // Draw fragments
  for (let frag of fragments) {
    drawFragment(frag);
  }

  // Draw connecting threads (faint lines between nearby fragments)
  drawThreads();

  // Occasional new fragment
  if (frameCount % 180 === 0 && fragments.length < 50) {
    fragments.push(createFragment());
  }

  // Remove fragments that have drifted too far
  for (let i = fragments.length - 1; i >= 0; i--) {
    let frag = fragments[i];
    let d = dist(frag.x, frag.y, width / 2, height / 2);
    if (d > max(width, height)) {
      fragments.splice(i, 1);
    }
  }
}

function drawBackgroundDust() {
  noStroke();
  for (let i = 0; i < 50; i++) {
    let x = (noise(i * 0.1, time * 0.1) * width * 1.5) - width * 0.25;
    let y = (noise(i * 0.1 + 100, time * 0.1) * height * 1.5) - height * 0.25;
    let size = noise(i * 0.2 + 200) * 2;
    fill(350, 30, 15, 10);
    ellipse(x, y, size, size);
  }
}

function drawFragment(frag) {
  // Update position
  frag.orbitPhase += frag.orbitSpeed;
  frag.angle += frag.rotationSpeed;

  // Wobble effect
  let wobbleX = sin(time * frag.wobbleSpeed * 10 + frag.wobblePhase) * 5;
  let wobbleY = cos(time * frag.wobbleSpeed * 8 + frag.wobblePhase) * 5;

  // Orbit center slowly moves
  let centerOffsetX = sin(time * 0.001 + frag.wobblePhase) * 50;
  let centerOffsetY = cos(time * 0.0015 + frag.wobblePhase) * 30;

  // Target position
  let targetX = frag.orbitX + centerOffsetX + cos(frag.orbitPhase) * frag.orbitRadius + wobbleX;
  let targetY = frag.orbitY + centerOffsetY + sin(frag.orbitPhase) * frag.orbitRadius + wobbleY;

  // Smooth movement
  frag.x += (targetX - frag.x) * 0.02;
  frag.y += (targetY - frag.y) * 0.02;

  push();
  translate(frag.x, frag.y);
  rotate(frag.angle);

  // Outer glow
  noStroke();
  for (let g = 3; g > 0; g--) {
    let glowAlpha = frag.alpha * 0.1 * (4 - g);
    fill(frag.hue, 70, frag.brightness + 10, glowAlpha);
    beginShape();
    for (let v of frag.vertices) {
      let gx = v.x * frag.scale * (1 + g * 0.15);
      let gy = v.y * frag.scale * (1 + g * 0.15);
      vertex(gx, gy);
    }
    endShape(CLOSE);
  }

  // Main fragment shape
  fill(frag.hue, 80, frag.brightness, frag.alpha);
  stroke(frag.hue, 90, frag.brightness + 20, frag.edgeAlpha);
  strokeWeight(0.5);
  beginShape();
  for (let v of frag.vertices) {
    let vx = v.x * frag.scale;
    let vy = v.y * frag.scale;
    vertex(vx, vy);
  }
  endShape(CLOSE);

  // Inner highlight
  noStroke();
  fill(frag.hue, 50, frag.brightness + 30, 20);
  beginShape();
  for (let v of frag.vertices) {
    let vx = v.x * frag.scale * 0.5;
    let vy = v.y * frag.scale * 0.5;
    vertex(vx, vy);
  }
  endShape(CLOSE);

  pop();
}

function drawThreads() {
  strokeWeight(0.5);

  for (let i = 0; i < fragments.length; i++) {
    for (let j = i + 1; j < fragments.length; j++) {
      let f1 = fragments[i];
      let f2 = fragments[j];
      let d = dist(f1.x, f1.y, f2.x, f2.y);

      // Draw faint thread if close enough
      if (d < 120) {
        let alpha = map(d, 0, 120, 8, 0);
        stroke(350, 40, 30, alpha);
        line(f1.x, f1.y, f2.x, f2.y);
      }
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  // Fragment explosion from click point
  for (let i = 0; i < 12; i++) {
    let frag = createFragment();
    frag.x = mouseX;
    frag.y = mouseY;
    frag.orbitX = mouseX;
    frag.orbitY = mouseY;
    frag.orbitRadius = random(10, 40);
    frag.orbitSpeed = random(0.01, 0.03) * random([-1, 1]);
    frag.vx = random(-3, 3);
    frag.vy = random(-3, 3);
    frag.alpha = random(60, 90);
    fragments.push(frag);
  }
}
</script>
</body>
</html>
