<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schwarzschild — Black Hole</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const particles = [];
const STAR_COUNT = 800;
const PHOTON_RATIO = 0.15;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noCursor();
  
  // Initialize stars
  for (let i = 0; i < STAR_COUNT; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  // Deep space background with subtle gradient
  background(230, 30, 5, 15);
  
  const centerX = width / 2;
  const centerY = height / 2;
  const schwarzschildRadius = min(width, height) * 0.08;
  const accretionDisk = min(width, height) * 0.25;
  
  // Draw distant stars
  for (let p of particles) {
    p.update();
    p.show();
  }
  
  // Draw gravitational lensing ring (Einstein ring)
  noFill();
  for (let r = 0; r < 3; r++) {
    const ringRadius = schwarzschildRadius * (2.5 + r * 0.4);
    const alpha = map(r, 0, 2, 40, 10);
    stroke(280, 60, 80, alpha);
    strokeWeight(1);
    ellipse(centerX, centerY, ringRadius * 2);
  }
  
  // Accretion disk glow
  for (let i = 5; i > 0; i--) {
    const diskAlpha = map(i, 5, 0, 5, 25);
    const diskSize = accretionDisk * (i / 5);
    fill(30, 80, 100, diskAlpha);
    noStroke();
    ellipse(centerX, centerY, diskSize * 2, diskSize * 0.3);
  }
  
  // Accretion disk with rotation
  for (let a = 0; a < TWO_PI; a += 0.05) {
    const noiseVal = noise(a * 2, frameCount * 0.005);
    const radiusVariation = map(noiseVal, 0, 1, 0.85, 1.15);
    const diskR = accretionDisk * radiusVariation;
    
    const x = centerX + cos(a) * diskR;
    const y = centerY + sin(a) * diskR * 0.3;
    
    const hue = map(a % TWO_PI, 0, TWO_PI, 20, 50);
    const brightness = map(dist(x, y, centerX, centerY), 0, accretionDisk, 100, 60);
    
    fill(hue, 70, brightness, 60);
    noStroke();
    ellipse(x, y, 3, 2);
  }
  
  // Photon sphere visualization
  noFill();
  strokeWeight(2);
  for (let a = 0; a < TWO_PI; a += 0.1) {
    const photonR = schwarzschildRadius * 1.5;
    const wobble = sin(a * 8 + frameCount * 0.05) * 5;
    const x = centerX + cos(a) * (photonR + wobble);
    const y = centerY + sin(a) * (photonR * 0.3 + wobble * 0.3);
    
    stroke(200, 30, 100, 50);
    point(x, y);
  }
  
  // Event horizon
  fill(0);
  stroke(280, 80, 70, 60);
  strokeWeight(3);
  ellipse(centerX, centerY, schwarzschildRadius * 2);
  
  // Inner glow
  for (let i = 5; i > 0; i--) {
    const glowSize = schwarzschildRadius * (i / 5) * 2;
    fill(280, 60, 30, map(i, 5, 0, 10, 0));
    noStroke();
    ellipse(centerX, centerY, glowSize);
  }
}

class Particle {
  constructor() {
    this.reset();
  }
  
  reset() {
    const angle = random(TWO_PI);
    const distFromCenter = random(min(width, height) * 0.3, min(width, height) * 0.6);
    this.x = width / 2 + cos(angle) * distFromCenter;
    this.y = height / 2 + sin(angle) * distFromCenter * 0.3;
    this.z = random(0.5, 3);
    this.size = random(1, 3);
    this.hue = random(200, 280);
    this.baseSpeed = random(0.3, 1.5);
  }
  
  update() {
    const centerX = width / 2;
    const centerY = height / 2;
    const schwarzschildRadius = min(width, height) * 0.08;
    
    const dx = centerX - this.x;
    const dy = centerY - this.y;
    const dist = sqrt(dx * dx + dy * dy);
    
    // Gravitational pull
    if (dist > schwarzschildRadius * 2) {
      const force = 500 / (dist * dist);
      this.x += (dx / dist) * force * this.baseSpeed;
      this.y += (dy / dist) * force * this.baseSpeed * 0.3;
    }
    
    // Orbital motion
    const orbitSpeed = 50 / dist;
    this.x += -dy * orbitSpeed * 0.001 * this.baseSpeed;
    this.y += dx * orbitSpeed * 0.0005 * this.baseSpeed;
    
    // Reset if too close or too far
    if (dist < schwarzschildRadius || dist > min(width, height) * 0.5) {
      this.reset();
    }
  }
  
  show() {
    const centerX = width / 2;
    const centerY = height / 2;
    const dist = distSq(this.x, this.y, centerX, centerY);
    const brightness = map(dist, 0, sq(min(width, height) * 0.3), 100, 40);
    const alpha = map(dist, 0, sq(min(width, height) * 0.5), 80, 20);
    
    fill(this.hue, 20, brightness, alpha);
    noStroke();
    ellipse(this.x, this.y, this.size * this.z);
  }
}

function distSq(x1, y1, x2, y2) {
  return (x1 - x2) ** 2 + (y1 - y2) ** 2;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
