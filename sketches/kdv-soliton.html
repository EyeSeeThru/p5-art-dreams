<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KDV Soliton</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #030108; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// KDV Soliton - Korteweg-de Vries solitary wave visualization
// Solitons maintain their shape and interact elastically

let grid = [];
let nextGrid = [];
let cols, rows;
let dx = 8;
let dt = 0.1;
let c = 1.0; // wave speed
let alpha = 1.0; // nonlinear coefficient
let beta = 0.5; // dispersion coefficient
let particles = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  cols = floor(width / dx);
  rows = floor(height / dx);
  
  // Initialize grid
  for (let i = 0; i < cols; i++) {
    grid[i] = [];
    nextGrid[i] = [];
    for (let j = 0; j < rows; j++) {
      grid[i][j] = 0;
      nextGrid[i][j] = 0;
    }
  }
  
  // Create initial solitons
  createSoliton(floor(cols * 0.3), floor(rows * 0.5), 40, 1.2);
  createSoliton(floor(cols * 0.6), floor(rows * 0.4), 35, 0.9);
  createSoliton(floor(cols * 0.75), floor(rows * 0.6), 30, 0.7);
  
  // Initialize particles for visualization
  for (let i = 0; i < 150; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: random(-1, 1),
      vy: random(-1, 1),
      hue: random(280, 340),
      size: random(2, 5)
    });
  }
  
  background(0);
}

function createSoliton(x0, y0, amplitude, speed) {
  let sigma = sqrt(12 * beta / (alpha * amplitude));
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let dist = sqrt(pow((i - x0), 2) + pow((j - y0), 2));
      grid[i][j] += amplitude * exp(-dist * dist / (2 * sigma * sigma));
    }
  }
}

function solveKDV() {
  // KDV equation: u_t + alpha * u * u_x + beta * u_xxx = 0
  // Using finite difference method
  
  for (let i = 2; i < cols - 2; i++) {
    for (let j = 2; j < rows - 2; j++) {
      let u = grid[i][j];
      let ux = (grid[i + 1][j] - grid[i - 1][j]) / (2 * dx);
      let uxxx = (grid[i + 2][j] - 3 * grid[i + 1][j] + 3 * grid[i - 1][j] - grid[i - 2][j]) / (dx * dx * dx);
      let uy = (grid[i][j + 1] - grid[i][j - 1]) / (2 * dx);
      let uyy = (grid[i][j + 1] - 2 * grid[i][j] + grid[i][j - 1]) / (dx * dx);
      
      let dudt = -alpha * u * (ux + uy) - beta * (uxxx + uyy);
      nextGrid[i][j] = u + dt * dudt;
      
      // Damping at boundaries
      if (i < 3 || i > cols - 4 || j < 3 || j > rows - 4) {
        nextGrid[i][j] *= 0.95;
      }
    }
  }
  
  // Swap grids
  let temp = grid;
  grid = nextGrid;
  nextGrid = temp;
}

function draw() {
  // Semi-transparent background
  background(280, 60, 8, 15);
  
  // Solve KDV equation
  solveKDV();
  
  // Draw wave field
  noStroke();
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let val = grid[i][j];
      if (abs(val) > 0.5) {
        let x = i * dx;
        let y = j * dx;
        let hue = map(val, -50, 50, 280, 340);
        let sat = map(abs(val), 0, 50, 40, 90);
        let bri = map(abs(val), 0, 50, 20, 100);
        
        fill(hue, sat, bri, 70);
        rect(x, y, dx, dx);
      }
    }
  }
  
  // Draw and update particles
  for (let p of particles) {
    let gx = floor(p.x / dx);
    let gy = floor(p.y / dx);
    
    if (gx > 0 && gx < cols - 1 && gy > 0 && gy < rows - 1) {
      let gradX = grid[gx + 1][gy] - grid[gx - 1][gy];
      let gradY = grid[gx][gy + 1] - grid[gx][gy - 1];
      
      p.vx += gradX * 0.02;
      p.vy += gradY * 0.02;
    }
    
    p.vx *= 0.99;
    p.vy *= 0.99;
    
    p.x += p.vx;
    p.y += p.vy;
    
    // Wrap around
    if (p.x < 0) p.x = width;
    if (p.x > width) p.x = 0;
    if (p.y < 0) p.y = height;
    if (p.y > height) p.y = 0;
    
    // Draw particle
    let gx2 = floor(p.x / dx);
    let gy2 = floor(p.y / dx);
    let waveVal = 0;
    if (gx2 >= 0 && gx2 < cols && gy2 >= 0 && gy2 < rows) {
      waveVal = grid[gx2][gy2];
    }
    
    let alpha = map(abs(waveVal), 0, 30, 30, 100);
    fill(p.hue, 80, 100, alpha);
    ellipse(p.x, p.y, p.size);
  }
  
  // Add glow effect
  blendMode(ADD);
  for (let i = 0; i < cols; i += 3) {
    for (let j = 0; j < rows; j += 3) {
      let val = grid[i][j];
      if (abs(val) > 5) {
        let x = i * dx;
        let y = j * dx;
        let hue = map(val, -30, 30, 260, 340);
        
        fill(hue, 60, 60, 8);
        ellipse(x, y, 30, 30);
      }
    }
  }
  blendMode(BLEND);
  
  // Reset solitons periodically
  if (frameCount % 600 === 0) {
    grid = [];
    nextGrid = [];
    for (let i = 0; i < cols; i++) {
      grid[i] = [];
      nextGrid[i] = [];
      for (let j = 0; j < rows; j++) {
        grid[i][j] = 0;
        nextGrid[i][j] = 0;
      }
    }
    createSoliton(floor(cols * random(0.2, 0.4)), floor(rows * random(0.3, 0.7)), random(30, 50), random(0.8, 1.5));
    createSoliton(floor(cols * random(0.5, 0.8)), floor(rows * random(0.3, 0.7)), random(25, 45), random(0.6, 1.2));
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  setup();
}
</script>
</body>
</html>
