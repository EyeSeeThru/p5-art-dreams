<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hilbert Curve</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const ORDER = 6;
const HILBERT_SIZE = Math.pow(2, ORDER);
let points = [];
let t = 0;
let colors;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  colors = [
    color(45, 90, 100),
    color(180, 70, 90),
    color(300, 80, 95),
    color(120, 60, 90)
  ];
  
  generateHilbert();
}

function generateHilbert() {
  points = [];
  for (let i = 0; i < HILBERT_SIZE * HILBERT_SIZE; i++) {
    let pt = hilbert(i);
    points.push({
      x: map(pt.x, 0, HILBERT_SIZE - 1, 80, width - 80),
      y: map(pt.y, 0, HILBERT_SIZE - 1, 80, height - 80),
      idx: i
    });
  }
}

function hilbert(i) {
  const points = [
    [0, 0], [0, 1], [1, 1], [1, 0]
  ];
  let x = 0, y = 0;
  for (let s = 0; s < ORDER; s++) {
    let bit1 = (i >> (2 * s)) & 1;
    let bit2 = (i >> (2 * s + 1)) & 1;
    let rx = bit1;
    let ry = bit2 ^ bit1;
    
    let rot = (rx === 0) ? ry : (rx === 1 && ry === 0) ? 3 : 1;
    for (let r = 0; r < rot; r++) {
      [x, y] = [y, (1 << s) - 1 - x];
    }
    
    x += rx * (1 << s);
    y += ry * (1 << s);
  }
  return { x, y };
}

function draw() {
  background(10, 10, 8, 25);
  
  let progress = (t * 0.3) % 1;
  let activeCount = floor(points.length * progress);
  
  noFill();
  
  for (let i = 1; i < points.length; i++) {
    if (i > activeCount) break;
    
    let p1 = points[i - 1];
    let p2 = points[i];
    
    let hue = (i * 0.5 + t * 30) % 360;
    let sat = 70 + 30 * sin(i * 0.02 + t);
    let bri = 80 + 20 * sin(i * 0.05 + t * 2);
    
    stroke(hue, sat, bri, 60);
    strokeWeight(2);
    line(p1.x, p1.y, p2.x, p2.y);
    
    if (i % 50 === 0 || i === activeCount) {
      noStroke();
      fill(hue, 50, 100, 80);
      circle(p2.x, p2.y, 4 + 2 * sin(t * 5 + i * 0.1));
    }
  }
  
  // Glow effect at leading edge
  if (activeCount > 0 && activeCount < points.length) {
    let lead = points[activeCount];
    let glowSize = 20 + 10 * sin(t * 8);
    
    for (let r = glowSize; r > 0; r -= 3) {
      let alpha = map(r, 0, glowSize, 30, 0);
      noStroke();
      fill(60, 80, 100, alpha);
      circle(lead.x, lead.y, r * 2);
    }
  }
  
  // Grid of smaller hilberts in background
  drawBackgroundPattern();
  
  t += 0.015;
}

function drawBackgroundPattern() {
  let gridSize = 80;
  let subOrder = 3;
  let subSize = Math.pow(2, subOrder);
  
  for (let gx = 0; gx < width / gridSize + 1; gx++) {
    for (let gy = 0; gy < height / gridSize + 1; gy++) {
      let ox = gx * gridSize + 20;
      let oy = gy * gridSize + 20;
      
      let subProgress = (t * 0.5 + gx * 0.1 + gy * 0.1) % 1;
      let subCount = floor(subSize * subSize * subProgress);
      
      stroke(240, 30, 40, 15);
      strokeWeight(0.5);
      
      for (let i = 1; i < subCount && i < subSize * subSize; i++) {
        let p1 = hilbertSub(i - 1, subOrder);
        let p2 = hilbertSub(i, subOrder);
        
        p1.x = ox + map(p1.x, 0, subSize - 1, 0, gridSize - 40);
        p1.y = oy + map(p1.y, 0, subSize - 1, 0, gridSize - 40);
        p2.x = ox + map(p2.x, 0, subSize - 1, 0, gridSize - 40);
        p2.y = oy + map(p2.y, 0, subSize - 1, 0, gridSize - 40);
        
        line(p1.x, p1.y, p2.x, p2.y);
      }
    }
  }
}

function hilbertSub(i, order) {
  let x = 0, y = 0;
  for (let s = 0; s < order; s++) {
    let bit1 = (i >> (2 * s)) & 1;
    let bit2 = (i >> (2 * s + 1)) & 1;
    let rx = bit1;
    let ry = bit2 ^ bit1;
    
    let rot = (rx === 0) ? ry : (rx === 1 && ry === 0) ? 3 : 1;
    for (let r = 0; r < rot; r++) {
      [x, y] = [y, (1 << s) - 1 - x];
    }
    
    x += rx * (1 << s);
    y += ry * (1 << s);
  }
  return { x, y };
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  generateHilbert();
}
</script>
</body>
</html>
