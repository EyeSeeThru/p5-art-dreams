<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Aurora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const NUM_BANDS = 80;
    const NUM_PARTICLES = 400;
    let bands = [];
    let particles = [];
    
    class AuroraBand {
      constructor(x, index, total) {
        this.baseX = x;
        this.index = index;
        this.phase = random(TWO_PI);
        this.speed = random(0.005, 0.015);
        this.amplitude = random(60, 120);
        this.frequency = random(0.008, 0.02);
        this.hue = map(index, 0, total, 120, 280);
        this.alpha = random(30, 80);
        this.y = height * 0.5;
      }
      
      update(t) {
        this.phase += this.speed;
        this.y = height * 0.4 + sin(this.phase + t * 0.5) * this.amplitude * 
                 noise(this.index * 0.1, t * this.frequency);
      }
      
      draw(t) {
        noStroke();
        let yOffset = 0;
        for (let i = 0; i < 12; i++) {
          let localY = this.y + yOffset;
          let wave = sin(this.phase + t + i * 0.3) * 15;
          let h = this.hue + sin(t + i) * 20;
          let a = this.alpha - i * 2;
          if (a > 0) {
            fill(h, 70, 70, a);
            beginShape();
            for (let x = max(0, this.baseX - 100); x < min(width, this.baseX + 100); x += 8) {
              let y = localY + wave + sin(x * 0.02 + t + i) * 10;
              let alpha = a * (1 - abs(x - this.baseX) / 100);
              fill(h, 70, 70, alpha);
              vertex(x, y);
            }
            for (let x = min(width, this.baseX + 100); x > max(0, this.baseX - 100); x -= 8) {
              let y = localY + wave + 30 + sin(x * 0.02 + t + i) * 10;
              let alpha = a * (1 - abs(x - this.baseX) / 100);
              fill(h, 60, 50, alpha * 0.5);
              vertex(x, y);
            }
            endShape(CLOSE);
          }
          yOffset += 8;
        }
      }
    }
    
    class AuroraParticle {
      constructor() {
        this.reset();
      }
      
      reset() {
        this.x = random(width);
        this.y = random(height);
        this.vx = random(-0.3, 0.3);
        this.vy = random(-0.5, -0.1);
        this.size = random(1, 3);
        this.hue = random(120, 260);
        this.alpha = random(100, 255);
        this.life = random(100, 255);
        this.maxLife = this.life;
      }
      
      update(t) {
        let noiseX = noise(this.x * 0.005, this.y * 0.005, t * 0.3) * 2 - 1;
        let noiseY = noise(this.x * 0.005 + 100, this.y * 0.005, t * 0.3) * 2 - 1;
        this.vx += noiseX * 0.05;
        this.vy += noiseY * 0.02 - 0.01;
        this.vx *= 0.99;
        this.vy *= 0.99;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 1.5;
        if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > width + 10) {
          this.reset();
          this.y = height + 10;
        }
      }
      
      draw() {
        let a = map(this.life, 0, this.maxLife, 0, this.alpha);
        noStroke();
        fill(this.hue, 80, 90, a);
        circle(this.x, this.y, this.size);
      }
    }
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 255);
      for (let i = 0; i < NUM_BANDS; i++) {
        let x = map(i, 0, NUM_BANDS - 1, width * 0.1, width * 0.9);
        bands.push(new AuroraBand(x, i, NUM_BANDS));
      }
      for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push(new AuroraParticle());
      }
    }
    
    function draw() {
      background(0, 0, 5, 30);
      let t = frameCount * 0.01;
      for (let band of bands) {
        band.update(t);
        band.draw(t);
      }
      for (let p of particles) {
        p.update(t);
        p.draw();
      }
      drawStars();
    }
    
    function drawStars() {
      noStroke();
      randomSeed(42);
      for (let i = 0; i < 150; i++) {
        let x = random(width);
        let y = random(height * 0.7);
        let s = random(0.5, 2);
        let a = random(50, 150);
        fill(40, 20, 100, a);
        circle(x, y, s);
      }
    }
    
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
