<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Orbs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #020810; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Floating Orbs - Bioluminescent deep sea creatures with trailing tentacles
let orbs = [];
let particles = [];
let time = 0;
const NUM_ORBS = 8;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Create bioluminescent orbs
  for (let i = 0; i < NUM_ORBS; i++) {
    orbs.push(new BioOrb(
      random(width * 0.2, width * 0.8),
      random(height * 0.2, height * 0.7),
      random(20, 45)
    ));
  }
}

function draw() {
  background(220, 40, 3, 25);
  time += 0.015;
  
  // Draw ambient particles (marine snow)
  if (frameCount % 3 === 0) {
    particles.push(new AmbientParticle());
  }
  
  for (let p of particles) {
    p.update();
    p.display();
  }
  particles = particles.filter(p => p.life > 0);
  
  // Update and draw orbs
  for (let orb of orbs) {
    orb.update();
    orb.display();
  }
  
  // Draw depth layers (fake depth of field)
  for (let i = 0; i < 3; i++) {
    noStroke();
    fill(220, 30, 2, 3);
    rect(0, 0, width, height);
  }
}

class BioOrb {
  constructor(x, y, size) {
    this.x = x;
    this.y = y;
    this.size = size;
    this.baseX = x;
    this.baseY = y;
    this.phase = random(TWO_PI);
    this.pulseSpeed = random(0.02, 0.05);
    this.hue = random([160, 180, 200, 280, 300, 320]);
    this.tentacles = [];
    this.numTentacles = floor(random(6, 12));
    
    for (let i = 0; i < this.numTentacles; i++) {
      this.tentacles.push({
        angle: map(i, 0, this.numTentacles, 0, TWO_PI),
        length: size * random(1.5, 3),
        segments: [],
        phase: random(TWO_PI)
      });
      // Pre-populate segments
      for (let j = 0; j < 15; j++) {
        this.tentacles[i].segments.push({
          x: this.x,
          y: this.y,
          vx: 0,
          vy: 0
        });
      }
    }
  }
  
  update() {
    // Gentle drifting motion
    this.x = this.baseX + sin(time * 0.5 + this.phase) * 30;
    this.y = this.baseY + cos(time * 0.3 + this.phase) * 20;
    
    // Pulse
    this.pulse = 0.7 + sin(time * 2 + this.phase) * 0.3;
    
    // Update tentacles
    for (let t of this.tentacles) {
      let prevX = this.x;
      let prevY = this.y;
      
      for (let i = 0; i < t.segments.length; i++) {
        let seg = t.segments[i];
        let segLength = this.size / 8;
        
        // Wave motion
        let wave = sin(time * 2 + t.phase + i * 0.3) * (i * 0.5);
        let angle = t.angle + wave * 0.1;
        
        // Target position
        let targetX = prevX + cos(angle) * segLength;
        let targetY = prevY + sin(angle) * segLength;
        
        // Spring physics
        seg.vx += (targetX - seg.x) * 0.3;
        seg.vy += (targetY - seg.y) * 0.3;
        seg.vx *= 0.7;
        seg.vy *= 0.7;
        
        seg.x += seg.vx;
        seg.y += seg.vy;
        
        prevX = seg.x;
        prevY = seg.y;
      }
    }
  }
  
  display() {
    // Draw tentacles first (behind orb)
    for (let t of this.tentacles) {
      noFill();
      
      // Glow layer
      stroke(this.hue, 70, 100, 15);
      strokeWeight(this.size * 0.4);
      beginShape();
      curveVertex(this.x, this.y);
      for (let seg of t.segments) {
        curveVertex(seg.x, seg.y);
      }
      curveVertex(t.segments[t.segments.length-1].x, t.segments[t.segments.length-1].y);
      endShape();
      
      // Main tentacle
      stroke(this.hue, 60, 100, 50);
      strokeWeight(2);
      beginShape();
      curveVertex(this.x, this.y);
      for (let seg of t.segments) {
        curveVertex(seg.x, seg.y);
      }
      curveVertex(t.segments[t.segments.length-1].x, t.segments[t.segments.length-1].y);
      endShape();
    }
    
    // Outer glow
    let glowSize = this.size * 2 * this.pulse;
    for (let i = 5; i > 0; i--) {
      noStroke();
      fill(this.hue, 70, 100, 5);
      ellipse(this.x, this.y, glowSize + i * 15);
    }
    
    // Inner glow
    fill(this.hue, 50, 100, 30);
    ellipse(this.x, this.y, this.size * 1.2 * this.pulse);
    
    // Core
    fill(this.hue, 20, 100, 90);
    ellipse(this.x, this.y, this.size * 0.6 * this.pulse);
    
    // Bright center
    fill(0, 0, 100, 80);
    ellipse(this.x, this.y, this.size * 0.2 * this.pulse);
  }
}

class AmbientParticle {
  constructor() {
    this.x = random(width);
    this.y = height + 10;
    this.size = random(1, 3);
    this.speed = random(0.3, 1);
    this.drift = random(-0.5, 0.5);
    this.life = 255;
    this.hue = random([180, 200, 220, 280]);
  }
  
  update() {
    this.y -= this.speed;
    this.x += this.drift + sin(this.y * 0.01) * 0.3;
    this.life -= 1;
  }
  
  display() {
    noStroke();
    fill(this.hue, 30, 100, this.life * 0.4);
    ellipse(this.x, this.y, this.size);
    
    // Glow
    fill(this.hue, 40, 100, this.life * 0.15);
    ellipse(this.x, this.y, this.size * 3);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  orbs = [];
  setup();
}
</script>
</body>
</html>
