<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Echolocation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020208; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Echolocation — Bat sonar wave propagation
// Bats emit ultrasonic chirps that reflect off objects
// Visualize acoustic waves emanating from bat position
// Objects create echoes with time delay based on distance
// Wave interference patterns reveal object positions and shapes

let time = 0;
let bat;
let objects = [];
let waveFronts = [];
let mode = 'waves'; // 'waves', 'interference', 'sonar'

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Bat position at center-left
  bat = { x: width * 0.25, y: height * 0.5, angle: 0 };

  // Random objects (insects, obstacles)
  for (let i = 0; i < 12; i++) {
    objects.push({
      x: random(width * 0.4, width * 0.95),
      y: random(height * 0.1, height * 0.9),
      size: random(15, 40),
      type: random() > 0.5 ? 'insect' : 'leaf'
    });
  }

  textSize(11);
}

function draw() {
  background(240, 30, 3, 40);
  time += 0.016;

  // Update bat angle to scan
  bat.angle = sin(time * 0.5) * PI * 0.8;

  // Emit chirp waves periodically
  if (frameCount % 30 === 0) {
    emitWave(bat.x, bat.y, bat.angle);
  }

  if (mode === 'waves') {
    drawWaves();
  } else if (mode === 'interference') {
    drawInterference();
  } else {
    drawSonar();
  }

  // Draw bat
  drawBat();

  // Draw objects
  drawObjects();

  // Draw info
  drawInfo();
}

function emitWave(x, y, angle) {
  // Emit 3 concentric waves in quick succession (chirp)
  for (let i = 0; i < 3; i++) {
    waveFronts.push({
      x: x,
      y: y,
      r: 0,
      angle: angle,
      speed: 8 - i * 0.5,
      hue: 45 + i * 15,
      alpha: 80,
      echoes: []
    });
  }
}

function drawWaves() {
  noFill();
  for (let w of waveFronts) {
    // Only draw if within beam angle
    let dx = mouseX - w.x;
    let dy = mouseY - w.y;
    let beamWidth = PI / 3; // 60 degree beam

    // Update radius
    w.r += w.speed;

    // Check for echoes from objects
    for (let obj of objects) {
      let distToObj = dist(w.x, w.y, obj.x, obj.y);
      let echoDelay = distToObj / w.speed;

      // If wave front just passed the object, create echo
      if (abs(w.r - distToObj) < w.speed * 2 && w.echoes.indexOf(obj) === -1) {
        w.echoes.push(obj);
        // Echo wave emanates from object
        waveFronts.push({
          x: obj.x,
          y: obj.y,
          r: 0,
          angle: 0,
          speed: w.speed * 0.8,
          hue: 200,
          alpha: 50,
          echoes: [],
          isEcho: true
        });
      }
    }

    // Draw wave front
    if (w.r < max(width, height)) {
      // Only draw in beam direction
      let segments = 60;
      for (let i = 0; i < segments; i++) {
        let a = map(i, 0, segments, w.angle - PI / 4, w.angle + PI / 4);
        let px = w.x + cos(a) * w.r;
        let py = w.y + sin(a) * w.r;

        // Fade with distance
        let fade = map(w.r, 0, max(width, height), w.alpha, 0);
        stroke(w.hue, 70, 90, fade);
        strokeWeight(2);
        point(px, py);
      }

      // Glow
      stroke(w.hue, 60, 100, w.alpha * 0.2);
      strokeWeight(8);
      arc(w.x, w.y, w.r * 2, w.r * 2, w.angle - PI / 4, w.angle + PI / 4);
    }
  }

  // Remove old wave fronts
  waveFronts = waveFronts.filter(w => w.r < max(width, height) * 1.2);
}

function drawInterference() {
  // Show interference pattern from all wave sources
  loadPixels();
  let d = pixelDensity();
  let step = 4;

  for (let x = 0; x < width; x += step) {
    for (let y = 0; y < height; y += step) {
      let idx = (y * width + x) * 4 * d;
      let total = 0;

      for (let w of waveFronts) {
        let d = dist(x, y, w.x, w.y);
        let phase = (d - w.r) * 0.1;
        total += cos(phase) * map(w.r, 0, 500, 1, 0);
      }

      let bright = map(total, -5, 5, 0, 100);
      bright = constrain(bright, 0, 100);
      pixels[idx] = bright * 1.5;
      pixels[idx + 1] = bright * 0.8;
      pixels[idx + 2] = bright * 0.5;
      pixels[idx + 3] = 255;
    }
  }
  updatePixels();

  // Draw wave fronts
  noFill();
  for (let w of waveFronts) {
    if (w.r < max(width, height)) {
      stroke(w.hue, 70, 90, 30);
      strokeWeight(1);
      ellipse(w.x, w.y, w.r * 2, w.r * 2);
    }
  }
  waveFronts = waveFronts.filter(w => w.r < max(width, height) * 1.2);
}

function drawSonar() {
  // Classic sonar/radar display
  let cx = width * 0.35;
  let cy = height * 0.5;
  let maxR = min(width, height) * 0.4;

  // Background
  fill(240, 20, 5, 100);
  noStroke();
  ellipse(cx, cy, maxR * 2, maxR * 2);

  // Grid
  stroke(210, 15, 20, 30);
  strokeWeight(0.5);
  for (let r = maxR / 4; r <= maxR; r += maxR / 4) {
    ellipse(cx, cy, r * 2, r * 2);
  }
  for (let a = 0; a < PI * 2; a += PI / 6) {
    line(cx, cy, cx + cos(a) * maxR, cy + sin(a) * maxR);
  }

  // Sweep line
  let sweepAngle = -time * 0.5;
  stroke(60, 80, 90, 50);
  strokeWeight(1);
  line(cx, cy, cx + cos(sweepAngle) * maxR, cy + sin(sweepAngle) * maxR);

  // Blip at bat position (relative to sonar center)
  let batR = dist(cx, cy, bat.x, bat.y);
  let batAngle = atan2(bat.y - cy, bat.x - cx);

  // Draw bat blip
  if (batR < maxR) {
    noStroke();
    fill(60, 90, 90, 80);
    ellipse(bat.x, bat.y, 8, 8);
  }

  // Sweep reveals objects
  for (let obj of objects) {
    let objR = dist(cx, cy, obj.x, obj.y);
    let objAngle = atan2(obj.y - cy, obj.x - cx);

    // Normalize angles
    let diff = (sweepAngle - objAngle + PI) % (2 * PI) - PI;
    if (abs(diff) < 0.1 && objR < maxR) {
      // Object is being swept
      let fade = map(abs(diff), 0, 0.1, 100, 20);
      noStroke();
      fill(120, 70, 90, fade);
      ellipse(obj.x, obj.y, obj.size * 2, obj.size * 2);

      // Echo line back to bat
      stroke(120, 50, 60, fade * 0.5);
      strokeWeight(1);
      line(obj.x, obj.y, bat.x, bat.y);
    } else if (objR < maxR) {
      // Object already swept, fading blip
      noStroke();
      fill(120, 50, 70, 20);
      ellipse(obj.x, obj.y, obj.size * 1.5, obj.size * 1.5);
    }
  }
}

function drawBat() {
  push();
  translate(bat.x, bat.y);
  rotate(bat.angle + PI / 2);

  // Body
  fill(30, 40, 50);
  noStroke();
  ellipse(0, 0, 20, 30);

  // Head
  ellipse(0, -15, 15, 15);

  // Ears
  fill(30, 50, 60);
  triangle(-6, -12, -10, -28, -2, -15);
  triangle(6, -12, 10, -28, 2, -15);

  // Eyes (glowing)
  fill(60, 80, 90);
  ellipse(-4, -16, 4, 4);
  ellipse(4, -16, 4, 4);

  // Wings
  fill(30, 30, 40);
  noStroke();
  // Left wing
  beginShape();
  vertex(-10, 0);
  vertex(-40, -10 + sin(time * 10) * 5);
  vertex(-50, 10 + sin(time * 8) * 8);
  vertex(-30, 20 + sin(time * 12) * 3);
  vertex(-10, 15);
  endShape(CLOSE);
  // Right wing
  beginShape();
  vertex(10, 0);
  vertex(40, -10 + sin(time * 10 + 1) * 5);
  vertex(50, 10 + sin(time * 8 + 1) * 8);
  vertex(30, 20 + sin(time * 12 + 1) * 3);
  vertex(10, 15);
  endShape(CLOSE);

  pop();

  // Emit direction indicator
  stroke(60, 80, 80, 40);
  strokeWeight(2);
  let dirX = bat.x + cos(bat.angle) * 50;
  let dirY = bat.y + sin(bat.angle) * 50;
  line(bat.x, bat.y, dirX, dirY);
}

function drawObjects() {
  for (let obj of objects) {
    if (obj.type === 'insect') {
      // Insect body
      fill(40, 60, 60);
      noStroke();
      ellipse(obj.x, obj.y, obj.size, obj.size * 0.6);
      // Wings
      fill(40, 30, 70, 50);
      ellipse(obj.x - obj.size * 0.4, obj.y - obj.size * 0.2, obj.size * 0.5, obj.size * 0.3);
      ellipse(obj.x + obj.size * 0.4, obj.y - obj.size * 0.2, obj.size * 0.5, obj.size * 0.3);
      // Antennae
      stroke(40, 50, 60);
      strokeWeight(1);
      line(obj.x - 3, obj.y - obj.size * 0.3, obj.x - 8, obj.y - obj.size * 0.8);
      line(obj.x + 3, obj.y - obj.size * 0.3, obj.x + 8, obj.y - obj.size * 0.8);
    } else {
      // Leaf
      fill(100, 50, 50);
      noStroke();
      push();
      translate(obj.x, obj.y);
      rotate(obj.x * 0.01 + time * 0.1);
      ellipse(0, 0, obj.size, obj.size * 0.6);
      // Vein
      stroke(100, 40, 40);
      strokeWeight(1);
      line(-obj.size / 2, 0, obj.size / 2, 0);
      pop();
    }
  }
}

function drawInfo() {
  fill(195, 10, 80, 85);
  textSize(14);
  textAlign(LEFT, TOP);
  text('Echolocation — Bat Sonar Wave Propagation', 16, 16);
  fill(165, 8, 65, 75);
  textSize(10);
  text('Bats emit ultrasonic chirps that reflect off objects. Echo delay reveals distance.', 16, 38);
  text('Objects generate echo waves returning to bat. Interference patterns reveal spatial layout.', 16, 52);
  text('Mode: ' + mode.toUpperCase() + ' (click to cycle: waves | interference | sonar)', 16, 66);
  text('SPACE to scatter objects. Mouse to aim.', 16, 80);

  // Legend
  fill(45, 70, 90, 80);
  text('● Bat chirp (yellow)', 16, height - 50);
  fill(200, 70, 90, 80);
  text('● Echo waves (cyan)', 16, height - 35);
}

function mousePressed() {
  let modes = ['waves', 'interference', 'sonar'];
  let idx = modes.indexOf(mode);
  mode = modes[(idx + 1) % modes.length];
}

function keyPressed() {
  if (key === ' ') {
    // Scatter objects
    for (let obj of objects) {
      obj.x = random(width * 0.4, width * 0.95);
      obj.y = random(height * 0.1, height * 0.9);
    }
    waveFronts = [];
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  bat.x = width * 0.25;
  bat.y = height * 0.5;
}
</script>
</body>
</html>
