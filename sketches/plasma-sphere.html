<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plasma Sphere - p5 Art Dreams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Plasma Sphere - Glowing plasma ball with animated tendrils

let particles = [];
let tendrils = [];
let time = 0;
let centerX, centerY, sphereRadius;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  centerX = width / 2;
  centerY = height / 2;
  sphereRadius = min(width, height) * 0.15;
  
  // Initialize tendrils
  for (let i = 0; i < 12; i++) {
    tendrils.push(createTendril(i));
  }
  
  background(0);
}

function createTendril(index) {
  let angle = (TWO_PI / 12) * index;
  return {
    angle: angle,
    speed: random(0.01, 0.03),
    wobble: random(5, 15),
    length: sphereRadius * random(2, 4),
    segments: [],
    hue: random(280, 340), // Purple to magenta range
    phase: random(TWO_PI)
  };
}

function draw() {
  // Very subtle fade for trail effect
  background(0, 0, 0, 0.03);
  
  time += 0.03;
  
  // Draw central sphere glow
  drawCoreSphere();
  
  // Update and draw tendrils
  for (let tendril of tendrils) {
    updateTendril(tendril);
    drawTendril(tendril);
  }
  
  // Spawn particles from tendril tips
  if (random() < 0.3) {
    let tendril = random(tendrils);
    if (tendril.segments.length > 0) {
      let tip = tendril.segments[tendril.segments.length - 1];
      spawnParticle(tip.x, tip.y, tendril.hue);
    }
  }
  
  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.life -= p.decay;
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.98;
    p.vy *= 0.98;
    
    if (p.life <= 0) {
      particles.splice(i, 1);
    } else {
      drawParticle(p);
    }
  }
}

function drawCoreSphere() {
  // Multiple glow layers
  noStroke();
  
  // Outer glow
  for (let r = sphereRadius * 4; r > sphereRadius; r -= sphereRadius * 0.2) {
    let alpha = map(r, sphereRadius, sphereRadius * 4, 0.15, 0);
    fill(300, 80, 100, alpha);
    ellipse(centerX, centerY, r * 2);
  }
  
  // Inner bright core
  fill(320, 60, 100, 0.8);
  ellipse(centerX, centerY, sphereRadius * 0.8);
  
  // Bright center
  fill(60, 20, 100, 0.9); // Yellow-white
  ellipse(centerX, centerY, sphereRadius * 0.3);
  
  // Pulsing effect
  let pulse = sin(time * 2) * 0.2 + 0.8;
  fill(300, 40, 100, 0.3 * pulse);
  ellipse(centerX, centerY, sphereRadius * 1.5);
}

function updateTendril(tendril) {
  tendril.angle += tendril.speed;
  
  // Build segments
  let segments = [];
  let x = centerX;
  let y = centerY;
  
  let numSegments = floor(tendril.length / 10);
  
  for (let i = 0; i < numSegments; i++) {
    let progress = i / numSegments;
    let noiseVal = noise(i * 0.1, time * 0.5 + tendril.phase);
    let wobbleX = sin(noiseVal * TWO_PI + progress * 4) * tendril.wobble * progress;
    let wobbleY = cos(noiseVal * TWO_PI + progress * 4) * tendril.wobble * progress * 0.5;
    
    let angle = tendril.angle + wobbleX * 0.02;
    let dist = sphereRadius + i * 8;
    
    let segX = centerX + cos(angle) * dist + wobbleX;
    let segY = centerY + sin(angle) * dist * 0.5 + wobbleY;
    
    segments.push({
      x: segX,
      y: segY,
      progress: progress
    });
  }
  
  tendril.segments = segments;
}

function drawTendril(tendril) {
  if (tendril.segments.length < 2) return;
  
  // Draw glow layer
  for (let i = 0; i < tendril.segments.length - 1; i++) {
    let seg = tendril.segments[i];
    let nextSeg = tendril.segments[i + 1];
    let progress = seg.progress;
    
    let alpha = (1 - progress) * 0.4;
    let weight = (1 - progress) * 8 + 1;
    
    // Outer glow
    stroke(tendril.hue, 70, 100, alpha);
    strokeWeight(weight * 3);
    noFill();
    line(seg.x, seg.y, nextSeg.x, nextSeg.y);
  }
  
  // Draw core
  for (let i = 0; i < tendril.segments.length - 1; i++) {
    let seg = tendril.segments[i];
    let nextSeg = tendril.segments[i + 1];
    let progress = seg.progress;
    
    let alpha = (1 - progress) * 0.9;
    let weight = (1 - progress) * 3 + 0.5;
    
    stroke(tendril.hue, 50, 100, alpha);
    strokeWeight(weight);
    noFill();
    line(seg.x, seg.y, nextSeg.x, nextSeg.y);
  }
  
  // Bright tips
  let tip = tendril.segments[tendril.segments.length - 1];
  let tipAlpha = (sin(time * 5 + tendril.phase) * 0.3 + 0.7);
  
  noStroke();
  fill(tendril.hue, 40, 100, tipAlpha);
  ellipse(tip.x, tip.y, 8);
  
  // Glow at tip
  fill(tendril.hue, 60, 100, tipAlpha * 0.3);
  ellipse(tip.x, tip.y, 20);
}

function spawnParticle(x, y, hue) {
  let angle = random(TWO_PI);
  let speed = random(1, 4);
  
  particles.push({
    x: x,
    y: y,
    vx: cos(angle) * speed,
    vy: sin(angle) * speed,
    life: 1,
    decay: random(0.01, 0.03),
    hue: hue + random(-20, 20),
    size: random(2, 6)
  });
}

function drawParticle(p) {
  noStroke();
  
  // Glow
  fill(p.hue, 70, 100, p.life * 0.15);
  ellipse(p.x, p.y, p.size * 4);
  
  // Core
  fill(p.hue, 50, 100, p.life);
  ellipse(p.x, p.y, p.size);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  centerX = width / 2;
  centerY = height / 2;
  sphereRadius = min(width, height) * 0.15;
  tendrils = [];
  particles = [];
  for (let i = 0; i < 12; i++) {
    tendrils.push(createTendril(i));
  }
}
</script>
</body>
</html>
