<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flower of Life</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Flower of Life - Sacred Geometry with animated rotation and harmonic colors
let t = 0;
let layers = 4;
let baseRadius;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  baseRadius = min(width, height) / (layers * 2.5 + 2);
}

function draw() {
  background(240, 20, 5);
  translate(width / 2, height / 2);
  
  t += 0.008;
  
  // Outer glow ring
  noFill();
  for (let i = 60; i > 0; i--) {
    stroke(200, 60, 80, i * 0.5);
    strokeWeight(2);
    let r = baseRadius * layers * 2.2 + sin(t * 2 + i * 0.1) * 10;
    ellipse(0, 0, r * 2, r * 2);
  }
  
  // Draw the flower of life pattern
  drawFlower(0, 0, baseRadius, layers, t);
  
  // Central hexagon highlight
  drawHexagon(0, 0, baseRadius * 0.7, t * 0.5, 60);
  
  // Pulsing center orb
  let pulse = sin(t * 3) * 0.3 + 1;
  noStroke();
  fill(180, 80, 90, 80);
  ellipse(0, 0, baseRadius * 0.5 * pulse, baseRadius * 0.5 * pulse);
  fill(200, 60, 100, 90);
  ellipse(0, 0, baseRadius * 0.25 * pulse, baseRadius * 0.25 * pulse);
  
  // Corner seed of life accents
  for (let i = 0; i < 6; i++) {
    let angle = t * 0.3 + i * PI / 3;
    let cx = cos(angle) * baseRadius * 1.73;
    let cy = sin(angle) * baseRadius * 1.73;
    drawFlower(cx, cy, baseRadius, 1, -t * 0.7 + i);
  }
}

function drawFlower(x, y, r, n, phase) {
  push();
  translate(x, y);
  
  // Central circle
  drawCircle(0, 0, r, phase);
  
  // Surrounding circles (6 around)
  for (let i = 0; i < 6; i++) {
    let angle = phase + i * PI / 3;
    let cx = cos(angle) * r;
    let cy = sin(angle) * r;
    drawCircle(cx, cy, r, phase + 0.3);
    
    // Second layer for deeper layers
    if (n > 1) {
      for (let j = 0; j < 6; j++) {
        let a2 = phase + j * PI / 3;
        let c2x = cx + cos(a2) * r;
        let c2y = cy + sin(a2) * r;
        drawCircle(c2x, c2y, r, phase + 0.6);
        
        // Third layer
        if (n > 2) {
          for (let k = 0; k < 6; k++) {
            let a3 = phase + k * PI / 3;
            drawCircle(c2x + cos(a3) * r, c2y + sin(a3) * r, r, phase + 0.9);
          }
        }
      }
    }
  }
  
  pop();
}

function drawCircle(x, y, r, phase) {
  let hueShift = (phase * 20) % 360;
  let alpha = 40 + sin(phase * 2) * 20;
  
  // Glow
  noFill();
  for (let i = 5; i > 0; i--) {
    let glowAlpha = alpha * (i / 5) * 0.5;
    stroke((hueShift + 180) % 360, 70, 80, glowAlpha);
    strokeWeight(i * 2);
    ellipse(x, y, r * 2, r * 2);
  }
  
  // Main circle
  stroke(hueShift, 60, 90, alpha + 20);
  strokeWeight(1.5);
  ellipse(x, y, r * 2, r * 2);
  
  // Inner pattern
  stroke(hueShift, 40, 70, alpha * 0.6);
  strokeWeight(0.8);
  ellipse(x, y, r * 1.4, r * 1.4);
}

function drawHexagon(x, y, r, phase, alphaVal) {
  push();
  translate(x, y);
  rotate(phase);
  
  stroke(300, 60, 90, alphaVal);
  strokeWeight(2);
  beginShape();
  for (let i = 0; i < 6; i++) {
    let a = i * PI / 3;
    vertex(cos(a) * r, sin(a) * r);
  }
  endShape(CLOSE);
  
  // Inner triangle
  stroke(200, 50, 80, alphaVal * 0.7);
  strokeWeight(1.5);
  beginShape();
  for (let i = 0; i < 3; i++) {
    let a = i * TWO_PI / 3 + PI / 6;
    vertex(cos(a) * r * 0.7, sin(a) * r * 0.7);
  }
  endShape(CLOSE);
  
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  baseRadius = min(width, height) / (layers * 2.5 + 2);
}
</script>
</body>
</html>
