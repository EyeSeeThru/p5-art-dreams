<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levy Flight</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Levy Flight - Heavy-tailed random walk visualization
// Modeled after animal foraging patterns

let agents = [];
let numAgents = 80;
let trailAlpha = 8;
let colorShift = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(0);
  
  // Initialize agents at random positions
  for (let i = 0; i < numAgents; i++) {
    agents.push(new LevyAgent(random(width), random(height), i));
  }
}

function draw() {
  // Semi-transparent overlay for trail effect
  noStroke();
  fill(0, 0, 0, trailAlpha);
  rect(0, 0, width, height);
  
  // Update and draw all agents
  for (let agent of agents) {
    agent.update();
    agent.display();
  }
  
  // Subtle color shift over time
  colorShift += 0.1;
  if (colorShift > 360) colorShift = 0;
}

class LevyAgent {
  constructor(x, y, id) {
    this.pos = createVector(x, y);
    this.vel = createVector(0, 0);
    this.id = id;
    this.stepSize = 0;
    this.waitTime = 0;
    this.hue = (id * 360 / numAgents + colorShift) % 360;
    this.saturation = 70 + random(30);
    this.brightness = 80 + random(20);
  }
  
  update() {
    if (this.waitTime > 0) {
      this.waitTime--;
      return;
    }
    
    // Levy flight: heavy-tailed step distribution
    // Most steps are small, occasionally a very long one
    if (this.stepSize <= 0) {
      // Sample from power law: step = stepMin * u^(-1/mu)
      // where u is uniform random, mu controls tail weight
      let u = random(0.001, 1);
      let mu = 1.5; // Tail exponent (1 < mu <= 3)
      this.stepSize = pow(u, -1/mu) * 3;
      this.stepSize = min(this.stepSize, 300); // Cap maximum step
      
      // Random direction
      this.vel = p5.Vector.random2D();
      this.vel.mult(this.stepSize);
    }
    
    // Move
    this.pos.add(this.vel);
    this.stepSize -= this.vel.mag();
    
    // Wrap around edges with margin
    let margin = 50;
    if (this.pos.x < -margin) this.pos.x = width + margin;
    if (this.pos.x > width + margin) this.pos.x = -margin;
    if (this.pos.y < -margin) this.pos.y = height + margin;
    if (this.pos.y > height + margin) this.pos.y = -margin;
    
    // Occasionally change hue
    if (random() < 0.02) {
      this.hue = (this.hue + random(20, 60)) % 360;
    }
  }
  
  display() {
    let alpha = map(this.stepSize, 0, 300, 30, 90);
    stroke(this.hue, this.saturation, this.brightness, alpha);
    strokeWeight(1.5);
    
    let endPos = p5.Vector.sub(this.pos, this.vel);
    line(endPos.x, endPos.y, this.pos.x, this.pos.y);
    
    // Draw small glowing point at current position
    noStroke();
    fill(this.hue, this.saturation - 20, 100, 60);
    ellipse(this.pos.x, this.pos.y, 3, 3);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
}
</script>
</body>
</html>
