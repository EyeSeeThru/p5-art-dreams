<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brownian Tree</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Brownian Tree - Diffusion-Limited Aggregation
// Particles perform random walks and stick to form fractal structures

let particles = [];
let tree = [];
let maxParticles = 2000;
let stuckCount = 0;
let seedRadius = 30;
let walkSpeed = 2;
let colors;
let hueOffset = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(10);
  
  // Golden hour inspired palette
  colors = [
    color(35, 90, 100),   // Golden amber
    color(25, 95, 100),  // Deep orange
    color(15, 80, 100),  // Warm red-orange
    color(45, 70, 100),  // Yellow gold
    color(55, 60, 100),  // Pale yellow
  ];
  
  // Initialize seed at center
  let centerX = width / 2;
  let centerY = height / 2;
  
  // Create multiple seed points for branching
  for (let i = 0; i < 8; i++) {
    let angle = (TWO_PI / 8) * i;
    let sx = centerX + cos(angle) * seedRadius * 0.5;
    let sy = centerY + sin(angle) * seedRadius * 0.5;
    tree.push({ x: sx, y: sy, gen: 0 });
  }
  
  // Central seed
  tree.push({ x: centerX, y: centerY, gen: 0 });
  
  // Spawn initial walkers
  spawnParticles(100);
}

function spawnParticles(count) {
  for (let i = 0; i < count; i++) {
    particles.push(createWalker());
  }
}

function createWalker() {
  // Spawn from edges
  let side = floor(random(4));
  let x, y;
  
  switch(side) {
    case 0: // Top
      x = random(width);
      y = -10;
      break;
    case 1: // Right
      x = width + 10;
      y = random(height);
      break;
    case 2: // Bottom
      x = random(width);
      y = height + 10;
      break;
    case 3: // Left
      x = -10;
      y = random(height);
      break;
  }
  
  return {
    x: x,
    y: y,
    vx: random(-1, 1),
    vy: random(-1, 1),
    age: 0,
    maxAge: random(500, 1500)
  };
}

function draw() {
  // Semi-transparent background for subtle trails
  background(10, 0, 5, 3);
  
  // Update and draw stuck particles
  for (let i = 0; i < tree.length; i++) {
    let p = tree[i];
    let col = colors[i % colors.length];
    let h = (hue(col) + hueOffset) % 360;
    
    noStroke();
    fill(h, saturation(col), brightness(col), 80);
    
    let sz = map(p.gen, 0, 50, 4, 1);
    sz = max(sz, 1);
    ellipse(p.x, p.y, sz, sz);
  }
  
  // Update walkers
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    
    // Brownian motion
    p.vx += random(-0.3, 0.3);
    p.vy += random(-0.3, 0.3);
    
    // Damping
    p.vx *= 0.98;
    p.vy *= 0.98;
    
    // Limit spd
    let spd = sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > walkSpeed) {
      p.vx = (p.vx / spd) * walkSpeed;
      p.vy = (p.vy / spd) * walkSpeed;
    }
    
    p.x += p.vx;
    p.y += p.vy;
    p.age++;
    
    // Check if out of bounds or too old
    if (p.x < -50 || p.x > width + 50 || p.y < -50 || p.y > height + 50 || p.age > p.maxAge) {
      particles.splice(i, 1);
      continue;
    }
    
    // Check collision with tree
    for (let j = 0; j < tree.length; j++) {
      let t = tree[j];
      let d = dist(p.x, p.y, t.x, t.y);
      
      if (d < 3) {
        // Stick!
        tree.push({ x: p.x, y: p.y, gen: t.gen + 1 });
        particles.splice(i, 1);
        stuckCount++;
        hueOffset += 0.5;
        break;
      }
    }
  }
  
  // Maintain particle count
  if (particles.length < maxParticles && frameCount % 5 === 0) {
    spawnParticles(5);
  }
  
  // Add glow effect to newer particles
  if (stuckCount > 0 && stuckCount % 10 === 0) {
    noStroke();
    fill(45, 80, 100, 5);
    for (let i = max(0, tree.length - 50); i < tree.length; i++) {
      let p = tree[i];
      ellipse(p.x, p.y, 15, 15);
    }
  }
  
  // Gradually shift overall hue
  hueOffset += 0.02;
  
  // Stop when tree is large enough
  if (tree.length > 3000) {
    noLoop();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(10);
}
</script>
</body>
</html>
