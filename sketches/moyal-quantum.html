<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Moyal Quantum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Moyal Quantum — Moyal star product eigenfunctions in phase space
// Visualizes Gaussian wave packets evolving under the Moyal bracket
// ψ ⋆ ψ = ψ(x)exp(iħ(←∇x←∇p − ←∇p←∇x)/2) ψ(x+p)
// Rendered as phase space (x,p) with Wigner function contours
let t = 0;
const RES = 100;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
}

function draw() {
  background(5, 5, 8);

  let cx = width / 2, cy = height / 2;
  let scale = min(width, height) * 0.38;

  // Phase space: x horizontal, p vertical
  let xMin = -1.2, xMax = 1.2;
  let pMin = -1.2, pMax = 1.2;

  let cellW = width / RES, cellH = height / RES;

  for (let i = 0; i < RES; i++) {
    for (let j = 0; j < RES; j++) {
      let x = map(i, 0, RES, xMin, xMax);
      let p = map(j, 0, RES, pMin, pMax);

      // Gaussian wave packet: exp(-x²/2σ²) * exp(-p²/2σp²) * cos phase
      let sigma = 0.25 + 0.1 * sin(t * 0.3);
      let sigmaP = 0.2;

      // Primary packet
      let amp1 = exp(-x * x / (2 * sigma * sigma) - p * p / (2 * sigmaP * sigmaP));
      let phase1 = t * 2.0 + x * p * 4;

      // Secondary shifted packet (showing interference / Moyal product)
      let x2 = x - 0.5 * sin(t * 0.7);
      let p2 = p + 0.4 * cos(t * 0.5);
      let amp2 = 0.6 * exp(-x2 * x2 / (2 * sigma * sigma) - p2 * p2 / (2 * sigmaP * sigmaP));
      let phase2 = t * 1.5;

      // Moyal interference: when wave packets overlap, Wigner function oscillates
      let combined = amp1 * cos(phase1) + amp2 * cos(phase2);

      // Wigner function has negative regions (quantum!) — show as contour oscillations
      let wig = combined * (1.0 + 0.5 * exp(-20 * pow(x - 0.3 * sin(t * 0.4), 2) - 20 * pow(p - 0.3 * cos(t * 0.3), 2)));

      // Color: hue = phase, brightness = amplitude envelope, saturation = coherence
      let h = (degrees(atan2(
        amp1 * sin(phase1) + amp2 * sin(phase2),
        amp1 * cos(phase1) + amp2 * cos(phase2)
      )) + 360) % 360;
      let b = 70 + 30 * abs(wig);
      let s = 60 + 35 * abs(wig);
      let a = 40 + 60 * abs(wig);

      // Highlight negative Wigner regions (quantum interference)
      if (wig < 0) {
        a *= 0.5;
      }

      fill(h, s, b, a);
      rect(i * cellW, j * cellH, cellW * 0.9, cellH * 0.9);
    }
  }

  // Axis labels
  fill(255, 0, 60, 50);
  textSize(11);
  textAlign(CENTER, CENTER);
  text('x →', cx, height - 20);
  push();
  translate(18, cy);
  rotate(-HALF_PI);
  text('p →', 0, 0);
  pop();

  // Legend
  fill(255, 0, 70, 40);
  textSize(11);
  textAlign(LEFT, TOP);
  text('Moyal Quantum Phase Space  ·  Wigner function contours', 20, 20);
  text('Gaussian wave packets under Moyal ⋆-product evolution', 20, 36);

  t += deltaTime() * 0.001;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
