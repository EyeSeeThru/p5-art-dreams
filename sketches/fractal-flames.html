<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Flames</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Fractal Flames - Iterated Function System with creative variations
// Based on fractal flame algorithm with variations

let particles = [];
let numParticles = 8000;
let iterations = 12;
let colorPalette = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  background(0);
  
  // Color palette - electric dreams
  colorPalette = [
    color(280, 80, 100),  // purple
    color(320, 90, 100),  // magenta
    color(200, 90, 100),  // cyan
    color(50, 90, 100),   // yellow
    color(180, 80, 100),  // teal
    color(0, 80, 100),    // red
    color(260, 70, 90),    // violet
  ];
  
  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push(createParticle());
  }
}

function createParticle() {
  return {
    x: random(-2, 2),
    y: random(-2, 2),
    hue: random(360),
    variation: floor(random(4)), // 0-3 different transformations
    variationProb: random(),
  };
}

function applyTransform(p) {
  let x = p.x;
  let y = p.y;
  let n = p.variation;
  
  // Fractal flame-inspired transforms
  if (n === 0) {
    // Linear
    let r = sqrt(x*x + y*y);
    let a = atan2(y, x);
    x = r * cos(a + 0.1);
    y = r * sin(a + 0.1);
  } else if (n === 1) {
    // Sinusoidal with swirl
    let nx = sin(x * 2) + cos(y * 1.5);
    let ny = cos(x * 1.5) + sin(y * 2);
    x = nx * 0.7;
    y = ny * 0.7;
  } else if (n === 2) {
    // Spherical
    let r = x*x + y*y + 0.1;
    x = (x*x - y*y) / r;
    y = 2*x*y / r;
  } else {
    // Swirl
    let r2 = x*x + y*y;
    let a1 = 1 / (r2 + 0.1);
    let nx = x * sin(a1) - y * cos(a1);
    let ny = x * cos(a1) + y * sin(a1);
    x = nx * 0.9;
    y = ny * 0.9;
  }
  
  // Add some noise
  x += random(-0.02, 0.02);
  y += random(-0.02, 0.02);
  
  return { x, y };
}

function draw() {
  // Semi-transparent overlay for trails
  noStroke();
  fill(0, 0, 0, 0.03);
  rect(0, 0, width, height);
  
  // Draw particles
  for (let i = 0; i < 40; i++) { // Speed up
    let p = particles[i];
    
    // Apply transformations multiple times
    let px = p.x;
    let py = p.y;
    for (let j = 0; j < iterations; j++) {
      let result = applyTransform({ x: px, y: py, variation: (p.variation + j) % 4 });
      px = result.x;
      py = result.y;
    }
    
    // Map to screen coordinates
    let screenX = map(px, -3, 3, 0, width);
    let screenY = map(py, -3, 3, 0, height);
    
    // Draw with color
    if (screenX > 0 && screenX < width && screenY > 0 && screenY < height) {
      let col = colorPalette[p.variation % colorPalette.length];
      col.setAlpha(0.6);
      stroke(col);
      strokeWeight(1.5);
      point(screenX, screenY);
    }
    
    // Occasionally reset particle
    if (random() < 0.001) {
      let newP = createParticle();
      p.x = newP.x;
      p.y = newP.y;
      p.hue = newP.hue;
      p.variation = newP.variation;
    }
  }
  
  // Slowly cycle colors
  colorPalette = colorPalette.map((c, i) => {
    let h = (hue(c) + 0.1) % 360;
    return color(h, saturation(c), brightness(c));
  });
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
}
</script>
</body>
</html>
