<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Tunneling</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const particles = [];
const barriers = [];
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  // Create potential barriers
  barriers.push({ x: width * 0.4, w: 30, h: height * 0.6 });
  barriers.push({ x: width * 0.6, w: 20, h: height * 0.4 });
  
  // Initialize particles
  for (let i = 0; i < 120; i++) {
    particles.push(new QuantumParticle());
  }
}

function draw() {
  background(0, 0, 0, 0.15);
  
  // Draw barriers
  noStroke();
  for (let b of barriers) {
    // Barrier glow
    for (let i = 5; i > 0; i--) {
      fill(280, 80, 30, 0.03 * i);
      rect(b.x - b.w/2 - i*8, height/2 - b.h/2 - i*8, b.w + i*16, b.h + i*16, 4);
    }
    fill(280, 60, 40);
    rect(b.x - b.w/2, height/2 - b.h/2, b.w, b.h, 2);
  }
  
  // Update and draw particles
  for (let p of particles) {
    p.update();
    p.display();
  }
  
  // Draw wave interference pattern
  drawInterference();
  
  t += 0.02;
}

function drawInterference() {
  strokeWeight(1);
  for (let x = 0; x < width; x += 8) {
    for (let y = 0; y < height; y += 8) {
      let d = 0;
      for (let p of particles) {
        d += sin(dist(x, y, p.x, p.y) * 0.05 - t * 3) * p.amp;
      }
      let alpha = map(abs(d), 0, 5, 0, 0.3);
      stroke(200, 70, 80, alpha);
      point(x, y);
    }
  }
}

class QuantumParticle {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = random(-50, width * 0.2);
    this.y = height/2 + random(-height * 0.25, height * 0.25);
    this.vx = random(2, 4);
    this.vy = random(-0.5, 0.5);
    this.amp = random(0.5, 1.5);
    this.tunneled = false;
    this.hue = random(160, 240);
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    
    // Check barrier tunneling
    for (let b of barriers) {
      if (this.x > b.x - b.w/2 && this.x < b.x + b.w/2) {
        if (abs(this.y - height/2) < b.h/2) {
          // Tunneling probability based on barrier width
          let tunnelProb = exp(-b.w * 0.1);
          if (random() < tunnelProb) {
            this.tunneled = true;
            this.vx *= 1.5;
            this.hue = random(300, 360); // Pink after tunneling
          } else {
            // Reflected
            this.vx *= -0.8;
          }
        }
      }
    }
    
    // Wave-like motion
    this.y += sin(this.x * 0.02 + t) * 0.5;
    
    // Reset if off screen
    if (this.x > width + 50 || this.x < -100) {
      this.reset();
    }
  }
  
  display() {
    let alpha = this.tunneled ? 1 : 0.7;
    let size = this.tunneled ? 6 : 4;
    
    // Glow
    noStroke();
    for (let i = 3; i > 0; i--) {
      fill(this.hue, 70, 90, 0.1 * i * alpha);
      ellipse(this.x, this.y, size * (i + 1));
    }
    
    // Core
    fill(this.hue, 60, 100, alpha);
    ellipse(this.x, this.y, size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  barriers[0] = { x: width * 0.4, w: 30, h: height * 0.6 };
  barriers[1] = { x: width * 0.6, w: 20, h: height * 0.4 };
}
</script>
</body>
</html>
