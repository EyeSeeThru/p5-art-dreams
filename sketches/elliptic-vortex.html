<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elliptic Vortex</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #050508;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
<script>
// Elliptic Vortex - Vortex dynamics within an elliptic domain
// Uses conformal mapping to transform circular vortices into elliptic space
let t = 0;
let particles = [];
const NUM_PARTICLES = 800;
const A = 320; // semi-major axis
const B = 200; // semi-minor axis

function setup() {
  createCanvas(800, 800);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Initialize particles in elliptic domain
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(createParticle());
  }
}

function createParticle() {
  // Distribute particles in ellipse using rejection sampling
  let x, y;
  do {
    x = random(-A, A);
    y = random(-B, B);
  } while ((x*x)/(A*A) + (y*y)/(B*B) > 1);
  
  // Initial velocity from vortex field
  let angle = atan2(y, x);
  let r = sqrt(x*x + y*y);
  let ecc = sqrt(1 - (B*B)/(A*A));
  
  // Vortex velocity field with elliptic correction
  let speed = 1.5 + sin(angle * 3 + t * 0.5) * 0.8;
  let vx = -sin(angle) * speed * (1 + ecc * cos(angle));
  let vy = cos(angle) * speed * (1 + ecc * cos(angle));
  
  return {
    x: x + width/2,
    y: y + height/2,
    vx: vx,
    vy: vy,
    hue: random(180, 280), // cyan to magenta
    life: random(100, 300),
    maxLife: 300,
    size: random(1.5, 3)
  };
}

function draw() {
  // Fade effect for trails
  background(5, 8, 8, 25);
  
  let cx = width / 2;
  let cy = height / 2;
  
  // Draw elliptic boundary
  noFill();
  stroke(240, 30, 40, 50);
  strokeWeight(1);
  drawEllipse(cx, cy, A * 2, B * 2);
  
  // Update and draw particles
  for (let p of particles) {
    // Apply vortex dynamics with time variation
    let dx = p.x - cx;
    let dy = p.y - cy;
    let angle = atan2(dy, dx);
    let r = sqrt(dx*dx + dy*dy);
    
    // Check if inside ellipse
    let ex = (dx * dx) / (A * A) + (dy * dy) / (B * B);
    if (ex > 0.95) {
      // Near boundary - reflect with damping
      let normAngle = atan2(dy * A * A, dx * B * B);
      let reflectAngle = 2 * normAngle - angle + PI;
      p.vx = cos(reflectAngle) * abs(p.vx) * 0.5;
      p.vy = sin(reflectAngle) * abs(p.vy) * 0.5;
    }
    
    // Add swirling perturbation
    let swirl = sin(t * 0.3 + r * 0.02) * 0.15;
    p.vx += -sin(angle + PI/2) * swirl;
    p.vy += cos(angle + PI/2) * swirl;
    
    // Add radial breathing
    let breathe = cos(t * 0.2) * 0.1;
    p.vx += cos(angle) * breathe * 0.3;
    p.vy += sin(angle) * breathe * 0.3;
    
    // Damping
    p.vx *= 0.98;
    p.vy *= 0.98;
    
    // Update position
    p.x += p.vx;
    p.y += p.vy;
    
    // Decrease life
    p.life--;
    
    // Color cycling based on life and position
    let hueShift = (t * 20 + r * 0.5) % 360;
    let saturation = map(p.life, 0, p.maxLife, 20, 80);
    let brightness = map(p.life, 0, p.maxLife, 30, 90);
    let alpha = map(p.life, 0, p.maxLife/4, 0, 60);
    
    // Draw particle with glow
    noStroke();
    fill((p.hue + hueShift) % 360, saturation, brightness, alpha);
    
    // Outer glow
    for (let i = 3; i > 0; i--) {
      fill((p.hue + hueShift) % 360, saturation, brightness, alpha / (i * 2));
      ellipse(p.x, p.y, p.size * i * 1.5, p.size * i * 1.5);
    }
    
    // Core
    fill((p.hue + hueShift) % 360, saturation * 0.5, brightness, alpha * 2);
    ellipse(p.x, p.y, p.size, p.size);
    
    // Reset dead particles
    if (p.life <= 0) {
      Object.assign(p, createParticle());
    }
  }
  
  // Add center glow
  let glowSize = 60 + sin(t * 0.5) * 20;
  for (let i = 5; i > 0; i--) {
    fill(240, 60, 30, 3);
    ellipse(cx, cy, glowSize * i, glowSize * i * 0.6);
  }
  
  t += 0.02;
}

function drawEllipse(cx, cy, w, h) {
  beginShape();
  for (let a = 0; a < TWO_PI; a += 0.1) {
    let x = cx + (w/2) * cos(a);
    let y = cy + (h/2) * sin(a);
    vertex(x, y);
  }
  endShape(CLOSE);
}
</script>
</body>
</html>
