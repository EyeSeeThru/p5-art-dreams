<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dyson Swarm</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Dyson Swarm - Orbiting solar collectors
const collectors = [];
const numCollectors = 180;
const particles = [];
const numParticles = 400;
let centralStar;

function setup() {
  createCanvas(windowWidth, windowHeight);
  
  // Central star
  centralStar = {
    x: 0, y: 0, z: 0,
    radius: 25,
    pulse: 0
  };
  
  // Create orbiting collectors in shell layers
  for (let i = 0; i < numCollectors; i++) {
    const layer = i % 3;
    const radius = 80 + layer * 60 + random(-10, 10);
    const theta = random(TWO_PI);
    const phi = random(-PI/3, PI/3);
    
    collectors.push({
      radius: radius,
      theta: theta,
      phi: phi,
      speed: 0.002 + random(0.001) * (1 - layer * 0.3),
      layer: layer,
      size: 3 + random(3),
      tilt: random(TWO_PI),
      tiltSpeed: random(0.01, 0.03)
    });
  }
  
  // Energy particles
  for (let i = 0; i < numParticles; i++) {
    particles.push(createParticle());
  }
}

function createParticle() {
  const angle = random(TWO_PI);
  const dist = random(30, 200);
  return {
    angle: angle,
    dist: dist,
    speed: random(0.5, 1.5),
    size: random(1, 3),
    brightness: random(150, 255),
    wobble: random(100)
  };
}

function draw() {
  background(0, 0, 0, 40);
  translate(width/2, height/2);
  
  centralStar.pulse += 0.05;
  const pulseSize = centralStar.radius + sin(centralStar.pulse) * 3;
  
  // Draw central star with glow
  noStroke();
  for (let r = 80; r > 0; r -= 10) {
    const alpha = map(r, 80, 0, 5, 40);
    fill(255, 200, 100, alpha);
    ellipse(0, 0, r * 2, r * 2);
  }
  
  // Core
  fill(255, 240, 200);
  ellipse(0, 0, pulseSize, pulseSize);
  
  // Inner bright core
  fill(255, 255, 255);
  ellipse(0, 0, pulseSize * 0.6, pulseSize * 0.6);
  
  // Energy particles spiraling in
  for (let p of particles) {
    p.angle += p.speed * 0.02;
    p.dist -= 0.3;
    p.wobble += 0.05;
    
    if (p.dist < 40) {
      Object.assign(p, createParticle());
    }
    
    const x = cos(p.angle) * p.dist;
    const y = sin(p.angle) * p.dist + sin(p.wobble) * 5;
    const alpha = map(p.dist, 40, 200, 255, 50);
    
    fill(100, 200, 255, alpha);
    ellipse(x, y, p.size, p.size);
  }
  
  // Draw collectors by layer (back to front)
  const sortedCollectors = [...collectors].sort((a, b) => a.radius - b.radius);
  
  for (let c of sortedCollectors) {
    c.theta += c.speed;
    c.tilt += c.tiltSpeed;
    
    // 3D to 2D projection
    const x = c.radius * cos(c.theta) * cos(c.phi);
    const y = c.radius * sin(c.theta) * cos(c.phi);
    const z = c.radius * sin(c.phi);
    
    // Perspective scaling
    const perspective = 800 / (800 - z);
    const screenX = x * perspective;
    const screenY = y * perspective;
    const screenSize = c.size * perspective;
    
    // Depth-based alpha
    const depthAlpha = map(z, -100, 100, 80, 255);
    
    // Layer colors
    const colors = [
      [100, 200, 255],  // Blue
      [180, 140, 255],  // Purple  
      [255, 180, 100]   // Orange
    ];
    const col = colors[c.layer];
    
    // Draw collector
    push();
    translate(screenX, screenY);
    rotate(c.tilt);
    
    noStroke();
    
    // Glow
    fill(col[0], col[1], col[2], 30);
    ellipse(0, 0, screenSize * 4, screenSize * 4);
    
    // Panel
    fill(col[0], col[1], col[2], depthAlpha);
    ellipse(0, 0, screenSize * 1.5, screenSize);
    
    // Highlight
    fill(255, 255, 255, depthAlpha * 0.5);
    ellipse(screenSize * 0.2, -screenSize * 0.1, screenSize * 0.4, screenSize * 0.3);
    
    pop();
  }
  
  // Orbital rings
  noFill();
  strokeWeight(1);
  for (let r = 100; r <= 250; r += 75) {
    stroke(100, 100, 150, 20);
    ellipse(0, 0, r * 2, r * 2);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
