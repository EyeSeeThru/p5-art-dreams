<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plasma Turbulence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let myShader;

const vert = `
attribute vec3 aPosition;
attribute vec2 aTexCoord;
varying vec2 vTexCoord;
void main() {
  vTexCoord = aTexCoord;
  vec4 positionVec4 = vec4(aPosition, 1.0);
  positionVec4.xy = positionVec4.xy * 2.0 - 1.0;
  gl_Position = positionVec4;
}
`;

const frag = `
precision highp float;
varying vec2 vTexCoord;
uniform float uTime;
uniform vec2 uResolution;

// Simplex noise functions
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

float snoise(vec2 v) {
  const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
  vec2 i  = floor(v + dot(v, C.yy));
  vec2 x0 = v - i + dot(i, C.xx);
  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
  vec4 x12 = x0.xyxy + C.xxzz;
  x12.xy -= i1;
  i = mod289(i);
  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
  m = m*m; m = m*m;
  vec3 x = 2.0 * fract(p * C.www) - 1.0;
  vec3 h = abs(x) - 0.5;
  vec3 ox = floor(x + 0.5);
  vec3 a0 = x - ox;
  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
  vec3 g;
  g.x = a0.x * x0.x + h.x * x0.y;
  g.yz = a0.yz * x12.xz + h.yz * x12.yw;
  return 130.0 * dot(m, g);
}

float fbm(vec2 p) {
  float f = 0.0;
  float w = 0.5;
  for (int i = 0; i < 5; i++) {
    f += w * snoise(p);
    p *= 2.0;
    w *= 0.5;
  }
  return f;
}

vec3 palette(float t) {
  vec3 a = vec3(0.5, 0.5, 0.5);
  vec3 b = vec3(0.5, 0.5, 0.5);
  vec3 c = vec3(1.0, 1.0, 1.0);
  vec3 d = vec3(0.263, 0.416, 0.557);
  return a + b * cos(6.28318 * (c * t + d));
}

void main() {
  vec2 uv = vTexCoord;
  vec2 p = uv * 4.0 - 2.0;
  p.x *= uResolution.x / uResolution.y;
  
  float t = uTime * 0.15;
  
  // Multiple layers of turbulent plasma
  float n1 = fbm(p + vec2(t * 0.3, t * 0.2));
  float n2 = fbm(p * 1.5 + vec2(-t * 0.2, t * 0.4) + n1 * 0.5);
  float n3 = fbm(p * 0.8 + vec2(t * 0.1, -t * 0.3) + n2 * 0.3);
  
  float plasma = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;
  plasma = plasma * 0.5 + 0.5;
  
  // Add swirling motion
  float swirl = snoise(vec2(p.x + t, p.y - t * 0.5)) * 0.3;
  plasma += swirl;
  
  // Color mapping with vibrant palette
  vec3 col = palette(plasma + t * 0.2);
  
  // Add bright hotspots
  float hotspot = pow(plasma, 3.0) * 2.0;
  col += vec3(hotspot * 0.5, hotspot * 0.3, hotspot * 0.8);
  
  // Vignette
  float vig = 1.0 - length(uv - 0.5) * 0.8;
  col *= vig;
  
  gl_FragColor = vec4(col, 1.0);
}
`;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  myShader = createShader(vert, frag);
}

function draw() {
  myShader.setUniform('uTime', frameCount * 0.016);
  myShader.setUniform('uResolution', [width, height]);
  shader(myShader);
  rect(0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
