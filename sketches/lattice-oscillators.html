<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice Oscillators</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const cols = 40;
const rows = 40;
let grid = [];
let prevGrid = [];
let damping = 0.99;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  for (let i = 0; i < cols; i++) {
    grid[i] = [];
    prevGrid[i] = [];
    for (let j = 0; j < rows; j++) {
      grid[i][j] = 0;
      prevGrid[i][j] = 0;
    }
  }
  
  // Initial disturbance in center
  let centerX = floor(cols / 2);
  let centerY = floor(rows / 2);
  for (let i = -3; i <= 3; i++) {
    for (let j = -3; j <= 3; j++) {
      if (i*i + j*j <= 9) {
        grid[centerX + i][centerY + j] = random(0.5, 1);
      }
    }
  }
}

function draw() {
  background(0);
  
  // Wave equation simulation
  let nextGrid = [];
  for (let i = 0; i < cols; i++) {
    nextGrid[i] = [];
    for (let j = 0; j < rows; j++) {
      if (i === 0 || i === cols - 1 || j === 0 || j === rows - 1) {
        nextGrid[i][j] = 0;
      } else {
        let laplacian = (
          prevGrid[i-1][j] + prevGrid[i+1][j] +
          prevGrid[i][j-1] + prevGrid[i][j+1]
        ) / 4 - grid[i][j];
        
        nextGrid[i][j] = (2 * grid[i][j] - prevGrid[i][j] + laplacian) * damping;
      }
    }
  }
  
  // Swap grids
  for (let i = 0; i < cols; i++) {
    prevGrid[i] = [...grid[i]];
    grid[i] = [...nextGrid[i]];
  }
  
  // Add periodic disturbances
  if (frameCount % 60 === 0) {
    let rx = floor(random(2, cols - 2));
    let ry = floor(random(2, rows - 2));
    grid[rx][ry] = 1.5;
  }
  
  // Render
  let cellW = width / cols;
  let cellH = height / rows;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let val = grid[i][j];
      let hue = map(val, -1, 1, 180, 300);
      hue = constrain(hue, 180, 320);
      let sat = map(abs(val), 0, 1, 30, 90);
      let bri = map(abs(val), 0, 1, 20, 100);
      
      fill(hue, sat, bri);
      noStroke();
      rect(i * cellW, j * cellH, cellW + 1, cellH + 1);
    }
  }
  
  // Add glow overlay
  blendMode(ADD);
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let val = grid[i][j];
      if (abs(val) > 0.3) {
        let alpha = map(abs(val), 0.3, 1, 0, 0.15);
        fill(280, 80, 100, alpha);
        let glowSize = map(abs(val), 0.3, 1, cellW, cellW * 3);
        ellipse(i * cellW + cellW/2, j * cellH + cellH/2, glowSize, glowSize);
      }
    }
  }
  blendMode(BLEND);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  let i = floor(mouseX / (width / cols));
  let j = floor(mouseY / (height / rows));
  if (i > 0 && i < cols - 1 && j > 0 && j < rows - 1) {
    grid[i][j] = 2;
  }
}
</script>
</body>
</html>
