<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice Oscillators</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Simplified lattice oscillators - wave simulation with cleaner rendering
const GRID_SIZE = 25;
let grid = [];
let prevGrid = [];
const damping = 0.985;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  pixelDensity(1);
  
  for (let i = 0; i < GRID_SIZE; i++) {
    grid[i] = [];
    prevGrid[i] = [];
    for (let j = 0; j < GRID_SIZE; j++) {
      grid[i][j] = 0;
      prevGrid[i][j] = 0;
    }
  }
}

function draw() {
  background(0, 0, 3);
  
  // Wave simulation
  let nextGrid = [];
  for (let i = 0; i < GRID_SIZE; i++) {
    nextGrid[i] = [];
    for (let j = 0; j < GRID_SIZE; j++) {
      if (i === 0 || i === GRID_SIZE - 1 || j === 0 || j === GRID_SIZE - 1) {
        nextGrid[i][j] = 0;
      } else {
        let laplacian = (
          prevGrid[i-1][j] + prevGrid[i+1][j] +
          prevGrid[i][j-1] + prevGrid[i][j+1]
        ) / 4 - grid[i][j];
        
        nextGrid[i][j] = (2 * grid[i][j] - prevGrid[i][j] + laplacian) * damping;
      }
    }
  }
  
  // Swap grids
  for (let i = 0; i < GRID_SIZE; i++) {
    prevGrid[i] = [...grid[i]];
    grid[i] = [...nextGrid[i]];
  }
  
  // Random disturbances
  if (frameCount % 30 === 0) {
    let rx = floor(random(2, GRID_SIZE - 2));
    let ry = floor(random(2, GRID_SIZE - 2));
    grid[rx][ry] = random(0.8, 1.2);
  }
  
  // Render - simplified
  let cellW = width / GRID_SIZE;
  let cellH = height / GRID_SIZE;
  let margin = cellW * 0.15;
  
  noStroke();
  for (let i = 0; i < GRID_SIZE; i++) {
    for (let j = 0; j < GRID_SIZE; j++) {
      let val = grid[i][j];
      let absVal = abs(val);
      
      if (absVal > 0.02) {
        // Color based on value
        let hue = val > 0 ? map(absVal, 0, 1, 200, 280) : map(absVal, 0, 1, 320, 360);
        hue = constrain(hue, 180, 360);
        
        let size = map(absVal, 0, 1, 0.3, 0.85);
        
        fill(hue, map(absVal, 0, 1, 50, 90), map(absVal, 0, 1, 60, 100), 0.9);
        
        let cx = i * cellW + cellW / 2;
        let cy = j * cellH + cellH / 2;
        ellipse(cx, cy, cellW * size, cellH * size);
      }
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  let i = floor(mouseX / (width / GRID_SIZE));
  let j = floor(mouseY / (height / GRID_SIZE));
  if (i > 0 && i < GRID_SIZE - 1 && j > 0 && j < GRID_SIZE - 1) {
    grid[i][j] = 1.5;
  }
}
</script>
</body>
</html>
