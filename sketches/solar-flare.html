<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Flare</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let particles = [];
let flares = [];
let numParticles = 800;
let numFlares = 12;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push(new Particle());
  }
  
  // Initialize flares
  for (let i = 0; i < numFlares; i++) {
    flares.push(new Flare());
  }
}

function draw() {
  // Deep space background with subtle stars
  background(5, 10, 8);
  
  // Draw distant stars
  drawStars();
  
  // Draw the sun
  drawSun();
  
  // Update and draw flares
  for (let flare of flares) {
    flare.update();
    flare.draw();
  }
  
  // Update and draw particles
  for (let p of particles) {
    p.update();
    p.draw();
  }
}

function drawStars() {
  randomSeed(42);
  for (let i = 0; i < 200; i++) {
    let x = random(width);
    let y = random(height);
    let size = random(0.5, 2);
    let brightness = random(30, 80);
    noStroke();
    fill(220, 10, brightness);
    ellipse(x, y, size);
  }
}

function drawSun() {
  let cx = width / 2;
  let cy = height / 2;
  let baseRadius = min(width, height) * 0.15;
  
  // Outer corona glow
  for (let r = baseRadius * 3; r > baseRadius; r -= 3) {
    let alpha = map(r, baseRadius, baseRadius * 3, 0.4, 0);
    fill(45, 100, 100, alpha);
    noStroke();
    ellipse(cx, cy, r * 2);
  }
  
  // Inner corona
  for (let r = baseRadius * 1.5; r > baseRadius * 0.8; r -= 2) {
    let alpha = map(r, baseRadius * 0.8, baseRadius * 1.5, 0.6, 0.2);
    fill(30, 100, 100, alpha);
    ellipse(cx, cy, r * 2);
  }
  
  // Sun surface
  for (let r = baseRadius; r > 0; r -= 1) {
    let hue = map(r, 0, baseRadius, 10, 50);
    let bri = map(r, 0, baseRadius, 100, 90);
    fill(hue, 90, bri);
    ellipse(cx, cy, r * 2);
  }
  
  // Bright core
  fill(60, 20, 100);
  ellipse(cx, cy, baseRadius * 0.5);
}

class Particle {
  constructor() {
    this.reset();
  }
  
  reset() {
    let cx = width / 2;
    let cy = height / 2;
    let angle = random(TWO_PI);
    let dist = random(min(width, height) * 0.1, min(width, height) * 0.4);
    
    this.pos = createVector(cx + cos(angle) * dist, cy + sin(angle) * dist);
    this.vel = createVector(0, 0);
    this.acc = createVector(0, 0);
    this.life = random(100, 255);
    this.maxLife = this.life;
    this.size = random(1, 4);
    this.hue = random(20, 60);
  }
  
  update() {
    let cx = width / 2;
    let cy = height / 2;
    
    // Attraction to sun with some chaos
    let toSun = createVector(cx - this.pos.x, cy - this.pos.y);
    let dist = toSun.mag();
    toSun.normalize();
    
    // Coronal mass ejection effect
    let ejection = map(dist, 0, min(width, height) * 0.4, 0.8, 0.1);
    toSun.mult(ejection);
    
    // Add some turbulence
    let noiseScale = 0.005;
    let nx = (noise(this.pos.x * noiseScale, frameCount * 0.01) - 0.5) * 0.5;
    let ny = (noise(this.pos.y * noiseScale, frameCount * 0.01 + 100) - 0.5) * 0.5;
    
    this.acc.add(toSun);
    this.acc.add(nx, ny);
    
    this.vel.add(this.acc);
    this.vel.limit(4);
    this.pos.add(this.vel);
    this.acc.mult(0);
    
    // Life decay
    this.life -= 0.5;
    
    // Reset if dead or too far
    if (this.life <= 0 || dist > min(width, height) * 0.6 || dist < min(width, height) * 0.05) {
      this.reset();
    }
  }
  
  draw() {
    let alpha = map(this.life, 0, this.maxLife, 0, 0.8);
    fill(this.hue, 80, 100, alpha);
    noStroke();
    ellipse(this.pos.x, this.pos.y, this.size);
  }
}

class Flare {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.angle = random(TWO_PI);
    this.length = random(min(width, height) * 0.2, min(width, height) * 0.5);
    this.thickness = random(2, 8);
    this.speed = random(0.005, 0.02);
    this.wobble = random(0.5, 2);
    this.hue = random(20, 50);
    this.life = random(50, 150);
    this.maxLife = this.life;
    this.active = true;
  }
  
  update() {
    this.angle += this.speed;
    this.life -= 1;
    
    if (this.life <= 0) {
      this.reset();
    }
  }
  
  draw() {
    let cx = width / 2;
    let cy = height / 2;
    let baseRadius = min(width, height) * 0.15;
    
    let startX = cx + cos(this.angle) * baseRadius;
    let startY = cy + sin(this.angle) * baseRadius;
    
    // Wobble effect
    let wobbleOffset = sin(frameCount * 0.05 + this.wobble) * 20;
    let endX = cx + cos(this.angle) * (baseRadius + this.length + wobbleOffset);
    let endY = cy + sin(this.angle) * (baseRadius + this.length + wobbleOffset);
    
    // Draw flare arc
    let alpha = map(this.life, 0, this.maxLife, 0, 0.6);
    let steps = 20;
    
    for (let i = 0; i < steps; i++) {
      let t = i / steps;
      let x = lerp(startX, endX, t);
      let y = lerp(startY, endY, t);
      let size = this.thickness * (1 - t * 0.8);
      let hue = this.hue + t * 20;
      
      fill(hue, 90, 100, alpha * (1 - t * 0.5));
      noStroke();
      ellipse(x, y, size);
    }
    
    // Bright tip
    fill(this.hue + 20, 50, 100, alpha * 0.8);
    ellipse(endX, endY, this.thickness * 0.5);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
