<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sand Oscillation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Sand Oscillation - Granular wave patterns
const particles = [];
const PARTICLE_COUNT = 800;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new GrainParticle());
  }
}

function draw() {
  // Semi-transparent background for trail effect
  background(250, 8, 8, 15);
  
  for (let p of particles) {
    p.update();
    p.display();
  }
  
  time += 0.015;
}

class GrainParticle {
  constructor() {
    this.baseX = random(width);
    this.baseY = random(height);
    this.size = random(1.5, 4);
    this.offset = random(TWO_PI * 2);
    this.speed = random(0.5, 1.5);
    this.amplitude = random(30, 80);
    this.frequency = random(0.002, 0.008);
    this.hue = random(180, 280);
  }
  
  update() {
    // Multiple wave layers
    let wave1 = sin(time * this.speed + this.baseX * this.frequency + this.offset) * this.amplitude;
    let wave2 = cos(time * this.speed * 0.7 + this.baseY * this.frequency * 1.3) * this.amplitude * 0.6;
    let wave3 = sin(time * this.speed * 1.2 + (this.baseX + this.baseY) * this.frequency * 0.8) * this.amplitude * 0.4;
    
    this.x = this.baseX + wave1 + wave2;
    this.y = this.baseY + wave2 + wave3;
    
    // Add slight noise for organic feel
    this.x += noise(this.baseX * 0.01, time * 0.5) * 20 - 10;
    this.y += noise(this.baseY * 0.01, time * 0.5 + 100) * 20 - 10;
    
    // Color cycling
    this.hue = (this.hue + 0.1) % 360;
    this.sat = 60 + sin(time * 0.5 + this.offset) * 20;
    this.bri = 70 + sin(time * 0.3 + this.baseX * 0.01) * 30;
  }
  
  display() {
    let alpha = map(this.size, 1.5, 4, 40, 80);
    fill(this.hue, this.sat, this.bri, alpha);
    ellipse(this.x, this.y, this.size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  // Reinitialize particles on resize
  particles.length = 0;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new GrainParticle());
  }
}
</script>
</body>
</html>
