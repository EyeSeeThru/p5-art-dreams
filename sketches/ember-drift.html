<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ember Drift</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #010101; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Ember Drift — Embers Floating Through Darkness
// Artistic, meditative, hypnotic
// Individual embers rising at different speeds

let embers = [];
const NUM_EMBERS = 80;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Initialize embers
  for (let i = 0; i < NUM_EMBERS; i++) {
    embers.push(createEmber(random(height * 0.7, height)));
  }
}

function createEmber(startY) {
  return {
    x: random(width),
    y: startY,
    size: random(1.5, 5),
    speed: random(0.3, 1.2),
    hue: random(0, 45), // Red to orange to yellow
    saturation: random(70, 100),
    brightness: random(80, 100),
    alpha: random(50, 90),
    wobbleAmp: random(0.5, 2),
    wobbleFreq: random(0.01, 0.04),
    wobblePhase: random(TWO_PI),
    flickerSpeed: random(0.05, 0.15),
    life: 1.0,
    decay: random(0.0003, 0.0008)
  };
}

function draw() {
  // Dark background with subtle warmth at bottom
  background(0, 20, 1);

  time += 0.01;

  // Draw heat glow at bottom
  drawHeatGlow();

  // Update and draw embers
  for (let i = embers.length - 1; i >= 0; i--) {
    let e = embers[i];

    // Update position
    e.y -= e.speed;
    e.x += sin(time * e.wobbleFreq * 60 + e.wobblePhase) * e.wobbleAmp;

    // Flicker
    let flicker = sin(time * e.flickerSpeed * 60) * 0.3 + 0.7;
    e.alpha = (80 + sin(time * 30 + i) * 20) * flicker * e.life;

    // Decay
    e.life -= e.decay;

    // Remove dead embers
    if (e.life <= 0 || e.y < -20) {
      embers.splice(i, 1);
      continue;
    }

    // Draw ember
    drawEmber(e);
  }

  // Spawn new embers
  if (embers.length < NUM_EMBERS && frameCount % 3 === 0) {
    embers.push(createEmber(height + random(10, 50)));
  }

  // Occasional ember burst
  if (random() < 0.005 && embers.length < NUM_EMBERS * 1.5) {
    for (let j = 0; j < 8; j++) {
      let e = createEmber(height + random(10, 50));
      e.x = random(width);
      e.speed *= random(1.5, 3);
      embers.push(e);
    }
  }

  // Draw subtle heat shimmer at bottom
  drawHeatShimmer();
}

function drawEmber(e) {
  noStroke();

  // Outer glow
  fill(e.hue, e.saturation, e.brightness * 0.3, e.alpha * 0.2);
  ellipse(e.x, e.y, e.size * 6, e.size * 6);

  // Middle glow
  fill(e.hue, e.saturation * 0.8, e.brightness * 0.6, e.alpha * 0.4);
  ellipse(e.x, e.y, e.size * 3, e.size * 3);

  // Core
  fill(e.hue + 10, e.saturation * 0.5, e.brightness, e.alpha * 0.8);
  ellipse(e.x, e.y, e.size, e.size);

  // Hot center
  fill(min(e.hue + 30, 50), 30, 100, e.alpha * 0.6);
  ellipse(e.x, e.y, e.size * 0.4, e.size * 0.4);
}

function drawHeatGlow() {
  // Subtle gradient glow from bottom
  noStroke();
  for (let y = height - 60; y < height; y++) {
    let alpha = map(y, height - 60, height, 0, 15);
    fill(15, 80, 30, alpha);
    rect(0, y, width, 1);
  }
}

function drawHeatShimmer() {
  // Heat shimmer lines at bottom
  strokeWeight(1);
  for (let i = 0; i < 5; i++) {
    let y = height - 20 + i * 5;
    let alpha = map(i, 0, 4, 8, 2);

    stroke(20, 60, 40, alpha);
    beginShape();
    for (let x = 0; x < width; x += 10) {
      let offset = sin(x * 0.02 + time * 3 + i) * 3;
      vertex(x, y + offset);
    }
    endShape();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  // Burst of new embers from mouse position
  for (let i = 0; i < 15; i++) {
    let e = createEmber(mouseY);
    e.x = mouseX + random(-30, 30);
    e.speed *= random(1.5, 3);
    e.size *= random(1, 2);
    embers.push(e);
  }
}
</script>
</body>
</html>
