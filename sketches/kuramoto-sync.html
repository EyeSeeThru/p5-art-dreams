<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuramoto Sync — Coupled Oscillators</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Kuramoto Coupled Oscillator Synchronization
// Demonstrates spontaneous synchronization in systems of coupled phase oscillators

let oscillators = [];
let cols, rows;
let spacing = 25;
let coupling = 0.08;  // Coupling strength
let naturalFreqSpread = 0.3;  // Spread of natural frequencies

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  
  cols = floor(width / spacing);
  rows = floor(height / spacing);
  
  // Initialize oscillators in a grid
  for (let i = 0; i < cols; i++) {
    oscillators[i] = [];
    for (let j = 0; j < rows; j++) {
      // Natural frequency with some variation across the grid
      let baseFreq = map(noise(i * 0.1, j * 0.1), 0, 1, 0.02, 0.08);
      oscillators[i][j] = {
        phase: random(TWO_PI),
        naturalFreq: baseFreq + random(-naturalFreqSpread, naturalFreqSpread) * 0.02,
        amp: random(3, 8)
      };
    }
  }
}

function draw() {
  background(10, 8, 5, 0.15);
  
  // Update and draw oscillators
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let osc = oscillators[i][j];
      
      // Calculate coupling from neighbors (4-connected)
      let couplingSum = 0;
      let neighbors = 0;
      
      // Four neighbors
      if (i > 0) { couplingSum += sin(oscillators[i-1][j].phase - osc.phase); neighbors++; }
      if (i < cols-1) { couplingSum += sin(oscillators[i+1][j].phase - osc.phase); neighbors++; }
      if (j > 0) { couplingSum += sin(oscillators[i][j-1].phase - osc.phase); neighbors++; }
      if (j < rows-1) { couplingSum += sin(oscillators[i][j+1].phase - osc.phase); neighbors++; }
      
      // Kuramoto model: dθ/dt = ω + K * sum(sin(θj - θi))
      let dPhase = osc.naturalFreq + (coupling / neighbors) * couplingSum;
      osc.phase += dPhase;
      
      // Draw oscillator as a glowing orb
      let x = i * spacing + spacing/2;
      let y = j * spacing + spacing/2;
      
      // Phase determines hue (0-360), frequency affects brightness
      let hue = (osc.phase % TWO_PI) / TWO_PI * 360;
      let bright = map(sin(osc.phase), -1, 1, 40, 100);
      let size = map(sin(osc.phase), -1, 1, osc.amp * 0.5, osc.amp * 1.5);
      
      // Outer glow
      fill(hue, 70, bright, 0.15);
      ellipse(x, y, size * 4, size * 4);
      
      // Core
      fill(hue, 60, bright, 0.9);
      ellipse(x, y, size, size);
    }
  }
  
  // Global order parameter visualization
  let orderParam = calculateOrderParameter();
  
  // Draw order parameter indicator
  fill(0, 0, 100, 0.8);
  textSize(14);
  textAlign(LEFT, TOP);
  text(`Order: ${orderParam.toFixed(3)}`, 20, 20);
  text(`Coupling: ${coupling.toFixed(2)}`, 20, 40);
  
  // Slowly vary coupling to show synchronization transition
  coupling = map(sin(frameCount * 0.001), -1, 1, 0.02, 0.2);
}

function calculateOrderParameter() {
  let sumCos = 0;
  let sumSin = 0;
  let total = cols * rows;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      sumCos += cos(oscillators[i][j].phase);
      sumSin += sin(oscillators[i][j].phase);
    }
  }
  
  return sqrt(sq(sumCos/total) + sq(sumSin/total));
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / spacing);
  rows = floor(height / spacing);
}
</script>
</body>
</html>
