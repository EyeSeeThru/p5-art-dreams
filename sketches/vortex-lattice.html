<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vortex Lattice</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const cells = [];
const cols = 6;
const rows = 6;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  const cellW = width / cols;
  const cellH = height / rows;
  
  for (let i = 0; i < cols; i++) {
    cells[i] = [];
    for (let j = 0; j < rows; j++) {
      cells[i][j] = {
        x: i * cellW + cellW / 2,
        y: j * cellH + cellH / 2,
        phase: random(TWO_PI),
        freq: random(0.5, 1.5),
        amp: random(30, 60),
        hue: (i * 60 + j * 40) % 360
      };
    }
  }
}

function draw() {
  background(0, 0, 0, 15);
  
  const t = time * 0.02;
  
  // Draw connecting flows
  strokeWeight(1);
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      const c = cells[i][j];
      const ox = sin(t * c.freq + c.phase) * c.amp;
      const oy = cos(t * c.freq + c.phase) * c.amp;
      
      // Draw vortex ring
      noFill();
      const hue = (c.hue + t * 20) % 360;
      stroke(hue, 80, 80, 40);
      
      push();
      translate(c.x + ox, c.y + oy);
      rotate(t * c.freq * 2);
      
      // Inner spiral
      for (let a = 0; a < TWO_PI; a += 0.1) {
        const r = 15 + sin(a * 3 + t) * 8;
        const px = cos(a) * r;
        const py = sin(a) * r;
        point(px, py);
      }
      pop();
      
      // Connect to neighbors
      if (i < cols - 1) {
        const cn = cells[i + 1][j];
        const onx = sin(t * cn.freq + cn.phase) * cn.amp;
        const ony = cos(t * cn.freq + cn.phase) * cn.amp;
        stroke(hue, 60, 60, 20);
        line(c.x + ox, c.y + oy, cn.x + onx, cn.y + ony);
      }
      if (j < rows - 1) {
        const cn = cells[i][j + 1];
        const onx = sin(t * cn.freq + cn.phase) * cn.amp;
        const ony = cos(t * cn.freq + cn.phase) * cn.amp;
        stroke(hue, 60, 60, 20);
        line(c.x + ox, c.y + oy, cn.x + onx, cn.y + ony);
      }
    }
  }
  
  // Central influence
  const cx = width / 2;
  const cy = height / 2;
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      const c = cells[i][j];
      const ox = sin(t * c.freq + c.phase) * c.amp;
      const oy = cos(t * c.freq + c.phase) * c.amp;
      const dx = cx - (c.x + ox);
      const dy = cy - (c.y + oy);
      const d = sqrt(dx * dx + dy * dy);
      if (d < 200) {
        stroke(0, 0, 100, 10 * (1 - d / 200));
        line(c.x + ox, c.y + oy, cx, cy);
      }
    }
  }
  
  time++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  setup();
}
</script>
</body>
</html>
