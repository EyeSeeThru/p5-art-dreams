<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spherical Harmonics — Y_l^m Functions</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let t = 0;
let l = 2, m = 1;
let sphereRadius;
let paused = false;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  sphereRadius = min(width, height) * 0.35;
}

function draw() {
  background(0);

  if (!paused) t++;

  let mode = floor(t / 200) % 5;
  if (mode === 0) { l = 0; m = 0; }
  else if (mode === 1) { l = 1; m = 0; }
  else if (mode === 2) { l = 2; m = 0; }
  else if (mode === 3) { l = 2; m = 1; }
  else { l = 3; m = 0; }

  rotateX(frameCount * 0.003);
  rotateY(frameCount * 0.005);

  drawSphere();

  resetMatrix();
  drawUI();
}

function drawSphere() {
  let res = 60;

  for (let i = 0; i <= res; i++) {
    for (let j = 0; j <= res; j++) {
      let u = (i / res) * TWO_PI;
      let v = (j / res) * PI;

      let x = sphereRadius * sin(v) * cos(u);
      let y = sphereRadius * sin(v) * sin(u);
      let z = sphereRadius * cos(v);

      let theta = acos(z / sphereRadius);
      let phi = atan2(y, x);

      let Y = sphericalHarmonic(l, m, theta, phi);
      let col = getColor(Y);

      let offset = Y * sphereRadius * 0.15;
      let nx = sin(v) * cos(u);
      let ny = sin(v) * sin(u);
      let nz = cos(v);

      let finalX = x + nx * offset;
      let finalY = y + ny * offset;
      let finalZ = z + nz * offset;

      push();
      translate(finalX, finalY, finalZ);
      noStroke();
      fill(col.r, col.g, col.b);
      sphere(2.2);
      pop();
    }
  }
}

function legendreP(l, m, x) {
  if (l === 0 && m === 0) return 1;
  if (l === 1 && m === 0) return x;
  if (l === 1 && m === 1) return -sqrt(1 - x * x);
  if (l === 2 && m === 0) return 0.5 * (3 * x * x - 1);
  if (l === 2 && m === 1) return -3 * x * sqrt(1 - x * x);
  if (l === 2 && m === 2) return 3 * (1 - x * x);
  if (l === 3 && m === 0) return 0.5 * (5 * x * x * x - 3 * x);
  return sin(l * x + m * atan2(sqrt(1 - x * x), x));
}

function sphericalHarmonic(l, m, theta, phi) {
  let N = sqrt((2 * l + 1) / (4 * PI) * factorial(l - abs(m)) / factorial(l + abs(m)));
  let cosTheta = cos(theta);
  let P = legendreP(l, abs(m), cosTheta);

  if (m === 0) return N * P;
  else if (m > 0) return N * sqrt(2) * P * cos(m * phi);
  else return N * sqrt(2) * P * sin(abs(m) * phi);
}

function factorial(n) {
  let result = 1;
  for (let i = 2; i <= n; i++) result *= i;
  return result;
}

function getColor(Y) {
  if (Y > 0) {
    let intensity = map(Y, 0, 1, 120, 255);
    return { r: intensity, g: intensity * 0.3, b: intensity * 0.1 };
  } else {
    let intensity = map(Y, -1, 0, 60, 140);
    return { r: intensity, g: intensity * 0.2, b: intensity * 0.05 };
  }
}

function drawUI() {
  push();
  translate(-width / 2, -height / 2);

  fill(255, 120, 60);
  textSize(12);
  textAlign(LEFT, TOP);
  text(`Y_${l}^${m}`, 10, 10);
  text(`l=${l}, m=${m}`, 10, 26);

  textAlign(RIGHT, TOP);
  text(`Mode ${(floor(t / 200) % 5) + 1}/5`, width - 10, 10);

  pop();
}

function keyPressed() {
  if (key === ' ') paused = !paused;
}

// REQUIRED: save canvas
function keyTyped() {
  if (key === 's') saveCanvas('spherical-harmonics', 'png');
}
</script>
</body>
</html>
