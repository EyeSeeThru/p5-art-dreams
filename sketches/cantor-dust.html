<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cantor Dust</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Cantor Dust - 3D visualization of Cantor set as fractal dust
// Each iteration creates smaller cubes at corners

let cubes = [];
let rotX = 0, rotY = 0;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  
  // Initial cube covering the entire space
  cubes.push({
    x: 0, y: 0, z: 0,
    size: 300,
    alpha: 255
  });
  
  // Generate first iteration of Cantor dust
  generateCantorDust();
}

function generateCantorDust() {
  let newCubes = [];
  let iterations = 3;
  
  for (let iter = 0; iter < iterations; iter++) {
    let newArr = [];
    let scale = pow(1/3, iter + 1);
    let offset = 300 * scale * 2;
    
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        for (let dz = -1; dz <= 1; dz++) {
          // Skip center - this is the Cantor "dust" pattern
          if (dx === 0 && dy === 0 && dz === 0) continue;
          // Skip edges on middle layer for more interesting pattern
          if (abs(dx) + abs(dy) + abs(dz) === 1 && iter === 0) continue;
          
          newArr.push({
            x: dx * offset,
            y: dy * offset,
            z: dz * offset,
            size: 300 * scale,
            alpha: 255 - iter * 60
          });
        }
      }
    }
    newCubes = newCubes.concat(newArr);
  }
  
  cubes = cubes.concat(newCubes);
}

function draw() {
  background(10, 10, 15);
  
  // Gentle rotation
  rotX += 0.003;
  rotY += 0.005;
  
  rotateX(rotX + sin(t * 0.5) * 0.2);
  rotateY(rotY + cos(t * 0.3) * 0.2);
  
  // Lighting
  ambientLight(40);
  pointLight(255, 200, 150, 400, -300, 200);
  pointLight(100, 150, 255, -400, 300, -200);
  directionalLight(255, 255, 255, 0.5, 0.5, -1);
  
  // Pulsing scale
  let pulse = 1 + sin(t * 2) * 0.05;
  
  // Draw cubes with glow effect
  for (let cube of cubes) {
    push();
    translate(cube.x, cube.y, cube.z);
    scale(pulse);
    
    // Color based on position
    let r = map(sin(cube.x * 0.01 + t), -1, 1, 80, 180);
    let g = map(cos(cube.y * 0.01 + t * 0.7), -1, 1, 100, 200);
    let b = map(sin(cube.z * 0.01 + t * 0.5), -1, 1, 150, 255);
    
    // Emissive material for glow
    noStroke();
    fill(r, g, b, cube.alpha);
    
    // Draw cube
    box(cube.size);
    
    // Inner glow layer
    fill(r * 1.5, g * 1.5, b * 1.5, cube.alpha * 0.35);
    box(cube.size * 0.85);
    
    pop();
  }
  
  // Central glow sphere
  push();
  noStroke();
  let glowR = 150 + sin(t * 3) * 50;
  let glowG = 180 + cos(t * 2) * 50;
  let glowB = 255;
  fill(glowR, glowG, glowB, 100 + sin(t * 4) * 50);
  emissiveMaterial(glowR, glowG, glowB);
  sphere(20 + sin(t * 2) * 5);
  pop();
  
  t += 0.016;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
