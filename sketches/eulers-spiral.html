<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Euler's Spiral</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const MAX_ITERATIONS = 800;
let t = 0;
let spirals = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  background(10);
  
  // Create multiple spiral instances
  for (let i = 0; i < 5; i++) {
    spirals.push({
      offset: i * 0.3,
      scale: 80 + i * 25,
      hue: (180 + i * 40) % 360,
      speed: 0.002 + i * 0.0005,
      phase: i * TWO_PI / 5
    });
  }
}

function fresnelC(x) {
  // Approximation of Fresnel integral C
  let sum = 0;
  let term = x;
  for (let n = 0; n < 50; n++) {
    sum += term;
    term *= -x * x * (4 * n + 1) / ((4 * n + 3) * (2 * n + 1));
    if (abs(term) < 1e-10) break;
  }
  return sum;
}

function fresnelS(x) {
  // Approximation of Fresnel integral S  
  let sum = 0;
  let term = x;
  for (let n = 0; n < 50; n++) {
    sum += term;
    term *= -x * x * (4 * n + 3) / ((4 * n + 5) * (2 * n + 2));
    if (abs(term) < 1e-10) break;
  }
  return sum;
}

function clothoidPoint(t, scale) {
  let c = fresnelC(t * sqrt(PI / 2));
  let s = fresnelS(t * sqrt(PI / 2));
  return {
    x: c * scale,
    y: s * scale
  };
}

function draw() {
  // Fade effect for trails
  noStroke();
  fill(10, 8);
  rect(0, 0, width, height);
  
  translate(width / 2, height / 2);
  
  let time = millis() * 0.001;
  
  // Draw each spiral
  for (let spiral of spirals) {
    let currentT = t * spiral.scale + spiral.offset;
    let prevPoint = null;
    
    beginShape();
    noFill();
    strokeWeight(1.5);
    
    for (let i = 0; i < MAX_ITERATIONS; i += 3) {
      let ti = -3 + i * 0.02 + time * spiral.speed * 50 + spiral.phase;
      
      if (abs(ti) > 4) break;
      
      let pt = clothoidPoint(ti, spiral.scale);
      
      // Dynamic coloring based on position
      let hue = (spiral.hue + i * 0.5 + time * 20) % 360;
      let sat = 70 + sin(i * 0.1 + time) * 20;
      let bri = 80 + cos(i * 0.05 + time * 2) * 20;
      
      stroke(hue, sat, bri, 0.7);
      
      if (prevPoint) {
        line(prevPoint.x, prevPoint.y, pt.x, pt.y);
      }
      
      prevPoint = pt;
    }
    endShape();
    
    // Draw glow particles
    for (let i = 0; i < 20; i++) {
      let angle = i * PI / 10 + time * spiral.speed * 100 + spiral.phase;
      let rad = abs(sin(angle)) * 200;
      let ti = sin(angle * 2) * 2;
      let pt = clothoidPoint(ti, spiral.scale);
      
      let ph = (spiral.hue + i * 15 + time * 30) % 360;
      noStroke();
      fill(ph, 60, 100, 0.8);
      circle(pt.x, pt.y, 3 + sin(time * 3 + i) * 2);
    }
  }
  
  t += 0.008;
  
  // Reset when complete cycle
  if (t > 8) {
    t = 0;
    background(10);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(10);
}
</script>
</body>
</html>
