<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blood Moon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030101; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Blood Moon — Dramatic Red Moon Rising
// Artistic, emotional, eerie atmosphere
// Deep red and black, moody and evocative

let time = 0;
let clouds = [];
let numClouds = 15;
let moonY;
let moonPhase = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  moonY = height + 200; // Start below horizon

  // Initialize clouds
  for (let i = 0; i < numClouds; i++) {
    clouds.push({
      x: random(width),
      y: random(height * 0.3, height * 0.7),
      size: random(150, 400),
      speed: random(0.1, 0.4),
      alpha: random(20, 50),
      offset: random(TWO_PI)
    });
  }
}

function draw() {
  // Dark red-tinted sky gradient
  let skyTop = color(0, 30, 5);
  let skyBottom = color(0, 60, 8);
  for (let y = 0; y < height; y++) {
    let inter = map(y, 0, height, 0, 1);
    let c = lerpColor(skyTop, skyBottom, inter);
    stroke(c);
    line(0, y, width, y);
  }

  time += 0.008;
  moonPhase += 0.003;

  // Slowly rise moon
  if (moonY > height * 0.4) {
    moonY -= 0.3;
  }

  // Draw clouds (behind moon)
  for (let cloud of clouds) {
    drawCloud(cloud);
  }

  // Draw moon
  drawMoon();

  // Draw horizon glow
  drawHorizonGlow();

  // Stars / dust particles
  drawDust();
}

function drawMoon() {
  let moonX = width * 0.7;
  let moonSize = min(width, height) * 0.35;
  let pulse = sin(moonPhase) * 0.05 + 0.95;

  // Outer glow layers
  noStroke();
  for (let r = moonSize * 2.5; r > moonSize; r -= moonSize * 0.1) {
    let alpha = map(r, moonSize, moonSize * 2.5, 40, 5) * pulse;
    fill(355, 90, 40, alpha);
    ellipse(moonX, moonY, r * pulse, r * pulse);
  }

  // Main moon body
  fill(355, 85, 55, 95);
  ellipse(moonX, moonY, moonSize * pulse, moonSize * pulse);

  // Surface texture (subtle craters as darker spots)
  fill(355, 80, 35, 30);
  ellipse(moonX - moonSize * 0.2, moonY - moonSize * 0.1, moonSize * 0.2, moonSize * 0.2);
  ellipse(moonX + moonSize * 0.25, moonY + moonSize * 0.15, moonSize * 0.15, moonSize * 0.15);
  ellipse(moonX - moonSize * 0.05, moonY + moonSize * 0.25, moonSize * 0.12, moonSize * 0.12);
  ellipse(moonX + moonSize * 0.1, moonY - moonSize * 0.25, moonSize * 0.18, moonSize * 0.18);

  // Inner glow (brighter center)
  fill(0, 20, 90, 20);
  ellipse(moonX, moonY, moonSize * 0.7 * pulse, moonSize * 0.7 * pulse);

  // Subtle red rim on one side
  noFill();
  strokeWeight(3);
  stroke(355, 100, 70, 30);
  arc(moonX, moonY, moonSize * pulse, moonSize * pulse, PI * 0.7, PI * 1.5);
}

function drawCloud(cloud) {
  let wobble = sin(time * 2 + cloud.offset) * 20;
  let x = cloud.x + wobble;
  let y = cloud.y + sin(time + cloud.offset) * 10;

  noStroke();

  // Soft, wispy cloud
  for (let i = 0; i < 5; i++) {
    let size = cloud.size * (1 - i * 0.15);
    let offsetX = sin(time * 0.5 + cloud.offset + i) * 30;
    let offsetY = cos(time * 0.3 + cloud.offset + i * 0.5) * 10;

    fill(355, 60, 20, cloud.alpha * (1 - i * 0.15));
    ellipse(x + offsetX, y + offsetY + i * 20, size, size * 0.4);
  }
}

function drawHorizonGlow() {
  // Warm red glow at horizon
  noStroke();
  let glowY = height * 0.85;

  for (let y = glowY; y < height; y++) {
    let alpha = map(y, glowY, height, 15, 0);
    let brightness = map(y, glowY, height, 25, 10);
    fill(355, 80, brightness, alpha);
    rect(0, y, width, 1);
  }

  // Horizon line glow
  for (let x = 0; x < width; x += 3) {
    let flicker = random(5, 15);
    fill(355, 90, 30, flicker);
    ellipse(x, glowY, 4, 4);
  }
}

let dustParticles = [];

function drawDust() {
  // Add new dust particles occasionally
  if (frameCount % 5 === 0 && dustParticles.length < 100) {
    dustParticles.push({
      x: random(width),
      y: random(height),
      size: random(1, 3),
      life: random(100, 200),
      maxLife: 0,
      vx: random(-0.2, 0.2),
      vy: random(-0.3, -0.1)
    });
    dustParticles[dustParticles.length - 1].maxLife = dustParticles[dustParticles.length - 1].life;
  }

  // Draw dust
  noStroke();
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    let p = dustParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 1;

    if (p.life <= 0) {
      dustParticles.splice(i, 1);
      continue;
    }

    let lifeRatio = p.life / p.maxLife;
    fill(355, 50, 40, lifeRatio * 30);
    ellipse(p.x, p.y, p.size * lifeRatio, p.size * lifeRatio);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  // Moonrise animation on click
  moonY = height + 100;
}
</script>
</body>
</html>
