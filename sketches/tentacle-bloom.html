<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tentacle Bloom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a12; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Tentacle Bloom - Bioluminescent jellyfish-like generative art
// Each tentacle follows a sinusoidal path with Perlin noise perturbation
// Creates an ethereal blooming effect with pulsing glow

let tentacles = [];
let numTentacles = 80;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  
  // Create tentacles emanating from center
  for (let i = 0; i < numTentacles; i++) {
    let angle = (TWO_PI / numTentacles) * i;
    tentacles.push(new Tentacle(angle));
  }
}

function draw() {
  background(240, 30, 5, 0.15); // Dark blue-purple background with fade
  
  // Center glow
  let glowSize = 80 + sin(time * 0.5) * 20;
  for (let r = glowSize * 3; r > 0; r -= 20) {
    fill(280, 80, 60, 0.03);
    ellipse(width/2, height/2, r * 2);
  }
  
  // Draw tentacles
  for (let tentacle of tentacles) {
    tentacle.update();
    tentacle.draw();
  }
  
  // Center orb
  let orbSize = 15 + sin(time * 2) * 5;
  fill(300, 90, 90, 0.9);
  ellipse(width/2, height/2, orbSize);
  fill(300, 100, 100, 0.5);
  ellipse(width/2, height/2, orbSize * 2);
  
  time += 0.016;
}

class Tentacle {
  constructor(angle) {
    this.baseAngle = angle;
    this.segments = 60;
    this.baseHue = 280 + random(-30, 30); // Purple-magenta range
    this.noiseOffset = random(1000);
    this.length = min(width, height) * 0.35;
    this.phase = random(TWO_PI);
    this.thickness = random(2, 6);
  }
  
  update() {
    // Subtle angle drift
    this.baseAngle += sin(time * 0.3 + this.phase) * 0.001;
  }
  
  draw() {
    let x = width / 2;
    let y = height / 2;
    let angle = this.baseAngle;
    
    // Animate wave propagation
    let waveSpeed = time * 2;
    
    for (let i = 0; i < this.segments; i++) {
      let t = i / this.segments;
      let segLen = this.length / this.segments;
      
      // Sinusoidal wave with noise
      let wave = sin(t * PI * 3 + waveSpeed + this.phase) * t * 80;
      let noiseVal = noise(
        cos(angle + this.noiseOffset) * 0.5 + time * 0.2,
        sin(angle + this.noiseOffset) * 0.5 + i * 0.05
      );
      let noiseWave = map(noiseVal, 0, 1, -40, 40) * t;
      
      // Combine movements
      angle += (wave * 0.01 + noiseWave * 0.02) / this.segments;
      
      x += cos(angle) * segLen;
      y += sin(angle) * segLen;
      
      // Size decreases along tentacle
      let size = this.thickness * (1 - t * 0.7);
      
      // Color shifts along length
      let hue = (this.baseHue + t * 40 + sin(time + t * PI) * 20) % 360;
      let sat = 80 - t * 30;
      let bri = 90 - t * 40;
      let alpha = 0.8 - t * 0.5;
      
      fill(hue, sat, bri, alpha);
      ellipse(x, y, size, size * 1.5);
      
      // Add glow particles along tentacle
      if (i % 8 === 0 && random() > 0.7) {
        let glowX = x + random(-10, 10);
        let glowY = y + random(-10, 10);
        let glowSize = random(2, 5);
        fill(hue, sat - 20, 100, 0.4);
        ellipse(glowX, glowY, glowSize * 2);
      }
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  // Reset tentacles for new dimensions
  tentacles = [];
  for (let i = 0; i < numTentacles; i++) {
    let angle = (TWO_PI / numTentacles) * i;
    tentacles.push(new Tentacle(angle));
  }
}
</script>
</body>
</html>
