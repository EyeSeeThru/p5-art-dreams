<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dissipative Patterns</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Dissipative Patterns - Far-from-equilibrium self-organization
// Inspired by Belousov-Zhabotinsky reaction and Turing patterns

let grid = [];
let nextGrid = [];
let cols, rows;
let resolution = 6;
let time = 0;

const A = 1.0;  // Activator
const I = 0.0;  // Inhibitor  
const D = 0.5;  // Diffusion rates ratio

function setup() {
  createCanvas(windowWidth, windowHeight);
  cols = floor(width / resolution);
  rows = floor(height / resolution);
  
  // Initialize grid with random values
  for (let i = 0; i < cols; i++) {
    grid[i] = [];
    nextGrid[i] = [];
    for (let j = 0; j < rows; j++) {
      // Create initial pattern clusters
      let noiseVal = noise(i * 0.05, j * 0.05);
      grid[i][j] = noiseVal > 0.5 ? A : I;
      nextGrid[i][j] = grid[i][j];
    }
  }
  
  // Seed some interesting starting points
  seedPattern();
  
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
}

function seedPattern() {
  // Add spiral wave seeds
  let centers = [
    {x: cols * 0.3, y: rows * 0.3},
    {x: cols * 0.7, y: rows * 0.6},
    {x: cols * 0.5, y: rows * 0.8}
  ];
  
  for (let c of centers) {
    for (let r = 0; r < 30; r++) {
      let angle = r * 0.3;
      let x = floor(c.x + cos(angle) * r * 0.5);
      let y = floor(c.y + sin(angle) * r * 0.5);
      if (x >= 0 && x < cols && y >= 0 && y < rows) {
        grid[x][y] = A;
      }
    }
  }
}

function draw() {
  background(10);
  
  // Gray-Scott inspired reaction-diffusion
  updateGrid();
  
  // Render with beautiful colors
  renderGrid();
  
  // Add overlay glow
  drawGlow();
  
  time += 0.01;
}

function updateGrid() {
  for (let i = 1; i < cols - 1; i++) {
    for (let j = 1; j < rows - 1; j++) {
      let state = grid[i][j];
      
      // Get neighbors
      let sum = 0;
      let sumSq = 0;
      let count = 0;
      
      for (let di = -1; di <= 1; di++) {
        for (let dj = -1; dj <= 1; dj++) {
          let val = grid[i + di][j + dj];
          sum += val;
          sumSq += val * val;
          count++;
        }
      }
      
      let avg = sum / count;
      let variance = (sumSq / count) - (avg * avg);
      
      // Reaction-diffusion dynamics
      let reaction = state * (1 - state) * (state - 0.3);
      let diffusion = 0.1 * (avg - state);
      let laplacian = (grid[i-1][j] + grid[i+1][j] + grid[i][j-1] + grid[i][j+1] - 4 * state) * 0.1;
      
      // Add noise for randomness
      let noiseVal = noise(i * 0.02 + time, j * 0.02) * 0.02 - 0.01;
      
      nextGrid[i][j] = state + reaction + diffusion + laplacian + noiseVal;
      nextGrid[i][j] = constrain(nextGrid[i][j], 0, 1);
    }
  }
  
  // Swap grids
  let temp = grid;
  grid = nextGrid;
  nextGrid = temp;
}

function renderGrid() {
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let state = grid[i][j];
      
      if (state > 0.15) {
        let x = i * resolution;
        let y = j * resolution;
        
        // Color based on state and position
        let hue = map(state, 0, 1, 180, 320);
        let sat = map(state, 0, 1, 30, 90);
        let bri = map(state, 0, 1, 20, 100);
        
        fill(hue, sat, bri, 80);
        rect(x, y, resolution, resolution);
      }
    }
  }
}

function drawGlow() {
  // Add ethereal glow overlay
  push();
  blendMode(ADD);
  for (let i = 0; i < cols; i += 3) {
    for (let j = 0; j < rows; j += 3) {
      let state = grid[i][j];
      if (state > 0.4) {
        let x = i * resolution;
        let y = j * resolution;
        let alpha = map(state, 0.4, 1, 0, 15);
        fill(280, 80, 100, alpha);
        ellipse(x + resolution/2, y + resolution/2, resolution * 4);
      }
    }
  }
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / resolution);
  rows = floor(height / resolution);
  
  // Reinitialize on resize
  grid = [];
  nextGrid = [];
  for (let i = 0; i < cols; i++) {
    grid[i] = [];
    nextGrid[i] = [];
    for (let j = 0; j < rows; j++) {
      grid[i][j] = noise(i * 0.03, j * 0.03) > 0.5 ? A : I;
      nextGrid[i][j] = grid[i][j];
    }
  }
  seedPattern();
}
</script>
</body>
</html>
