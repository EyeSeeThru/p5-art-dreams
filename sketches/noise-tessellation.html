<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noise Tessellation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const cols = 40;
const rows = 30;
const cellW = 24;
const cellH = 24;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  noStroke();
}

function draw() {
  background(10, 10, 15);
  time += 0.008;
  
  const offsetX = (width - cols * cellW) / 2;
  const offsetY = (height - rows * cellH) / 2;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      const x = offsetX + i * cellW + cellW / 2;
      const y = offsetY + j * cellH + cellH / 2;
      
      const n1 = noise(i * 0.1 + time, j * 0.1 + time);
      const n2 = noise(i * 0.15 - time * 0.7, j * 0.15 + time * 0.5);
      const n3 = noise(i * 0.08 + time * 0.3, j * 0.2 - time * 0.2);
      
      const dx = map(n1, 0, 1, -cellW * 0.4, cellW * 0.4);
      const dy = map(n2, 0, 1, -cellH * 0.4, cellH * 0.4);
      const size = map(n3, 0, 1, 4, cellW * 0.9);
      
      const hue = map(noise(i * 0.05 + time * 0.2, j * 0.05), 0, 1, 180, 320);
      const sat = map(n1 + n2, 0, 2, 50, 90);
      const bri = map(n3, 0, 1, 60, 100);
      
      const c = color(`hsla(${hue % 360}, ${sat}%, ${bri}%, 0.7)`);
      
      // Draw hexagon-like polygon
      fill(c);
      push();
      translate(x + dx, y + dy);
      beginShape();
      for (let k = 0; k < 6; k++) {
        const angle = TWO_PI / 6 * k + time * 0.5;
        const r = size * 0.5;
        vertex(cos(angle) * r, sin(angle) * r);
      }
      endShape(CLOSE);
      
      // Inner glow
      const innerC = color(`hsla(${hue % 360}, ${sat + 10}%, ${bri + 20}%, 0.4)`);
      fill(innerC);
      beginShape();
      for (let k = 0; k < 6; k++) {
        const angle = TWO_PI / 6 * k - time * 0.3;
        const r = size * 0.25;
        vertex(cos(angle) * r, sin(angle) * r);
      }
      endShape(CLOSE);
      pop();
    }
  }
  
  // Connecting lines between nearby cells
  stroke(255, 255, 255, 15);
  strokeWeight(0.5);
  for (let i = 0; i < cols - 1; i++) {
    for (let j = 0; j < rows - 1; j++) {
      const x1 = offsetX + i * cellW + cellW / 2;
      const y1 = offsetY + j * cellH + cellH / 2;
      const x2 = offsetX + (i + 1) * cellW + cellW / 2;
      const y2 = offsetY + (j + 1) * cellH + cellH / 2;
      
      const n = noise(i * 0.1 + time, j * 0.1 + time);
      if (n > 0.6) {
        line(x1, y1, x2, y2);
      }
    }
  }
  noStroke();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
