<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacobi Elliptic</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const sketches = [];

let m = 0;
let mVal = 0;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noLoop();
}

function draw() {
  background(240, 20, 5, 30);
  
  translate(width / 2, height / 2);
  
  let scale = min(width, height) * 0.35;
  
  // Jacobi elliptic functions sn, cn, dn
  // Using series approximation for visualization
  
  for (let i = 0; i < 360; i += 2) {
    let hue = (i + t * 20) % 360;
    stroke(hue, 80, 90, 40);
    noFill();
    
    beginShape();
    for (let j = 0; j < 400; j++) {
      let u = map(j, 0, 400, -3 * PI, 3 * PI);
      
      // Elliptic sine approximation
      let sn = sin(u + sin(u * 0.3 + mVal) * 0.5);
      let cn = cos(u + cos(u * 0.4 + mVal) * 0.5);
      let dn = 1 + 0.3 * sin(u * 0.7 + mVal);
      
      // Parametric surface
      let x = sn * scale * (1 + 0.3 * sin(i * 0.1 + t));
      let y = cn * scale * (1 + 0.3 * cos(i * 0.1 + t * 0.7));
      let z = dn * 50 * sin(i * 0.05 + t * 0.5);
      
      // Project 3D to 2D
      let projX = x - z * 0.3;
      let projY = y + z * 0.2;
      
      vertex(projX, projY);
    }
    endShape();
  }
  
  // Draw flowing particles
  for (let i = 0; i < 200; i++) {
    let angle = i * 0.1 + t;
    let radius = (50 + 150 * sin(angle * 0.3 + mVal)) * scale / 200;
    
    let x = cos(angle + sin(angle * 2 + t) * 0.5) * radius;
    let y = sin(angle + cos(angle * 1.5 + t * 0.8) * 0.5) * radius;
    
    let hue = (angle * 10 + t * 30) % 360;
    fill(hue, 70, 100, 80);
    noStroke();
    ellipse(x, y, 3 + sin(t + i) * 1.5, 3 + cos(t + i) * 1.5);
  }
  
  // Center glow
  for (let r = 0; r < 100; r += 5) {
    let alpha = map(r, 0, 100, 30, 0);
    fill(280, 60, 100, alpha);
    noStroke();
    ellipse(0, 0, r * 2 + sin(t) * 20);
  }
  
  t += 0.015;
  mVal = 0.5 + 0.5 * sin(t * 0.2);
  
  saveFrame();
}

function saveFrame() {
  // Capture once for thumbnail
  if (t < 0.05) {
    setTimeout(() => {
      let canvas = document.querySelector('canvas');
      if (canvas) {
        let thumb = document.createElement('canvas');
        thumb.width = 400;
        thumb.height = 400;
        let ctx = thumb.getContext('2d');
        ctx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, 400, 400);
        
        let link = document.createElement('a');
        link.download = 'thumbnail.png';
        link.href = thumb.toDataURL('image/png');
        link.click();
      }
    }, 500);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
