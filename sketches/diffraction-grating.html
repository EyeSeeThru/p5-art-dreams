<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diffraction Grating</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const slits = 12;
const slitSpacing = 28;
const wavelength = 520;
const screenDistance = 800;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function draw() {
  background(5, 3, 8);
  
  const gratingCenterX = width * 0.15;
  const gratingY = height * 0.5;
  const gratingWidth = slits * slitSpacing;
  
  // Draw diffraction grating
  stroke(80, 90, 120);
  strokeWeight(2);
  for (let i = 0; i < slits; i++) {
    const x = gratingCenterX - gratingWidth/2 + i * slitSpacing;
    line(x, gratingY - 3, x, gratingY + 3);
  }
  
  // Draw light source
  noStroke();
  for (let r = 8; r > 0; r--) {
    fill(255, 250, 220, 15);
    ellipse(gratingCenterX, gratingY, r * 6, r * 6);
  }
  fill(255, 255, 240);
  ellipse(gratingCenterX, gratingY, 12, 12);
  
  // Draw rays to grating
  stroke(255, 250, 200, 40);
  strokeWeight(1);
  for (let i = 0; i < slits; i++) {
    const x = gratingCenterX - gratingWidth/2 + i * slitSpacing;
    line(gratingCenterX, gratingY, x, gratingY);
  }
  
  // Calculate and draw interference pattern
  const screenX = width * 0.65;
  const patternHeight = height * 0.85;
  
  loadPixels();
  
  for (let y = 0; y < height; y++) {
    const screenY = y - height/2;
    
    let intensity = 0;
    let totalPhase = 0;
    
    for (let i = 0; i < slits; i++) {
      const slitX = gratingCenterX - gratingWidth/2 + i * slitSpacing;
      const pathDiff = (slitX - gratingCenterX) * screenY / screenDistance;
      const phase = TWO_PI * (t * 0.001 + pathDiff / wavelength);
      totalPhase += sin(phase);
    }
    
    intensity = sq(totalPhase / slits);
    
    // Spectral color based on angle
    const angle = atan2(screenY, screenX - gratingCenterX);
    const order = floor(screenY * screenDistance / (slitSpacing * wavelength));
    const hue = map(sin(angle * 3 + t * 0.002), -1, 1, 380, 700);
    
    const rgb = wavelengthToRGB(hue);
    
    const col = intensity * 255;
    const idx = (y * width + floor(screenX)) * 4;
    
    if (intensity > 0.1) {
      for (let x = floor(screenX); x < width; x++) {
        const dx = x - screenX;
        const dy = screenY;
        const dist = sqrt(dx*dx + dy*dy);
        const falloff = 1 / (1 + dist * 0.002);
        const intensity2 = intensity * falloff;
        
        const pIdx = (y * width + x) * 4;
        pixels[pIdx] = rgb.r * intensity2 * 2.5;
        pixels[pIdx + 1] = rgb.g * intensity2 * 2.5;
        pixels[pIdx + 2] = rgb.b * intensity2 * 2.5;
        pixels[pIdx + 3] = 255;
      }
    }
  }
  
  updatePixels();
  
  // Draw interference intensity graph
  const graphX = width * 0.85;
  const graphWidth = width * 0.12;
  
  noFill();
  strokeWeight(2);
  
  for (let c = 0; c < 3; c++) {
    const cols = [
      [255, 60, 60],
      [60, 255, 60],
      [60, 100, 255]
    ];
    stroke(cols[c][0], cols[c][1], cols[c][2], 180);
    
    beginShape();
    for (let y = 0; y < patternHeight; y++) {
      const screenY = y - patternHeight/2;
      let totalPhase = 0;
      
      for (let i = 0; i < slits; i++) {
        const pathDiff = (i - slits/2) * slitSpacing * screenY / screenDistance;
        const phase = TWO_PI * (t * 0.001 + pathDiff / wavelength);
        totalPhase += sin(phase);
      }
      
      const intensity = sq(totalPhase / slits);
      const x = graphX + intensity * graphWidth * (c === 1 ? 0.8 : 1);
      const yPos = height/2 + screenY;
      vertex(x, yPos);
    }
    endShape();
  }
  
  // Title
  fill(200, 210, 230);
  noStroke();
  textSize(14);
  textAlign(LEFT, TOP);
  text('Diffraction Grating Interference', 20, 20);
  textSize(11);
  fill(140, 150, 170);
  text(`${slits} slits, λ = ${wavelength}nm`, 20, 42);
  
  t += 16;
}

function wavelengthToRGB(wavelength) {
  let r, g, b;
  
  if (wavelength >= 380 && wavelength < 440) {
    r = -(wavelength - 440) / (440 - 380);
    g = 0;
    b = 1;
  } else if (wavelength >= 440 && wavelength < 490) {
    r = 0;
    g = (wavelength - 440) / (490 - 440);
    b = 1;
  } else if (wavelength >= 490 && wavelength < 510) {
    r = 0;
    g = 1;
    b = -(wavelength - 510) / (510 - 490);
  } else if (wavelength >= 510 && wavelength < 580) {
    r = (wavelength - 510) / (580 - 510);
    g = 1;
    b = 0;
  } else if (wavelength >= 580 && wavelength < 645) {
    r = 1;
    g = -(wavelength - 645) / (645 - 580);
    b = 0;
  } else if (wavelength >= 645 && wavelength <= 780) {
    r = 1;
    g = 0;
    b = 0;
  } else {
    r = 0;
    g = 0;
    b = 0;
  }
  
  return {
    r: r * 255,
    g: g * 255,
    b: b * 255
  };
}
</script>
</body>
</html>
