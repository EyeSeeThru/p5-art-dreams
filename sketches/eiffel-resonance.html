<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Eiffel Resonance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Eiffel Resonance — Tower Vibration Modes
// The Eiffel Tower oscillates at ~0.3 Hz in strong winds
// Visualize harmonic modes of a tapered cantilever structure
// Higher modes have more nodes (points of zero displacement)
// Wind forces drive resonance at natural frequencies

let time = 0;
let mode = 1; // 1 = 1st harmonic, 2 = 2nd, etc
let windStrength = 0;
let particles = [];
let towerPoints = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  frameRate(30);

  // Initialize tower profile (tapered parabola like Eiffel Tower)
  let segments = 60;
  for (let i = 0; i <= segments; i++) {
    let t = i / segments; // 0 at base, 1 at top
    let x = lerp(width * 0.5, width * 0.45, t);
    let y = lerp(height * 0.85, height * 0.08, t);
    let w = lerp(120, 15, t); // Width decreases with height
    towerPoints.push({ x: x, y: y, w: w, baseX: x });
  }

  // Wind particles
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: random(-100, width),
      y: random(height),
      speed: random(2, 5),
      size: random(2, 5),
      alpha: random(30, 70)
    });
  }

  textSize(11);
}

function draw() {
  // Background fade
  background(240, 40, 5, 25);

  // Oscillate wind strength
  windStrength = (sin(time * 0.3) * 0.5 + 0.5) * 0.8 + 0.2;
  if (mouseIsPressed) windStrength = 1.0;

  // Update particles
  updateParticles();

  // Draw wind particles (background)
  drawParticles();

  // Draw tower with vibration
  drawTower();

  // Draw ground
  drawGround();

  // Draw info
  drawInfo();
  time += 0.016;
}

function getVibrationX(index, t) {
  // t is height ratio (0 = base, 1 = top)
  // Vibration amplitude increases with height (cantilever)
  let amplitude = windStrength * 30 * t;

  // Different modes have different shapes
  // Mode 1: sin(πx/2) - fundamental
  // Mode 2: sin(πx) - second harmonic (node at middle)
  // Mode 3: sin(3πx/2) - third harmonic (nodes at 1/3 and 2/3)
  let phase = time * (2 + mode * 0.5);
  let vibration;

  if (mode === 1) {
    // Fundamental mode
    vibration = sin(PI * t / 2 + phase) * amplitude;
  } else if (mode === 2) {
    // Second harmonic - node in middle
    vibration = sin(PI * t + phase) * amplitude;
  } else if (mode === 3) {
    // Third harmonic - nodes at 1/3 and 2/3
    vibration = sin(3 * PI * t / 2 + phase) * amplitude;
  } else if (mode === 4) {
    // Fourth harmonic
    vibration = sin(2 * PI * t + phase) * amplitude;
  } else {
    // Higher modes
    vibration = sin((mode * PI * t / 2) + phase) * amplitude;
  }

  return vibration;
}

function getNodePositions() {
  // Return t values where vibration is always zero (nodes)
  let nodes = [];
  if (mode === 2) {
    nodes.push(0.5); // Middle node
  } else if (mode === 3) {
    nodes.push(1/3, 2/3);
  } else if (mode === 4) {
    nodes.push(0.33, 0.66);
  }
  return nodes;
}

function drawTower() {
  // Draw Eiffel Tower shape with vibration
  let nodes = getNodePositions();
  let nodeYPositions = nodes.map(n => lerp(height * 0.85, height * 0.08, n));

  // Tower outline - left side
  noFill();
  strokeWeight(3);

  // Dynamic color based on mode
  let hue = (mode - 1) * 30 + 180;
  stroke(hue, 60, 70, 80);

  // Draw left profile
  beginShape();
  for (let i = 0; i < towerPoints.length; i++) {
    let p = towerPoints[i];
    let t = i / towerPoints.length;
    let vib = getVibrationX(i, t);

    // Curved outward (left side) with vibration
    let offsetX = -p.w / 2 + vib;
    vertex(p.x + offsetX, p.y);
  }
  endShape();

  // Draw right profile
  beginShape();
  for (let i = 0; i < towerPoints.length; i++) {
    let p = towerPoints[i];
    let t = i / towerPoints.length;
    let vib = getVibrationX(i, t);

    // Curved outward (right side) with vibration
    let offsetX = p.w / 2 + vib;
    vertex(p.x + offsetX, p.y);
  }
  endShape();

  // Draw cross braces (horizontal struts)
  strokeWeight(1.5);
  stroke(hue, 50, 60, 50);
  let numStruts = 8;
  for (let s = 1; s < numStruts; s++) {
    let t = s / numStruts;
    let leftIdx = Math.floor(t * (towerPoints.length - 1));
    let rightIdx = leftIdx;

    if (leftIdx < towerPoints.length && rightIdx < towerPoints.length) {
      let left = towerPoints[leftIdx];
      let right = towerPoints[rightIdx];
      let leftT = (leftIdx) / towerPoints.length;
      let rightT = leftT;
      let leftVib = getVibrationX(leftIdx, leftT);
      let rightVib = getVibrationX(rightIdx, rightT);

      line(
        left.x - left.w / 2 + leftVib, left.y,
        right.x + right.w / 2 + rightVib, right.y
      );
    }
  }

  // Draw arch at base
  let baseLeft = towerPoints[0];
  let baseRight = towerPoints[0];
  let baseVibL = getVibrationX(0, 0);
  let baseVibR = getVibrationX(0, 0);

  // Curved arch
  strokeWeight(4);
  stroke(hue, 70, 75, 90);
  noFill();
  beginShape();
  for (let a = 0; a <= 20; a++) {
    let archT = a / 20;
    let archX = lerp(
      baseLeft.x - baseLeft.w / 2 + baseVibL,
      baseRight.x + baseRight.w / 2 + baseVibR,
      archT
    );
    // Parabolic arch shape
    let archY = lerp(baseLeft.y, baseLeft.y, archT) - sin(archT * PI) * 60;
    vertex(archX, archY);
  }
  endShape();

  // Draw node indicators (points of no motion)
  if (nodes.length > 0) {
    noStroke();
    for (let n = 0; n < nodes.length; n++) {
      let nodeY = nodeYPositions[n];
      let nodeX = width * 0.5 + getVibrationX(30, nodes[n]);
      fill(0, 80, 100, 70);
      ellipse(nodeX, nodeY, 12, 12);
      fill(0, 0, 100);
      ellipse(nodeX, nodeY, 6, 6);
    }
  }

  // Draw vibration amplitude envelope
  strokeWeight(1);
  stroke(hue, 80, 80, 30);
  noFill();
  beginShape();
  for (let i = 0; i < towerPoints.length; i++) {
    let p = towerPoints[i];
    let t = i / towerPoints.length;
    let vib = getVibrationX(i, t);
    let envelope = abs(vib);
    vertex(p.x - p.w / 2 - envelope * 2 + vib, p.y);
  }
  endShape();
  beginShape();
  for (let i = 0; i < towerPoints.length; i++) {
    let p = towerPoints[i];
    let t = i / towerPoints.length;
    let vib = getVibrationX(i, t);
    let envelope = abs(vib);
    vertex(p.x + p.w / 2 + envelope * 2 + vib, p.y);
  }
  endShape();

  // Highlight top (greatest displacement)
  let topVib = getVibrationX(towerPoints.length - 1, 1);
  let topPoint = towerPoints[towerPoints.length - 1];
  strokeWeight(4);
  stroke(hue, 90, 100, 90);
  point(topPoint.x + topVib, topPoint.y);
}

function drawGround() {
  // Ground line
  stroke(200, 20, 30, 50);
  strokeWeight(2);
  let groundY = height * 0.85;
  line(width * 0.1, groundY, width * 0.9, groundY);

  // Ground pattern
  strokeWeight(1);
  stroke(200, 15, 25, 30);
  for (let x = width * 0.1; x < width * 0.9; x += 20) {
    line(x, groundY, x - 10, groundY + 20);
  }

  // Label
  fill(200, 10, 50, 60);
  textSize(10);
  textAlign(CENTER);
  text('Ground (fixed base)', width * 0.5, groundY + 35);
}

function updateParticles() {
  for (let p of particles) {
    p.x += p.speed * (1 + windStrength * 2);
    if (p.x > width + 50) {
      p.x = -50;
      p.y = random(height);
    }
  }
}

function drawParticles() {
  noStroke();
  for (let p of particles) {
    let hue = (time * 20 + p.y) % 360;
    fill(hue, 40, 90, p.alpha * windStrength);
    ellipse(p.x, p.y, p.size, p.size);
  }
}

function drawInfo() {
  fill(195, 10, 90, 90);
  textSize(14);
  textAlign(LEFT, TOP);
  text('Eiffel Resonance — Tower Vibration Modes', 16, 16);
  fill(165, 8, 70, 80);
  textSize(10);
  text('Eiffel Tower natural frequency ≈ 0.3 Hz (wind). Higher modes have more nodes (zero-motion points).', 16, 38);
  text('Mode ' + mode + ': ' + getModeDescription(mode), 16, 52);
  text('Wind: ' + nf(windStrength * 100, 0, 0) + '% | Click to max wind | 1-5 to change mode | SPACE to reset phase', 16, 66);
  textAlign(LEFT, BASELINE);

  // Mode indicator
  let nodes = getNodePositions();
  fill(180, 10, 80, 70);
  text('Nodes: ' + (nodes.length + 1), 16, height - 20);
}

function getModeDescription(m) {
  if (m === 1) return '1st harmonic — anti-node at top, fixed at base';
  if (m === 2) return '2nd harmonic — node at middle';
  if (m === 3) return '3rd harmonic — nodes at 1/3 and 2/3 height';
  if (m === 4) return '4th harmonic — multiple nodes';
  return 'Higher harmonic — many nodes';
}

function keyPressed() {
  if (key === '1') mode = 1;
  if (key === '2') mode = 2;
  if (key === '3') mode = 3;
  if (key === '4') mode = 4;
  if (key === '5') mode = 5;
  if (key === ' ') {
    time = 0; // Reset phase
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  // Recalculate tower profile
  towerPoints = [];
  let segments = 60;
  for (let i = 0; i <= segments; i++) {
    let t = i / segments;
    let x = lerp(width * 0.5, width * 0.45, t);
    let y = lerp(height * 0.85, height * 0.08, t);
    let w = lerp(120, 15, t);
    towerPoints.push({ x: x, y: y, w: w, baseX: x });
  }
}
</script>
</body>
</html>
