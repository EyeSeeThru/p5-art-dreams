<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nightfall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020104; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Nightfall — The moment darkness descends
// Artistic, transitional, meditative
// The threshold between day and night

let time = 0;
let stars = [];
let particles = [];
const NUM_STARS = 100;
const NUM_PARTICLES = 40;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Initialize stars
  for (let i = 0; i < NUM_STARS; i++) {
    stars.push(createStar());
  }

  // Initialize particles (fading light)
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(createParticle());
  }
}

function createStar() {
  return {
    x: random(width),
    y: random(height * 0.7), // Mostly in upper sky
    size: random(1, 3),
    twinklePhase: random(TWO_PI),
    twinkleSpeed: random(0.02, 0.08),
    alpha: random(30, 70),
    hue: random(200, 240) // Blue to white
  };
}

function createParticle() {
  return {
    x: random(width),
    y: random(height * 0.3, height),
    size: random(2, 6),
    vx: random(-0.3, 0.3),
    vy: random(-0.5, -0.1),
    hue: random(20, 50), // Warm oranges and yellows
    alpha: random(20, 50),
    life: 1,
    maxLife: random(100, 200)
  };
}

function draw() {
  // Draw sky gradient - transitioning from twilight to dark
  drawSky();

  // Draw stars
  for (let star of stars) {
    updateStar(star);
    drawStar(star);
  }

  // Draw fading light particles
  for (let p of particles) {
    updateParticle(p);
    drawParticle(p);
  }

  // Draw horizon glow (last light)
  drawHorizonGlow();

  // Draw subtle mist/fog at bottom
  drawMist();

  time += 0.016;
}

function drawSky() {
  // Vertical gradient from deep blue-black at top to slightly lighter at horizon
  noStroke();
  for (let y = 0; y < height; y += 4) {
    let t = y / height;
    let brightness = 1 + t * 2;
    let sat = 30 - t * 20;
    fill(220, sat, brightness, 100);
    rect(0, y, width, 4);
  }
}

function updateStar(star) {
  // Twinkle
  star.twinklePhase += star.twinkleSpeed;
  star.alpha = 30 + sin(star.twinklePhase) * 30;
}

function drawStar(star) {
  let alpha = star.alpha * (1 - star.size / 4); // Smaller stars dimmer

  noStroke();

  // Glow
  fill(star.hue, 20, 80, alpha * 0.2);
  ellipse(star.x, star.y, star.size * 4, star.size * 4);

  // Core
  fill(star.hue, 10, 100, alpha);
  ellipse(star.x, star.y, star.size, star.size);

  // Bright center
  fill(0, 0, 100, alpha * 0.8);
  ellipse(star.x, star.y, star.size * 0.5, star.size * 0.5);
}

function updateParticle(p) {
  p.x += p.vx;
  p.y += p.vy;
  p.life -= 1 / p.maxLife;
  p.alpha = 30 * p.life;

  // Reset when dead
  if (p.life <= 0) {
    let newP = createParticle();
    p.x = newP.x;
    p.y = newP.y;
    p.vx = newP.vx;
    p.vy = newP.vy;
    p.hue = newP.hue;
    p.alpha = newP.alpha;
    p.life = 1;
  }

  // Wrap horizontally
  if (p.x < 0) p.x = width;
  if (p.x > width) p.x = 0;
}

function drawParticle(p) {
  if (p.alpha < 1) return;

  noStroke();

  // Fading ember
  fill(p.hue, 60, 70, p.alpha * 0.5);
  ellipse(p.x, p.y, p.size * 2, p.size * 2);

  fill(p.hue, 30, 90, p.alpha * 0.8);
  ellipse(p.x, p.y, p.size, p.size);
}

function drawHorizonGlow() {
  // Last light at the horizon - very subtle
  noStroke();

  // Gradient at horizon
  for (let y = height * 0.65; y < height; y += 4) {
    let t = (y - height * 0.65) / (height * 0.35);
    let alpha = (1 - t) * 15;
    fill(30, 40, 15, alpha);
    rect(0, y, width, 4);
  }

  // Occasional warm pulse
  let pulseAlpha = (sin(time * 0.5) * 0.5 + 0.5) * 8;
  fill(30, 50, 20, pulseAlpha);
  ellipse(width / 2, height * 0.85, width * 0.8, height * 0.15);
}

function drawMist() {
  // Ground mist
  noStroke();
  for (let i = 0; i < 15; i++) {
    let x = noise(i * 0.5, time * 0.01) * width;
    let y = height * 0.85 + noise(i * 0.5 + 100, time * 0.008) * height * 0.2;
    let size = noise(i * 0.3 + 200, time * 0.005) * 100 + 50;
    let alpha = noise(i * 0.4 + 300, time * 0.006) * 12 + 5;

    fill(220, 20, 15, alpha);
    ellipse(x, y, size, size * 0.4);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  // Add new stars at mouse position
  for (let i = 0; i < 10; i++) {
    let star = createStar();
    star.x = mouseX + random(-50, 50);
    star.y = random(height * 0.5);
    star.size = random(1, 4);
    stars.push(star);
  }

  // Spawn rising particles (embers)
  for (let i = 0; i < 8; i++) {
    let p = createParticle();
    p.x = mouseX + random(-20, 20);
    p.y = mouseY + random(-20, 20);
    p.vy = random(-1, -0.3);
    p.alpha = random(40, 70);
    particles.push(p);
  }

  // Limit stars
  if (stars.length > NUM_STARS * 2) {
    stars.splice(0, stars.length - NUM_STARS * 2);
  }

  // Limit particles
  if (particles.length > NUM_PARTICLES * 2) {
    particles.splice(0, particles.length - NUM_PARTICLES * 2);
  }
}
</script>
</body>
</html>
