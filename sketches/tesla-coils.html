<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Coils - p5 Art Dreams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Tesla Coil Electrical Discharge Simulation
// Branching lightning with glow effects

let coils = [];
let particles = [];
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  // Create multiple Tesla coil sources
  const coilCount = 3;
  const margin = width * 0.2;
  
  for (let i = 0; i < coilCount; i++) {
    let x = margin + (width - 2 * margin) * (i / (coilCount - 1));
    let y = height * 0.85;
    coils.push({
      x: x,
      y: y,
      phase: i * TWO_PI / coilCount,
      intensity: 0.6 + Math.random() * 0.4
    });
  }
  
  background(0);
}

function draw() {
  // Semi-transparent background for trail effect
  background(0, 0, 0, 0.08);
  
  time += 0.02;
  
  // Update and draw coils
  for (let coil of coils) {
    let discharge = sin(time * 3 + coil.phase) * 0.5 + 0.5;
    discharge *= coil.intensity;
    
    if (discharge > 0.7 && random() < 0.15) {
      createLightning(coil.x, coil.y - 50, coil.y - random(100, 300), discharge);
    }
    
    // Draw coil base
    drawCoil(coil.x, coil.y, coil.phase);
  }
  
  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.life -= p.decay;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.02; // slight gravity
    
    if (p.life <= 0) {
      particles.splice(i, 1);
    } else {
      drawParticle(p);
    }
  }
}

function drawCoil(x, y, phase) {
  // Tesla coil tower
  let glow = sin(time * 4 + phase) * 0.3 + 0.7;
  
  // Tower
  stroke(200, 30, 80, glow);
  strokeWeight(3);
  line(x, y, x, y - 60);
  
  // Top sphere with glow
  noStroke();
  for (let r = 40; r > 0; r -= 5) {
    fill(280, 80, 100, 0.03);
    ellipse(x, y - 60, r * 2);
  }
  
  fill(280, 60, 100, glow);
  ellipse(x, y - 60, 20);
  
  // Base
  fill(0, 0, 20);
  rectMode(CENTER);
  rect(x, y + 10, 40, 20);
}

function createLightning(x, startY, endY, intensity) {
  let segments = [];
  let xPos = x;
  let yPos = startY;
  let step = (endY - startY) / 15;
  
  for (let i = 0; i < 15; i++) {
    let targetX = xPos + random(-30, 30) * intensity;
    let targetY = yPos + step;
    
    // Add jitter
    segments.push({
      x1: xPos,
      y1: yPos,
      x2: targetX,
      y2: targetY,
      intensity: intensity,
      hue: random() > 0.7 ? random(160, 200) : random(260, 320) // Cyan or purple
    });
    
    xPos = targetX;
    yPos = targetY;
    
    // Spawn particles at each segment
    if (random() < 0.5) {
      particles.push({
        x: targetX,
        y: targetY,
        vx: random(-2, 2),
        vy: random(-3, 0),
        life: 1,
        decay: random(0.02, 0.05),
        hue: random() > 0.5 ? random(160, 200) : random(260, 320),
        size: random(2, 5)
      });
    }
    
    // Occasionally branch
    if (random() < 0.2 && i > 2) {
      createBranch(xPos, yPos, intensity * 0.6);
    }
  }
  
  // Draw main lightning
  for (let seg of segments) {
    let alpha = seg.intensity * 0.9;
    stroke(seg.hue, 80, 100, alpha);
    strokeWeight(seg.intensity * 3);
    line(seg.x1, seg.y1, seg.x2, seg.y2);
    
    // Glow layer
    stroke(seg.hue, 60, 100, alpha * 0.3);
    strokeWeight(seg.intensity * 10);
    line(seg.x1, seg.y1, seg.x2, seg.y2);
  }
}

function createBranch(x, y, intensity) {
  let segments = [];
  let xPos = x;
  let yPos = y;
  let dir = random() > 0.5 ? 1 : -1;
  let branchSteps = floor(random(5, 10));
  
  for (let i = 0; i < branchSteps; i++) {
    let targetX = xPos + dir * random(10, 25) * intensity;
    let targetY = yPos + random(10, 25);
    
    segments.push({
      x1: xPos,
      y1: yPos,
      x2: targetX,
      y2: targetY,
      intensity: intensity * 0.5
    });
    
    xPos = targetX;
    yPos = targetY;
    dir *= random(0.8, 1.2);
    
    if (yPos > height) break;
  }
  
  for (let seg of segments) {
    stroke(280, 70, 100, seg.intensity * 0.7);
    strokeWeight(seg.intensity * 2);
    line(seg.x1, seg.y1, seg.x2, seg.y2);
  }
}

function drawParticle(p) {
  noStroke();
  
  // Glow
  fill(p.hue, 70, 100, p.life * 0.2);
  ellipse(p.x, p.y, p.size * 4);
  
  // Core
  fill(p.hue, 50, 100, p.life);
  ellipse(p.x, p.y, p.size);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  coils = [];
  particles = [];
  setup();
}
</script>
</body>
</html>
