<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice Resonance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const COLS = 24;
const ROWS = 18;
let grid = [];
let velocities = [];
let damping = 0.992;
let c = 0.4;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  
  for (let i = 0; i < COLS; i++) {
    grid[i] = [];
    velocities[i] = [];
    for (let j = 0; j < ROWS; j++) {
      grid[i][j] = 0;
      velocities[i][j] = 0;
    }
  }
}

function draw() {
  background(0, 0, 5);
  
  let newGrid = [];
  for (let i = 0; i < COLS; i++) {
    newGrid[i] = [];
    for (let j = 0; j < ROWS; j++) {
      newGrid[i][j] = grid[i][j];
    }
  }
  
  for (let i = 1; i < COLS - 1; i++) {
    for (let j = 1; j < ROWS - 1; j++) {
      let laplacian = (
        grid[i-1][j] + grid[i+1][j] + 
        grid[i][j-1] + grid[i][j+1]
      ) / 4 - grid[i][j];
      
      velocities[i][j] += c * c * laplacian;
      velocities[i][j] *= damping;
      newGrid[i][j] += velocities[i][j];
    }
  }
  
  let t = frameCount * 0.03;
  let autoX = floor(COLS/2 + sin(t * 0.7) * (COLS/3));
  let autoY = floor(ROWS/2 + cos(t * 0.5) * (ROWS/3));
  let autoX2 = floor(COLS/2 + cos(t * 0.6) * (COLS/3));
  let autoY2 = floor(ROWS/2 + sin(t * 0.8) * (ROWS/3));
  
  newGrid[autoX][autoY] = sin(t * 3) * 80;
  newGrid[autoX2][autoY2] = cos(t * 2.5) * 80;
  
  if (mouseIsPressed && mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
    let mx = floor(map(mouseX, 0, width, 1, COLS - 1));
    let my = floor(map(mouseY, 0, height, 1, ROWS - 1));
    if (mx > 0 && mx < COLS - 1 && my > 0 && my < ROWS - 1) {
      newGrid[mx][my] = 100;
    }
  }
  
  grid = newGrid;
  
  let cellW = width / COLS;
  let cellH = height / ROWS;
  
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      let val = grid[i][j];
      let hue = map(val, -100, 100, 180, 300);
      let sat = map(abs(val), 0, 80, 40, 90);
      let bri = map(abs(val), 0, 80, 20, 100);
      
      fill(hue, sat, bri, 85);
      
      let size = map(abs(val), 0, 80, 0.2, 0.9);
      let x = i * cellW + cellW/2;
      let y = j * cellH + cellH/2;
      
      ellipse(x, y, cellW * size, cellH * size);
    }
  }
  
  // Glow overlay
  blendMode(ADD);
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      let val = grid[i][j];
      if (abs(val) > 30) {
        let hue = map(val, -100, 100, 200, 320);
        fill(hue, 60, 30, 15);
        let x = i * cellW + cellW/2;
        let y = j * cellH + cellH/2;
        ellipse(x, y, cellW * 2, cellH * 2);
      }
    }
  }
  blendMode(BLEND);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
