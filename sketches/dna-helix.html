<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA Helix</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// DNA Helix - Double helix visualization with rotating animation
let t = 0;
const numPairs = 40;
const helixRadius = 80;
const helixPitch = 25;
const sphereSize = 12;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
}

function draw() {
  background(0, 0, 5, 0.15);
  
  translate(width / 2, height / 2);
  
  // Rotate entire structure slowly
  rotateX(frameCount * 0.008);
  rotateY(frameCount * 0.012);
  
  // Draw double helix
  for (let i = 0; i < numPairs; i++) {
    let angle = (TWO_PI * i) / numPairs + t;
    let y = (i - numPairs / 2) * helixPitch;
    
    // Strand 1
    let x1 = cos(angle) * helixRadius;
    let z1 = sin(angle) * helixRadius;
    
    // Strand 2 (opposite)
    let x2 = cos(angle + PI) * helixRadius;
    let z2 = sin(angle + PI) * helixRadius;
    
    // Base pair connection
    let hue = map(i, 0, numPairs, 180, 300);
    
    // Connecting line between strands
    stroke(hue, 60, 80, 0.4);
    strokeWeight(2);
    line(x1, y, z1, x2, y, z2);
    
    // Strand 1 sphere
    push();
    translate(x1, y, z1);
    noStroke();
    fill(hue, 70, 90);
    emissiveMaterial(hue, 50, 30);
    sphere(sphereSize * 0.7 + sin(t * 2 + i * 0.2) * 2);
    pop();
    
    // Strand 2 sphere
    push();
    translate(x2, y, z2);
    noStroke();
    fill(hue + 60, 60, 95);
    emissiveMaterial(hue + 60, 40, 30);
    sphere(sphereSize * 0.7 + sin(t * 2 + i * 0.2 + PI) * 2);
    pop();
  }
  
  // Add floating particles
  for (let i = 0; i < 50; i++) {
    let angle = random(TWO_PI);
    let r = random(100, 300);
    let x = cos(angle + t * 0.5) * r;
    let y = random(-height/2, height/2);
    let z = sin(angle + t * 0.5) * r;
    
    push();
    translate(x, y, z);
    noStroke();
    fill(200, 30, 100, 0.6);
    sphere(3);
    pop();
  }
  
  t += 0.03;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
