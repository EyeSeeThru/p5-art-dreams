<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Islands of Chaos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const GRID_SIZE = 80;
const CELL_SIZE = 8;
let grid = [];
let nextGrid = [];
let avalancheCount = 0;
let maxAvalanche = 0;
let colors = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  
  // Initialize grid
  for (let i = 0; i < GRID_SIZE; i++) {
    grid[i] = [];
    nextGrid[i] = [];
    for (let j = 0; j < GRID_SIZE; j++) {
      grid[i][j] = 0;
      nextGrid[i][j] = 0;
    }
  }
  
  // Generate palette
  for (let i = 0; i < 360; i += 2) {
    colors.push(color(i, 70, 90, 0.9));
  }
}

function draw() {
  background(10);
  
  // Add sand grains randomly
  for (let k = 0; k < 3; k++) {
    let x = floor(random(GRID_SIZE));
    let y = floor(random(GRID_SIZE));
    grid[x][y]++;
  }
  
  // Run avalanche simulation
  let toppling = true;
  while (toppling) {
    toppling = false;
    avalancheCount++;
    
    for (let i = 0; i < GRID_SIZE; i++) {
      for (let j = 0; j < GRID_SIZE; j++) {
        nextGrid[i][j] = grid[i][j];
      }
    }
    
    for (let i = 0; i < GRID_SIZE; i++) {
      for (let j = 0; j < GRID_SIZE; j++) {
        if (grid[i][j] >= 4) {
          toppling = true;
          nextGrid[i][j] -= 4;
          
          // Distribute to neighbors
          if (i > 0) nextGrid[i-1][j]++;
          if (i < GRID_SIZE-1) nextGrid[i+1][j]++;
          if (j > 0) nextGrid[i][j-1]++;
          if (j < GRID_SIZE-1) nextGrid[i][j+1]++;
        }
      }
    }
    
    // Swap grids
    for (let i = 0; i < GRID_SIZE; i++) {
      for (let j = 0; j < GRID_SIZE; j++) {
        grid[i][j] = nextGrid[i][j];
      }
    }
  }
  
  maxAvalanche = max(maxAvalanche, avalancheCount);
  avalancheCount = 0;
  
  // Draw cells
  let offsetX = (width - GRID_SIZE * CELL_SIZE) / 2;
  let offsetY = (height - GRID_SIZE * CELL_SIZE) / 2;
  
  for (let i = 0; i < GRID_SIZE; i++) {
    for (let j = 0; j < GRID_SIZE; j++) {
      let val = grid[i][j];
      if (val > 0) {
        let hue = map(val, 0, 4, 180, 360);
        let sat = map(val, 0, 4, 40, 80);
        let bri = map(val, 0, 4, 60, 100);
        fill(hue, sat, bri, 0.95);
        rect(offsetX + i * CELL_SIZE, offsetY + j * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
      } else {
        fill(220, 5, 15, 0.3);
        rect(offsetX + i * CELL_SIZE, offsetY + j * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
      }
    }
  }
  
  // Draw info
  fill(255);
  textSize(12);
  textAlign(LEFT, TOP);
  text('ISLANDS OF CHAOS', 20, 20);
  textSize(10);
  fill(150);
  text('Self-organized criticality via sandpile model', 20, 40);
  text('Cluster size: ' + maxAvalanche, 20, 58);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
