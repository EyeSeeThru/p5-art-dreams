<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flame Silk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #010101; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Flame Silk — Flames Flowing Like Silk
// Artistic, elegant, hypnotic
// Fire moving like fabric

let time = 0;
let numFlames = 10;
let flames = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Initialize flame folds
  for (let i = 0; i < numFlames; i++) {
    flames.push({
      y: map(i, 0, numFlames, height * 0.05, height * 0.98),
      amplitude: random(60, 140),
      frequency: random(0.005, 0.012),
      speed: random(0.4, 0.9) * random([-1, 1]),
      phase: random(TWO_PI),
      hue: random(5, 40), // Red to orange
      saturation: random(80, 100),
      brightness: random(70, 95),
      thickness: random(80, 180),
      highlightAlpha: random(15, 35)
    });
  }
}

function draw() {
  // Dark background
  background(0, 30, 1);

  time += 0.015;

  // Draw flame folds from back to front
  for (let i = 0; i < flames.length; i++) {
    drawFlameFold(flames[i], i);
  }

  // Floating ember particles
  drawEmbers();

  // Mouse influence
  drawMouseInfluence();
}

function drawFlameFold(flame, index) {
  noStroke();

  let phaseOffset = flame.phase + time * flame.speed;
  let baseY = flame.y;

  // Multiple layers per flame for depth
  for (let layer = 0; layer < 4; layer++) {
    let layerOffset = layer * 12;
    let layerAlpha = map(layer, 0, 3, flame.highlightAlpha, flame.highlightAlpha * 0.2);
    let layerThickness = flame.thickness * (1 - layer * 0.15);

    // Draw flowing shape
    beginShape();
    for (let x = -50; x <= width + 50; x += 4) {
      let wave1 = sin(x * flame.frequency + phaseOffset) * flame.amplitude;
      let wave2 = sin(x * flame.frequency * 2.1 + phaseOffset * 1.5) * flame.amplitude * 0.4;
      let wave3 = cos(x * flame.frequency * 0.6 + phaseOffset * 0.7) * flame.amplitude * 0.2;
      let y = baseY + wave1 + wave2 + wave3 + layerOffset;

      let bright = flame.brightness + sin(x * 0.015 + time * 2) * 10;
      let hueShift = sin(x * 0.02 + layer + time * 0.8) * 8;

      fill((flame.hue + hueShift + 360) % 360, flame.saturation, bright, layerAlpha);
      vertex(x, y);
    }

    // Close shape at bottom
    for (let x = width + 50; x >= -50; x -= 4) {
      let wave1 = sin(x * flame.frequency + phaseOffset) * flame.amplitude;
      let wave2 = sin(x * flame.frequency * 2.1 + phaseOffset * 1.5) * flame.amplitude * 0.4;
      let wave3 = cos(x * flame.frequency * 0.6 + phaseOffset * 0.7) * flame.amplitude * 0.2;
      let y = baseY + wave1 + wave2 + wave3 + layerOffset + layerThickness;

      fill((flame.hue + 360) % 360, flame.saturation * 0.8, flame.brightness * 0.8, layerAlpha * 0.4);
      vertex(x, y);
    }
    endShape(CLOSE);
  }

  // Draw highlight edge
  strokeWeight(1.5);
  for (let x = -50; x <= width + 50; x += 3) {
    let wave1 = sin(x * flame.frequency + phaseOffset) * flame.amplitude;
    let wave2 = sin(x * flame.frequency * 2.1 + phaseOffset * 1.5) * flame.amplitude * 0.4;
    let wave3 = cos(x * flame.frequency * 0.6 + phaseOffset * 0.7) * flame.amplitude * 0.2;
    let y = baseY + wave1 + wave2 + wave3;

    let highlightBright = 90 + sin(x * 0.03 + time * 2.5) * 8;
    let highlightAlpha = flame.highlightAlpha * (0.6 + sin(x * 0.02 + time) * 0.4);

    stroke(30, 70, highlightBright, highlightAlpha);
    point(x, y);
  }
}

let emberParticles = [];

function drawEmbers() {
  // Add new embers
  if (frameCount % 8 === 0 && emberParticles.length < 30) {
    emberParticles.push({
      x: random(width),
      y: random(height * 0.5, height),
      size: random(1, 3),
      vx: random(-0.3, 0.3),
      vy: random(-0.8, -0.2),
      alpha: random(30, 60),
      life: random(100, 200)
    });
  }

  // Draw and update embers
  noStroke();
  for (let i = emberParticles.length - 1; i >= 0; i--) {
    let p = emberParticles[i];
    p.x += p.vx + sin(time * 2 + i) * 0.15;
    p.y += p.vy;
    p.life -= 1;
    p.alpha *= 0.995;

    if (p.life <= 0) {
      emberParticles.splice(i, 1);
      continue;
    }

    let lifeRatio = p.life / 200;

    // Glow
    fill(20, 90, 60, p.alpha * 0.3 * lifeRatio);
    ellipse(p.x, p.y, p.size * 4, p.size * 4);

    // Core
    fill(30, 80, 80, p.alpha * lifeRatio);
    ellipse(p.x, p.y, p.size, p.size);
  }
}

function drawMouseInfluence() {
  // Flame bends toward mouse
  noFill();
  strokeWeight(0.5);

  for (let r = 250; r > 30; r -= 25) {
    let alpha = map(r, 30, 250, 12, 0);
    stroke(25, 60, 40, alpha);
    ellipse(mouseX, mouseY, r, r * 0.7);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);

  for (let i = 0; i < flames.length; i++) {
    flames[i].y = map(i, 0, flames.length, height * 0.05, height * 0.98);
  }
}

function mousePressed() {
  // Burst of flame intensity
  for (let flame of flames) {
    flame.amplitude *= 1.8;
    flame.brightness = min(100, flame.brightness + 20);
    setTimeout(() => {
      flame.amplitude *= 0.6;
      flame.brightness = max(70, flame.brightness - 20);
    }, 600);
  }

  // Spawn burst of embers
  for (let i = 0; i < 12; i++) {
    emberParticles.push({
      x: mouseX + random(-40, 40),
      y: mouseY + random(-20, 20),
      size: random(1.5, 4),
      vx: random(-1, 1),
      vy: random(-2, -0.5),
      alpha: random(50, 80),
      life: random(150, 250)
    });
  }
}
</script>
</body>
</html>
