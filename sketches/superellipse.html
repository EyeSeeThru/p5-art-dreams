<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Superellipse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
let t = 0;
const PARTICLES = 300;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
}

function draw() {
  background(5, 5, 8, 25);
  translate(width / 2, height / 2);

  let cx = width * 0.35;
  let cy = height * 0.35;
  let n = map(sin(t * 0.15), -1, 1, 0.3, 5.0);
  let hue = (t * 2) % 360;

  // Rotating superellipse frames
  for (let layer = 0; layer < 4; layer++) {
    let rot = t * (0.3 + layer * 0.15) + layer * HALF_PI * 0.25;
    let scl = 1.0 - layer * 0.18;
    let alpha = 20 + layer * 8;
    push();
    rotate(rot);
    strokeWeight(0.6);
    stroke(hue + layer * 20, 70, 80, alpha);
    noFill();
    beginShape();
    for (let a = 0; a < TWO_PI; a += 0.02) {
      let x = cx * scl * pow(abs(cos(a)), 2 / n);
      let y = cy * scl * pow(abs(sin(a)), 2 / n);
      x *= sign(cos(a));
      y *= sign(sin(a));
      vertex(x, y);
    }
    endShape(CLOSE);
    pop();
  }

  // Particle trails along superellipse
  for (let i = 0; i < PARTICLES; i++) {
    let phase = (i / PARTICLES) * TWO_PI + t * 0.4;
    let spd = 0.3 + 0.7 * (i % 7) / 6;
    let phase2 = phase + t * spd * 0.3;
    let n2 = map(sin(phase2 * 0.5 + t * 0.1), -1, 1, 0.5, 4.0);

    let rx = cx * pow(abs(cos(phase)), 2 / n2);
    let ry = cy * pow(abs(sin(phase)), 2 / n2);
    rx *= sign(cos(phase));
    ry *= sign(sin(phase));

    // Second shape — offset
    let phase3 = phase + PI;
    let rx2 = cx * 0.6 * pow(abs(cos(phase3)), 2 / n2);
    let ry2 = cy * 0.6 * pow(abs(sin(phase3)), 2 / n2);
    rx2 *= sign(cos(phase3));
    ry2 *= sign(sin(phase3));

    let px = rx + (rx2 - rx) * 0.5;
    let py = ry + (ry2 - ry) * 0.5;

    let sz = map(sin(phase2 * 3), -1, 1, 1.5, 4.5);
    let alpha2 = map(sin(phase2 * 2 + t), -1, 1, 30, 90);
    let h = (hue + i * 1.2 + t * 10) % 360;

    fill(h, 75, 90, alpha2);
    ellipse(px, py, sz, sz);
  }

  // Central glow
  let gAlpha = map(sin(t * 0.5), -1, 1, 20, 50);
  noStroke();
  fill(hue, 80, 100, gAlpha);
  ellipse(0, 0, 30, 30);

  t += deltaTime() * 0.001;
}

function sign(x) { return x >= 0 ? 1 : -1; }

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
