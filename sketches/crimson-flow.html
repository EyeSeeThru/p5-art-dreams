<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Crimson Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Crimson Flow — Artistic Red Abstract
// Flowing, dreamlike red forms against deep black
// Expressive, emotionally evocative, not scientific

let particles = [];
let flowField = [];
let numParticles = 800;
let time = 0;
let phase = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: 0,
      vy: 0,
      life: random(100, 300),
      maxLife: 0,
      size: random(1, 4),
      hue: random(340, 380) % 360 // Deep red range
    });
    particles[i].maxLife = particles[i].life;
  }

  // Initialize flow field
  let resolution = 20;
  for (let x = 0; x < width / resolution + 1; x++) {
    flowField[x] = [];
    for (let y = 0; y < height / resolution + 1; y++) {
      flowField[x][y] = 0;
    }
  }
}

function draw() {
  // Very slow fade for ghostly trails
  background(0, 0, 3, 8);

  time += 0.005;
  phase += 0.008;

  // Update flow field with smooth, organic motion
  updateFlowField();

  // Update and draw particles
  for (let p of particles) {
    // Get flow direction at particle position
    let resolution = 20;
    let fx = floor(p.x / resolution);
    let fy = floor(p.y / resolution);
    fx = constrain(fx, 0, flowField.length - 1);
    fy = constrain(fy, 0, flowField[0].length - 1);

    let angle = flowField[fx][fy] * TWO_PI * 2;

    // Smooth velocity change
    p.vx = lerp(p.vx, cos(angle) * 2, 0.1);
    p.vy = lerp(p.vy, sin(angle) * 2, 0.1);

    // Update position
    p.x += p.vx;
    p.y += p.vy;

    // Life cycle
    p.life -= 0.5;

    // Reset if dead or out of bounds
    if (p.life <= 0 || p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
      p.x = random(width);
      p.y = random(height);
      p.life = random(150, 400);
      p.maxLife = p.life;
      p.vx = 0;
      p.vy = 0;
    }

    // Draw with life-based intensity
    let lifeRatio = p.life / p.maxLife;
    let alpha = sin(lifeRatio * PI) * 60;
    let brightness = map(lifeRatio, 0, 1, 40, 90);
    let hueShift = (lifeRatio * 30) % 60;

    stroke((p.hue + hueShift) % 360, 85, brightness, alpha);
    strokeWeight(p.size * lifeRatio + 0.5);

    // Draw line from old to new position for trail effect
    let oldX = p.x - p.vx * 3;
    let oldY = p.y - p.vy * 3;
    line(oldX, oldY, p.x, p.y);
  }

  // Add central glow
  drawCentralGlow();

  // Add floating orbs occasionally
  if (frameCount % 60 === 0 && random() > 0.7) {
    spawnOrb();
  }

  drawOrbs();
}

function updateFlowField() {
  let resolution = 20;
  let cols = floor(width / resolution) + 1;
  let rows = floor(height / resolution) + 1;

  for (let x = 0; x < cols; x++) {
    for (let y = 0; y < rows; y++) {
      // Multiple layers of Perlin noise for organic flow
      let nx = x * resolution;
      let ny = y * resolution;

      // Base flow - large slow movement
      let angle1 = noise(nx * 0.001, ny * 0.001, time * 0.5);

      // Secondary flow - medium movement
      let angle2 = noise(nx * 0.003, ny * 0.003, time * 0.8 + 100);

      // Tertiary flow - small detailed movement
      let angle3 = noise(nx * 0.008, ny * 0.008, time * 1.2 + 200);

      // Combine layers
      flowField[x][y] = (angle1 * 0.5 + angle2 * 0.3 + angle3 * 0.2 + sin(phase + nx * 0.005 + ny * 0.003) * 0.1);
    }
  }
}

let orbs = [];

function spawnOrb() {
  orbs.push({
    x: random(width),
    y: random(height),
    size: random(20, 80),
    vx: random(-0.5, 0.5),
    vy: random(-0.5, 0.5),
    life: random(100, 200),
    maxLife: 0
  });
  orbs[orbs.length - 1].maxLife = orbs[orbs.length - 1].life;
}

function drawOrbs() {
  for (let i = orbs.length - 1; i >= 0; i--) {
    let orb = orbs[i];

    orb.x += orb.vx;
    orb.y += orb.vy;
    orb.life -= 1;

    if (orb.life <= 0) {
      orbs.splice(i, 1);
      continue;
    }

    let lifeRatio = orb.life / orb.maxLife;
    let alpha = lifeRatio * 15;

    // Draw soft glow orb
    noStroke();
    for (let r = orb.size; r > 0; r -= orb.size / 5) {
      fill(350, 90, 30, alpha * (1 - r / orb.size));
      ellipse(orb.x, orb.y, r, r);
    }
  }
}

function drawCentralGlow() {
  // Subtle central glow that pulses
  let pulse = sin(phase * 0.5) * 0.3 + 0.7;
  let centerX = width / 2 + sin(time * 10) * 50;
  let centerY = height / 2 + cos(time * 8) * 30;

  noStroke();
  for (let r = 300; r > 0; r -= 20) {
    fill(355, 80, 20, pulse * 2 * (1 - r / 300));
    ellipse(centerX, centerY, r, r);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);

  // Reinitialize flow field
  let resolution = 20;
  for (let x = 0; x < width / resolution + 1; x++) {
    flowField[x] = [];
    for (let y = 0; y < height / resolution + 1; y++) {
      flowField[x][y] = 0;
    }
  }
}

function mousePressed() {
  // Add burst of particles at click
  for (let i = 0; i < 50; i++) {
    let p = particles[floor(random(particles.length))];
    p.x = mouseX;
    p.y = mouseY;
    p.life = random(200, 400);
    p.maxLife = p.life;
    p.vx = random(-3, 3);
    p.vy = random(-3, 3);
  }

  // Spawn extra orbs on click
  for (let i = 0; i < 3; i++) {
    spawnOrb();
  }
}
</script>
</body>
</html>
