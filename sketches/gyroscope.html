<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gyroscope</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let angleX = 0;
let angleY = 0;
let angleZ = 0;
let spinSpeed = 0.02;
let precessionSpeed = 0.008;
let nutationAngle = 0;
let nutationSpeed = 0.015;
let particles = [];

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 1);
  
  // Create trailing particles
  for (let i = 0; i < 150; i++) {
    particles.push({
      x: random(-200, 200),
      y: random(-200, 200),
      z: random(-200, 200),
      hue: random(360),
      size: random(2, 5),
      life: random(0.5, 1)
    });
  }
}

function draw() {
  background(10, 20, 15);
  
  scale(2);
  
  // Update angles
  angleX += spinSpeed;
  angleY += precessionSpeed;
  nutationAngle = sin(frameCount * nutationSpeed) * 0.3;
  
  // Draw outer ring (reference)
  noFill();
  stroke(200, 30, 40, 0.3);
  strokeWeight(1);
  ellipse(0, 0, 400, 400);
  
  // Apply rotations for gyroscope frame
  rotateZ(angleY);
  rotateX(nutationAngle);
  rotateY(angleX);
  
  // Draw main rotor (disk)
  push();
  stroke(280, 60, 90, 0.8);
  strokeWeight(2);
  fill(280, 70, 30, 0.4);
  ellipse(0, 0, 180, 180);
  
  // Rotor glow
  for (let r = 180; r > 0; r -= 20) {
    fill(280, 60, 20 + (180 - r) * 0.3, 0.1);
    noStroke();
    ellipse(0, 0, r, r);
  }
  pop();
  
  // Draw axis shaft
  push();
  stroke(50, 40, 90, 0.6);
  strokeWeight(4);
  line(0, -120, 0, 120);
  
  // Axis endpoints
  fill(180, 50, 95, 0.9);
  noStroke();
  ellipse(0, -120, 15, 15);
  ellipse(0, 120, 15, 15);
  pop();
  
  // Precession ring
  push();
  rotateX(PI / 2);
  noFill();
  stroke(160, 50, 80, 0.4);
  strokeWeight(2);
  ellipse(0, 0, 280, 280);
  pop();
  
  // Draw particles in 3D space
  push();
  for (let p of particles) {
    let x = p.x * cos(angleX * 0.5) - p.z * sin(angleX * 0.5);
    let z = p.x * sin(angleX * 0.5) + p.z * cos(angleX * 0.5);
    
    fill(p.hue, 60, 80, p.life * 0.6);
    noStroke();
    ellipse(x, p.y, p.size, p.size);
    
    p.life -= 0.008;
    if (p.life <= 0) {
      p.x = random(-150, 150);
      p.y = random(-150, 150);
      p.z = random(-150, 150);
      p.life = 1;
      p.hue = (p.hue + 5) % 360;
    }
  }
  pop();
  
  // Orbital indicator rings
  push();
  rotateZ(frameCount * 0.01);
  for (let i = 0; i < 3; i++) {
    rotateX(PI / 3);
    noFill();
    stroke(200 + i * 30, 40, 60, 0.2);
    strokeWeight(1);
    ellipse(0, 0, 220 + i * 30, 220 + i * 30);
  }
  pop();
  
  // Info text
  fill(0, 0, 100, 0.7);
  noStroke();
  textSize(12);
  textAlign(LEFT, BOTTOM);
  text('GYROSCOPE — Precession & Nutation', 20, height - 20);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
