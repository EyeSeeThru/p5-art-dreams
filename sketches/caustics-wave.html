<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Caustics Wave</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06080c; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Caustics Wave — light refraction patterns through a wavy water surface
// Simulates caustic curves formed by light focusing through refractive index variations
// The "caustic" is the envelope of light rays — where light concentrates
let time = 0;
let particles = [];
let gridRes = 60;
let rSeed = 0;
const NUM_PARTICLES = 180;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  rSeed = random(10000);
  randomSeed(rSeed);

  // Initialize particles at random positions, drifting upward slowly
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: random(-0.3, 0.3),
      vy: random(-0.5, -0.1),
      hue: random(35, 65),  // golden-white
      bright: random(80, 100),
      size: random(1.5, 4)
    });
  }
}

function draw() {
  // Dark water background
  background(200, 40, 6);

  let cx = width / 2;
  let cy = height / 2;

  // Draw subtle water surface grid
  stroke(200, 30, 15, 18);
  strokeWeight(0.5);
  let gs = 30;
  for (let x = 0; x < width; x += gs) line(x, 0, x, height);
  for (let y = 0; y < height; y += gs) line(0, y, width, y);

  // Draw caustic patterns using multiple layers of animated sinusoidal waves
  // The "caustic envelope" — areas where many light rays converge
  drawCausticLayer(time, 0);

  // Second layer with slower variation for depth
  drawCausticLayer(time * 0.6 + 1000, 1);

  // Draw bright caustic lines — the "envelope" of focused light
  drawCausticLines(time);

  // Draw floating particles that accumulate at caustic bright spots
  updateAndDrawParticles(time);

  // Surface ripple overlay
  drawSurfaceRipples(time);

  // Vignette
  radialGradientRect(0, 0, width, height, [
    [0, 0, 0, 0],
    [0, 0, 0, 60]
  ]);

  // Title
  noStroke();
  fill(40, 20, 80, 70);
  textSize(11);
  textAlign(LEFT, TOP);
  text('Caustics Wave — light refraction patterns through a wavy water surface', 16, 16);
  fill(40, 15, 65, 55);
  text('Bright caustic curves form where light rays focus after passing through refractive index variations', 16, 32);
  fill(40, 10, 55, 45);
  text('Particles (golden light motes) accumulate at caustic focal points — regions of maximum intensity', 16, 48);

  textAlign(RIGHT, TOP);
  fill(40, 15, 70, 55);
  text('Particles: ' + NUM_PARTICLES + '   Grid: ' + gridRes + 'x' + gridRes, width - 16, 16);

  time++;
}

function drawCausticLayer(t, layerIdx) {
  // Multiple overlapping sinusoidal grids create interference patterns
  // where bright caustic lines form
  let numWaves = 4;
  let cellSize = gridRes;

  noStroke();
  for (let x = 0; x < width; x += cellSize) {
    for (let y = 0; y < height; y += cellSize) {
      let totalIntensity = 0;

      // Sum contributions from multiple wave directions
      let angles = [0.3, 1.1, 2.3, 3.8 + layerIdx * 1.5];
      let freqs = [0.018, 0.022, 0.015, 0.025 + layerIdx * 0.008];
      let phases = [t * 0.012, t * 0.015, t * 0.009, t * 0.02];

      for (let w = 0; w < numWaves; w++) {
        let k = freqs[w];
        let phase = phases[w] + angles[w];
        totalIntensity += cos(k * x + phase) * cos(k * y * 0.7 + phase * 0.8);
      }

      // Caustic: intensity to a high power concentrates at peaks
      // This makes the "bright lines" of the caustic envelope
      let causticIntensity = pow(max(0, totalIntensity / numWaves), 2.8);

      if (causticIntensity > 0.05) {
        let hue = 38 + causticIntensity * 20 + layerIdx * 12;
        let sat = 60 + causticIntensity * 35;
        let bri = 20 + causticIntensity * 70;
        fill(hue, sat, bri, causticIntensity * 45);
        rect(x, y, cellSize + 1, cellSize + 1);
      }
    }
  }
}

function drawCausticLines(t) {
  // Draw the actual caustic envelope lines — 
  // where light intensity is maximum (envelope of the ray family)
  // We approximate this by finding ridges in the intensity field
  strokeWeight(0.8);

  let step = 8;
  for (let x = 0; x < width; x += step) {
    for (let y = 0; y < height; y += step) {
      let e = getCausticIntensity(x, y, t);
      let ex = getCausticIntensity(x + step, y, t);
      let ey = getCausticIntensity(x, y + step, t);

      // Gradient of intensity field
      let gx = ex - e;
      let gy = ey - e;

      let mag = sqrt(gx * gx + gy * gy);
      if (mag > 0.15 && e > 0.4) {
        // Ridge point — draw perpendicular to gradient
        let nx = -gy / mag;
        let ny = gx / mag;
        let len = 4 + e * 8;

        stroke(42, 55, 95, e * 80);
        line(x + nx * len, y + ny * len, x - nx * len, y - ny * len);
      }
    }
  }
}

function getCausticIntensity(x, y, t) {
  let angles = [0.3, 1.1, 2.3, 3.8];
  let freqs = [0.018, 0.022, 0.015, 0.025];
  let phases = [t * 0.012, t * 0.015, t * 0.009, t * 0.02];

  let total = 0;
  for (let w = 0; w < angles.length; w++) {
    let k = freqs[w];
    let phase = phases[w] + angles[w];
    total += cos(k * x + phase) * cos(k * y * 0.7 + phase * 0.8);
  }
  return max(0, total / angles.length);
}

function updateAndDrawParticles(t) {
  // Particles drift slowly, drawn to bright caustic regions
  // (simulate phototropism — light-seeking behavior)
  randomSeed(rSeed + floor(t * 0.1));
  noStroke();

  for (let p of particles) {
    // Calculate caustic intensity at particle position
    let ci = getCausticIntensity(p.x, p.y, t * 0.8) * getCausticIntensity(p.x, p.y, t * 0.5 + 500);

    // Gentle drift upward + attraction to bright regions
    let tx = p.x + p.vx;
    let ty = p.y + p.vy;

    // Add slight attraction toward caustic peaks
    let ci_x = getCausticIntensity(p.x + 3, p.y, t * 0.8) - getCausticIntensity(p.x - 3, p.y, t * 0.8);
    let ci_y = getCausticIntensity(p.x, p.y + 3, t * 0.8) - getCausticIntensity(p.x, p.y - 3, t * 0.8);
    tx += ci_x * 0.8;
    ty += ci_y * 0.5;

    p.x = tx;
    p.y = ty;

    // Wrap around edges
    if (p.x < 0) p.x = width;
    if (p.x > width) p.x = 0;
    if (p.y < 0) p.y = height;
    if (p.y > height) p.y = 0;

    // Draw particle with glow based on caustic intensity at its position
    let glow = ci * 2 + 0.2;
    fill(p.hue, 45, p.bright, glow * 28);
    ellipse(p.x, p.y, p.size * 4, p.size * 4);
    fill(p.hue, 30, 100, glow * 55);
    ellipse(p.x, p.y, p.size * 2, p.size * 2);
    fill(p.hue, 15, 100, 90);
    ellipse(p.x, p.y, p.size * 0.7, p.size * 0.7);
  }
}

function drawSurfaceRipples(t) {
  // Concentric ripples emanating from center — simulate water surface waves
  noFill();
  for (let i = 0; i < 6; i++) {
    let phase = t * 0.015 + i * PI * 0.4;
    let r = (50 + i * 40) + sin(phase) * 15;
    let alpha = 12 + sin(phase) * 6;
    stroke(195, 25, 60, alpha);
    strokeWeight(0.6 + i * 0.1);
    ellipse(width / 2, height / 2, r * 2, r * 2);
  }
}

function radialGradientRect(x, y, w, h, stops) {
  // Simple radial vignette using stacked ellipses
  let cx = x + w / 2;
  let cy = y + h / 2;
  let maxR = dist(0, 0, w / 2, h / 2);

  for (let i = 0; i < stops.length; i++) {
    let r = maxR * (1 - i / (stops.length - 1));
    fill(stops[i][0], stops[i][1], stops[i][2], stops[i][3]);
    ellipse(cx, cy, r * 2, r * 2);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
