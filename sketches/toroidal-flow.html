<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toroidal Flow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050508; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const particles = [];
const NUM_PARTICLES = 1200;
const R = 220;
const r = 80;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push(createParticle());
  }
  background(10);
}

function createParticle() {
  return {
    u: random(TWO_PI),
    v: random(TWO_PI),
    speed: 0.003 + random(0.004),
    hue: random(280, 340),
    size: 1 + random(2),
    trail: [],
    trailLen: 15 + floor(random(20))
  };
}

function torusPoint(u, v) {
  let x = (R + r * cos(v)) * cos(u);
  let y = (R + r * cos(v)) * sin(u);
  let z = r * sin(v);
  return { x, y, z };
}

function torusFlow(u, v, t) {
  // Custom flow field on torus surface
  let du = sin(v * 3 + t * 0.5) * 0.5 + cos(v * 2 - t * 0.3) * 0.3;
  let dv = cos(u * 2 + v + t * 0.4) * 0.6 + sin(u - v * 2 + t * 0.2) * 0.4;
  return { du, dv };
}

function project(x, y, z, camDist) {
  let scale = camDist / (camDist + z * 0.5);
  return {
    x: width / 2 + x * scale * 1.2,
    y: height / 2 + y * scale * 1.2,
    z: z,
    scale: scale
  };
}

function draw() {
  // Slow fade
  noStroke();
  fill(5, 10);
  rect(0, 0, width, height);
  
  let t = millis() * 0.001;
  
  // Camera rotation
  let camAngle = t * 0.15;
  let camTilt = sin(t * 0.1) * 0.3;
  let cosA = cos(camAngle);
  let sinA = sin(camAngle);
  let cosT = cos(camTilt);
  let sinT = sin(camTilt);
  
  // Draw torus wireframe with manual rotation
  stroke(30, 20, 40, 0.3);
  strokeWeight(0.5);
  noFill();
  
  for (let i = 0; i < 32; i++) {
    let u1 = (i / 32) * TWO_PI;
    let u2 = ((i + 1) / 32) * TWO_PI;
    
    for (let j = 0; j < 24; j++) {
      let v = (j / 24) * TWO_PI;
      
      let p1 = torusPoint(u1, v);
      let p2 = torusPoint(u2, v);
      let p3 = torusPoint(u1, v + 0.26);
      
      // Rotate around Z then X (same as camera)
      let r1x = p1.x * cosA - p1.y * sinA;
      let r1y = p1.x * sinA + p1.y * cosA;
      let r1z = p1.z;
      let r1y2 = r1y * cosT - r1z * sinT;
      let r1z2 = r1y * sinT + r1z * cosT;
      
      let r2x = p2.x * cosA - p2.y * sinA;
      let r2y = p2.x * sinA + p2.y * cosA;
      let r2z = p2.z;
      let r2y2 = r2y * cosT - r2z * sinT;
      let r2z2 = r2y * sinT + r2z * cosT;
      
      let r3x = p3.x * cosA - p3.y * sinA;
      let r3y = p3.x * sinA + p3.y * cosA;
      let r3z = p3.z;
      let r3y2 = r3y * cosT - r3z * sinT;
      let r3z2 = r3y * sinT + r3z * cosT;
      
      let proj1 = project(r1x, r1y2, r1z2, 500);
      let proj2 = project(r2x, r2y2, r2z2, 500);
      let proj3 = project(r3x, r3y2, r3z2, 500);
      
      line(proj1.x, proj1.y, proj2.x, proj2.y);
      line(proj1.x, proj1.y, proj3.x, proj3.y);
    }
  }
  
  // Update and draw particles
  for (let p of particles) {
    let flow = torusFlow(p.u, p.v, t);
    
    p.u += flow.du * p.speed;
    p.v += flow.dv * p.speed;
    
    // Wrap coordinates
    p.u = p.u % TWO_PI;
    p.v = p.v % TWO_PI;
    if (p.u < 0) p.u += TWO_PI;
    if (p.v < 0) p.v += TWO_PI;
    
    let pt = torusPoint(p.u, p.v);
    
    // Rotate point for camera
    let cosA = cos(camAngle);
    let sinA = sin(camAngle);
    let cosT = cos(camTilt);
    let sinT = sin(camTilt);
    
    let rx = pt.x * cosA - pt.y * sinA;
    let ry = pt.x * sinA + pt.y * cosA;
    let rz = pt.z;
    
    let ry2 = ry * cosT - rz * sinT;
    let rz2 = ry * sinT + rz * cosT;
    
    let proj = project(rx, ry2, rz2, 500);
    
    // Store trail
    p.trail.push({ x: proj.x, y: proj.y, s: proj.scale });
    if (p.trail.length > p.trailLen) {
      p.trail.shift();
    }
    
    // Draw trail
    for (let i = 1; i < p.trail.length; i++) {
      let alpha = (i / p.trail.length) * 0.6;
      let size = p.size * p.trail[i].s * (i / p.trail.length);
      let hue = (p.hue + t * 20) % 360;
      
      noStroke();
      fill(hue, 70, 90, alpha);
      circle(p.trail[i].x, p.trail[i].y, size);
    }
    
    // Draw particle head
    noStroke();
    fill(p.hue, 60, 100, 0.9);
    circle(proj.x, proj.y, p.size * proj.scale * 1.5);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(10);
}
</script>
</body>
</html>
