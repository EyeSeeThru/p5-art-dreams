<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dry Brush</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080604; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Dry Brush — Scratchy dry brush strokes on rough canvas
// Paint almost dry, leaving textured marks and bristle trails
// Red and ochre on dark gessoed canvas

let brushStrokes = [];
let numStrokes = 40;
let t = 0;
let canvasBuffer;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 255);

  // Create rough canvas texture
  canvasBuffer = createGraphics(width, height);
  canvasBuffer.pixelDensity(1);
  drawCanvasTexture();

  // Initialize dry brush strokes
  for (let i = 0; i < numStrokes; i++) {
    brushStrokes.push(createDryBrushStroke());
  }
}

function drawCanvasTexture() {
  // Dark warm gessoed canvas background
  canvasBuffer.background(25, 35, 22); // HSB: warm dark brown

  // Add canvas weave texture using pixel manipulation
  canvasBuffer.loadPixels();
  for (let i = 0; i < canvasBuffer.pixels.length; i += 4) {
    let n = noise(
      (i/4 % canvasBuffer.width) * 0.15,
      floor((i/4) / canvasBuffer.width) * 0.15
    ) * 12;
    canvasBuffer.pixels[i] += n;     // warm undertone
    canvasBuffer.pixels[i+1] += n * 0.5;
    canvasBuffer.pixels[i+2] += n * 0.3;
  }
  canvasBuffer.updatePixels();

  // Subtle vertical and horizontal thread lines
  canvasBuffer.stroke(20, 25, 18, 50);
  canvasBuffer.strokeWeight(0.5);
  for (let y = 0; y < height; y += 4) {
    canvasBuffer.line(0, y, width, y);
  }
  for (let x = 0; x < width; x += 4) {
    canvasBuffer.line(x, 0, x, height);
  }
}

function createDryBrushStroke() {
  return {
    x: random(width),
    y: random(height),
    angle: random(TWO_PI),
    length: random(60, 180),
    brushWidth: random(8, 25),
    speed: random(0.5, 2),
    phase: random(TWO_PI),
    hue: random(0, 25),          // red to orange-yellow (HSB)
    saturation: random(70, 95),   // rich pigment
    brightness: random(80, 96),  // visible (was 25-50, too dark)
    opacity: random(220, 255),   // near-opaque (was 100-200, too faint)
    dryness: random(0.3, 0.7),
    pressure: random(0.3, 1.0),
    bend: random(-0.3, 0.3)
  };
}

function draw() {
  // Draw canvas texture first
  image(canvasBuffer, 0, 0);

  t += 0.01;

  // Update and draw each brush stroke
  for (let i = 0; i < brushStrokes.length; i++) {
    let s = brushStrokes[i];

    // Slow movement
    s.x += cos(s.angle) * s.speed * 0.3;
    s.y += sin(s.angle) * s.speed * 0.3;

    // Slight angle drift
    s.angle += sin(t + s.phase) * 0.01;

    // Wrap
    if (s.x < -s.length) s.x = width + s.length;
    if (s.x > width + s.length) s.x = -s.length;
    if (s.y < -s.length) s.y = height + s.length;
    if (s.y > height + s.length) s.y = -s.length;

    // Draw dry brush stroke
    drawDryBrushStroke(s);
  }

  // Add scattered bristles (tiny marks that fly off)
  drawBristleScatter();

  // Add paint drip marks
  drawDripMarks();
}

function drawDryBrushStroke(s) {
  let segments = floor(s.length / 6);
  let prevX, prevY;

  for (let j = 0; j < segments; j++) {
    let progress = j / segments;
    let offsetAlong = progress * s.length;

    // Slight curve
    let curve = sin(progress * PI) * s.bend * 30;

    let tx = s.x + cos(s.angle) * offsetAlong + cos(s.angle + HALF_PI) * curve;
    let ty = s.y + sin(s.angle) * offsetAlong + sin(s.angle + HALF_PI) * curve;

    // Pressure variation (lighter at start and end = dry brush effect)
    let pressureCurve = sin(progress * PI);
    let currentPressure = s.pressure * pressureCurve;

    // Bristle texture: varies width along stroke
    let bristleVariation = noise(j * 0.3, t * 0.5) * s.brushWidth * 0.5;
    let currentWidth = s.brushWidth * currentPressure * (0.5 + bristleVariation);

    // Dry brush: more likely to skip at edges (less pressure) vs center (more)
    let skipChance = s.dryness * (1 - progress);
    if (random() < skipChance * 0.3) continue;

    // Shadow/depth layer — dark warm underpainting
    noStroke();
    fill(15, 40, 20, s.opacity * 0.35);
    ellipse(tx + 2, ty + 2, currentWidth, currentWidth * 0.6);

    // Main stroke color — HSB mode: hue 0-25 (red-orange), saturation 70-95, brightness 80-96
    let h = s.hue;
    let b = min(s.brightness + sin(t * 2 + s.phase) * 8, 100);
    fill(h, s.saturation, b, s.opacity * currentPressure);
    ellipse(tx, ty, currentWidth, currentWidth * 0.65);

    // Highlight on top edge
    if (random() < 0.2 && currentPressure > 0.5) {
      fill(h + 5, s.saturation - 15, s.brightness + 5, s.opacity * 0.45);
      ellipse(tx - currentWidth * 0.1, ty - currentWidth * 0.15, currentWidth * 0.3, currentWidth * 0.15);
    }

    // Connect to previous for continuous stroke
    if (prevX !== undefined && random() < 0.7) {
      stroke(h, s.saturation, b, s.opacity * currentPressure * 0.6);
      strokeWeight(currentWidth * 0.5);
      line(prevX, prevY, tx, ty);
    }

    prevX = tx;
    prevY = ty;
  }
}

function drawBristleScatter() {
  // Tiny bristles that scatter from strokes
  noStroke();
  for (let i = 0; i < 30; i++) {
    let bx = noise(i * 5, t * 0.3) * width;
    let by = noise(i * 10, t * 0.3 + 100) * height;
    let bs = noise(i * 20) * 3 + 0.5;
    let h = noise(i * 30) * 20; // 0-20: red-orange range

    fill(h, 60, 70, 80); // warm colored bristles
    ellipse(bx, by, bs, bs * 0.4); // elongated bristle
  }
}

function drawDripMarks() {
  // Occasional drip of paint running down
  let dripX = noise(t * 0.2) * width;
  let dripY = noise(t * 0.2 + 500) * height * 0.3;
  let dripLen = noise(t * 0.1) * 40 + 10;

  // Drip body — dark warm brown, visible
  strokeWeight(2);
  stroke(12, 50, 45, 110);
  line(dripX, dripY, dripX, dripY + dripLen);

  // Drip head — slightly brighter
  noStroke();
  fill(15, 55, 60, 140);
  ellipse(dripX, dripY + dripLen, 5, 5);
}

function windowResized() {
  // Recreate canvas texture
  canvasBuffer = createGraphics(width, height);
  canvasBuffer.pixelDensity(1);
  drawCanvasTexture();
}

function mousePressed() {
  // Add new stroke at mouse position
  let newStroke = createDryBrushStroke();
  newStroke.x = mouseX;
  newStroke.y = mouseY;
  newStroke.angle = random(TWO_PI);
  newStroke.pressure = 1.0; // full pressure on click
  brushStrokes.push(newStroke);

  // Limit strokes
  if (brushStrokes.length > 55) {
    brushStrokes.shift();
  }
}
</script>
</body>
</html>
