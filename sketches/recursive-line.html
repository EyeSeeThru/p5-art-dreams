<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursive Line</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #191919; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Recursive Line — L-system/recursive branching patterns
// RED AND BLACK version - mathematical geometric patterns
// Background: rgb(25,25,25) minimum
// Elements: vivid red rgb(100,100,100) minimum

const BG_R = 25, BG_G = 25, BG_B = 25;

let time = 0;
let angle = 25;
let segLength = 150;
let depth = 8;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(RGB, 255);
  background(BG_R, BG_G, BG_B);
}

function draw() {
  background(BG_R, BG_G, BG_B);
  
  time += 0.003;
  
  // Animate angle slightly
  let currentAngle = angle + sin(time * 0.5) * 5;
  
  // Draw from bottom center, growing upward
  let startX = width / 2;
  let startY = height - 50;
  
  strokeWeight(2);
  
  // Recursive tree
  drawBranch(startX, startY, -90, segLength, currentAngle, depth);
  
  // Draw some floating recursive fragments
  drawFloatingPattern();
}

function drawBranch(x, y, angle, len, branchAngle, d) {
  if (d <= 0 || len < 2) return;
  
  // Calculate end point
  let rad = radians(angle);
  let x2 = x + cos(rad) * len;
  let y2 = y + sin(rad) * len;
  
  // Color based on depth - vivid red, brightness varies with depth
  // Deeper branches = brighter red
  let bright = map(d, 0, depth, 80, 200);
  let r = bright;
  let g = map(d, 0, depth, 20, 60);
  let b = map(d, 0, depth, 20, 50);
  let alpha = map(d, 0, depth, 150, 255);
  
  stroke(r, g, b, alpha);
  strokeWeight(map(d, 0, depth, 0.5, 2.5));
  line(x, y, x2, y2);
  
  // Add small circles at branch points
  if (d > 3) {
    noStroke();
    fill(r, g * 0.5, b * 0.5, 120);
    ellipse(x2, y2, map(d, 0, depth, 2, 5), map(d, 0, depth, 2, 5));
  }
  
  // Recursive branching - two directions
  let newLen = len * 0.7;
  
  // Left branch
  drawBranch(x2, y2, angle - branchAngle + sin(time + d) * 3, newLen, branchAngle, d - 1);
  
  // Right branch
  drawBranch(x2, y2, angle + branchAngle + cos(time + d) * 3, newLen, branchAngle, d - 1);
  
  // Occasional third branch in middle
  if (d % 3 === 0 && d > 2) {
    drawBranch(x2, y2, angle + sin(time * 0.7) * 5, newLen * 0.8, branchAngle, d - 2);
  }
}

function drawFloatingPattern() {
  // Floating recursive fragments in the air
  push();
  noFill();
  
  for (let i = 0; i < 5; i++) {
    let fx = width * 0.2 + (width * 0.6) * (i / 4);
    let fy = height * 0.3 + sin(time * 0.5 + i) * 30;
    let fs = 30 + sin(time * 0.3 + i * 0.5) * 10;
    
    stroke(150, 40, 40, 50);
    strokeWeight(1);
    
    // Small recursive square pattern
    drawRecursiveSquare(fx, fy, fs, 4);
  }
  
  pop();
}

function drawRecursiveSquare(x, y, s, d) {
  if (d <= 0 || s < 2) return;
  
  let half = s / 2;
  
  // Draw square - red outline
  stroke(map(d, 0, 4, 80, 180), 20, 20, map(d, 0, 4, 80, 200));
  strokeWeight(map(d, 0, 4, 0.5, 1.5));
  noFill();
  rect(x - half, y - half, s, s);
  
  // Draw 4 smaller squares at corners
  let newS = s * 0.4;
  drawRecursiveSquare(x - half, y - half, newS, d - 1);
  drawRecursiveSquare(x + half, y - half, newS, d - 1);
  drawRecursiveSquare(x - half, y + half, newS, d - 1);
  drawRecursiveSquare(x + half, y + half, newS, d - 1);
}

function mousePressed() {
  // Click regenerates with slightly different angle
  angle = random(20, 35);
  segLength = random(100, 180);
  depth = floor(random(6, 10));
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
