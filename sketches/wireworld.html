<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireworld</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0d1117; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Wireworld - Cellular Automaton for Electronic Circuits
// States: 0=empty, 1=wire, 2=electron head, 3=electron tail

const CELL_SIZE = 6;
const COLS = 140;
const ROWS = 90;

let grid, nextGrid;
let electronColor;
let tailColor;
let wireColor;

function setup() {
  createCanvas(COLS * CELL_SIZE, ROWS * CELL_SIZE);
  pixelDensity(1);
  noStroke();
  
  electronColor = color(255, 80, 40);
  tailColor = color(40, 80, 255);
  wireColor = color(80, 200, 120);
  
  // Initialize grid
  grid = createGrid();
  nextGrid = createGrid();
  
  // Create a simple circuit pattern
  createCircuit();
}

function createGrid() {
  let g = [];
  for (let i = 0; i < COLS; i++) {
    g[i] = [];
    for (let j = 0; j < ROWS; j++) {
      g[i][j] = 0;
    }
  }
  return g;
}

function createCircuit() {
  // Create some wire loops and circuits
  let cx = COLS / 2;
  let cy = ROWS / 2;
  
  // Main clock oscillator loop
  for (let i = 10; i < COLS - 10; i++) {
    grid[i][10] = 1; // top wire
    grid[i][ROWS-10] = 1; // bottom wire
  }
  for (let j = 10; j < ROWS - 10; j++) {
    grid[10][j] = 1; // left wire
    grid[COLS-10][j] = 1; // right wire
  }
  
  // Corner pulses
  grid[10][10] = 2;
  grid[COLS-10][10] = 2;
  grid[10][ROWS-10] = 2;
  grid[COLS-10][ROWS-10] = 2;
  
  // Inner circuit patterns
  for (let i = 25; i < 50; i++) {
    grid[i][30] = 1;
    grid[i][60] = 1;
  }
  for (let j = 30; j <= 60; j++) {
    grid[25][j] = 1;
    grid[50][j] = 1;
  }
  grid[25][30] = 2;
  grid[50][45] = 2;
  
  // Another loop
  for (let i = 90; i < 115; i++) {
    grid[i][30] = 1;
    grid[i][60] = 1;
  }
  for (let j = 30; j <= 60; j++) {
    grid[90][j] = 1;
    grid[115][j] = 1;
  }
  grid[90][30] = 2;
  grid[115][45] = 2;
  
  // Add some scattered electron heads
  for (let i = 0; i < 15; i++) {
    let x = floor(random(5, COLS-5));
    let y = floor(random(5, ROWS-5));
    if (grid[x][y] === 0) {
      grid[x][y] = random() > 0.5 ? 2 : 1;
    }
  }
}

function draw() {
  background(13, 17, 23);
  
  // Display grid
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      let cell = grid[i][j];
      let x = i * CELL_SIZE;
      let y = j * CELL_SIZE;
      
      if (cell === 1) {
        // Wire - with subtle pulse
        let brightness = 80 + 40 * sin(frameCount * 0.05 + i * 0.1 + j * 0.1);
        fill(80, brightness, 120);
        rect(x, y, CELL_SIZE, CELL_SIZE);
      } else if (cell === 2) {
        // Electron head - bright glow
        fill(electronColor);
        rect(x, y, CELL_SIZE, CELL_SIZE);
        // Glow effect
        fill(255, 80, 40, 100);
        rect(x-1, y-1, CELL_SIZE+2, CELL_SIZE+2);
      } else if (cell === 3) {
        // Electron tail
        fill(tailColor);
        rect(x, y, CELL_SIZE, CELL_SIZE);
      }
    }
  }
  
  // Evolve every few frames
  if (frameCount % 3 === 0) {
    evolve();
  }
  
  // Add some random electrons occasionally
  if (frameCount % 30 === 0 && random() > 0.7) {
    let x = floor(random(COLS));
    let y = floor(random(ROWS));
    if (grid[x][y] === 1) {
      grid[x][y] = 2;
    }
  }
}

function evolve() {
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      let cell = grid[i][j];
      
      if (cell === 0) {
        nextGrid[i][j] = 0;
      } else if (cell === 1) {
        // Wire becomes electron head if exactly 1 or 2 neighbors are electron heads
        let heads = countElectronHeads(i, j);
        nextGrid[i][j] = (heads === 1 || heads === 2) ? 2 : 1;
      } else if (cell === 2) {
        // Electron head becomes tail
        nextGrid[i][j] = 3;
      } else if (cell === 3) {
        // Electron tail becomes wire
        nextGrid[i][j] = 1;
      }
    }
  }
  
  // Swap grids
  let temp = grid;
  grid = nextGrid;
  nextGrid = temp;
}

function countElectronHeads(x, y) {
  let count = 0;
  for (let dx = -1; dx <= 1; dx++) {
    for (let dy = -1; dy <= 1; dy++) {
      if (dx === 0 && dy === 0) continue;
      let nx = x + dx;
      let ny = y + dy;
      if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
        if (grid[nx][ny] === 2) {
          count++;
        }
      }
    }
  }
  return count;
}
</script>
</body>
</html>
