<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Sculpture — p5 Art Dreams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Kinetic Sculpture - Balancing geometric forms with physics

let arms = [];
let particles = [];
let time = 0;
const NUM_ARMS = 7;
const NUM_PARTICLES = 150;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Create rotating arm system
  for (let i = 0; i < NUM_ARMS; i++) {
    arms.push({
      angle: (TWO_PI / NUM_ARMS) * i,
      length: random(80, 180),
      speed: random(0.005, 0.02) * (random() > 0.5 ? 1 : -1),
      phase: random(TWO_PI),
      weight: random(2, 6),
      hue: random(160, 280)
    });
  }
  
  // Create ambient particles
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: random(-0.5, 0.5),
      vy: random(-0.5, 0.5),
      size: random(1, 4),
      hue: random(180, 320),
      alpha: random(20, 60)
    });
  }
}

function draw() {
  background(10, 8, 12);
  
  let cx = width / 2;
  let cy = height / 2;
  
  // Draw ambient particles
  noStroke();
  for (let p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    
    // Wrap around edges
    if (p.x < 0) p.x = width;
    if (p.x > width) p.x = 0;
    if (p.y < 0) p.y = height;
    if (p.y > height) p.y = 0;
    
    fill(p.hue, 60, 80, p.alpha);
    ellipse(p.x, p.y, p.size);
  }
  
  // Draw connecting web
  strokeWeight(0.5);
  for (let i = 0; i < arms.length; i++) {
    for (let j = i + 1; j < arms.length; j++) {
      let a1 = arms[i];
      let a2 = arms[j];
      
      let x1 = cx + cos(a1.angle + time * a1.speed + a1.phase) * a1.length;
      let y1 = cy + sin(a1.angle + time * a1.speed + a1.phase) * a1.length;
      let x2 = cx + cos(a2.angle + time * a2.speed + a2.phase) * a2.length;
      let y2 = cy + sin(a2.angle + time * a2.speed + a2.phase) * a2.length;
      
      let d = dist(x1, y1, x2, y2);
      if (d < 300) {
        let alpha = map(d, 0, 300, 30, 0);
        stroke(200, 50, 80, alpha);
        line(x1, y1, x2, y2);
      }
    }
  }
  
  // Draw rotating arms with shapes
  for (let arm of arms) {
    arm.angle += arm.speed;
    
    let x = cx + cos(arm.angle + arm.phase) * arm.length;
    let y = cy + sin(arm.angle + arm.phase) * arm.length;
    
    // Arm line
    strokeWeight(arm.weight);
    stroke(arm.hue, 50, 60, 40);
    line(cx, cy, x, y);
    
    // Glowing endpoint
    let pulseSize = 15 + sin(time * 3 + arm.phase) * 5;
    
    // Outer glow
    noStroke();
    for (let r = pulseSize * 3; r > 0; r -= pulseSize / 2) {
      let alpha = map(r, 0, pulseSize * 3, 40, 0);
      fill(arm.hue, 40, 90, alpha);
      ellipse(x, y, r);
    }
    
    // Core
    fill(arm.hue, 30, 100, 90);
    ellipse(x, y, pulseSize);
    
    // Inner bright spot
    fill(0, 0, 100, 80);
    ellipse(x, y, pulseSize * 0.3);
  }
  
  // Center hub
  let hubPulse = 20 + sin(time * 2) * 8;
  for (let r = hubPulse * 2; r > 0; r -= hubPulse / 3) {
    let alpha = map(r, 0, hubPulse * 2, 50, 0);
    fill(280, 40, 80, alpha);
    noStroke();
    ellipse(cx, cy, r);
  }
  fill(300, 50, 100, 90);
  ellipse(cx, cy, hubPulse);
  
  // Orbital rings
  noFill();
  strokeWeight(1);
  for (let ring = 0; ring < 3; ring++) {
    let ringSize = 60 + ring * 50 + sin(time + ring) * 10;
    let ringAlpha = 20 + sin(time * 2 + ring) * 10;
    stroke(200 + ring * 20, 40, 70, ringAlpha);
    ellipse(cx, cy, ringSize, ringSize * 0.7);
  }
  
  time += 1;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
