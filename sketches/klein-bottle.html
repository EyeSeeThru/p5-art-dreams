<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klein Bottle</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Klein Bottle - Mathematical Surface Visualization
// Parametric equations for the "figure-8" immersion of a Klein bottle

let angle = 0;
let particles = [];
let numParticles = 800;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 1);
  
  // Initialize particles on the Klein bottle surface
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      u: random(TWO_PI),
      v: random(TWO_PI),
      hue: random(280, 340),
      speed: random(0.002, 0.008),
      size: random(2, 5)
    });
  }
}

function draw() {
  background(10, 10, 15);
  
  // Ambient light
  ambientLight(40);
  pointLight(255, 0, 80, 400, -200, 300);
  pointLight(180, 80, 100, -400, 200, -300);
  pointLight(300, 60, 90, 0, 0, 500);
  
  rotateY(angle * 0.3);
  rotateX(angle * 0.15);
  
  // Draw Klein bottle surface with reduced opacity for wireframe effect
  noFill();
  strokeWeight(0.5);
  
  // Draw multiple layers for depth
  for (let layer = 0; layer < 3; layer++) {
    let layerOffset = layer * 0.003;
    stroke(280 + layer * 20, 70, 60, 0.15 - layer * 0.04);
    
    beginShape(TRIANGLE_STRIP);
    for (let i = 0; i < 50; i++) {
      let u = map(i, 0, 50, 0, TWO_PI);
      for (let j = 0; j < 30; j++) {
        let v = map(j, 0, 30, 0, TWO_PI) + layerOffset;
        let pos = kleinPoint(u, v);
        vertex(pos.x, pos.y, pos.z);
      }
    }
    endShape();
  }
  
  // Draw particles on surface
  noStroke();
  for (let p of particles) {
    p.u += p.speed;
    p.v += p.speed * 0.7;
    
    // Keep u and v in bounds
    if (p.u > TWO_PI) p.u -= TWO_PI;
    if (p.v > TWO_PI) p.v -= TWO_PI;
    
    let pos = kleinPoint(p.u, p.v);
    
    // Pulsing size
    let pulse = sin(frameCount * 0.05 + p.u * 3) * 0.3 + 0.7;
    
    push();
    translate(pos.x, pos.y, pos.z);
    fill(p.hue, 80, 90, pulse);
    emissiveMaterial(p.hue, 60, 40);
    sphere(p.size * pulse);
    pop();
  }
  
  // Add glow effect at center
  push();
  noLights();
  fill(320, 90, 100, 0.3);
  translate(0, 0, 0);
  sphere(30 + sin(frameCount * 0.03) * 5);
  pop();
  
  angle += 0.01;
}

function kleinPoint(u, v) {
  // Figure-8 Klein bottle parametric equations
  let r = 4 * (1 - cos(u) / 2);
  let x, y, z;
  
  if (u < PI) {
    x = 6 * cos(u) * (1 + sin(u)) + r * cos(u) * cos(v);
    y = 16 * sin(u) + r * sin(u) * cos(v);
  } else {
    x = 6 * cos(u) * (1 + sin(u)) + r * cos(v + PI);
    y = 16 * sin(u);
  }
  z = r * sin(v);
  
  // Scale down
  return { x: x * 1.5, y: y * 1.5, z: z * 1.5 };
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
