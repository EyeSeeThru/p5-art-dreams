<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photon Bloom</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let particles = [];
let bloomCenters = [];
const NUM_CENTERS = 7;
const PARTICLES_PER_CENTER = 80;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Create bloom centers
  for (let i = 0; i < NUM_CENTERS; i++) {
    bloomCenters.push({
      x: width * 0.2 + width * 0.6 * noise(i * 10),
      y: height * 0.2 + height * 0.6 * noise(i * 20),
      hue: (i * 360 / NUM_CENTERS + frameCount * 0.1) % 360,
      radius: 50 + noise(i * 30) * 100,
      phase: noise(i * 40)
    });
  }
  
  // Create particles for each center
  for (let c = 0; c < NUM_CENTERS; c++) {
    for (let i = 0; i < PARTICLES_PER_CENTER; i++) {
      particles.push(new PhotonParticle(bloomCenters[c], c));
    }
  }
}

function draw() {
  // Semi-transparent background for trail effect
  background(0, 0, 0, 8);
  
  // Update and draw particles
  for (let p of particles) {
    p.update();
    p.display();
  }
  
  // Draw bloom centers (subtle glow)
  for (let center of bloomCenters) {
    center.hue = (center.hue + 0.2) % 360;
    let pulse = sin(frameCount * 0.02 + center.phase * TWO_PI) * 0.3 + 0.7;
    
    noStroke();
    for (let r = center.radius * 2; r > 0; r -= 20) {
      let alpha = map(r, 0, center.radius * 2, 15, 0) * pulse;
      fill(center.hue, 60, 80, alpha);
      ellipse(center.x, center.y, r, r);
    }
  }
}

class PhotonParticle {
  constructor(center, centerIndex) {
    this.center = center;
    this.centerIndex = centerIndex;
    this.reset();
  }
  
  reset() {
    this.x = this.center.x;
    this.y = this.center.y;
    this.angle = random(TWO_PI);
    this.speed = random(0.5, 2.5);
    this.radius = random(5, this.center.radius * 0.8);
    this.life = random(100, 200);
    this.maxLife = this.life;
    this.size = random(2, 8);
    this.hueOffset = random(-20, 20);
    this.orbitSpeed = random(0.01, 0.03) * (random() > 0.5 ? 1 : -1);
  }
  
  update() {
    // Orbital motion around center
    this.angle += this.orbitSpeed;
    
    // Spiral outward
    this.radius += 0.3;
    
    // Calculate position
    let wobble = noise(this.x * 0.01, this.y * 0.01, frameCount * 0.01) * 30 - 15;
    this.x = this.center.x + cos(this.angle) * this.radius + wobble;
    this.y = this.center.y + sin(this.angle) * this.radius + wobble;
    
    this.life--;
    
    if (this.life <= 0 || this.radius > this.center.radius * 1.5) {
      this.reset();
    }
  }
  
  display() {
    let lifeRatio = this.life / this.maxLife;
    let hue = (this.center.hue + this.hueOffset + frameCount * 0.05) % 360;
    let brightness = 80 + lifeRatio * 20;
    let alpha = lifeRatio * 60;
    
    // Glow effect
    noStroke();
    for (let i = 3; i > 0; i--) {
      let glowSize = this.size * (1 + i * 0.5);
      let glowAlpha = alpha * (1 - i * 0.3) * 0.3;
      fill(hue, 40, brightness, glowAlpha);
      ellipse(this.x, this.y, glowSize, glowSize);
    }
    
    // Core
    fill(hue, 30, brightness, alpha);
    ellipse(this.x, this.y, this.size, this.size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  
  // Recreate centers for new dimensions
  bloomCenters = [];
  for (let i = 0; i < NUM_CENTERS; i++) {
    bloomCenters.push({
      x: width * 0.2 + width * 0.6 * noise(i * 10),
      y: height * 0.2 + height * 0.6 * noise(i * 20),
      hue: (i * 360 / NUM_CENTERS) % 360,
      radius: 50 + noise(i * 30) * 100,
      phase: noise(i * 40)
    });
  }
  
  // Reset particles
  particles = [];
  for (let c = 0; c < NUM_CENTERS; c++) {
    for (let i = 0; i < PARTICLES_PER_CENTER; i++) {
      particles.push(new PhotonParticle(bloomCenters[c], c));
    }
  }
}
</script>
</body>
</html>
