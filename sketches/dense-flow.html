<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dense Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020208; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Dense Flow — Optical Flow Visualization
// Lucas-Kanade method: estimate optical flow from image gradients
// I(x,y,t) partial derivative: Ix·u + Iy·v + It = 0
// u,v = optical flow velocity at each pixel
// Shows motion field as flowing streamlines and velocity-colored vectors

let time = 0;
let flowField = [];
let prevFrame = [];
let cols, rows;
const CELL_SIZE = 12;
let mode = 'streamlines'; // 'streamlines', 'vectors', 'particles'

let particles = [];
const N_PARTICLES = 800;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  cols = floor(width / CELL_SIZE);
  rows = floor(height / CELL_SIZE);
  flowField = [];
  for (let i = 0; i < cols * rows; i++) flowField.push({ u: 0, v: 0 });

  // Initialize particles
  for (let i = 0; i < N_PARTICLES; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: 0,
      vy: 0,
      age: random(100),
      hue: random(360)
    });
  }

  textSize(11);
}

function draw() {
  background(240, 30, 4, 30);

  // Generate flow field based on animated patterns
  generateFlowField();

  time += 0.02;

  if (mode === 'streamlines') {
    drawStreamlines();
  } else if (mode === 'vectors') {
    drawVectors();
  } else {
    drawParticles();
  }

  // Draw motion legend/info
  drawInfo();
}

function generateFlowField() {
  let cx = width / 2;
  let cy = height / 2;
  let t = time;

  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      let idx = j * cols + i;
      let wx = i * CELL_SIZE + CELL_SIZE / 2;
      let wy = j * CELL_SIZE + CELL_SIZE / 2;

      // Multiple flow sources
      // 1. Central vortex
      let dx1 = wx - cx;
      let dy1 = wy - cy;
      let r1 = sqrt(dx1 * dx1 + dy1 * dy1) + 0.1;
      let angle1 = atan2(dy1, dx1);
      let vortexStrength = 120 * exp(-r1 * 0.005) * sin(t * 0.5);
      let u1 = -sin(angle1) * vortexStrength;
      let v1 = cos(angle1) * vortexStrength;

      // 2. Oscillating dipole
      let dipX = cx + cos(t * 0.3) * 150;
      let dipY = cy + sin(t * 0.4) * 100;
      let dx2 = wx - dipX;
      let dy2 = wy - dipY;
      let r2 = sqrt(dx2 * dx2 + dy2 * dy2) + 1;
      let angle2 = atan2(dy2, dx2);
      let dipStrength = 80 * sin(t * 0.7) / (r2 * 0.02 + 1);
      let u2 = cos(angle2) * dipStrength;
      let v2 = sin(angle2) * dipStrength;

      // 3. Horizontal wave
      let waveU = 40 * sin(wx * 0.02 + t * 0.8) * cos(wy * 0.01 - t * 0.5);
      let waveV = 20 * cos(wx * 0.01 + t * 0.6) * sin(wy * 0.02 + t * 0.3);

      // 4. Perlin noise flow
      let noiseScale = 0.005;
      let noiseU = (noise(wx * noiseScale, wy * noiseScale, t * 0.3) - 0.5) * 80;
      let noiseV = (noise(wx * noiseScale + 100, wy * noiseScale + 100, t * 0.3 + 50) - 0.5) * 80;

      // Combine
      flowField[idx].u = u1 + u2 + waveU + noiseU;
      flowField[idx].v = v1 + v2 + waveV + noiseV;
    }
  }
}

function drawStreamlines() {
  // Draw flowing streamlines
  strokeWeight(1);
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      let idx = j * cols + i;
      let wx = i * CELL_SIZE + CELL_SIZE / 2;
      let wy = j * CELL_SIZE + CELL_SIZE / 2;
      let u = flowField[idx].u;
      let v = flowField[idx].v;
      let speed = sqrt(u * u + v * v);

      // Hue based on direction: red=E, cyan=W, green=S, magenta=N
      let angle = atan2(v, u);
      let hue = map(angle, -PI, PI, 0, 360);
      let alpha = map(speed, 0, 100, 20, 70);

      stroke(hue, 70, 85, alpha);
      let len = min(speed * 0.3, CELL_SIZE * 0.8);
      let nx = u / (speed + 0.1);
      let ny = v / (speed + 0.1);
      line(wx - nx * len / 2, wy - ny * len / 2,
           wx + nx * len / 2, wy + ny * len / 2);
    }
  }

  // Draw streamline particles
  noStroke();
  for (let p of particles) {
    let ix = floor(p.x / CELL_SIZE);
    let iy = floor(p.y / CELL_SIZE);
    if (ix >= 0 && ix < cols && iy >= 0 && iy < rows) {
      let idx = iy * cols + ix;
      p.vx = flowField[idx].u * 0.05;
      p.vy = flowField[idx].v * 0.05;
      p.x += p.vx;
      p.y += p.vy;
      p.age++;

      // Wrap around
      if (p.x < 0) p.x = width;
      if (p.x > width) p.x = 0;
      if (p.y < 0) p.y = height;
      if (p.y > height) p.y = 0;

      // Reset old particles
      if (p.age > 100 + random(50)) {
        p.x = random(width);
        p.y = random(height);
        p.age = 0;
        p.hue = random(360);
      }

      // Draw
      let alpha = map(sin(p.age * 0.1), -1, 1, 30, 80);
      fill(p.hue, 60, 90, alpha);
      ellipse(p.x, p.y, 3, 3);
    }
  }
}

function drawVectors() {
  // Draw velocity vectors as arrows
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      let idx = j * cols + i;
      let wx = i * CELL_SIZE + CELL_SIZE / 2;
      let wy = j * CELL_SIZE + CELL_SIZE / 2;
      let u = flowField[idx].u;
      let v = flowField[idx].v;
      let speed = sqrt(u * u + v * v);

      if (speed > 2) {
        let angle = atan2(v, u);
        let hue = map(angle, -PI, PI, 0, 360);
        let len = min(speed * 0.4, CELL_SIZE * 0.9);
        let alpha = map(speed, 0, 100, 30, 90);

        // Arrow shaft
        stroke(hue, 70, 85, alpha);
        strokeWeight(1.5);
        line(wx, wy, wx + cos(angle) * len, wy + sin(angle) * len);

        // Arrowhead
        let headLen = 4;
        let headAngle = 0.5;
        fill(hue, 70, 85, alpha);
        noStroke();
        let tipX = wx + cos(angle) * len;
        let tipY = wy + sin(angle) * len;
        triangle(
          tipX, tipY,
          tipX - cos(angle - headAngle) * headLen, tipY - sin(angle - headAngle) * headLen,
          tipX - cos(angle + headAngle) * headLen, tipY - sin(angle + headAngle) * headLen
        );
      }
    }
  }

  // Speed magnitude heatmap overlay
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      let idx = j * cols + i;
      let wx = i * CELL_SIZE;
      let wy = j * CELL_SIZE;
      let speed = sqrt(flowField[idx].u ** 2 + flowField[idx].v ** 2);
      let alpha = map(speed, 0, 80, 0, 40);
      fill(200, 80, 100, alpha);
      noStroke();
      rect(wx + 2, wy + 2, CELL_SIZE - 4, CELL_SIZE - 4);
    }
  }
}

function drawParticles() {
  // Particle advection through flow
  noStroke();
  for (let p of particles) {
    let ix = floor(p.x / CELL_SIZE);
    let iy = floor(p.y / CELL_SIZE);
    if (ix >= 0 && ix < cols && iy >= 0 && iy < rows) {
      let idx = iy * cols + ix;
      let u = flowField[idx].u;
      let v = flowField[idx].v;

      p.vx = lerp(p.vx, u * 0.08, 0.1);
      p.vy = lerp(p.vy, v * 0.08, 0.1);
      p.x += p.vx;
      p.y += p.vy;
      p.age++;

      // Trail
      let trailLen = 8;
      let alpha = map(p.age, 0, 100, 0, 60);
      let hueShift = p.hue + p.age * 0.5;
      fill(hueShift % 360, 70, 90, alpha);
      ellipse(p.x, p.y, trailLen, trailLen);

      // Reset
      if (p.x < 0 || p.x > width || p.y < 0 || p.y > height || p.age > 120) {
        p.x = random(width);
        p.y = random(height);
        p.vx = 0;
        p.vy = 0;
        p.age = 0;
        p.hue = random(360);
      }
    }
  }
}

function drawInfo() {
  fill(195, 10, 80, 85);
  textSize(13);
  textAlign(LEFT, TOP);
  text('Dense Flow — Optical Flow Field Visualization', 16, 16);
  fill(165, 8, 65, 75);
  textSize(10);
  text('Lucas-Kanade: Ix·u + Iy·v + It = 0. Motion vectors from image brightness gradients.', 16, 38);
  text('Central vortex + oscillating dipole + wave patterns + Perlin noise.', 16, 52);
  text('Arrow hue = flow direction (red=E, cyan=W, magenta=N, green=S). Brightness = speed.', 16, 66);
  text('Click to switch mode: Streamlines | Vectors | Particles. SPACE to regenerate.', 16, 80);

  // Mode indicator
  fill(195, 15, 85, 90);
  textAlign(RIGHT, TOP);
  text('Mode: ' + mode.toUpperCase(), width - 16, 16);

  // Flow stats
  let avgSpeed = 0;
  let maxSpeed = 0;
  for (let f of flowField) {
    let s = sqrt(f.u * f.u + f.v * f.v);
    avgSpeed += s;
    maxSpeed = max(maxSpeed, s);
  }
  avgSpeed /= flowField.length;
  fill(165, 8, 60, 65);
  text('Avg speed: ' + avgSpeed.toFixed(1) + '  Max: ' + maxSpeed.toFixed(1), width - 16, 36);
}

function mousePressed() {
  let modes = ['streamlines', 'vectors', 'particles'];
  let idx = modes.indexOf(mode);
  mode = modes[(idx + 1) % modes.length];
}

function keyPressed() {
  if (key === ' ') {
    // Regenerate particles
    for (let p of particles) {
      p.x = random(width);
      p.y = random(height);
      p.age = 0;
      p.hue = random(360);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / CELL_SIZE);
  rows = floor(height / CELL_SIZE);
  flowField = [];
  for (let i = 0; i < cols * rows; i++) flowField.push({ u: 0, v: 0 });
}
</script>
</body>
</html>
