<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Droplets</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Fractal Droplets - Organic metaball-like structures with fractal edges
let droplets = [];
let numDroplets = 12;
let colorShift = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  
  for (let i = 0; i < numDroplets; i++) {
    droplets.push(new FractalDroplet(
      random(width * 0.2, width * 0.8),
      random(height * 0.2, height * 0.8),
      random(40, 120)
    ));
  }
}

function draw() {
  background(240, 30, 5, 0.15);
  
  // Draw connecting tendrils
  for (let i = 0; i < droplets.length; i++) {
    for (let j = i + 1; j < droplets.length; j++) {
      let d = dist(droplets[i].x, droplets[i].y, droplets[j].x, droplets[j].y);
      if (d < 250) {
        let alpha = map(d, 0, 250, 0.3, 0);
        stroke((colorShift + i * 10) % 360, 60, 80, alpha);
        strokeWeight(1);
        drawFractalTendril(
          droplets[i].x, droplets[i].y,
          droplets[j].x, droplets[j].y,
          floor(map(d, 0, 250, 8, 3))
        );
        noStroke();
      }
    }
  }
  
  // Update and draw droplets
  for (let droplet of droplets) {
    droplet.update();
    droplet.display();
  }
  
  colorShift += 0.3;
}

function drawFractalTendril(x1, y1, x2, y2, depth) {
  if (depth <= 0) {
    line(x1, y1, x2, y2);
    return;
  }
  
  let mx = (x1 + x2) / 2;
  let my = (y1 + y2) / 2;
  let offset = random(-30, 30);
  
  drawFractalTendril(x1, y1, mx + offset, my + offset, depth - 1);
  drawFractalTendril(mx + offset, my + offset, x2, y2, depth - 1);
}

class FractalDroplet {
  constructor(x, y, size) {
    this.x = x;
    this.y = y;
    this.baseSize = size;
    this.size = size;
    this.vx = random(-1.5, 1.5);
    this.vy = random(-1.5, 1.5);
    this.phase = random(TWO_PI);
    this.hue = random(360);
    this.fractalLayers = floor(random(3, 6));
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    
    // Bounce off walls
    if (this.x < 50 || this.x > width - 50) this.vx *= -1;
    if (this.y < 50 || this.y > height - 50) this.vy *= -1;
    
    // Breathing effect
    this.phase += 0.03;
    this.size = this.baseSize * (1 + sin(this.phase) * 0.15);
    
    // Gentle attraction to center
    let dx = width/2 - this.x;
    let dy = height/2 - this.y;
    this.vx += dx * 0.0003;
    this.vy += dy * 0.0003;
    
    // Damping
    this.vx *= 0.995;
    this.vy *= 0.995;
  }
  
  display() {
    push();
    translate(this.x, this.y);
    
    // Outer glow
    for (let i = 5; i > 0; i--) {
      let alpha = map(i, 5, 0, 0.05, 0.2);
      let glowSize = this.size + i * 25;
      fill((this.hue + colorShift) % 360, 70, 90, alpha);
      this.drawFractalCircle(glowSize, this.fractalLayers);
    }
    
    // Core
    fill((this.hue + colorShift) % 360, 80, 95, 0.9);
    this.drawFractalCircle(this.size, this.fractalLayers);
    
    // Inner highlight
    fill((this.hue + colorShift + 30) % 360, 30, 100, 0.6);
    ellipse(-this.size * 0.2, -this.size * 0.2, this.size * 0.4, this.size * 0.4);
    
    pop();
  }
  
  drawFractalCircle(radius, layers) {
    if (layers <= 0) {
      ellipse(0, 0, radius * 2);
      return;
    }
    
    let numPoints = 12;
    beginShape();
    for (let i = 0; i < numPoints; i++) {
      let angle = map(i, 0, numPoints, 0, TWO_PI);
      let noiseVal = noise(
        cos(angle) * 2 + frameCount * 0.01,
        sin(angle) * 2 + this.phase,
        layers
      );
      let r = radius * (0.7 + noiseVal * 0.6);
      let x = cos(angle) * r;
      let y = sin(angle) * r;
      vertex(x, y);
    }
    endShape(CLOSE);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
