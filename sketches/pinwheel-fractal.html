<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinwheel Fractal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a12; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<script>
// Pinwheel Fractal — recursively subdivided right triangles
// Based on the pinwheel tiling by Charles Petrie

let triangles = [];
let level = 0;
const maxLevel = 5;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  initTriangles();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initTriangles();
}

function initTriangles() {
  triangles = [];
  level = 0;
  
  // Initial large right triangle (3-4-5 proportions)
  let cx = width / 2;
  let cy = height / 2;
  let size = min(width, height) * 0.42;
  
  // Three vertices of the initial triangle
  let v1 = { x: cx, y: cy - size * 0.8 };
  let v2 = { x: cx - size, y: cy + size * 0.6 };
  let v3 = { x: cx + size * 0.666, y: cy + size * 0.5 };
  
  triangles.push({ v1, v2, v3, level: 0 });
}

function subdivide(tri) {
  let { v1, v2, v3, level: lv } = tri;
  let newTriangles = [];
  
  // Pinwheel subdivision: split into 5 smaller similar triangles
  // Using the 3-4-5 right triangle subdivision
  
  // Find midpoint of hypotenuse
  let m1 = { 
    x: (v1.x + v2.x) / 2, 
    y: (v1.y + v2.y) / 2 
  };
  
  // Find point on longest leg (v1-v3) at 2/5 from v1
  let p1 = {
    x: v1.x + (v3.x - v1.x) * 0.4,
    y: v1.y + (v3.y - v1.y) * 0.4
  };
  
  // Find point on longest leg (v1-v3) at 1/5 from v1  
  let p2 = {
    x: v1.x + (v3.x - v1.x) * 0.2,
    y: v1.y + (v3.y - v1.y) * 0.2
  };
  
  // The 5 new triangles
  // Triangle 1: v1, p2, m1
  newTriangles.push({ v1, v2: p2, v3: m1, level: lv + 1 });
  
  // Triangle 2: p2, v3, p1
  newTriangles.push({ v1: p2, v2: v3, v3: p1, level: lv + 1 });
  
  // Triangle 3: p1, v3, m1
  newTriangles.push({ v1: p1, v2: v3, v3: m1, level: lv + 1 });
  
  // Triangle 4: m1, v3, v2
  newTriangles.push({ v1: m1, v2: v3, v3: v2, level: lv + 1 });
  
  // Triangle 5: p2, p1, m1 (small central)
  newTriangles.push({ v1: p2, v2: p1, v3: m1, level: lv + 1 });
  
  return newTriangles;
}

function drawTriangle(tri) {
  let { v1, v2, v3, level: lv } = tri;
  
  // Color based on level and position
  let hue = (lv * 40 + frameCount * 0.3) % 360;
  let sat = 70 + lv * 5;
  let bri = 60 + sin(frameCount * 0.02 + lv) * 20;
  let alpha = map(lv, 0, maxLevels, 60, 100);
  
  fill(hue, sat, bri, alpha);
  stroke(hue, sat + 20, bri + 20, alpha + 10);
  strokeWeight(0.5 + (maxLevels - lv) * 0.3);
  
  beginShape();
  vertex(v1.x, v1.y);
  vertex(v2.x, v2.y);
  vertex(v3.x, v3.y);
  endShape(CLOSE);
}

function draw() {
  background(10, 20, 15, 40);
  
  time += 0.008;
  
  // Gradually increase subdivision level
  if (frameCount % 120 === 0 && level < maxLevels) {
    let newTriangles = [];
    for (let tri of triangles) {
      if (tri.level === level) {
        newTriangles.push(...subdivide(tri));
      } else {
        newTriangles.push(tri);
      }
    }
    triangles = newTriangles;
    level++;
  }
  
  // Center glow
  let cx = width / 2;
  let cy = height / 2;
  for (let r = 200; r > 0; r -= 20) {
    let alpha = map(r, 200, 0, 0, 15);
    fill(280, 80, 100, alpha);
    noStroke();
    ellipse(cx, cy, r, r);
  }
  
  // Draw triangles with subtle animation
  push();
  translate(0, 0);
  
  for (let i = 0; i < triangles.length; i++) {
    let tri = triangles[i];
    
    // Subtle breathing animation per triangle
    let idx = i * 0.1;
    let breath = sin(time * 2 + idx) * 2;
    
    let { v1, v2, v3, level: lv } = tri;
    
    let nv1 = { x: v1.x, y: v1.y + breath * (1 - lv / maxLevels) };
    let nv2 = { x: v2.x, y: v2.y + breath * (1 - lv / maxLevels) };
    let nv3 = { x: v3.x, y: v3.y + breath * (1 - lv / maxLevels) };
    
    // Color based on level
    let baseHue = (280 + lv * 30 + frameCount * 0.2) % 360;
    let sat = 60 + lv * 8;
    let bri = 50 + sin(time + lv) * 25;
    let alpha = map(lv, 0, maxLevels, 40, 90);
    
    fill(baseHue, sat, bri, alpha);
    stroke(baseHue, sat + 20, bri + 30, alpha + 10);
    strokeWeight(0.3 + (maxLevels - lv) * 0.25);
    
    beginShape();
    vertex(nv1.x, nv1.y);
    vertex(nv2.x, nv2.y);
    vertex(nv3.x, nv3.y);
    endShape(CLOSE);
    
    // Glowing center for deeper levels
    if (lv >= maxLevels - 1) {
      let mx = (nv1.x + nv2.x + nv3.x) / 3;
      let my = (nv1.y + nv2.y + nv3.y) / 3;
      let glowSize = 4 + sin(time * 3 + i) * 2;
      
      noStroke();
      fill(baseHue, 40, 100, 60);
      ellipse(mx, my, glowSize, glowSize);
    }
  }
  pop();
  
  // Floating particles along triangle edges
  let particleCount = 80;
  for (let i = 0; i < particleCount; i++) {
    let t = (i / particleCount + time * 0.1) % 1;
    let triIdx = floor(random(triangles.length * 0.3));
    let tri = triangles[triIdx];
    
    if (!tri) continue;
    
    let { v1, v2, v3, level: lv } = tri;
    
    // Random edge selection
    let edge = floor(random(3));
    let p1, p2;
    if (edge === 0) { p1 = v1; p2 = v2; }
    else if (edge === 1) { p1 = v2; p2 = v3; }
    else { p1 = v3; p2 = v1; }
    
    let px = lerp(p1.x, p2.x, t);
    let py = lerp(p1.y, p2.y, t);
    
    let hue = (280 + i * 2 + frameCount * 0.5) % 360;
    let size = 1 + sin(t * 10 + time * 3) * 0.8;
    
    noStroke();
    fill(hue, 60, 100, 50);
    ellipse(px, py, size, size);
  }
  
  // Outer frame glow
  noFill();
  stroke(280, 60, 80, 20);
  strokeWeight(2);
  rect(20, 20, width - 40, height - 40, 8);
  
  // Vignette
  drawVignette();
}

function drawVignette() {
  let cx = width / 2;
  let cy = height / 2;
  let maxR = max(width, height) * 0.7;
  
  for (let r = maxR; r > 0; r -= 30) {
    let alpha = map(r, 0, maxR, 0, 25);
    fill(10, 20, 10, alpha);
    noStroke();
    ellipse(cx, cy, r * 2, r * 2);
  }
}
</script>
</body>
</html>
