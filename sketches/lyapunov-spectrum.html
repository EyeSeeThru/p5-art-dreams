<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lyapunov Spectrum</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Lyapunov Spectrum - Visualizing Chaos
// Shows the spectrum of Lyapunov exponents for different chaotic attractors

let t = 0;
let particles = [];
let numParticles = 800;
let spectrum = [];
let currentSystem = 0;
const systems = ['rossler', 'lorenz', 'thomas', 'halvorsen'];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Initialize particles with perturbed initial conditions
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      x: random(-10, 10),
      y: random(-10, 10),
      z: random(-10, 10),
      hue: random(360),
      trail: []
    });
  }
  
  background(0);
}

function draw() {
  // Semi-transparent overlay for trail effect
  colorMode(RGB);
  fill(0, 0, 0, 8);
  noStroke();
  rect(0, 0, width, height);
  colorMode(HSB, 360, 100, 100, 100);
  
  let dt = 0.02;
  let system = systems[currentSystem];
  
  // Evolve particles and compute Lyapunov-like divergence
  for (let p of particles) {
    let x = p.x;
    let y = p.y;
    let z = p.z;
    
    let dx, dy, dz;
    
    if (system === 'rossler') {
      dx = -y - z;
      dy = x + 0.2 * y;
      dz = 0.2 + z * (x - 5.7);
    } else if (system === 'lorenz') {
      dx = 10 * (y - x);
      dy = x * (28 - z) - y;
      dz = x * y - 8/3 * z;
    } else if (system === 'thomas') {
      dx = sin(y) - 0.208186 * x;
      dy = sin(z) - 0.208186 * y;
      dz = sin(x) - 0.208186 * z;
    } else if (system === 'halvorsen') {
      dx = -1.4 * x - 4 * y - 4 * z - y * y;
      dy = -1.4 * y - 4 * z - 4 * x - z * z;
      dz = -1.4 * z - 4 * x - 4 * y - x * x;
    }
    
    // Euler integration
    p.x += dx * dt;
    p.y += dy * dt;
    p.z += dz * dt;
    
    // Store trail
    p.trail.push({x: p.x, y: p.y, z: p.z});
    if (p.trail.length > 30) p.trail.shift();
    
    // Project to 2D with perspective
    let scale = 15;
    let projX = width / 2 + p.x * scale;
    let projY = height / 2 + p.y * scale;
    
    // Calculate divergence for coloring
    let div = abs(dx) + abs(dy) + abs(dz);
    let hue = map(div, 0, 30, 180, 320) % 360;
    
    // Draw trail
    for (let i = 1; i < p.trail.length; i++) {
      let t = p.trail[i];
      let pt = p.trail[i-1];
      let tx = width / 2 + t.x * scale;
      let ty = height / 2 + t.y * scale;
      let px = width / 2 + pt.x * scale;
      let py = height / 2 + pt.y * scale;
      
      let alpha = map(i, 0, p.trail.length, 10, 80);
      stroke(hue, 70, 90, alpha);
      strokeWeight(map(i, 0, p.trail.length, 0.5, 2));
      line(px, py, tx, ty);
    }
    
    // Draw point
    noStroke();
    fill(p.hue, 60, 100, 70);
    ellipse(projX, projY, 3, 3);
  }
  
  // Compute and display Lyapunov exponent estimate
  let lyapunovEst = estimateLyapunov(particles, dt);
  spectrum.push(lyapunovEst);
  if (spectrum.length > 200) spectrum.shift();
  
  // Draw spectrum graph
  drawSpectrum();
  
  // Switch system periodically
  t++;
  if (t % 600 === 0) {
    currentSystem = (currentSystem + 1) % systems.length;
    resetParticles();
  }
  
  // Title
  fill(255);
  noStroke();
  textSize(14);
  textAlign(LEFT, TOP);
  text(`System: ${systems[currentSystem].toUpperCase()}`, 20, 20);
  text(`Lyapunov λ ≈ ${lyapunovEst.toFixed(3)}`, 20, 40);
}

function estimateLyapunov(pts, dt) {
  // Simple divergence estimation
  let totalDiv = 0;
  let sampleSize = min(50, pts.length);
  let startIdx = floor(random(pts.length - sampleSize));
  
  for (let i = startIdx; i < startIdx + sampleSize; i++) {
    let p = pts[i];
    let div = abs(p.x) + abs(p.y) + abs(p.z);
    totalDiv += div;
  }
  
  let avgDiv = totalDiv / sampleSize;
  return Math.log(avgDiv + 0.1) / dt * 0.01;
}

function drawSpectrum() {
  let graphX = 20;
  let graphY = height - 120;
  let graphW = 200;
  let graphH = 100;
  
  // Background
  fill(0, 0, 0, 50);
  noStroke();
  rect(graphX, graphY, graphW, graphH);
  
  // Draw spectrum
  noFill();
  stroke(120, 80, 100);
  strokeWeight(1.5);
  beginShape();
  for (let i = 0; i < spectrum.length; i++) {
    let x = map(i, 0, spectrum.length - 1, graphX, graphX + graphW);
    let y = map(spectrum[i], -2, 4, graphY + graphH, graphY);
    y = constrain(y, graphY, graphY + graphH);
    vertex(x, y);
  }
  endShape();
  
  // Zero line
  stroke(0, 0, 50);
  let zeroY = map(0, -2, 4, graphY + graphH, graphY);
  line(graphX, zeroY, graphX + graphW, zeroY);
  
  // Labels
  fill(200);
  noStroke();
  textSize(10);
  textAlign(LEFT);
  text('Lyapunov Spectrum', graphX, graphY - 8);
}

function resetParticles() {
  for (let p of particles) {
    p.x = random(-10, 10);
    p.y = random(-10, 10);
    p.z = random(-10, 10);
    p.trail = [];
  }
  spectrum = [];
  background(0);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
}
</script>
</body>
</html>
