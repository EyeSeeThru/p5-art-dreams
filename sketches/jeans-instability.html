<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeans Instability</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Jeans Instability — gravitational collapse in a uniform gas cloud
// Inspired by the Jeans length criterion for gravitational instability

let particles = [];
let G = 0.15;
let damping = 0.985;
let noiseScale = 0.008;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  initParticles();
}

function initParticles() {
  particles = [];
  let cols = 80;
  let rows = 80;
  let spacing = width / cols;
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let x = i * spacing + spacing * 0.5;
      let y = j * spacing + spacing * 0.5;
      let angle = noise(i * noiseScale, j * noiseScale) * TWO_PI * 2;
      let speed = noise(i * noiseScale + 100, j * noiseScale + 100) * 0.3;
      particles.push({
        x: x,
        y: y,
        vx: cos(angle) * speed,
        vy: sin(angle) * speed,
        dens: 1.0,
        originalX: x,
        originalY: y,
        ax: 0,
        ay: 0,
        gridI: i,
        gridJ: j
      });
    }
  }
}

function draw() {
  background(0, 15);

  let cx = width * 0.5;
  let cy = height * 0.5;

  // Compute gravitational attraction to center and neighbor forces
  for (let p of particles) {
    p.ax = 0;
    p.ay = 0;

    // Central mass — triggers collapse
    let dx = cx - p.x;
    let dy = cy - p.y;
    let r = max(sqrt(dx * dx + dy * dy), 20);
    let force = G * 80000 / (r * r);
    p.ax += (dx / r) * force;
    p.ay += (dy / r) * force;

    // Long-range gravitational coupling with neighbors (Jeans length coupling)
    for (let other of particles) {
      if (other === p) continue;
      let sdx = other.x - p.x;
      let sdy = other.y - p.y;
      let sr = sqrt(sdx * sdx + sdy * sdy);
      if (sr < 60 && sr > 1) {
        // Attractive gravity between density perturbations
        let gForce = G * 0.4 / (sr * sr);
        p.ax += (sdx / sr) * gForce;
        p.ay += (sdy / sr) * gForce;
      }
    }

    // Pressure-like repulsion at short range (prevents singularity)
    for (let other of particles) {
      if (other === p) continue;
      let sdx = other.x - p.x;
      let sdy = other.y - p.y;
      let sr = sqrt(sdx * sdx + sdy * sdy);
      if (sr < 8) {
        let repulse = 0.8 / (sr + 0.1);
        p.ax -= (sdx / sr) * repulse;
        p.ay -= (sdy / sr) * repulse;
      }
    }

    // Perlin noise background force — creates filamentary structure
    let n = noise(p.originalX * 0.003 + t * 0.0005, p.originalY * 0.003 + t * 0.0003);
    let nAngle = n * TWO_PI * 2;
    let nForce = 0.04;
    p.ax += cos(nAngle) * nForce;
    p.ay += sin(nAngle) * nForce;
  }

  // Integrate
  for (let p of particles) {
    p.vx = (p.vx + p.ax) * damping;
    p.vy = (p.vy + p.ay) * damping;
    p.x += p.vx;
    p.y += p.vy;
  }

  // Draw particles — density-based coloring
  loadPixels();
  for (let p of particles) {
    let px = floor(p.x);
    let py = floor(p.y);
    if (px < 0 || px >= width || py < 0 || py >= height) continue;

    // Compute local density from neighbor proximity
    let dens = 0;
    for (let other of particles) {
      let ddx = other.x - p.x;
      let ddy = other.y - p.y;
      let dr = sqrt(ddx * ddx + ddy * ddy);
      if (dr < 20) dens += 1 - dr / 20;
    }

    let idx = (py * width + px) * 4;

    // Color: cool blues for low density → warm oranges/whites for high density
    let h = map(dens, 0, 8, 200, 30);
    let s = map(dens, 0, 8, 80, 100);
    let b = map(dens, 0, 8, 20, 100);

    colorMode(HSB, 360, 100, 100, 100);
    let c = color(h, s, b, 80);

    pixels[idx]     = red(c);
    pixels[idx + 1] = green(c);
    pixels[idx + 2] = blue(c);
    pixels[idx + 3] = alpha(c);

    // Glow: bloom effect by drawing radial gradients
    if (dens > 3) {
      for (let gi = -2; gi <= 2; gi++) {
        for (let gj = -2; gj <= 2; gj++) {
          let gpx = px + gi;
          let gpy = py + gj;
          if (gpx < 0 || gpx >= width || gpy < 0 || gpy >= height) continue;
          let gr = sqrt(gi * gi + gj * gj);
          if (gr === 0) continue;
          let atten = 1 / (gr + 1) * 0.4;
          let gidx = (gpy * width + gpx) * 4;
          let hf = map(dens, 0, 8, 220, 40);
          let cf = color(hf, 90, 90, atten * 60);
          pixels[gidx]     = pixels[gidx]     * (1 - atten) + red(cf)     * atten;
          pixels[gidx + 1] = pixels[gidx + 1] * (1 - atten) + green(cf)   * atten;
          pixels[gidx + 2] = pixels[gidx + 2] * (1 - atten) + blue(cf)   * atten;
        }
      }
    }
  }
  updatePixels();

  // Draw subtle grid lines
  stroke(255, 8);
  strokeWeight(0.3);
  noFill();
  let gs = width / 20;
  for (let gx = 0; gx < width; gx += gs) {
    line(gx, 0, gx, height);
  }
  for (let gy = 0; gy < height; gy += gs) {
    line(0, gy, width, gy);
  }

  t++;

  // Slowly fade title
  if (t < 120) {
    noStroke();
    fill(255, 255, 255, map(t, 0, 120, 200, 0));
    textSize(14);
    textAlign(CENTER);
    text('Jeans Instability — gravitational collapse in a perturbed gas cloud', width / 2, 30);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initParticles();
  t = 0;
}
</script>
</body>
</html>
