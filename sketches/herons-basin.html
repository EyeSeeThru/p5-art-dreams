<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heron's Basin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Newton's Fractal - z^3 - 1 = 0

let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
}

function draw() {
  background(0);
  
  loadPixels();
  
  let w = width;
  let h = height;
  let maxIter = 25;
  
  // Three roots of z^3 - 1 = 0
  let r1 = { x: 1, y: 0 };
  let r2 = { x: -0.5, y: 0.866 };
  let r3 = { x: -0.5, y: -0.866 };
  
  for (let px = 0; px < w; px++) {
    for (let py = 0; py < h; py++) {
      // Map to complex plane
      let zx = (px - w/2) / (w * 0.35);
      let zy = (py - h/2) / (h * 0.35);
      
      let root = 0;
      
      for (let i = 0; i < maxIter; i++) {
        // z = z - (z^3 - 1) / (3z^2)
        let zx2 = zx * zx;
        let zy2 = zy * zy;
        let zx3 = zx * zx2 - zy * zy2;
        let zy3 = zy * zx2 + zx * zy2;
        
        let denom = 3 * (zx2 + zy2);
        if (denom < 0.0001) break;
        
        zx = zx - (zx3 - 1) / denom;
        zy = zy - zy3 / denom;
        
        // Check which root
        let d1 = (zx - r1.x)**2 + (zy - r1.y)**2;
        let d2 = (zx - r2.x)**2 + (zy - r2.y)**2;
        let d3 = (zx - r3.x)**2 + (zy - r3.y)**2;
        
        if (d1 < 0.01) { root = 1; break; }
        if (d2 < 0.01) { root = 2; break; }
        if (d3 < 0.01) { root = 3; break; }
      }
      
      let idx = 4 * (py * w + px);
      
      // Colors for each root
      if (root === 1) {
        pixels[idx] = 255;
        pixels[idx + 1] = 100;
        pixels[idx + 2] = 100;
      } else if (root === 2) {
        pixels[idx] = 100;
        pixels[idx + 1] = 255;
        pixels[idx + 2] = 150;
      } else if (root === 3) {
        pixels[idx] = 100;
        pixels[idx + 1] = 150;
        pixels[idx + 2] = 255;
      } else {
        pixels[idx] = 0;
        pixels[idx + 1] = 0;
        pixels[idx + 2] = 0;
      }
      pixels[idx + 3] = 255;
    }
  }
  
  updatePixels();
  
  t++;
}
</script>
</body>
</html>
