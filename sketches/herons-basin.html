<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Julia Set</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Animated Julia Set Fractal

let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
}

function draw() {
  background(0);
  loadPixels();
  
  let w = width;
  let h = height;
  
  // Animated Julia constant
  let ca = map(sin(t * 0.3), -1, 1, -0.8, 0.4);
  let cb = map(cos(t * 0.2), -1, 1, -0.6, 0.6);
  
  for (let px = 0; px < w; px++) {
    for (let py = 0; py < h; py++) {
      let x0 = map(px, 0, w, -1.5, 1.5);
      let y0 = map(py, 0, h, -1.2, 1.2);
      
      let x = 0;
      let y = 0;
      let iteration = 0;
      const maxIter = 60;
      
      while (x*x + y*y < 4 && iteration < maxIter) {
        let xtemp = x*x - y*y + ca;
        y = 2*x*y + cb;
        x = xtemp;
        iteration++;
      }
      
      let idx = 4 * (py * w + px);
      
      if (iteration === maxIter) {
        pixels[idx] = 0;
        pixels[idx + 1] = 0;
        pixels[idx + 2] = 0;
      } else {
        let smooth = iteration + 1 - Math.log(Math.log(Math.sqrt(x*x + y*y))) / Math.log(2);
        let hue = map(smooth, 0, maxIter, 180, 340);
        let sat = 0.8;
        let bri = map(iteration, 0, maxIter, 0.2, 1);
        
        // HSV to RGB
        let c = bri * sat;
        let m = bri - c;
        let h2 = hue / 60;
        let x2 = c * (1 - Math.abs(h2 % 2 - 1));
        
        let r, g, b;
        if (h2 < 1) { r = c; g = x2; b = 0; }
        else if (h2 < 2) { r = x2; g = c; b = 0; }
        else if (h2 < 3) { r = 0; g = c; b = x2; }
        else if (h2 < 4) { r = 0; g = x2; b = c; }
        else if (h2 < 5) { r = x2; g = 0; b = c; }
        else { r = c; g = 0; b = x2; }
        
        pixels[idx] = (r + m) * 255;
        pixels[idx + 1] = (g + m) * 255;
        pixels[idx + 2] = (b + m) * 255;
      }
      pixels[idx + 3] = 255;
    }
  }
  
  updatePixels();
  t += 0.01;
}
</script>
</body>
</html>
