<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice Gas Automaton — FHP Model</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Lattice Gas Automaton — FHP (Frisch-Hasslacher-Pomeau) Model
// RED AND BLACK VERSION
// Background: pure black (0,0,0)
// Elements: vivid red hue 0-20, saturation 70-100, brightness based on particle count

let grid = [];
let gridSize = 100;
let cellSize;
let t = 0;

let DX = [1, 0.5, -0.5, -1, -0.5, 0.5, 0];
let DY = [0, -0.866, -0.866, 0, 0.866, 0.866, 0];

function setup() {
  createCanvas(windowWidth, windowHeight);
  cellSize = max(5, floor(width / gridSize));
  
  for (let i = 0; i < gridSize; i++) {
    grid[i] = [];
    for (let j = 0; j < gridSize; j++) {
      grid[i][j] = 0;
    }
  }
  
  initFlow();
}

function initFlow() {
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      if (j > gridSize * 0.4 && j < gridSize * 0.6 && i < gridSize * 0.3) {
        grid[i][j] = 1 << 0;
        if (random() < 0.3) grid[i][j] |= 1 << 6;
      } else if (random() < 0.3) {
        grid[i][j] = 1 << floor(random(6));
      } else {
        grid[i][j] = 0;
      }
    }
  }
}

function initVortex() {
  let cx = floor(gridSize * 0.5);
  let cy = floor(gridSize * 0.5);
  
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let dx = i - cx;
      let dy = j - cy;
      let angle = atan2(dy, dx) + Math.PI / 2;
      let dir = floor(((angle + Math.PI) / (2 * Math.PI)) * 6) % 6;
      grid[i][j] = 1 << dir;
      if (random() < 0.3) grid[i][j] |= 1 << 6;
    }
  }
}

function initDrops() {
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      if (random() < 0.25) {
        grid[i][j] = 1 << floor(random(6));
      } else {
        grid[i][j] = 0;
      }
    }
  }
}

function draw() {
  background(0, 0, 0);
  
  let displayMode = floor(t / 400) % 3;
  
  if (t % 400 === 0) {
    if (displayMode === 0) initFlow();
    else if (displayMode === 1) initVortex();
    else initDrops();
  }
  
  evolve();
  drawGrid();
  
  fill(10, 60, 85);
  textSize(12);
  textAlign(LEFT, TOP);
  
  if (displayMode === 0) {
    text("Lattice Gas Automaton — Jet Flow", 10, 10);
    text("Fluid jet emerging into chamber", 10, 26);
  } else if (displayMode === 1) {
    text("Lattice Gas Automaton — Vortex", 10, 10);
    text("Initial vortex decays into turbulence", 10, 26);
  } else {
    text("Lattice Gas Automaton — Drops", 10, 10);
    text("Droplets coalesce and flow", 10, 26);
  }
  
  text("Space to reinitialize", 10, 42);
  
  fill(10, 50, 70);
  textAlign(RIGHT, TOP);
  text("FHP Collision Rules", width - 10, 10);
  
  t++;
}

function evolve() {
  let next = [];
  for (let i = 0; i < gridSize; i++) {
    next[i] = [];
    for (let j = 0; j < gridSize; j++) {
      next[i][j] = 0;
    }
  }
  
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let bits = grid[i][j];
      
      for (let d = 0; d < 6; d++) {
        if (bits & (1 << d)) {
          let ni = (i + Math.round(DX[d]) + gridSize) % gridSize;
          let nj = (j + Math.round(DY[d]) + gridSize) % gridSize;
          next[ni][nj] |= (1 << d);
        }
      }
      
      if (bits & (1 << 6)) {
        next[i][j] |= (1 << 6);
      }
    }
  }
  
  let newGrid = [];
  for (let i = 0; i < gridSize; i++) {
    newGrid[i] = [];
    for (let j = 0; j < gridSize; j++) {
      let incoming = next[i][j];
      let count = 0;
      let d1 = -1, d2 = -1;
      
      for (let d = 0; d < 6; d++) {
        if (incoming & (1 << d)) {
          count++;
          if (d1 === -1) d1 = d;
          else d2 = d;
        }
      }
      
      if (count === 2 && d2 === (d1 + 3) % 6) {
        let rotateBy = random() < 0.5 ? 1 : 5;
        newGrid[i][j] = (1 << ((d1 + rotateBy) % 6)) | (1 << ((d2 + rotateBy) % 6));
      } else {
        newGrid[i][j] = incoming;
      }
    }
  }
  
  grid = newGrid;
}

function drawGrid() {
  noStroke();
  
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let bits = grid[i][j];
      let count = 0;
      for (let d = 0; d < 7; d++) {
        if (bits & (1 << d)) count++;
      }
      
      // Red palette
      if (count === 0) {
        fill(0, 0, 0);
      } else if (count === 1) {
        fill(5, 50, 40);
      } else if (count === 2) {
        fill(5, 65, 55);
      } else if (count === 3) {
        fill(5, 75, 70);
      } else {
        fill(5, 85, 85);
      }
      
      rect(i * cellSize, j * cellSize, cellSize, cellSize);
    }
  }
}

function keyPressed() {
  if (key === ' ') {
    let displayMode = floor(t / 400) % 3;
    if (displayMode === 0) initFlow();
    else if (displayMode === 1) initVortex();
    else initDrops();
  }
}
</script>
</body>
</html>
