<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forest Fire</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #191919; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Forest Fire — Self-organized criticality model
// RED AND BLACK version
// Background: min rgb(25,25,25)
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100
// Mathematical concept: power-law distributed avalanches from simple rules

const GRID_SIZE = 80;
const P_GROWTH = 0.01;
const P_LIGHTNING = 0.0001;

let grid = [];
let burning = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noSmooth();
  initGrid();
}

function initGrid() {
  grid = [];
  burning = [];
  for (let y = 0; y < GRID_SIZE; y++) {
    grid[y] = [];
    for (let x = 0; x < GRID_SIZE; x++) {
      grid[y][x] = random() < 0.5 ? 1 : 0;
    }
  }
}

function growTrees() {
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if (grid[y][x] === 0 && random() < P_GROWTH) {
        grid[y][x] = 1;
      }
    }
  }
}

function lightningStrike() {
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if (grid[y][x] === 1 && random() < P_LIGHTNING) {
        burning.push({ x: x, y: y, age: 0 });
        grid[y][x] = 2;
      }
    }
  }
}

function spreadFire() {
  let newBurning = [];
  
  for (let b of burning) {
    b.age++;
    
    let neighbors = [
      { x: b.x - 1, y: b.y },
      { x: b.x + 1, y: b.y },
      { x: b.x, y: b.y - 1 },
      { x: b.x, y: b.y + 1 }
    ];
    
    for (let n of neighbors) {
      if (n.x >= 0 && n.x < GRID_SIZE && n.y >= 0 && n.y < GRID_SIZE) {
        if (grid[n.y][n.x] === 1) {
          grid[n.y][n.x] = 2;
          newBurning.push({ x: n.x, y: n.y, age: 0 });
        }
      }
    }
    
    if (b.age < 10) {
      newBurning.push(b);
    } else {
      grid[b.y][b.x] = 0;
    }
  }
  
  burning = newBurning;
}

function drawGrid() {
  let cellW = width / GRID_SIZE;
  let cellH = height / GRID_SIZE;
  
  noStroke();
  
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      let cx = x * cellW;
      let cy = y * cellH;
      
      if (grid[y][x] === 0) {
        // Empty - dark red-brown
        fill(10, 40, 12);
      } else if (grid[y][x] === 1) {
        // Tree - RED gradient based on local density
        let neighbors = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            let nx = x + dx;
            let ny = y + dy;
            if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
              if (grid[ny][nx] === 1) neighbors++;
            }
          }
        }
        let bri = map(neighbors, 0, 9, 35, 75);
        let sat = map(neighbors, 0, 9, 50, 80);
        fill(10, sat, bri);
      } else if (grid[y][x] === 2) {
        // Burning - VIVID RED
        let bri = map(b.age, 0, 10, 95, 70);
        fill(10, 85, bri);
      }
      
      rect(cx + 0.5, cy + 0.5, cellW - 1, cellH - 1);
    }
  }
}

function draw() {
  background(25, 25, 25);
  
  for (let i = 0; i < 3; i++) {
    growTrees();
    lightningStrike();
    spreadFire();
  }
  
  drawGrid();
  
  // Stats
  let treeCount = 0;
  let fireCount = 0;
  for (let y = 0; y < GRID_SIZE; y++) {
    for (let x = 0; x < GRID_SIZE; x++) {
      if (grid[y][x] === 1) treeCount++;
      if (grid[y][x] === 2) fireCount++;
    }
  }
  
  // UI - RED
  noStroke();
  fill(10, 40, 85);
  textSize(11);
  textAlign(LEFT, TOP);
  text("Forest Fire — Self-Organized Criticality", 10, 10);
  text("Trees: " + treeCount + " | Burning: " + fireCount + " | Growth: " + P_GROWTH + " | Lightning: " + P_LIGHTNING, 10, 24);
  
  fill(10, 30, 70);
  textAlign(RIGHT, TOP);
  text("Click to reset", width - 10, 10);
  
  // Legend
  let legendX = width - 90;
  let legendY = 40;
  textAlign(LEFT, TOP);
  fill(10, 30, 60);
  text("Legend:", legendX, legendY);
  
  fill(10, 40, 12);
  rect(legendX, legendY + 15, 12, 12);
  fill(10, 30, 60);
  text("Empty", legendX + 18, legendY + 15);
  
  fill(10, 60, 55);
  rect(legendX, legendY + 32, 12, 12);
  fill(10, 30, 60);
  text("Tree", legendX + 18, legendY + 32);
  
  fill(10, 85, 95);
  rect(legendX, legendY + 49, 12, 12);
  fill(10, 30, 60);
  text("Avalanche", legendX + 18, legendY + 49);
}

function mousePressed() {
  initGrid();
}
</script>
</body>
</html>
