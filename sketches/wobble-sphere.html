<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobble Sphere</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Wobble Sphere - A 3D sphere with Perlin noise displacement
let angleX = 0;
let angleY = 0;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
}

function draw() {
  background(0);
  
  let camDist = 500;
  camera(0, 0, camDist, 0, 0, 0, 0, 1, 0);
  
  rotateY(angleY);
  rotateX(angleX);
  
  let radius = 180;
  let detail = 60;
  
  // Create sphere with noise displacement
  for (let i = 0; i <= detail; i++) {
    let lat = map(i, 0, detail, -HALF_PI, HALF_PI);
    
    beginShape(TRIANGLE_STRIP);
    for (let j = 0; j <= detail; j++) {
      let lon = map(j, 0, detail, -PI, PI);
      
      // Calculate displaced point
      let x = radius * cos(lat) * cos(lon);
      let y = radius * sin(lat);
      let z = radius * cos(lat) * sin(lon);
      
      // Apply noise displacement
      let noiseScale = 0.015;
      let noiseVal = noise(
        x * noiseScale + t * 0.3,
        y * noiseScale + t * 0.2,
        z * noiseScale + t * 0.1
      );
      
      let displacement = map(noiseVal, 0, 1, -40, 60);
      let r = radius + displacement;
      
      let nx = r * cos(lat) * cos(lon);
      let ny = r * sin(lat);
      let nz = r * cos(lat) * sin(lon);
      
      // Calculate normal for lighting
      let normal = createVector(nx, ny, nz).normalize();
      let light = createVector(1, 1, 1);
      let brightness = (normal.dot(light) + 1) * 0.5;
      
      // Color based on displacement and position
      let hue = map(displacement, -40, 60, 180, 320);
      let sat = map(noiseVal, 0, 1, 40, 90);
      let bri = map(brightness, 0, 1, 40, 100);
      
      fill(hue % 360, sat, bri);
      vertex(nx, ny, nz);
      
      // Next longitude point
      let lon2 = map(j + 1, 0, detail, -PI, PI);
      let nx2 = r * cos(lat) * cos(lon2);
      let nz2 = r * cos(lat) * sin(lon2);
      
      fill((hue + 20) % 360, sat * 0.8, bri * 0.9);
      vertex(nx2, ny, nz2);
    }
    endShape();
  }
  
  // Rotation
  angleY += 0.003;
  angleX += 0.002;
  t += 0.01;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
