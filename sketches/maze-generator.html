<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// MAZE GENERATOR - Recursive backtracking labyrinth
// Walls crumble in silence,
// paths emerge from the void,
// a perfect maze drawn in light.

let cols, rows;
let cellSize = 18;
let grid = [];
let stack = [];
let current;
let animationSpeed = 8;
let frameCount = 0;
let done = false;
let mazeBuffer;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(0, 0, 5);
  
  cols = floor(width / cellSize);
  rows = floor(height / cellSize);
  
  // Initialize grid
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      grid.push(new Cell(i, j));
    }
  }
  
  current = grid[0];
  current.visited = true;
  stack.push(current);
}

function draw() {
  background(0, 0, 5, 30);
  
  // Draw completed maze portion
  for (let cell of grid) {
    cell.show(true);
  }
  
  // Animate generation
  if (!done) {
    for (let k = 0; k < animationSpeed; k++) {
      if (stack.length > 0) {
        current = stack.pop();
        let next = current.checkNeighbors();
        
        if (next) {
          next.visited = true;
          stack.push(current);
          stack.push(next);
          current.removeWalls(next);
        }
      } else {
        done = true;
      }
    }
  }
  
  // Pulse effect on recent cells
  if (stack.length > 0) {
    let recent = stack[stack.length - 1];
    if (recent) {
      recent.highlight();
    }
  }
  
  // Subtle glow overlay
  noStroke();
  fill(0, 0, 100, 3);
  rect(0, 0, width, height);
}

function windowResized() {
  // Keep original maze on resize
}

class Cell {
  constructor(i, j) {
    this.i = i;
    this.j = j;
    this.walls = [true, true, true, true]; // top, right, bottom, left
    this.visited = false;
    this.x = i * cellSize;
    this.y = j * cellSize;
  }
  
  show(drawn) {
    strokeWeight(1.5);
    noFill();
    
    if (this.visited) {
      // Filled cell background
      noStroke();
      fill(230, 60, 15, 40);
      rect(this.x + 1, this.y + 1, cellSize - 2, cellSize - 2);
    }
    
    // Draw walls
    stroke(200, 40, 70, 80);
    
    if (this.walls[0]) line(this.x, this.y, this.x + cellSize, this.y);
    if (this.walls[1]) line(this.x + cellSize, this.y, this.x + cellSize, this.y + cellSize);
    if (this.walls[2]) line(this.x, this.y + cellSize, this.x + cellSize, this.y + cellSize);
    if (this.walls[3]) line(this.x, this.y, this.x, this.y + cellSize);
  }
  
  highlight() {
    noStroke();
    fill(50, 80, 100, 60);
    let s = cellSize * 0.6;
    rect(this.x + (cellSize - s) / 2, this.y + (cellSize - s) / 2, s, s);
  }
  
  checkNeighbors() {
    let neighbors = [];
    
    let top    = this.i >= 0 ? grid[index(this.i, this.j - 1)] : null;
    let right  = this.j >= 0 ? grid[index(this.i + 1, this.j)] : null;
    let bottom = grid[index(this.i, this.j + 1)];
    let left   = grid[index(this.i - 1, this.j)];
    
    if (top && !top.visited) neighbors.push(top);
    if (right && !right.visited) neighbors.push(right);
    if (bottom && !bottom.visited) neighbors.push(bottom);
    if (left && !left.visited) neighbors.push(left);
    
    if (neighbors.length > 0) {
      return random(neighbors);
    }
    return null;
  }
  
  removeWalls(next) {
    let dx = this.i - next.i;
    let dy = this.j - next.j;
    
    if (dx === 1) { this.walls[3] = false; next.walls[1] = false; }
    else if (dx === -1) { this.walls[1] = false; next.walls[3] = false; }
    else if (dy === 1) { this.walls[0] = false; next.walls[2] = false; }
    else if (dy === -1) { this.walls[2] = false; next.walls[0] = false; }
  }
}

function index(i, j) {
  if (i < 0 || j < 0 || i >= cols || j >= rows) return -1;
  return i + j * cols;
}
</script>
</body>
</html>
