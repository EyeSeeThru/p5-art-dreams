<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ulam Spiral</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let cellSize = 4;
let cols, rows;
let spiral = [];
let frame = 0;
let maxNum;
let palette;
let primeCache = new Set();

function isPrime(n) {
  if (n < 2) return false;
  if (primeCache.has(n)) return true;
  if (n % 2 === 0) return n === 2;
  if (n % 3 === 0) return n === 3;
  for (let i = 5; i * i <= n; i += 6) {
    if (n % i === 0 || n % (i + 2) === 0) return false;
  }
  primeCache.add(n);
  return true;
}

function generateSpiral(maxN) {
  spiral = [];
  let x = 0, y = 0;
  let dx = 1, dy = 0;
  let len = 1, cnt = 0, turn = 0;
  
  for (let n = 1; n <= maxN; n++) {
    spiral.push({x, y, n, prime: isPrime(n)});
    
    x += dx;
    y += dy;
    cnt++;
    
    if (cnt === len) {
      cnt = 0;
      turn++;
      [dx, dy] = [-dy, dx];
      if (turn === 2) {
        turn = 0;
        len++;
      }
    }
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100);
  
  maxNum = floor(width * height / (cellSize * cellSize)) * 2;
  generateSpiral(maxNum);
  
  palette = {
    prime: [45, 85, 95],
    composite: [220, 15, 25],
    bg: [230, 30, 8]
  };
}

function draw() {
  background(...palette.bg);
  
  translate(width / 2, height / 2);
  scale(1 + sin(frame * 0.01) * 0.08);
  rotate(frame * 0.005);
  
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (let s of spiral) {
    minX = min(minX, s.x); maxX = max(maxX, s.x);
    minY = min(minY, s.y); maxY = max(maxY, s.y);
  }
  
  let offsetX = -(minX + maxX) / 2;
  let offsetY = -(minY + maxY) / 2;
  
  let t = frame * 0.02;
  
  for (let s of spiral) {
    let px = (s.x + offsetX) * cellSize;
    let py = (s.y + offsetY) * cellSize;
    
    let hue, sat, bri;
    
    if (s.prime) {
      hue = (s.n * 2 + frame) % 360;
      sat = 70 + sin(t + s.n * 0.1) * 20;
      bri = 80 + sin(t * 1.5 + s.n * 0.05) * 15;
    } else {
      hue = 220;
      sat = 20;
      bri = 20 + (s.n % 50) * 0.5;
    }
    
    let pulse = s.prime ? 1 + sin(frame * 0.1 + s.n * 0.2) * 0.3 : 1;
    let size = cellSize * 0.7 * pulse;
    
    noStroke();
    fill(hue, sat, bri);
    ellipse(px, py, size, size);
    
    if (s.prime && frame > 60) {
      let glowSize = size * 2 * (s.n % 10 + 1) / 10;
      fill(hue, sat * 0.5, bri * 0.3, 0.3);
      ellipse(px, py, glowSize, glowSize);
    }
  }
  
  noFill();
  stroke(60, 80, 100, 0.3);
  for (let r = 100; r < 600; r += 80) {
    ellipse(0, 0, r, r);
  }
  
  frame++;
  if (frame > 600) frame = 0;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  maxNum = floor(width * height / (cellSize * cellSize)) * 2;
  generateSpiral(maxNum);
}
</script>
</body>
</html>
