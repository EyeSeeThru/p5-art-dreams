<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Lens</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const particles = [];
const starField = [];
const MASS_CENTER = { x: 0, y: 0 };
const G = 800;
const LENS_MASS = 3.5;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  MASS_CENTER.x = width / 2;
  MASS_CENTER.y = height / 2;
  
  // Create background star field
  for (let i = 0; i < 200; i++) {
    starField.push({
      x: random(width),
      y: random(height),
      size: random(0.5, 2),
      brightness: random(30, 100),
      twinkle: random(TWO_PI)
    });
  }
  
  // Create light particles orbiting/deflected by gravity
  for (let i = 0; i < 400; i++) {
    const angle = random(TWO_PI);
    const dist = random(100, Math.max(width, height) * 0.7);
    particles.push(new Photon(
      cos(angle) * dist + width / 2,
      sin(angle) * dist + height / 2
    ));
  }
}

function draw() {
  background(0, 0, 0, 15);
  
  // Draw star field with slight distortion hint
  for (const star of starField) {
    const distorted = getGravitationalOffset(star.x, star.y);
    const twinkle = sin(time * 2 + star.twinkle) * 20 + 80;
    noStroke();
    fill(220, 10, min(100, star.brightness + twinkle * 0.3), 80);
    ellipse(distorted.x, distorted.y, star.size);
  }
  
  // Draw the massive object (galaxy/black hole)
  drawMassCenter();
  
  // Update and draw photons
  for (const p of particles) {
    p.update();
    p.display();
  }
  
  // Add new photons periodically
  if (frameCount % 3 === 0 && particles.length < 500) {
    const angle = random(TWO_PI);
    const dist = random(150, Math.max(width, height) * 0.6);
    particles.push(new Photon(
      cos(angle) * dist + width / 2,
      sin(angle) * dist + height / 2
    ));
  }
  
  // Remove photons that go too far
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const d = dist(p.pos.x, p.pos.y, MASS_CENTER.x, MASS_CENTER.y);
    if (d > max(width, height) * 0.8 || d < 20) {
      particles.splice(i, 1);
    }
  }
  
  time += 0.016;
}

function drawMassCenter() {
  // Dark center (event horizon)
  noStroke();
  for (let r = 60; r > 0; r -= 10) {
    fill(0, 0, 0, 100);
    ellipse(MASS_CENTER.x, MASS_CENTER.y, r * 2);
  }
  
  // Accretion disk glow
  for (let i = 0; i < 80; i++) {
    const angle = time * 0.5 + i * 0.08;
    const radius = 80 + sin(angle * 3 + time) * 20;
    const x = MASS_CENTER.x + cos(angle) * radius;
    const y = MASS_CENTER.y + sin(angle) * radius;
    const hue = (20 + i * 2 + time * 10) % 60;
    fill(hue, 80, 100, 40);
    ellipse(x, y, random(3, 8));
  }
  
  // Einstein ring hint
  stroke(280, 60, 100, 30);
  noFill();
  ellipse(MASS_CENTER.x, MASS_CENTER.y, 180, 180);
}

function getGravitationalOffset(x, y) {
  const dx = x - MASS_CENTER.x;
  const dy = y - MASS_CENTER.y;
  const d = sqrt(dx * dx + dy * dy);
  
  if (d < 1) return { x, y };
  
  // Einstein deflection angle approximation
  const deflection = LENS_MASS / d;
  const angle = atan2(dy, dx);
  
  // Light bends around massive object
  const offsetX = x + cos(angle + HALF_PI) * deflection * 15;
  const offsetY = y + sin(angle + HALF_PI) * deflection * 15;
  
  return { x: offsetX, y: offsetY };
}

class Photon {
  constructor(x, y) {
    this.pos = createVector(x, y);
    this.vel = createVector(random(-1, 1), random(-1, 1));
    this.prevPos = this.pos.copy();
    
    // Calculate initial velocity toward center with some randomness
    const toCenter = createVector(MASS_CENTER.x - x, MASS_CENTER.y - y);
    toCenter.normalize();
    toCenter.mult(random(1, 3));
    this.vel = toCenter;
    
    this.hue = random(180, 320);
    this.trail = [];
  }
  
  update() {
    this.prevPos = this.pos.copy();
    
    // Gravitational acceleration
    const toCenter = createVector(MASS_CENTER.x - this.pos.x, MASS_CENTER.y - this.pos.y);
    const d = toCenter.mag();
    toCenter.normalize();
    
    // Inverse square law with softening
    const force = G / (d * d + 100);
    toCenter.mult(force);
    this.vel.add(toCenter);
    
    // Slight tangential velocity for orbit
    const tangent = createVector(-toCenter.y, toCenter.x);
    tangent.mult(0.02);
    this.vel.add(tangent);
    
    // Speed limit
    if (this.vel.mag() > 8) {
      this.vel.setMag(8);
    }
    
    this.pos.add(this.vel);
    
    // Trail
    this.trail.push(this.pos.copy());
    if (this.trail.length > 15) {
      this.trail.shift();
    }
  }
  
  display() {
    // Draw trail
    noFill();
    for (let i = 0; i < this.trail.length - 1; i++) {
      const alpha = map(i, 0, this.trail.length, 0, 60);
      const weight = map(i, 0, this.trail.length, 0.5, 2);
      stroke(this.hue, 70, 100, alpha);
      strokeWeight(weight);
      line(this.trail[i].x, this.trail[i].y, this.trail[i + 1].x, this.trail[i + 1].y);
    }
    
    // Draw photon
    noStroke();
    fill(this.hue, 60, 100, 90);
    ellipse(this.pos.x, this.pos.y, 3);
    
    // Glow
    fill(this.hue, 50, 100, 30);
    ellipse(this.pos.x, this.pos.y, 8);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  MASS_CENTER.x = width / 2;
  MASS_CENTER.y = height / 2;
}
</script>
</body>
</html>
