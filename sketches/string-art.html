<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>String Art</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// String Art - Parametric woven curves
const strings = [];
const numRings = 8;
const pointsPerRing = 64;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  
  // Initialize rings with different properties
  for (let i = 0; i < numRings; i++) {
    strings.push({
      radius: 50 + i * 45,
      rotationSpeed: (i % 2 === 0 ? 1 : -1) * (0.3 + i * 0.1),
      rotation: i * (TWO_PI / numRings),
      points: [],
      color: color(
        180 + sin(i * 0.5) * 75,
        50 + i * 20,
        200 + i * 15,
        80
      )
    });
  }
  
  // Calculate points for each ring
  for (let s of strings) {
    for (let i = 0; i < pointsPerRing; i++) {
      s.points.push(i / pointsPerRing);
    }
  }
}

function draw() {
  background(8, 8, 12, 25);
  
  translate(width / 2, height / 2);
  
  // Update rotations
  for (let s of strings) {
    s.rotation += s.rotationSpeed * 0.008;
  }
  
  // Draw strings connecting points between rings
  noFill();
  
  for (let layer = 0; layer < numRings - 1; layer++) {
    const ring1 = strings[layer];
    const ring2 = strings[layer + 1];
    
    // Create gradient for this layer
    const r = map(layer, 0, numRings, 100, 255);
    const g = map(layer, 0, numRings, 30, 150);
    const b = map(layer, 0, numRings, 150, 255);
    
    stroke(r, g, b, 40);
    strokeWeight(0.5);
    
    // Connect points
    for (let i = 0; i < pointsPerRing; i++) {
      const angle1 = ring1.rotation + ring1.points[i] * TWO_PI;
      const angle2 = ring2.rotation + ring2.points[i] * TWO_PI;
      
      const x1 = cos(angle1) * ring1.radius;
      const y1 = sin(angle1) * ring1.radius;
      const x2 = cos(angle2) * ring2.radius;
      const y2 = sin(angle2) * ring2.radius;
      
      // Add slight wave to opacity
      const wave = sin(time * 0.02 + i * 0.1 + layer) * 0.5 + 0.5;
      stroke(r, g, b, 20 + wave * 30);
      
      line(x1, y1, x2, y2);
    }
  }
  
  // Draw center glow
  noStroke();
  for (let i = 5; i > 0; i--) {
    fill(255, 80, 100, 3);
    ellipse(0, 0, i * 30, i * 30);
  }
  
  // Draw concentric ring guides
  noFill();
  stroke(255, 255, 255, 10);
  strokeWeight(1);
  for (let s of strings) {
    ellipse(0, 0, s.radius * 2, s.radius * 2);
  }
  
  // Draw point markers on outermost ring
  const outer = strings[strings.length - 1];
  fill(255, 200, 150, 150);
  noStroke();
  for (let i = 0; i < 16; i++) {
    const angle = outer.rotation + (i / 16) * TWO_PI;
    const x = cos(angle) * outer.radius;
    const y = sin(angle) * outer.radius;
    ellipse(x, y, 4, 4);
  }
  
  time++;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
