<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sine Surface</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
}

function draw() {
  background(0, 0, 5);
  
  let time = millis() * 0.001;
  
  // Rotate the entire view
  rotateX(time * 0.15 + sin(time * 0.3) * 0.2);
  rotateY(time * 0.2);
  
  let cols = 40;
  let rows = 40;
  let size = 8;
  let spacing = 14;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      push();
      
      let x = (i - cols/2) * spacing;
      let y = (j - rows/2) * spacing;
      
      // Create wave surface using sine function
      let dist = sqrt(x*x + y*y);
      let z = sin(dist * 0.08 - time * 2) * 60 
            + sin(x * 0.05 + time) * 20 
            + cos(y * 0.05 + time * 1.3) * 20;
      
      translate(x, y, z);
      
      // Color based on position and time
      let hue = (dist * 2 + time * 50) % 360;
      let sat = 70 + sin(dist * 0.1 + time) * 30;
      let bri = 80 + sin(time * 2 + dist * 0.05) * 20;
      
      fill(hue, sat, bri, 90);
      
      // Size varies with the wave
      let s = size + sin(dist * 0.1 - time * 2) * 3;
      sphere(s);
      
      pop();
    }
  }
  
  t += 0.016;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
