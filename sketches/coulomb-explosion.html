<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coulomb Explosion</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Coulomb Explosion — Charged particle repulsion visualization
const particles = [];
const numParticles = 180;
const repulsionStrength = 800;
const damping = 0.97;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  
  // Initialize particles in a dense cluster at center
  for (let i = 0; i < numParticles; i++) {
    const angle = random(TWO_PI);
    const r = random(20, 80);
    particles.push({
      x: width / 2 + cos(angle) * r,
      y: height / 2 + sin(angle) * r,
      vx: random(-0.5, 0.5),
      vy: random(-0.5, 0.5),
      charge: random() > 0.5 ? 1 : -1,
      hue: random(160, 280),
      size: random(3, 8)
    });
  }
}

function draw() {
  // Trail effect
  fill(10, 10, 15, 0.15);
  rect(0, 0, width, height);
  
  // Calculate Coulomb repulsion between all particle pairs
  for (let i = 0; i < particles.length; i++) {
    const p1 = particles[i];
    
    for (let j = i + 1; j < particles.length; j++) {
      const p2 = particles[j];
      
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const distSq = dx * dx + dy * dy;
      const dist = sqrt(distSq);
      
      // Coulomb force: F = k * q1 * q2 / r^2
      if (dist > 5 && dist < 400) {
        const force = repulsionStrength * p1.charge * p2.charge / distSq;
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        
        p1.vx -= fx * 0.001;
        p1.vy -= fy * 0.001;
        p2.vx += fx * 0.001;
        p2.vy += fy * 0.001;
      }
    }
  }
  
  // Update and draw particles
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    
    // Apply velocity
    p.x += p.vx;
    p.y += p.vy;
    
    // Damping
    p.vx *= damping;
    p.vy *= damping;
    
    // Boundary bounce with energy loss
    if (p.x < 0 || p.x > width) {
      p.vx *= -0.8;
      p.x = constrain(p.x, 0, width);
    }
    if (p.y < 0 || p.y > height) {
      p.vy *= -0.8;
      p.y = constrain(p.y, 0, height);
    }
    
    // Glow effect
    const speed = sqrt(p.vx * p.vx + p.vy * p.vy);
    const alpha = map(speed, 0, 5, 0.4, 1);
    const brightness = map(speed, 0, 8, 60, 100);
    
    // Outer glow
    fill(p.hue, 80, brightness, alpha * 0.3);
    ellipse(p.x, p.y, p.size * 3, p.size * 3);
    
    // Core
    fill(p.hue, 60, 100, alpha);
    ellipse(p.x, p.y, p.size, p.size);
  }
  
  // Draw connection lines for nearby particles of opposite charge
  strokeWeight(0.5);
  for (let i = 0; i < particles.length; i++) {
    const p1 = particles[i];
    for (let j = i + 1; j < particles.length; j++) {
      const p2 = particles[j];
      if (p1.charge !== p2.charge) {
        const d = dist(p1.x, p1.y, p2.x, p2.y);
        if (d < 80) {
          const alpha = map(d, 0, 80, 0.3, 0);
          stroke(p1.hue, 50, 100, alpha);
          line(p1.x, p1.y, p2.x, p2.y);
        }
      }
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

// Reset on mouse click
function mousePressed() {
  // Gentle push toward mouse
  for (const p of particles) {
    const dx = p.x - mouseX;
    const dy = p.y - mouseY;
    const d = sqrt(dx * dx + dy * dy);
    if (d > 10) {
      p.vx += (dx / d) * 2;
      p.vy += (dy / d) * 2;
    }
  }
}
</script>
</body>
</html>
