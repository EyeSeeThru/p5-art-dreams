<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diffusive Precipitation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Diffusive Precipitation - Chemical reaction visualization
// Simulates precipitates forming from diffusing chemicals

let grid = [];
let nextGrid = [];
let cols, rows;
let resolution = 4;
let chemicals = [];
let precipitate = [];
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  cols = floor(width / resolution);
  rows = floor(height / resolution);
  
  // Initialize grid: 0 = empty, 1 = chemical A, 2 = chemical B, 3 = precipitate
  for (let i = 0; i < cols; i++) {
    grid[i] = [];
    nextGrid[i] = [];
    for (let j = 0; j < rows; j++) {
      grid[i][j] = { chem: 0, concentration: 0 };
      nextGrid[i][j] = { chem: 0, concentration: 0 };
    }
  }
  
  // Add chemical sources
  // Chemical A sources (top-left region)
  for (let i = 0; i < 3; i++) {
    chemicals.push({
      x: random(cols * 0.1, cols * 0.25),
      y: random(rows * 0.1, rows * 0.3),
      type: 1,
      rate: random(0.8, 1.0)
    });
  }
  
  // Chemical B sources (bottom-right region)
  for (let i = 0; i < 3; i++) {
    chemicals.push({
      x: random(cols * 0.75, cols * 0.9),
      y: random(rows * 0.7, rows * 0.9),
      type: 2,
      rate: random(0.8, 1.0)
    });
  }
  
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
}

function draw() {
  background(10, 20, 25);
  
  // Add chemicals from sources
  for (let c of chemicals) {
    let ix = floor(c.x);
    let iy = floor(c.y);
    if (ix >= 0 && ix < cols && iy >= 0 && iy < rows) {
      grid[ix][iy].chem = c.type;
      grid[ix][iy].concentration = min(grid[ix][iy].concentration + c.rate * 0.15, 1);
    }
  }
  
  // Diffuse chemicals
  diffuse();
  
  // Check for precipitation (A + B = precipitate)
  precipitateForm();
  
  // Render
  renderGrid();
  
  // Slowly move chemical sources
  for (let c of chemicals) {
    c.x += random(-0.5, 0.5);
    c.y += random(-0.5, 0.5);
    c.x = constrain(c.x, 0, cols - 1);
    c.y = constrain(c.y, 0, rows - 1);
  }
  
  time += 0.01;
}

function diffuse() {
  let diffusionRate = 0.2;
  
  for (let i = 1; i < cols - 1; i++) {
    for (let j = 1; j < rows - 1; j++) {
      if (grid[i][j].concentration > 0.01) {
        // 4-neighbor diffusion
        let neighbors = [
          [i-1, j], [i+1, j], [i, j-1], [i, j+1]
        ];
        
        for (let n of neighbors) {
          let nx = n[0], ny = n[1];
          let amount = grid[i][j].concentration * diffusionRate * 0.25;
          
          // Only diffuse to empty or same chemical cells
          if (grid[nx][ny].chem === 0 || grid[nx][ny].chem === grid[i][j].chem) {
            nextGrid[nx][ny].chem = grid[i][j].chem;
            nextGrid[nx][ny].concentration += amount;
          }
        }
        
        // Decay slightly
        nextGrid[i][j].chem = grid[i][j].chem;
        nextGrid[i][j].concentration += grid[i][j].concentration * (1 - diffusionRate);
      }
    }
  }
  
  // Swap grids
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      grid[i][j].chem = nextGrid[i][j].chem;
      grid[i][j].concentration = nextGrid[i][j].concentration;
      nextGrid[i][j] = { chem: 0, concentration: 0 };
    }
  }
}

function precipitateForm() {
  // Look for cells where both chemicals meet
  for (let i = 1; i < cols - 1; i++) {
    for (let j = 1; j < rows - 1; j++) {
      if (grid[i][j].chem === 1 && grid[i][j].concentration > 0.3) {
        // Check for nearby type B
        for (let di = -2; di <= 2; di++) {
          for (let dj = -2; dj <= 2; dj++) {
            let ni = i + di;
            let nj = j + dj;
            if (ni >= 0 && ni < cols && nj >= 0 && nj < rows) {
              if (grid[ni][nj].chem === 2 && grid[ni][nj].concentration > 0.3) {
                // Create precipitate with some randomness
                if (random() < 0.02) {
                  precipitate.push({
                    x: (i + random(-1, 1)) * resolution,
                    y: (j + random(-1, 1)) * resolution,
                    hue: random(45, 65), // Golden yellow
                    size: random(2, 6),
                    age: 0,
                    maxAge: random(200, 500)
                  });
                }
              }
            }
          }
        }
      }
    }
  }
}

function renderGrid() {
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let cell = grid[i][j];
      let x = i * resolution;
      let y = j * resolution;
      
      if (cell.concentration > 0.05) {
        let alpha = cell.concentration * 0.6;
        let hue, sat, bri;
        
        if (cell.chem === 1) {
          // Chemical A - cyan/teal
          hue = 180 + sin(time + i * 0.01) * 20;
          sat = 70;
          bri = 80;
        } else if (cell.chem === 2) {
          // Chemical B - magenta/purple
          hue = 300 + cos(time + j * 0.01) * 20;
          sat = 70;
          bri = 80;
        }
        
        fill(hue % 360, sat, bri, alpha);
        rect(x, y, resolution, resolution);
      }
    }
  }
  
  // Render precipitates
  for (let p of precipitate) {
    p.age++;
    let alpha = 1 - (p.age / p.maxAge);
    if (alpha > 0) {
      let size = p.size * (1 + sin(p.age * 0.1) * 0.2);
      // Outer glow
      fill(p.hue, 60, 90, alpha * 0.3);
      ellipse(p.x, p.y, size * 3, size * 3);
      // Core
      fill(p.hue, 50, 100, alpha);
      ellipse(p.x, p.y, size, size);
    }
  }
  
  // Remove old precipitates
  precipitate = precipitate.filter(p => p.age < p.maxAge);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  setup();
}
</script>
</body>
</html>
