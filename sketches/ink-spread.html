<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ink Spread — Sumi-e Dreams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f5f0e6; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Ink Spread - Sumi-e style ink diffusion simulation
// Inspired by traditional Japanese sumi-e painting

let inkDrops = [];
let paperTexture;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  paperTexture = createGraphics(width, height);
  generatePaperTexture();
  
  // Initial ink drops
  for (let i = 0; i < 8; i++) {
    addInkDrop(random(width), random(height), random(20, 60));
  }
}

function generatePaperTexture() {
  paperTexture.background(245, 240, 230);
  paperTexture.noStroke();
  
  // Subtle fiber noise
  for (let i = 0; i < 5000; i++) {
    let x = random(width);
    let y = random(height);
    let alpha = random(3, 8);
    paperTexture.fill(200, 190, 170, alpha);
    paperTexture.ellipse(x, y, random(1, 3), random(1, 3));
  }
  
  // Larger texture variations
  for (let i = 0; i < 500; i++) {
    let x = random(width);
    let y = random(height);
    let alpha = random(2, 5);
    paperTexture.fill(210, 200, 180, alpha);
    paperTexture.ellipse(x, y, random(5, 15), random(5, 15));
  }
}

function addInkDrop(x, y, size) {
  inkDrops.push({
    x: x,
    y: y,
    size: size,
    maxSize: size * random(3, 5),
    growth: random(0.3, 0.8),
    density: random(200, 500),
    age: 0,
    fibers: [],
    done: false
  });
  
  // Add fiber-guided paths
  let drop = inkDrops[inkDrops.length - 1];
  for (let i = 0; i < drop.density; i++) {
    let angle = random(TWO_PI);
    let d = random(drop.size);
    drop.fibers.push({
      ox: cos(angle) * d,
      oy: sin(angle) * d,
      dx: 0,
      dy: 0,
      alpha: random(150, 255),
      w: random(1, 4)
    });
  }
}

function draw() {
  // Draw paper background
  image(paperTexture, 0, 0);
  
  // Update and draw ink
  for (let drop of inkDrops) {
    if (drop.done) continue;
    
    drop.age++;
    
    // Grow the ink
    if (drop.size < drop.maxSize) {
      drop.size += drop.growth;
    }
    
    // Draw ink particles with fiber guidance
    noStroke();
    
    for (let fiber of drop.fibers) {
      // Fiber creates organic spread pattern
      let noiseVal = noise(
        fiber.ox * 0.01 + drop.x * 0.005 + time * 0.1,
        fiber.oy * 0.01 + drop.y * 0.005 + time * 0.1
      );
      
      // Probabilistic spread along fibers
      if (noiseVal > 0.3 || random() < 0.1) {
        let spread = map(noiseVal, 0, 1, 0.5, 2);
        fiber.dx += (noiseVal - 0.5) * 0.5;
        fiber.dy += (noiseVal - 0.5) * 0.5;
      }
      
      // Damping
      fiber.dx *= 0.98;
      fiber.dy *= 0.98;
      
      let px = drop.x + fiber.ox * (drop.size / drop.maxSize) + fiber.dx;
      let py = drop.y + fiber.oy * (drop.size / drop.maxSize) + fiber.dy;
      
      // Ink density varies
      let alpha = fiber.alpha * (1 - drop.age / 800);
      alpha *= map(drop.size / drop.maxSize, 0, 1, 0.3, 1);
      
      // Color gradient from dark center to lighter edges
      let dx = px - drop.x;
      let dy = py - drop.y;
      let d = sqrt(dx*dx + dy*dy) / drop.size;
      let r = 20 + d * 30;
      let g = 20 + d * 25;
      let b = 25 + d * 20;
      
      fill(r, g, b, alpha * 0.15);
      ellipse(px, py, fiber.w * spread, fiber.w * spread);
    }
    
    // Add wispy edges
    if (drop.age % 3 === 0 && drop.size < drop.maxSize * 0.9) {
      for (let i = 0; i < 3; i++) {
        let angle = random(TWO_PI);
        let r = drop.size * random(0.8, 1.2);
        let px = drop.x + cos(angle) * r;
        let py = drop.y + sin(angle) * r;
        
        fill(30, 25, 20, random(5, 20));
        ellipse(px, py, random(2, 8), random(2, 8));
      }
    }
    
    // Mark as done
    if (drop.age > 600 && drop.size >= drop.maxSize) {
      drop.done = true;
    }
  }
  
  // Add occasional drips
  if (frameCount % 60 === 0 && frameCount < 300) {
    let x = random(width * 0.1, width * 0.9);
    let y = random(height * 0.1, height * 0.9);
    addInkDrop(x, y, random(15, 40));
  }
  
  time += 0.01;
  
  // Add subtle vignette
  let vignette = createGraphics(width, height);
  for (let r = max(width, height); r > 0; r -= 10) {
    let alpha = map(r, 0, max(width, height), 30, 0);
    vignette.noStroke();
    vignette.fill(245, 240, 230, alpha);
    vignette.ellipse(width/2, height/2, r * 2, r * 2);
  }
  image(vignette, 0, 0);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  paperTexture = createGraphics(width, height);
  generatePaperTexture();
}

function mousePressed() {
  addInkDrop(mouseX, mouseY, random(20, 50));
}
</script>
</body>
</html>
