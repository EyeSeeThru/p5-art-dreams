<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Discharge</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Tesla Discharge - Electrical discharge simulation with branching lightning
let branches = [];
let coils = [];
let particles = [];
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Create two Tesla coils
  coils.push(new TeslaCoil(width * 0.3, height * 0.85, 120));
  coils.push(new TeslaCoil(width * 0.7, height * 0.85, 120));
}

function draw() {
  background(240, 30, 5, 15);
  time += 0.02;
  
  // Draw coils
  for (let coil of coils) {
    coil.update();
    coil.display();
  }
  
  // Random lightning discharge
  if (frameCount % 8 === 0) {
    for (let coil of coils) {
      if (random() > 0.6) {
        branches.push(new Lightning(coil.x, coil.topY));
      }
    }
  }
  
  // Update and draw lightning branches
  for (let i = branches.length - 1; i >= 0; i--) {
    branches[i].update();
    branches[i].display();
    if (branches[i].done) {
      // Spawn particles at end
      for (let j = 0; j < 5; j++) {
        particles.push(new Particle(branches[i].endX, branches[i].endY));
      }
      branches.splice(i, 1);
    }
  }
  
  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();
    if (particles[i].life <= 0) {
      particles.splice(i, 1);
    }
  }
  
  // Ground glow
  noStroke();
  for (let i = 0; i < 5; i++) {
    let alpha = map(i, 0, 5, 30, 0);
    fill(280, 80, 80, alpha);
    ellipse(width/2, height, width * 0.8 - i * 50, 100 - i * 15);
  }
}

class TeslaCoil {
  constructor(x, baseHeight, h) {
    this.x = x;
    this.baseY = baseHeight;
    this.h = h;
    this.topY = this.baseY - this.h;
    this.pulse = 0;
    this.coilTurns = 20;
  }
  
  update() {
    this.pulse += 0.1;
  }
  
  display() {
    // Base
    fill(30);
    noStroke();
    ellipse(this.x, this.baseY + 20, 80, 30);
    
    // Tower
    stroke(60);
    strokeWeight(8);
    line(this.x, this.baseY, this.x, this.topY);
    
    // Coil turns
    strokeWeight(2);
    for (let i = 0; i < this.coilTurns; i++) {
      let y = map(i, 0, this.coilTurns, this.baseY, this.topY);
      let offset = sin(i * 0.5 + time) * 3;
      line(this.x - 10 + offset, y, this.x + 10 + offset, y);
    }
    
    // Top sphere
    noStroke();
    let glowSize = 30 + sin(this.pulse) * 5;
    for (let i = 3; i > 0; i--) {
      fill(280, 80, 100, 10);
      ellipse(this.x, this.topY, glowSize + i * 20);
    }
    fill(280, 60, 100);
    ellipse(this.x, this.topY, glowSize);
    
    // Spark at tip
    if (sin(this.pulse) > 0.8) {
      fill(280, 20, 100, 80);
      let sparkLen = random(10, 30);
      let angle = random(TWO_PI);
      ellipse(this.x + cos(angle) * sparkLen, this.topY + sin(angle) * sparkLen, 5);
    }
  }
}

class Lightning {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.segments = [];
    this.endX = x;
    this.endY = y;
    this.done = false;
    this.life = 1;
    this.maxGen = floor(random(8, 15));
    this.currentGen = 0;
    this.branches = [];
    
    this.generate(x, y, -PI/2, 0);
  }
  
  generate(x, y, angle, gen) {
    if (gen > this.maxGen || y > height * 0.9) {
      this.endX = x;
      this.endY = y;
      this.done = true;
      return;
    }
    
    let len = random(15, 40) * (1 - gen * 0.08);
    let newAngle = angle + random(-0.4, 0.4);
    let endX = x + cos(newAngle) * len;
    let endY = y + sin(newAngle) * len;
    
    this.segments.push({x1: x, y1: y, x2: endX, y2: endY, gen: gen});
    
    // Chance to branch
    if (random() > 0.6 && gen < this.maxGen - 2) {
      this.branches.push({x: endX, y: endY, angle: newAngle + random(-0.8, 0.8), gen: gen + 2});
    }
    
    this.generate(endX, endY, newAngle, gen + 1);
    
    // Process sub-branches
    for (let b of this.branches) {
      this.generate(b.x, b.y, b.angle, b.gen);
    }
  }
  
  update() {
    this.life -= 0.03;
    if (this.life <= 0) this.done = true;
  }
  
  display() {
    for (let seg of this.segments) {
      let alpha = this.life * map(seg.gen, 0, this.maxGen, 100, 30);
      let weight = map(seg.gen, 0, this.maxGen, 4, 1);
      
      // Glow
      stroke(280, 80, 100, alpha * 0.3);
      strokeWeight(weight + 6);
      line(seg.x1, seg.y1, seg.x2, seg.y2);
      
      // Core
      stroke(280, 20, 100, alpha);
      strokeWeight(weight);
      line(seg.x1, seg.y1, seg.x2, seg.y2);
    }
  }
}

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.vx = random(-3, 3);
    this.vy = random(-5, -1);
    this.life = 1;
    this.size = random(2, 6);
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.1;
    this.life -= 0.02;
  }
  
  display() {
    noStroke();
    let hue = (280 + this.life * 60) % 360;
    fill(hue, 40, 100, this.life * 80);
    ellipse(this.x, this.y, this.size * this.life);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  coils = [];
  setup();
}
</script>
</body>
</html>
