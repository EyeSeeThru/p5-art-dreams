<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Interference</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Wave Interference — Double-Slit Experiment Demonstration
// RED AND BLACK version
// Background: pure black (0,0,0)
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100

let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
}

function draw() {
  // Pure black background
  background(0, 0, 0);
  
  let wavelength = 15;
  let slitSeparation = 80;
  
  let mode = floor(t / 400) % 3;
  
  if (mode === 0) {
    // Mode 1: Interference pattern on screen
    let screenX = width * 0.8;
    let screenY = height / 2;
    
    // Draw screen
    noStroke();
    fill(10, 30, 50);
    rect(screenX - 5, screenY - 150, 10, 300);
    
    // Draw slits - VIVID RED
    fill(10, 70, 80);
    ellipse(width * 0.2, height/2 - slitSeparation/2, 8, 8);
    ellipse(width * 0.2, height/2 + slitSeparation/2, 8, 8);
    
    // Draw rays - dim red
    stroke(10, 30, 40, 50);
    strokeWeight(1);
    line(width * 0.2, height/2 - slitSeparation/2, screenX, screenY - 100);
    line(width * 0.2, height/2 + slitSeparation/2, screenX, screenY + 100);
    
    // Calculate interference pattern - RED
    noStroke();
    for (let y = 0; y < 300; y++) {
      let screenPos = (y - 150) / 100;
      let pathDiff = slitSeparation * screenPos;
      let phase = (2 * Math.PI * pathDiff) / wavelength;
      let intensity = Math.cos(phase/2) * Math.cos(phase/2);
      
      let brightness = intensity * 100;
      fill(10, 60, brightness + 30);
      rect(screenX, screenY - 150 + y, 8, 1);
    }
    
    fill(10, 60, 85);
    textSize(11);
    textAlign(LEFT, TOP);
    text("Wave Interference — Double Slit", 10, 10);
    text("I ∝ cos²(π d sin(θ) / λ)", 10, 24);
    text("Constructive: path difference = mλ | Destructive: path difference = (m+½)λ", 10, 38);
    text("Demonstrates wave nature of light", 10, 52);
    
  } else if (mode === 1) {
    // Mode 2: Ripple tank
    let centerX = width / 2;
    let centerY = height / 2;
    
    let src1X = centerX - 60;
    let src1Y = centerY;
    let src2X = centerX + 60;
    let src2Y = centerY;
    
    // Draw wave field - RED
    for (let x = 0; x < width; x += 4) {
      for (let y = 0; y < height; y += 4) {
        let d1 = Math.sqrt((x - src1X)**2 + (y - src1Y)**2);
        let d2 = Math.sqrt((x - src2X)**2 + (y - src2Y)**2);
        
        let phase1 = (d1 / wavelength) * 2 * Math.PI + t * 0.05;
        let phase2 = (d2 / wavelength) * 2 * Math.PI + t * 0.05;
        
        let wave1 = Math.sin(phase1);
        let wave2 = Math.sin(phase2);
        let combined = (wave1 + wave2) / 2;
        
        let intensity = Math.abs(combined);
        fill(10, 40 + intensity * 30, 30 + intensity * 40);
        rect(x, y, 4, 4);
      }
    }
    
    // Draw sources - VIVID RED
    fill(10, 70, 85);
    noStroke();
    ellipse(src1X, src1Y, 10, 10);
    ellipse(src2X, src2Y, 10, 10);
    
    fill(10, 60, 85);
    textSize(11);
    textAlign(LEFT, TOP);
    text("Wave Superposition — Ripple Tank", 10, 10);
    text("Two coherent sources with overlapping wavefronts", 10, 24);
    text("Constructive (bright) and destructive (dark) interference", 10, 38);
    
  } else {
    // Mode 3: Single slit diffraction
    let slitWidth = 40;
    
    // Draw slit - VIVID RED
    fill(10, 70, 80);
    noStroke();
    for (let y = height/2 - slitWidth/2; y <= height/2 + slitWidth/2; y += 5) {
      ellipse(width * 0.15, y, 4, 4);
    }
    
    // Draw screen
    fill(10, 30, 50);
    rect(width * 0.85 - 5, height/2 - 150, 10, 300);
    
    // Single slit diffraction - RED
    noStroke();
    for (let y = 0; y < 300; y++) {
      let screenPos = (y - 150) / 80;
      let beta = (Math.PI * slitWidth * screenPos) / wavelength;
      let sinc = beta === 0 ? 1 : Math.sin(beta) / beta;
      let intensity = sinc * sinc;
      
      let brightness = intensity * 100;
      fill(10, 60, brightness + 30);
      rect(width * 0.85, height/2 - 150 + y, 8, 1);
    }
    
    fill(10, 60, 85);
    textSize(11);
    textAlign(LEFT, TOP);
    text("Single Slit Diffraction — sinc² Pattern", 10, 10);
    text("β = (π a sin(θ)) / λ, I = sin²(β)/β²", 10, 24);
    text("Central maximum widest, side minima at β = mπ", 10, 38);
  }
  
  fill(10, 50, 70);
  textAlign(RIGHT, TOP);
  text("Modes cycle automatically", width - 10, 10);
  
  fill(10, 60, 75);
  textAlign(LEFT, BOTTOM);
  text("Wave Interference: the double-slit experiment that revealed wave-particle duality", 10, height - 10);
  
  t++;
}
</script>
</body>
</html>
