<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cycloid Dreams</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Cycloid Dreams - Epitrochoids, Hypotrochoids, and Cycloids
let t = 0;
const RO = 4; // Radius of rolling circle
let R, r, d; // Parameters
let numCurves = 12;
let colors = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  
  // Generate varied colors
  for (let i = 0; i < numCurves; i++) {
    let hue = (i * 360 / numCurves + 180) % 360;
    colors.push({
      h: hue,
      s: 70 + sin(i * 0.7) * 20,
      b: 80 + sin(i * 1.1) * 15
    });
  }
  
  R = width * 0.08; // Radius of fixed circle
  r = R * (0.3 + 0.4 * sin(0)); // Rolling circle radius varies
  d = R * 1.5; // Distance from center of rolling circle to drawing point
}

function draw() {
  background(10, 10, 15, 25);
  
  translate(width / 2, height / 2);
  
  let maxT = TWO_PI * (R / gcd(R, r));
  
  // Draw multiple curves with different parameters
  for (let c = 0; c < numCurves; c++) {
    let phase = c * TWO_PI / numCurves;
    let localR = R * (0.2 + 0.8 * sin(c * 0.5 + t * 0.1));
    let localD = R * (0.5 + 1.5 * cos(c * 0.3 + t * 0.05));
    
    let col = colors[c];
    let colObj = color(`hsb(${col.h}, ${col.s}%, ${col.b}%)`);
    stroke(colObj);
    strokeWeight(1.5);
    noFill();
    
    beginShape();
    for (let i = 0; i <= 500; i++) {
      let angle = (i / 500) * maxT * 2 + phase;
      
      // Hypotrochoid formula
      let x = (R - localR) * cos(angle) + localD * cos(((R - localR) / localR) * angle);
      let y = (R - localR) * sin(angle) - localD * sin(((R - localR) / localR) * angle);
      
      // Add some noise for organic feel
      let nx = x + sin(angle * 3 + t + c) * 5;
      let ny = y + cos(angle * 2 + t * 0.7 + c) * 5;
      
      vertex(nx, ny);
    }
    endShape();
  }
  
  // Central glowing orb
  noStroke();
  for (let i = 5; i > 0; i--) {
    let alpha = 30 - i * 5;
    let size = i * 8 + sin(t * 2) * 5;
    fill(200, 220, 255, alpha);
    ellipse(0, 0, size, size);
  }
  
  // Draw rolling circle guides (subtle)
  stroke(255, 30);
  strokeWeight(1);
  noFill();
  ellipse(0, 0, R * 2, R * 2);
  
  t += 0.02;
}

function gcd(a, b) {
  a = abs(a);
  b = abs(b);
  while (b) {
    let t = b;
    b = a % b;
    a = t;
  }
  return a;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  R = width * 0.08;
}
</script>
</body>
</html>
