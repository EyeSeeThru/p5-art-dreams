<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hopfield Memory</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #191919; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Hopfield Memory — Neural network associative memory visualization
// RED AND BLACK version - energy minimization in attractor networks
// Background: rgb(25,25,25) minimum
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100

const BG_R = 25, BG_G = 25, BG_B = 25;

let N = 20;
let neurons = [];
let weights = [];
let patterns = [];
let currentPattern = [];
let energy = 0;
let phase = 0;
let timer = 0;
let currentTarget = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  initNetwork();
}

function initNetwork() {
  N = min(floor(width / 25), floor(height / 25));
  N = min(N, 25);
  N = max(N, 10);
  
  neurons = [];
  weights = [];
  patterns = [];
  
  for (let i = 0; i < N; i++) {
    neurons[i] = [];
    for (let j = 0; j < N; j++) {
      neurons[i][j] = (random() < 0.5) ? 1 : -1;
    }
  }
  
  for (let i = 0; i < N; i++) {
    weights[i] = [];
    for (let j = 0; j < N; j++) {
      weights[i][j] = 0;
    }
  }
  
  let initialPattern = [];
  for (let i = 0; i < N; i++) {
    initialPattern[i] = [];
    for (let j = 0; j < N; j++) {
      initialPattern[i][j] = neurons[i][j];
    }
  }
  patterns.push(initialPattern);
  
  currentPattern = [];
  for (let i = 0; i < N; i++) {
    currentPattern[i] = [];
    for (let j = 0; j < N; j++) {
      currentPattern[i][j] = neurons[i][j];
    }
  }
  
  phase = 0;
  timer = 0;
  currentTarget = 0;
}

function learnPattern(pattern) {
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      if (i !== j) {
        weights[i][j] += pattern[i][j] * pattern[i][j] / N;
      }
    }
  }
}

function recall() {
  let i = floor(random(N));
  let j = floor(random(N));
  
  let sum = 0;
  for (let k = 0; k < N; k++) {
    sum += weights[i][j] * currentPattern[i][k];
  }
  
  neurons[i][j] = (sum >= 0) ? 1 : -1;
  currentPattern[i][j] = neurons[i][j];
}

function calculateEnergy() {
  let E = 0;
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      if (i !== j) {
        E -= weights[i][j] * neurons[i][j] * neurons[i][j];
      }
    }
  }
  return E / 2;
}

function addNoise() {
  let noiseLevel = 0.3;
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      if (random() < noiseLevel) {
        currentPattern[i][j] *= -1;
        neurons[i][j] = currentPattern[i][j];
      }
    }
  }
}

function draw() {
  background(BG_R, BG_G, BG_B);
  
  let cellSize = min(width, height) / N;
  let offsetX = (width - N * cellSize) / 2;
  let offsetY = (height - N * cellSize) / 2;
  
  if (phase === 0) {
    if (patterns.length < 3) {
      let newPattern = [];
      for (let i = 0; i < N; i++) {
        newPattern[i] = [];
        for (let j = 0; j < N; j++) {
          let x = i / N;
          let y = j / N;
          let val;
          if (patterns.length === 1) {
            val = (sin(y * PI * 4) > 0) ? 1 : -1;
          } else if (patterns.length === 2) {
            let cx = x - 0.5;
            let cy = y - 0.5;
            val = (sqrt(cx*cx + cy*cy) < 0.3) ? 1 : -1;
          } else {
            val = (x + y > 1) ? 1 : -1;
          }
          newPattern[i][j] = val;
        }
      }
      patterns.push(newPattern);
      learnPattern(newPattern);
    } else {
      phase = 1;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          currentPattern[i][j] = patterns[0][i][j];
          neurons[i][j] = currentPattern[i][j];
        }
      }
      addNoise();
    }
  } else {
    for (let k = 0; k < 10; k++) {
      recall();
    }
    
    timer++;
    if (timer > 300) {
      timer = 0;
      currentTarget = (currentTarget + 1) % patterns.length;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          currentPattern[i][j] = patterns[currentTarget][i][j];
          neurons[i][j] = currentPattern[i][j];
        }
      }
      addNoise();
    }
  }
  
  // Draw neurons - RED color scheme
  noStroke();
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      let x = offsetX + i * cellSize;
      let y = offsetY + j * cellSize;
      
      if (neurons[i][j] === 1) {
        // Active - vivid red
        fill(10, 75, 95, 95);
      } else {
        // Inactive - dark red/maroon
        fill(10, 40, 35, 95);
      }
      
      rect(x + 1, y + 1, cellSize - 2, cellSize - 2);
    }
  }
  
  let E = calculateEnergy();
  fill(10, 30, 80);
  textSize(12);
  textAlign(RIGHT, TOP);
  let phaseText = (phase === 0) ? "Learning" : "Recall";
  text("Hopfield Memory — Phase: " + phaseText + " — Energy: " + nf(E, 2, 1), width - 15, 15);
  
  fill(10, 30, 70);
  text("Patterns stored: " + patterns.length, width - 15, 32);
  text("Target pattern: " + (currentTarget + 1) + "/" + patterns.length, width - 15, 49);
  
  fill(10, 30, 60);
  textAlign(LEFT, TOP);
  text("Click to reset", 15, 15);
}

function mousePressed() {
  initNetwork();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  initNetwork();
}
</script>
</body>
</html>
