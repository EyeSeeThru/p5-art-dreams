<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electrohydrodynamics</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Electrohydrodynamics - Electric field driven fluid patterns
// Simulates electrohydrodynamic flow with charged particles and field lines

let particles = [];
let fieldLines = [];
let numParticles = 800;
let electrodes = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  
  // Create electrodes (charged points)
  for (let i = 0; i < 5; i++) {
    electrodes.push({
      x: width * (0.2 + i * 0.15),
      y: height * 0.3 + sin(i * 1.2) * height * 0.1,
      charge: (i % 2 === 0) ? 1 : -1,
      strength: 80 + i * 20
    });
  }
  
  // Add counter-electrodes at bottom
  for (let i = 0; i < 4; i++) {
    electrodes.push({
      x: width * (0.25 + i * 0.2),
      y: height * 0.75,
      charge: -1,
      strength: 60
    });
  }
  
  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push(createParticle());
  }
}

function createParticle() {
  return {
    x: random(width),
    y: random(height),
    vx: 0,
    vy: 0,
    hue: random(180, 280),
    size: random(2, 6),
    life: random(100, 300),
    maxLife: 0
  };
}

function draw() {
  // Dark background with slight trails
  fill(10, 10, 15, 0.15);
  rect(0, 0, width, height);
  
  // Update and draw particles
  for (let p of particles) {
    // Calculate electric field from all electrodes
    let ex = 0, ey = 0;
    
    for (let e of electrodes) {
      let dx = e.x - p.x;
      let dy = e.y - p.y;
      let d2 = dx * dx + dy * dy;
      let d = sqrt(d2) + 10;
      
      // Coulomb-like field with softening
      let strength = e.charge * e.strength / (d * d) * 1000;
      ex += (dx / d) * strength;
      ey += (dy / d) * strength;
    }
    
    // Add some noise for fluid-like behavior
    let noiseScale = 0.005;
    let nx = (noise(p.x * noiseScale, p.y * noiseScale, frameCount * 0.01) - 0.5) * 2;
    let ny = (noise(p.x * noiseScale + 100, p.y * noiseScale, frameCount * 0.01) - 0.5) * 2;
    
    // Apply forces
    p.vx += ex * 0.5 + nx;
    p.vy += ey * 0.5 + ny;
    
    // Damping
    p.vx *= 0.96;
    p.vy *= 0.96;
    
    // Update position
    p.x += p.vx;
    p.y += p.vy;
    
    // Life cycle
    p.life--;
    
    // Wrap around edges
    if (p.x < 0) p.x = width;
    if (p.x > width) p.x = 0;
    if (p.y < 0) p.y = height;
    if (p.y > height) p.y = 0;
    
    // Respawn if dead
    if (p.life <= 0) {
      Object.assign(p, createParticle());
    }
    
    // Draw particle
    let alpha = map(p.life, 0, p.maxLife || 100, 0, 0.8);
    alpha *= map(abs(p.vx) + abs(p.vy), 0, 10, 0.3, 1);
    
    fill(p.hue, 80, 100, alpha);
    ellipse(p.x, p.y, p.size);
  }
  
  // Draw electrodes
  for (let e of electrodes) {
    // Glow effect
    for (let r = 60; r > 0; r -= 10) {
      let alpha = map(r, 60, 0, 0.02, 0.3);
      fill(e.charge > 0 ? 320 : 200, 80, 100, alpha);
      ellipse(e.x, e.y, r * 2);
    }
    
    // Core
    fill(e.charge > 0 ? 320 : 200, 90, 100, 0.9);
    ellipse(e.x, e.y, 12);
  }
  
  // Draw field lines occasionally
  if (frameCount % 3 === 0) {
    let startElectrode = random(electrodes);
    let px = startElectrode.x;
    let py = startElectrode.y;
    
    beginShape();
    noFill();
    stroke(startElectrode.charge > 0 ? 280 : 180, 60, 100, 0.15);
    strokeWeight(1);
    
    for (let i = 0; i < 40; i++) {
      // Calculate field at this point
      let ex = 0, ey = 0;
      for (let e of electrodes) {
        let dx = e.x - px;
        let dy = e.y - py;
        let d2 = dx * dx + dy * dy;
        let d = sqrt(d2) + 10;
        let strength = e.charge * e.strength / (d * d) * 1000;
        ex += (dx / d) * strength;
        ey += (dy / d) * strength;
      }
      
      let mag = sqrt(ex * ex + ey * ey) + 0.1;
      px += (ex / mag) * 8;
      py += (ey / mag) * 8;
      
      vertex(px, py);
      
      if (px < 0 || px > width || py < 0 || py > height) break;
    }
    endShape();
    noStroke();
  }
  
  // Title
  fill(255);
  textSize(14);
  textAlign(RIGHT, BOTTOM);
  text('electrohydrodynamics', width - 20, height - 20);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
