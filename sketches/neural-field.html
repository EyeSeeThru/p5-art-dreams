<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Field</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Neural Field — Turing Patterns in Neural Tissue
// RED AND BLACK version
// Background: pure black (0,0,0)
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100
// Mathematical concept: Amari-S Griffith neural field model

let field = [];
let nextField = [];
let width = 100;
let height = 100;
let scale = 6;
let t = 0;

// Neural field parameters
const tau = 1.0;
const beta = 10;
const theta = 0;

function kernel(x, y) {
  let r = Math.sqrt(x*x + y*y);
  let sigmaE = 8;
  let sigmaI = 20;
  let A_E = 1.0;
  let A_I = 0.5;
  return A_E * Math.exp(-r*r/(2*sigmaE*sigmaE)) - A_I * Math.exp(-r*r/(2*sigmaI*sigmaI));
}

let kernel2D = [];

function initKernel() {
  kernel2D = [];
  let kSize = 25;
  for (let dy = -kSize; dy <= kSize; dy++) {
    let row = [];
    for (let dx = -kSize; dx <= kSize; dx++) {
      row.push(kernel(dx, dy));
    }
    kernel2D.push(row);
  }
}

function sigmoid(x) {
  return 1 / (1 + Math.exp(-beta * (x - theta)));
}

function initField() {
  field = [];
  for (let y = 0; y < height; y++) {
    let row = [];
    for (let x = 0; x < width; x++) {
      row.push(Math.random() * 2 - 1);
    }
    field.push(row);
  }
  nextField = field.map(row => [...row]);
}

function updateField() {
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      let sum = 0;
      let kSize = 12;
      
      for (let dy = -kSize; dy <= kSize; dy++) {
        for (let dx = -kSize; dx <= kSize; dx++) {
          let nx = x + dx;
          let ny = y + dy;
          if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
            let kVal = kernel2D[dy + 12][dx + 12];
            sum += kVal * sigmoid(field[ny][nx]);
          }
        }
      }
      
      let du = (-field[y][x] + sum) / tau;
      nextField[y][x] = field[y][x] + du * 0.5;
    }
  }
  
  [field, nextField] = [nextField, field];
}

function draw() {
  background(0, 0, 0);
  
  for (let i = 0; i < 3; i++) {
    updateField();
  }
  
  loadPixels();
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      let val = field[y][x];
      let activity = Math.max(0, val);
      let inhibition = Math.min(0, -val);
      
      let px = (x * scale) * 4;
      let py = (y * scale) * 4;
      
      // RED: vivid red for activity, dim red for inhibition
      let r = 10;
      let g = Math.floor(activity * 50) + Math.floor(inhibition * 10);
      let b = Math.floor(activity * 30) + Math.floor(inhibition * 5);
      
      for (let sy = 0; sy < scale; sy++) {
        for (let sx = 0; sx < scale; sx++) {
          let idx = 4 * ((y * scale + sy) * (width * scale) + (x * scale + sx));
          pixels[idx] = r;
          pixels[idx+1] = g;
          pixels[idx+2] = b;
          pixels[idx+3] = 255;
        }
      }
    }
  }
  updatePixels();
  
  noStroke();
  fill(10, 60, 85);
  textSize(11);
  textAlign(LEFT, TOP);
  text("Neural Field — Turing Patterns in Cortical Tissue", 10, 10);
  text("Amari-S Griffith model: u_t = -u + W * f(u)", 10, 24);
  text("Excitatory center, inhibitory surround (Mexican hat kernel)", 10, 38);
  text("Bienenstock-Cooper-Munro theory: activity contrasts develop", 10, 52);
  
  fill(10, 50, 70);
  textAlign(RIGHT, TOP);
  text("Click to perturb | +/- adjusts kernel", width - 10, 10);
  
  t++;
  
  fill(10, 60, 75);
  textAlign(LEFT, BOTTOM);
  text("Neural Field: pattern formation in biological neural networks", 10, height - 10);
}

function mousePressed() {
  let mx = Math.floor(mouseX / scale);
  let my = Math.floor(mouseY / scale);
  if (mx >= 0 && mx < width && my >= 0 && my < height) {
    field[my][mx] = 2;
  }
}
</script>
</body>
</html>
