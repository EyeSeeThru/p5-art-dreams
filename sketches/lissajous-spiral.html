<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lissajous Spiral</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a12; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
let t = 0;
let arms = 5;
let pointsPerArm = 300;
let hueOffset = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
}

function draw() {
  background(240, 20, 8, 30);
  translate(width / 2, height / 2);
  
  let maxR = min(width, height) * 0.42;
  
  for (let arm = 0; arm < arms; arm++) {
    let armAngle = (TWO_PI / arms) * arm;
    let armHue = (arm / arms * 360 + hueOffset) % 360;
    
    for (let i = 0; i < pointsPerArm; i++) {
      let progress = i / pointsPerArm;
      let pt = progress * 40 + t * 0.8;
      
      let spiralAngle = armAngle + progress * PI * 4;
      let r = progress * maxR;
      
      let x = cos(spiralAngle) * r;
      let y = sin(spiralAngle) * r;
      
      let wobble = sin(pt * 3 + arm) * 8;
      x += cos(pt * 2 + arm * 1.3) * wobble;
      y += sin(pt * 2.5 + arm * 0.7) * wobble;
      
      let size = 2 + sin(pt * 4) * 1.5;
      let alpha = 60 + sin(pt * 2 + arm) * 30;
      let hue = (armHue + progress * 180) % 360;
      
      fill(hue, 70, 90, alpha);
      circle(x, y, size);
    }
    
    // Connecting filaments
    for (let i = 0; i < pointsPerArm - 1; i++) {
      let progress = i / pointsPerArm;
      let nextProgress = (i + 1) / pointsPerArm;
      let pt = progress * 40 + t * 0.8;
      let ptNext = nextProgress * 40 + t * 0.8;
      
      let spiralAngle = armAngle + progress * PI * 4;
      let r = progress * maxR;
      let x1 = cos(spiralAngle) * r;
      let y1 = sin(spiralAngle) * r;
      
      let spiralAngleNext = armAngle + nextProgress * PI * 4;
      let rNext = nextProgress * maxR;
      let x2 = cos(spiralAngleNext) * rNext;
      let y2 = sin(spiralAngleNext) * rNext;
      
      let alpha = 15 + sin(pt * 2) * 10;
      stroke(armHue, 60, 80, alpha);
      strokeWeight(0.5);
      line(x1, y1, x2, y2);
    }
  }
  
  // Central glow
  noStroke();
  for (let i = 5; i > 0; i--) {
    fill(280, 80, 100, 3);
    circle(0, 0, i * 20);
  }
  
  t += 0.015;
  hueOffset = (hueOffset + 0.3) % 360;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
