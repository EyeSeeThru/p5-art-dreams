<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabor Patches</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Gabor Patches - Visual perception inspired optical patterns
// Each patch is a Gaussian windowed sine wave (Gabor function)

const SCALE = 6;
const AMPLITUDE = 1.0;
const SIGMA = 18;

let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  pixelDensity(1);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function gabor(x, y, freq, angle, phase, sigma) {
  // Rotation
  let xr = x * cos(angle) + y * sin(angle);
  let yr = -x * sin(angle) + y * cos(angle);
  
  // Gaussian envelope
  let gaussian = exp(-(xr * xr + yr * yr) / (2 * sigma * sigma));
  
  // Sine grating
  let sine = sin(2 * PI * freq * xr + phase);
  
  return gaussian * sine;
}

function draw() {
  background(0, 0, 5);
  
  let cols = ceil(width / SCALE / 60);
  let rows = ceil(height / SCALE / 60);
  
  let offsetX = (width - cols * 60 * SCALE) / 2;
  let offsetY = (height - rows * 60 * SCALE) / 2;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let cx = offsetX + (i + 0.5) * 60 * SCALE;
      let cy = offsetY + (j + 0.5) * 60 * SCALE;
      
      let freq = map(i, 0, cols, 0.02, 0.12);
      let angle = (i / cols) * PI + (j / rows) * PI * 0.5;
      let phase = time * 0.5 + (i + j) * 0.3;
      let sigmaMult = map(j, 0, rows, 0.8, 1.8);
      
      let patchSize = 45 * SCALE * sigmaMult;
      
      for (let px = -patchSize; px <= patchSize; px += SCALE) {
        for (let py = -patchSize; py <= patchSize; py += SCALE) {
          let val = gabor(px, py, freq, angle, phase, SIGMA * sigmaMult);
          
          // Map -1..1 to visual range
          let bright = map(val, -1, 1, 0, 100);
          let hue = map(i, 0, cols, 180, 300);
          let sat = map(abs(val), 0, 1, 20, 70);
          
          fill(hue, sat, bright, 90);
          rect(cx + px, cy + py, SCALE, SCALE);
        }
      }
      
      // Glowing center dot
      let dotBright = map(sin(time * 2 + i + j), -1, 1, 60, 100);
      fill(60, 80, dotBright, 70);
      ellipse(cx, cy, 12, 12);
    }
  }
  
  // Vignette overlay
  drawVignette();
  
  time += 0.02;
  
  if (frameCount % 60 === 0) {
    console.log(frameRate());
  }
}

function drawVignette() {
  // Radial gradient vignette
  let ctx = drawingContext;
  let gradient = ctx.createRadialGradient(
    width/2, height/2, height * 0.3,
    width/2, height/2, height * 0.9
  );
  gradient.addColorStop(0, 'rgba(10, 10, 15, 0)');
  gradient.addColorStop(1, 'rgba(10, 10, 15, 0.7)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
}
</script>
</body>
</html>
