<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soap Film Interference</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Soap Film Interference - Thin film iridescence simulation
// Based on the physics of light interference in thin films

let t = 0;
const filmThickness = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
  
  // Initialize film thickness field
  for (let i = 0; i < 30; i++) {
    filmThickness.push({
      x: random(width),
      y: random(height),
      r: random(100, 300),
      speed: random(0.5, 2),
      phaseAngle: random(TWO_PI),
      thickness: random(200, 600)
    });
  }
}

function draw() {
  background(0);
  t += 0.01;
  
  // Draw interfering soap film regions
  for (let i = 0; i < filmThickness.length; i++) {
    let f = filmThickness[i];
    
    // Animate thickness variation
    let thickness = f.thickness + sin(t * f.speed + f.phaseAngle) * 150;
    
    // Draw interference pattern
    for (let r = 0; r < f.r; r += 3) {
      // Thin film interference formula
      // Path difference = 2 * n * d * cos(theta)
      // n = refractive index (soap ~1.33)
      // d = film thickness
      
      let pathDiff = 2 * 1.33 * thickness * cos(r / f.r * PI / 4);
      let wavelength = map(r, 0, f.r, 380, 750); // nm
      let phaseVal = (pathDiff / wavelength) * TWO_PI;
      
      // Interference intensity
      let intensity = cos(phaseVal) * 0.5 + 0.5;
      intensity *= map(r, 0, f.r, 1, 0.3); // Fade at edges
      
      // Convert wavelength to RGB approximation
      let col = wavelengthToRGB(wavelength);
      
      fill(col.h, col.s * intensity, col.b * intensity, 0.6);
      ellipse(f.x, f.y, r, r);
    }
  }
  
  // Add interference between overlapping regions
  blendMode(ADD);
  for (let i = 0; i < 15; i++) {
    let x1 = random(width);
    let y1 = random(height);
    let x2 = random(width);
    let y2 = random(height);
    let d = dist(x1, y1, x2, y2);
    
    if (d < 400) {
      let overlap = map(d, 0, 400, 1, 0);
      for (let r = 0; r < 200; r += 4) {
        let angle = atan2(y2 - y1, x2 - x1);
        let wobble = sin(t * 2 + r * 0.05) * 20;
        let px = lerp(x1, x2, r / 200) + cos(angle + PI/2) * wobble;
        let py = lerp(y1, y2, r / 200) + sin(angle + PI/2) * wobble;
        
        let interference = sin(r * 0.1 - t * 3) * 0.5 + 0.5;
        fill(200 + interference * 60, 80, 80 * overlap, 0.3 * overlap);
        ellipse(px, py, 8, 8);
      }
    }
  }
  blendMode(BLEND);
  
  // Add subtle color cycling
  let globalHue = (t * 10) % 360;
  fill(globalHue, 20, 10, 0.05);
  rect(0, 0, width, height);
}

// Approximate wavelength to RGB conversion
function wavelengthToRGB(wavelength) {
  let r, g, b;
  
  if (wavelength >= 380 && wavelength < 440) {
    r = -(wavelength - 440) / (440 - 380);
    g = 0;
    b = 1;
  } else if (wavelength >= 440 && wavelength < 490) {
    r = 0;
    g = (wavelength - 440) / (490 - 440);
    b = 1;
  } else if (wavelength >= 490 && wavelength < 510) {
    r = 0;
    g = 1;
    b = -(wavelength - 510) / (510 - 490);
  } else if (wavelength >= 510 && wavelength < 580) {
    r = (wavelength - 510) / (580 - 510);
    g = 1;
    b = 0;
  } else if (wavelength >= 580 && wavelength < 645) {
    r = 1;
    g = -(wavelength - 645) / (645 - 580);
    b = 0;
  } else if (wavelength >= 645 && wavelength <= 750) {
    r = 1;
    g = 0;
    b = 0;
  } else {
    r = 0;
    g = 0;
    b = 0;
  }
  
  // Intensity adjustment at edges
  let factor;
  if (wavelength >= 380 && wavelength < 420) {
    factor = 0.3 + 0.7 * (wavelength - 380) / (420 - 380);
  } else if (wavelength >= 420 && wavelength <= 700) {
    factor = 1;
  } else if (wavelength > 700 && wavelength <= 750) {
    factor = 0.3 + 0.7 * (750 - wavelength) / (750 - 700);
  } else {
    factor = 0;
  }
  
  return {
    h: map(wavelength, 380, 750, 260, 0),
    s: 70 * factor,
    b: 100 * factor
  };
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  filmThickness.length = 0;
  for (let i = 0; i < 30; i++) {
    filmThickness.push({
      x: random(width),
      y: random(height),
      r: random(100, 300),
      speed: random(0.5, 2),
      phaseAngle: random(TWO_PI),
      thickness: random(200, 600)
    });
  }
}
</script>
</body>
</html>
