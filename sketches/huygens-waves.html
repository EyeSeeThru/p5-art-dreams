<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huygens Waves</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const CELL_SIZE = 4;
const DAMPING = 0.992;
let cols, rows;
let current, previous;
let sources = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  cols = Math.ceil(width / CELL_SIZE);
  rows = Math.ceil(height / CELL_SIZE);
  current = new Float32Array(cols * rows);
  previous = new Float32Array(cols * rows);
  
  // Add multiple wave sources
  sources.push({ x: width * 0.3, y: height * 0.4, phase: 0 });
  sources.push({ x: width * 0.7, y: height * 0.6, phase: PI * 0.7 });
  sources.push({ x: width * 0.5, y: height * 0.5, phase: PI * 1.3 });
  
  colorMode(HSB, 360, 100, 100);
  noStroke();
}

function draw() {
  // Excitation from sources
  for (let s of sources) {
    let col = Math.floor(s.x / CELL_SIZE);
    let row = Math.floor(s.y / CELL_SIZE);
    let idx = row * cols + col;
    let wave = sin(frameCount * 0.08 + s.phase) * 300;
    if (idx >= 0 && idx < current.length) {
      current[idx] += wave;
    }
  }
  
  // Wave equation simulation
  for (let i = 1; i < cols - 1; i++) {
    for (let j = 1; j < rows - 1; j++) {
      let idx = j * cols + i;
      let val = (
        previous[idx - 1] +
        previous[idx + 1] +
        previous[idx - cols] +
        previous[idx + cols]
      ) / 2 - current[idx];
      current[idx] = val * DAMPING;
    }
  }
  
  // Swap buffers
  let temp = previous;
  previous = current;
  current = temp;
  
  // Render
  loadPixels();
  for (let j = 0; j < rows; j++) {
    for (let i = 0; i < cols; i++) {
      let val = current[j * cols + i];
      let hue = map(sin(val * 0.02), -1, 1, 180, 280);
      let sat = map(abs(val), 0, 100, 30, 90);
      let bri = map(abs(val), 0, 150, 20, 100);
      bri = constrain(bri, 0, 100);
      
      let c = color(hue, sat, bri);
      
      let pixIdx = (j * CELL_SIZE * width + i * CELL_SIZE) * 4;
      for (let dy = 0; dy < CELL_SIZE; dy++) {
        for (let dx = 0; dx < CELL_SIZE; dx++) {
          let px = (j * CELL_SIZE + dy) * width + (i * CELL_SIZE + dx);
          if (px < pixels.length / 4) {
            let ci = px * 4;
            pixels[ci] = red(c);
            pixels[ci + 1] = green(c);
            pixels[ci + 2] = blue(c);
            pixels[ci + 3] = 255;
          }
        }
      }
    }
  }
  updatePixels();
  
  // Draw source markers
  for (let s of sources) {
    fill(0, 0, 100, 0.8);
    ellipse(s.x, s.y, 8, 8);
  }
  
  if (frameCount > 600) noLoop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = Math.ceil(width / CELL_SIZE);
  rows = Math.ceil(height / CELL_SIZE);
  current = new Float32Array(cols * rows);
  previous = new Float32Array(cols * rows);
}
</script>
</body>
</html>
