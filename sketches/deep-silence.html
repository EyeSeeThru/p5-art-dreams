<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Deep Silence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #010101; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Deep Silence — Near-total darkness with the faintest breathing light
// The quiet between heartbeats
// Meditative, minimal, almost empty

let t = 0;
let breathPhase = 0;
let subtleParticles = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);

  // Initialize subtle particles
  for (let i = 0; i < 30; i++) {
    subtleParticles.push({
      x: random(width),
      y: random(height),
      size: random(1, 3),
      alpha: random(0.02, 0.08),
      speed: random(0.0003, 0.001),
      phase: random(TWO_PI)
    });
  }
}

function draw() {
  // Near-black background with slight warmth
  background(3, 3, 5);

  t += 0.008;
  breathPhase = sin(t * 0.3) * 0.5 + 0.5; // 0 to 1 to 0

  // Draw subtle particles
  drawSubtleParticles();

  // Central breathing glow
  drawBreathingGlow();

  // Faint horizon line
  drawHorizon();

  // Very subtle vignette
  drawVignette();

  // Click creates brief flash
}

function drawSubtleParticles() {
  noStroke();

  for (let p of subtleParticles) {
    let alpha = p.alpha * (0.5 + breathPhase * 0.5);

    // Subtle movement
    p.y -= p.speed;
    p.x += sin(t * 0.5 + p.phase) * 0.1;

    // Wrap vertically
    if (p.y < -10) {
      p.y = height + 10;
      p.x = random(width);
    }

    // Draw with glow
    let glowSize = p.size * 4;
    fill(50, 40, 70, alpha * 0.2);
    ellipse(p.x, p.y, glowSize, glowSize);
    fill(120, 80, 160, alpha);
    ellipse(p.x, p.y, p.size, p.size);
  }
}

function drawBreathingGlow() {
  let centerX = width / 2;
  let centerY = height / 2;

  // Very subtle central glow
  let glowIntensity = 0.015 * breathPhase;

  noStroke();

  // Outer glow layers
  for (let i = 5; i >= 0; i--) {
    let size = 100 + i * 60;
    let alpha = glowIntensity * (1 - i / 6) * 0.5;

    fill(20, 25, 40, alpha);
    ellipse(centerX, centerY, size, size * 0.6);
  }

  // Core - barely visible warm center
  if (breathPhase > 0.3) {
    let coreAlpha = (breathPhase - 0.3) * 0.03;
    fill(50, 35, 45, coreAlpha);
    ellipse(centerX, centerY, 30, 20);
  }
}

function drawHorizon() {
  // Extremely faint horizon line
  let horizonY = height * 0.55;

  noStroke();

  // Gradient fade at edges
  for (let x = 0; x < width; x += 2) {
    let distFromCenter = abs(x - width / 2) / (width / 2);
    let alpha = 0.02 * (1 - distFromCenter * distFromCenter) * (0.3 + breathPhase * 0.3);

    stroke(15, 18, 30, alpha);
    point(x, horizonY);
  }
}

function drawVignette() {
  // Subtle vignette overlay using shapes instead of pixel manipulation
  noStroke();
  let maxDist = dist(0, 0, width / 2, height / 2);
  for (let i = 0; i < 8; i++) {
    let edge = i * (maxDist / 8);
    let alpha = map(i, 0, 8, 0, 25);
    fill(0, 0, 0, alpha);
    // Top
    rect(0, 0, width, edge);
    // Bottom
    rect(0, height - edge, width, edge);
    // Left
    rect(0, 0, edge, height);
    // Right
    rect(width - edge, 0, edge, height);
  }
}

function windowResized() {
  // Will resize
}

function mousePressed() {
  // Brief flash on click
  let flashSize = random(50, 150);
  noStroke();

  for (let i = 0; i < 10; i++) {
    let size = flashSize * (1 - i / 10);
    fill(40, 35, 50, 0.1 * (1 - i / 10));
    ellipse(mouseX, mouseY, size, size * 0.8);
  }
}
</script>
</body>
</html>
