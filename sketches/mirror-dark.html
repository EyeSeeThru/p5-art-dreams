<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mirror Dark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #010101; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Mirror Dark — Dark reflective surface with dancing light
// Artistic, mysterious, hypnotic
// The beauty of deep black mirror with occasional light

let time = 0;
let reflections = [];
const NUM_REFLECTIONS = 6;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  for (let i = 0; i < NUM_REFLECTIONS; i++) {
    reflections.push(createReflection());
  }
}

function createReflection(initial = false) {
  return {
    x: random(width),
    y: random(height),
    vx: random(-0.3, 0.3),
    vy: random(-0.2, 0.2),
    size: random(20, 60),
    hue: random(0, 360),
    hueShift: random(0.1, 0.5),
    alpha: random(30, 60),
    phase: random(TWO_PI),
    wobbleFreq: random(0.01, 0.03),
    life: 1, // For fading
    fading: false,
    maxLife: random(200, 400)
  };
}

function draw() {
  // Deep black mirror surface
  background(0, 0, 1);

  // Draw mirror surface texture
  drawMirrorSurface();

  // Update and draw reflections
  for (let ref of reflections) {
    updateReflection(ref);
    drawReflection(ref);
  }

  // Draw occasional light cracks/sparkles
  drawLightCracks();

  // Subtle overall reflection shimmer
  drawShimmer();

  time += 0.016;
}

function drawMirrorSurface() {
  // Very subtle gradient - mirror has depth
  noStroke();
  for (let y = 0; y < height; y += 4) {
    let alpha = abs(sin(y * 0.01 + time * 0.02)) * 0.5;
    fill(220, 5, 3, alpha);
    rect(0, y, width, 4);
  }

  // Horizontal mirror line
  stroke(0, 0, 8, 20);
  strokeWeight(0.5);
  line(0, height * 0.4, width, height * 0.4);
}

function updateReflection(ref) {
  // Gentle drift
  ref.x += ref.vx;
  ref.y += ref.vy;

  // Gentle wobble
  let wobble = sin(time * ref.wobbleFreq * 60 + ref.phase);

  // Hue slowly shifts
  ref.hue = (ref.hue + ref.hueShift) % 360;

  // Life countdown
  if (ref.fading) {
    ref.life -= 0.02;
  } else {
    ref.life = min(ref.life + 0.005, 1);
  }

  // Randomly start fading
  if (!ref.fading && random() < 0.001) {
    ref.fading = true;
  }

  // Boundary bouncing
  if (ref.x < 0 || ref.x > width) ref.vx *= -1;
  if (ref.y < 0 || ref.y > height) ref.vy *= -1;

  // Keep in bounds
  ref.x = constrain(ref.x, 0, width);
  ref.y = constrain(ref.y, 0, height);

  // Reset if life depleted
  if (ref.life <= 0) {
    let newRef = createReflection();
    ref.x = newRef.x;
    ref.y = newRef.y;
    ref.vx = newRef.vx;
    ref.vy = newRef.vy;
    ref.size = newRef.size;
    ref.hue = newRef.hue;
    ref.alpha = newRef.alpha;
    ref.life = 1;
    ref.fading = false;
  }
}

function drawReflection(ref) {
  let wobbleX = sin(time * ref.wobbleFreq * 60 + ref.phase) * 5;
  let wobbleY = cos(time * ref.wobbleFreq * 60 * 0.7 + ref.phase) * 3;
  let x = ref.x + wobbleX;
  let y = ref.y + wobbleY;
  let s = ref.size * ref.life;
  let alpha = ref.alpha * ref.life;

  if (s < 1 || alpha < 1) return;

  noStroke();

  // Glow
  fill(ref.hue, 50, 70, alpha * 0.3);
  ellipse(x, y, s * 3, s * 3);

  // Core
  fill(ref.hue, 30, 90, alpha * 0.5);
  ellipse(x, y, s * 2, s * 2);

  // Bright center
  fill(ref.hue, 10, 100, alpha * 0.8);
  ellipse(x, y, s, s);

  // Sharp point
  fill(0, 0, 100, alpha);
  ellipse(x, y, s * 0.3, s * 0.3);
}

function drawLightCracks() {
  // Occasional light cracks across the mirror
  if (random() < 0.02) {
    stroke(0, 0, 90, random(10, 30));
    strokeWeight(random(0.3, 1));
    let x1 = random(width);
    let y1 = random(height);
    let x2 = x1 + random(-100, 100);
    let y2 = y1 + random(-100, 100);
    line(x1, y1, x2, y2);

    // Branch
    if (random() < 0.5) {
      stroke(0, 0, 70, random(5, 15));
      line(x2, y2, x2 + random(-50, 50), y2 + random(-50, 50));
    }
  }
}

function drawShimmer() {
  // Very subtle overall shimmer
  noStroke();
  for (let i = 0; i < 20; i++) {
    let x = noise(time * 0.02 + i * 100, i * 50) * width;
    let y = noise(time * 0.015 + i * 100 + 200, i * 50) * height;
    let size = noise(time * 0.05 + i * 100, i * 50 + 300) * 20 + 5;
    let alpha = noise(time * 0.03 + i * 100, i * 50 + 400) * 15;

    fill(0, 0, 100, alpha);
    ellipse(x, y, size, size * 0.3);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  // Create burst of reflections at mouse position
  for (let i = 0; i < 5; i++) {
    let ref = createReflection();
    ref.x = mouseX + random(-30, 30);
    ref.y = mouseY + random(-30, 30);
    ref.size = random(15, 40);
    ref.life = 0.5;
    ref.fading = false;
    reflections.push(ref);
  }

  // Limit
  if (reflections.length > NUM_REFLECTIONS * 3) {
    reflections.splice(0, reflections.length - NUM_REFLECTIONS * 3);
  }
}
</script>
</body>
</html>
