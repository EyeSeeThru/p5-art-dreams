<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ash Fall</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #111; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Ash Fall — drifting particles like ash, embers, snow descending through darkness
// Particles respond to subtle wind currents, gather in soft piles at bottom
// Click to spawn bursts of new particles

let particles = [];
const MAX_PARTICLES = 400;
const BG_BRIGHTNESS = 20;

class Ash {
  constructor(x, y, burst = false) {
    this.pos = createVector(x, y);
    // Vary velocity based on burst strength
    let speed = burst ? random(1, 3) : random(0.3, 1.2);
    this.vel = createVector(random(-0.3, 0.3), speed);
    this.acc = createVector(0, 0);
    // Drift and wobble
    this.drift = random(0.01, 0.03);
    this.wobbleSpeed = random(0.01, 0.03);
    this.wobblePhase = random(TWO_PI);
    this.wobbleAmp = random(0.3, 0.8);
    // Visual
    this.size = random(1.5, 4);
    // Brightness varies — mostly dim with occasional brighter embers
    this.brightness = random(80, 180);
    this.alpha = random(100, 220);
    this.life = random(0.3, 1);
    this.maxLife = this.life;
  }
  
  update() {
    // Wind current — slow sinusoidal shift
    let windX = sin(frameCount * 0.002 + this.wobblePhase) * this.wobbleAmp * 0.1;
    windX += sin(frameCount * 0.005 + this.wobblePhase * 2) * this.wobbleAmp * 0.05;
    
    // Apply forces
    this.acc.set(windX * this.drift * 10, 0);
    this.vel.add(this.acc);
    this.vel.y += 0.02; // gentle gravity
    this.vel.mult(0.98); // drag
    this.pos.add(this.vel);
    
    // Fade as life depletes
    this.life -= 0.001;
    
    // Reset at bottom — respawn at top
    if (this.pos.y > height + 10) {
      this.pos.y = -10;
      this.pos.x = random(width);
      this.life = this.maxLife;
    }
  }
  
  draw() {
    let alpha = this.alpha * (this.life / this.maxLife);
    let b = this.brightness;
    
    // Glow for brighter embers
    if (b > 130) {
      // Outer glow
      noStroke();
      fill(b * 0.6, b * 0.2, b * 0.1, alpha * 0.2);
      ellipse(this.pos.x, this.pos.y, this.size * 4, this.size * 3);
      fill(b * 0.8, b * 0.3, b * 0.15, alpha * 0.4);
      ellipse(this.pos.x, this.pos.y, this.size * 2.5, this.size * 2);
    }
    
    // Main particle
    noStroke();
    fill(b, b * 0.25, b * 0.1, alpha);
    ellipse(this.pos.x, this.pos.y, this.size, this.size * 0.7);
    
    // Hot core for bright embers
    if (b > 140) {
      fill(b + 40, b * 0.5, b * 0.2, alpha * 0.8);
      ellipse(this.pos.x, this.pos.y, this.size * 0.5, this.size * 0.4);
    }
  }
  
  isDead() {
    return this.life <= 0;
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(RGB, 255);
  
  // Initial gentle rain of particles
  for (let i = 0; i < 200; i++) {
    particles.push(new Ash(random(width), random(height)));
  }
}

function draw() {
  // Dark background with slight warmth — BG_BRIGHTNESS = 20 for visibility
  background(BG_BRIGHTNESS, BG_BRIGHTNESS * 0.15, BG_BRIGHTNESS * 0.1);
  
  // Subtle ground accumulation gradient at bottom
  noStroke();
  for (let y = height - 60; y < height; y++) {
    let inter = map(y, height - 60, height, 0, 1);
    let alpha = inter * 25;
    fill(BG_BRIGHTNESS + 10, BG_BRIGHTNESS * 0.2, BG_BRIGHTNESS * 0.15, alpha);
    rect(0, y, width, 1);
  }
  
  // Update and draw particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    
    if (particles[i].isDead()) {
      particles.splice(i, 1);
    }
  }
  
  // Spawn new particles to maintain count
  while (particles.length < MAX_PARTICLES) {
    particles.push(new Ash(random(width), -10));
  }
  
  // Subtle vignette
  drawVignette();
}

function drawVignette() {
  // Soft vignette at edges
  let vignetteSize = min(width, height) * 1.2;
  noFill();
  for (let i = 0; i < 40; i++) {
    let alpha = map(i, 0, 40, 0, 30);
    stroke(BG_BRIGHTNESS, BG_BRIGHTNESS * 0.15, BG_BRIGHTNESS * 0.1, alpha);
    strokeWeight(20);
    ellipse(width/2, height/2, vignetteSize - i * 20, vignetteSize - i * 20);
  }
}

function mousePressed() {
  // Spawn burst of particles at click
  let burstCount = 30;
  for (let i = 0; i < burstCount; i++) {
    let p = new Ash(mouseX + random(-20, 20), mouseY + random(-20, 20), true);
    p.brightness = random(100, 200); // Brighter burst
    particles.push(p);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
