<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Currents</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #141414; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Silent Currents — abstract flowing field lines that trace invisible currents
// Luminous curved paths flowing across darkness like hidden air or water currents
// Click to create disturbance in the flow
// Background brightness 20, field lines brightness 80-220

const BG = 20;
const NUM_STREAMS = 12;
const STEPS = 180;
const LENGTH = 80;

let streams = [];
let time = 0;
let attractors = [];

class Attractor {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-0.3, 0.3);
    this.vy = random(-0.3, 0.3);
    this.strength = random(0.5, 1.5);
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    
    if (this.x < 0 || this.x > width) this.vx *= -1;
    if (this.y < 0 || this.y > height) this.vy *= -1;
  }
  
  disturb(px, py, amount) {
    let d = dist(px, py, this.x, this.y);
    if (d < 200) {
      this.vx += random(-amount, amount);
      this.vy += random(-amount, amount);
      this.vx = constrain(this.vx, -0.5, 0.5);
      this.vy = constrain(this.vy, -0.5, 0.5);
    }
  }
}

class Stream {
  constructor() {
    this.reset();
  }
  
  reset() {
    // Start at random position
    this.x = random(width);
    this.y = random(height);
    this.history = [];
    this.age = 0;
    this.maxAge = random(LENGTH * 0.5, LENGTH * 1.5);
    this.speed = random(1.5, 3);
    this.brightness = random(80, 200);
    this.baseHue = random(0, 30); // Red to orange-red range
    this.hueVariation = random(5, 15);
  }
  
  update(attractors) {
    // Store history
    this.history.push({ x: this.x, y: this.y });
    if (this.history.length > this.maxAge) {
      this.history.shift();
    }
    
    // Calculate flow field at current position using curl noise + attractors
    let angle = this.getFlowAngle(this.x, this.y);
    
    // Move along flow
    this.x += cos(angle) * this.speed;
    this.y += sin(angle) * this.speed;
    
    this.age++;
    
    // Reset if out of bounds or too old
    if (this.x < -10 || this.x > width + 10 || 
        this.y < -10 || this.y > height + 10 || 
        this.age > this.maxAge * 1.5) {
      this.reset();
    }
  }
  
  getFlowAngle(x, y) {
    // Base curl noise flow
    let scale = 0.003;
    let timeScale = 0.0003;
    
    // Curl noise approximation using Perlin noise derivatives
    let n1 = noise(x * scale, y * scale, time * timeScale);
    let n2 = noise(x * scale + 100, y * scale + 100, time * timeScale + 50);
    
    // Create swirling flow
    let angle1 = n1 * TWO_PI * 2;
    let angle2 = n2 * TWO_PI * 2;
    
    let baseAngle = (angle1 + angle2) * 0.5;
    
    // Add attractor influence
    let ax = 0, ay = 0;
    for (let a of attractors) {
      let dx = a.x - x;
      let dy = a.y - y;
      let d = max(10, sqrt(dx * dx + dy * dy));
      let force = a.strength * 50 / (d * d) * 1000;
      ax += (dx / d) * force;
      ay += (dy / d) * force;
    }
    
    let attractorAngle = atan2(ay, ax);
    
    // Blend base flow with attractor influence
    let blend = 0.7;
    return baseAngle * blend + attractorAngle * (1 - blend);
  }
  
  draw() {
    if (this.history.length < 2) return;
    
    let ageRatio = this.age / this.maxAge;
    let brightness = this.brightness;
    
    // Fade in and out
    if (ageRatio < 0.1) {
      brightness *= ageRatio / 0.1;
    } else if (ageRatio > 0.7) {
      brightness *= (1 - ageRatio) / 0.3;
    }
    
    // Draw trail with gradient
    noFill();
    
    // Glow layers
    for (let i = 1; i < this.history.length; i++) {
      let p1 = this.history[i - 1];
      let p2 = this.history[i];
      
      let alpha = map(i, 0, this.history.length, 0, brightness * 0.8);
      let thickness = map(i, 0, this.history.length, 0.5, 2.5);
      
      // Hue variation along trail
      let hue = this.baseHue + map(i, 0, this.history.length, 0, this.hueVariation);
      
      // Outer glow
      stroke(hue * 0.3, hue * 0.1, hue * 0.05, alpha * 0.3);
      strokeWeight(thickness * 4);
      line(p1.x, p1.y, p2.x, p2.y);
      
      // Middle glow
      stroke(hue * 0.6, hue * 0.2, hue * 0.1, alpha * 0.5);
      strokeWeight(thickness * 2);
      line(p1.x, p1.y, p2.x, p2.y);
      
      // Core
      stroke(hue, hue * 0.3, hue * 0.15, alpha);
      strokeWeight(thickness);
      line(p1.x, p1.y, p2.x, p2.y);
    }
    
    // Bright head
    if (this.history.length > 0) {
      let head = this.history[this.history.length - 1];
      let headAlpha = brightness * 0.9;
      
      fill(BG, BG * 0.1, 0, 0);
      noStroke();
      ellipse(head.x, head.y, 12, 12);
      
      fill(this.baseHue, this.baseHue * 0.3, this.baseHue * 0.1, headAlpha);
      ellipse(head.x, head.y, 4, 4);
      
      fill(255, 255 * 0.5, 255 * 0.3, headAlpha * 0.8);
      ellipse(head.x, head.y, 2, 2);
    }
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(RGB, 255);
  
  // Create streams
  for (let i = 0; i < NUM_STREAMS; i++) {
    streams.push(new Stream());
  }
  
  // Create attractors
  for (let i = 0; i < 4; i++) {
    attractors.push(new Attractor());
  }
}

function draw() {
  // Dark background with warmth
  background(BG, BG * 0.15, BG * 0.1);
  
  time++;
  
  // Update attractors
  for (let a of attractors) {
    a.update();
  }
  
  // Update and draw streams
  for (let s of streams) {
    s.update(attractors);
    s.draw();
  }
  
  // Subtle vignette
  drawVignette();
  
  // Draw attractors as very subtle marks
  for (let a of attractors) {
    let alpha = a.strength * 30;
    fill(BG + 10, BG * 0.2, BG * 0.15, alpha);
    noStroke();
    ellipse(a.x, a.y, 8, 8);
  }
}

function drawVignette() {
  let vignetteSize = min(width, height) * 1.2;
  noFill();
  for (let i = 0; i < 40; i++) {
    let alpha = map(i, 0, 40, 0, 20);
    stroke(BG, BG * 0.15, BG * 0.1, alpha);
    strokeWeight(15);
    ellipse(width/2, height/2, vignetteSize - i * 15, vignetteSize - i * 15);
  }
}

function mousePressed() {
  // Disturb attractors
  for (let a of attractors) {
    a.disturb(mouseX, mouseY, 0.2);
  }
  
  // Spawn new streams near click
  for (let i = 0; i < 3; i++) {
    let s = new Stream();
    s.x = mouseX + random(-30, 30);
    s.y = mouseY + random(-30, 30);
    s.history = [];
    streams.push(s);
  }
  
  // Limit total streams
  while (streams.length > NUM_STREAMS * 2) {
    streams.shift();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
