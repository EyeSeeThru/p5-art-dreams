<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bloodwood</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #0a0000; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
// Bloodwood — deep red tree sap, resin channels, viscous amber darkness
let channels = [];
let particles = [];
const NUM_CHANNELS = 12;
const NUM_PARTICLES = 60;

class Channel {
  constructor(startX, startY, angle, length) {
    this.x = startX;
    this.y = startY;
    this.angle = angle;
    this.length = length;
    this.thickness = random(2, 8);
    this.growth = 0;
    this.growSpeed = random(0.3, 1.2);
    this.maxLength = length;
    this.branched = false;
    this.branchAngle = random(-PI/4, PI/4);
    this.branchLength = random(0.3, 0.6);
    this.hue = random(0, 25); // deep red-orange range
    this.saturation = random(70, 100);
    this.brightness = random(60, 90);
    this.age = 0;
    this.pulsePhase = random(TWO_PI);
    this.pulseSpeed = random(0.01, 0.03);
  }
  
  update() {
    if (this.growth < this.maxLength) {
      this.growth += this.growSpeed;
      this.age++;
      
      // Occasionally branch
      if (!this.branched && this.growth > this.maxLength * 0.4 && random() < 0.008) {
        this.branched = true;
        let branchX = this.x + cos(this.angle) * this.growth * 0.6;
        let branchY = this.y + sin(this.angle) * this.growth * 0.6;
        channels.push(new Channel(branchX, branchY, this.angle + this.branchAngle, this.maxLength * this.branchLength));
      }
    }
    this.pulsePhase += this.pulseSpeed;
  }
  
  display() {
    if (this.growth < 1) return;
    
    let pulse = sin(this.pulsePhase) * 0.15 + 0.85;
    let currentThickness = this.thickness * pulse;
    
    push();
    translate(this.x, this.y);
    rotate(this.angle);
    
    // Main channel
    let segments = floor(this.growth / 3);
    for (let i = 0; i < segments; i++) {
      let t = i / segments;
      let segX = i * 3;
      let wobble = sin(t * 8 + this.age * 0.05) * 2;
      let brightnessMod = sin(t * 12 + this.pulsePhase) * 10;
      
      // Glow layer
      noStroke();
      let glowH = this.hue;
      let glowS = this.saturation * 0.5;
      let glowB = this.brightness * 0.3 * pulse;
      fill(glowH, glowS, glowB, 80);
      ellipse(segX + wobble, 0, currentThickness * 4, currentThickness * 2);
      
      // Core channel
      let coreH = this.hue;
      let coreS = this.saturation;
      let coreB = (this.brightness + brightnessMod) * pulse;
      fill(coreH, coreS, coreB);
      ellipse(segX + wobble, 0, currentThickness, currentThickness * 0.6);
      
      // Inner highlight
      fill(this.hue, this.saturation * 0.3, min(100, this.brightness + 20), 150);
      ellipse(segX + wobble, -currentThickness * 0.1, currentThickness * 0.4, currentThickness * 0.2);
    }
    
    // End droplet
    if (this.growth >= this.maxLength * 0.9) {
      let dropSize = sin(this.pulsePhase * 2) * 2 + currentThickness * 1.5;
      noStroke();
      fill(this.hue, this.saturation, this.brightness * pulse);
      ellipse(this.growth, 0, dropSize, dropSize * 0.8);
    }
    
    pop();
  }
}

class Particle {
  constructor() {
    this.reset();
  }
  
  reset() {
    // Start near a channel
    if (channels.length > 0 && random() < 0.7) {
      let c = random(channels);
      if (c.growth > 5) {
        this.x = c.x + cos(c.angle) * random(5, c.growth);
        this.y = c.y + sin(c.angle) * random(5, c.growth);
      } else {
        this.x = c.x + random(-20, 20);
        this.y = c.y + random(-20, 20);
      }
    } else {
      this.x = random(width);
      this.y = random(height);
    }
    this.vx = random(-0.3, 0.3);
    this.vy = random(-0.5, -0.1); // slow upward drift
    this.size = random(1, 4);
    this.life = 1;
    this.decay = random(0.002, 0.008);
    this.hue = random(5, 20);
    this.saturation = random(80, 100);
    this.brightness = random(50, 80);
  }
  
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vx += random(-0.02, 0.02);
    this.vy *= 0.995;
    this.life -= this.decay;
    
    if (this.life <= 0 || this.y < 0 || this.x < 0 || this.x > width) {
      this.reset();
    }
  }
  
  display() {
    noStroke();
    fill(this.hue, this.saturation, this.brightness, this.life * 200);
    ellipse(this.x, this.y, this.size * this.life, this.size * this.life * 0.7);
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(10, 80, 5);
  
  // Create initial channels from bottom
  for (let i = 0; i < NUM_CHANNELS; i++) {
    let startX = random(width * 0.1, width * 0.9);
    let startY = height + 20;
    let angle = random(-PI/2 - PI/6, -PI/2 + PI/6); // upward with spread
    let length = random(150, 400);
    channels.push(new Channel(startX, startY, angle, length));
  }
  
  // Create particles
  for (let i = 0; i < NUM_PARTICLES; i++) {
    let p = new Particle();
    p.y = random(height); // start scattered
    particles.push(p);
  }
}

function draw() {
  // Slow fade background
  background(10, 80, 5, 3);
  
  // Wood grain texture in background
  noStroke();
  for (let i = 0; i < 3; i++) {
    let y = (frameCount * 0.2 + i * 100) % height;
    for (let x = 0; x < width; x += 20) {
      let wobble = sin(x * 0.01 + frameCount * 0.01) * 5;
      fill(15, 60, 8, 15);
      ellipse(x + wobble, y, 30, 2);
    }
  }
  
  // Update and display channels
  for (let c of channels) {
    c.update();
    c.display();
  }
  
  // Update and display particles
  for (let p of particles) {
    p.update();
    p.display();
  }
  
  // Add occasional new channel from bottom
  if (frameCount % 180 === 0 && channels.length < 25) {
    let startX = random(width * 0.1, width * 0.9);
    let startY = height + 20;
    let angle = random(-PI/2 - PI/6, -PI/2 + PI/6);
    let length = random(150, 350);
    channels.push(new Channel(startX, startY, angle, length));
  }
  
  // Remove old channels that have finished growing and drifted off screen
  channels = channels.filter(c => c.y + c.length > -50);
  
  // Vignette
  noStroke();
  let vignetteSize = max(width, height) * 1.2;
  for (let i = 0; i < 10; i++) {
    let alpha = map(i, 0, 10, 0, 30);
    fill(0, 0, 0, alpha);
    ellipse(width/2, height/2, vignetteSize - i * vignetteSize * 0.08, vignetteSize - i * vignetteSize * 0.08);
  }
}

function mousePressed() {
  // Spawn particles from click
  for (let i = 0; i < 15; i++) {
    let p = new Particle();
    p.x = mouseX + random(-20, 20);
    p.y = mouseY + random(-20, 20);
    p.vy = random(-1, -0.3);
    particles.push(p);
  }
  
  // Spawn a new channel from bottom near click
  if (channels.length < 30) {
    let startX = mouseX + random(-50, 50);
    let startY = height + 20;
    let angle = atan2(mouseY - startY, mouseX - startX);
    // Constrain angle to mostly upward
    if (angle > 0) angle = -PI/2 + random(-PI/6, PI/6);
    let length = random(150, 350);
    channels.push(new Channel(startX, startY, angle, length));
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(10, 80, 5);
}
</script>
</body>
</html>
