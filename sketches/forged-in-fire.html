<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Forged in Fire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030101; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Forged in Fire — Glowing molten metal shaped by flame, sparks flying upward
// The transformation of raw metal through extreme heat
// GLSL shader for the molten metal effect

let shader;
let t = 0;

function preload() {
  // Create shader directly in setup since we can't load external files easily
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  noStroke();

  // Create shader
  shader = createShader(`
    precision highp float;
    uniform vec2 uResolution;
    uniform float uTime;

    // Simplex noise
    vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
    vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

    float snoise(vec2 v) {
      const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
      vec2 i  = floor(v + dot(v, C.yy));
      vec2 x0 = v - i + dot(i, C.xx);
      vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
      vec4 x12 = x0.xyxy + C.xxzz;
      x12.xy -= i1;
      i = mod289(i);
      vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
      vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
      m = m*m; m = m*m;
      vec3 x = 2.0 * fract(p * C.www) - 1.0;
      vec3 h = abs(x) - 0.5;
      vec3 ox = floor(x + 0.5);
      vec3 a0 = x - ox;
      m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
      vec3 g;
      g.x = a0.x * x0.x + h.x * x0.y;
      g.yz = a0.yz * x12.xz + h.yz * x12.yw;
      return 130.0 * dot(m, g);
    }

    float fbm(vec2 p) {
      float f = 0.0;
      float w = 0.5;
      for (int i = 0; i < 5; i++) {
        f += w * snoise(p);
        p *= 2.0;
        w *= 0.5;
      }
      return f;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / uResolution.xy;
      vec2 p = (gl_FragCoord.xy - 0.5 * uResolution.xy) / min(uResolution.x, uResolution.y);

      float t = uTime * 0.3;

      // Base darkness
      vec3 col = vec3(0.02, 0.005, 0.002);

      // Molten metal flow
      float flow = fbm(p * 2.0 + vec2(t * 0.2, t * 0.1));
      flow += fbm(p * 4.0 - vec2(t * 0.15, t * 0.25)) * 0.5;
      flow += fbm(p * 8.0 + vec2(t * 0.1, -t * 0.2)) * 0.25;
      flow = flow * 0.5 + 0.5;

      // Bright molten streaks
      float streaks = fbm(p * vec2(1.0, 8.0) + vec2(t * 0.3, 0.0));
      streaks = pow(abs(streaks), 0.5);

      // Heat glow
      float heat = pow(1.0 - length(p * vec2(0.8, 1.0)), 2.0);
      heat = max(heat, 0.0);

      // Central forge glow
      float forge = exp(-length(p) * 3.0);

      // Combine heat
      float molten = flow * heat;
      molten = pow(molten, 0.7);

      // Color gradient: deep red -> orange -> yellow-white
      vec3 coldColor = vec3(0.15, 0.02, 0.01);  // Dark red
      vec3 warmColor = vec3(0.6, 0.15, 0.02);    // Orange-red
      vec3 hotColor = vec3(0.95, 0.5, 0.1);     // Bright orange
      vec3 whiteColor = vec3(1.0, 0.85, 0.5);   // White-hot

      vec3 metalColor = coldColor;
      metalColor = mix(metalColor, warmColor, smoothstep(0.2, 0.5, molten));
      metalColor = mix(metalColor, hotColor, smoothstep(0.5, 0.75, molten));
      metalColor = mix(metalColor, whiteColor, smoothstep(0.75, 1.0, molten));

      // Add streaks (brighter flow lines)
      float streakIntensity = streaks * heat * 2.0;
      vec3 streakColor = mix(hotColor, whiteColor, streakIntensity);
      metalColor = mix(metalColor, streakColor, streakIntensity * 0.6);

      // Forge glow (center)
      vec3 forgeColor = vec3(0.4, 0.15, 0.05);
      metalColor += forgeColor * forge * 0.8;

      // Background subtle glow
      col += metalColor * 0.15;

      // Replace background with molten metal
      col = mix(col, metalColor, molten * heat * 1.5);

      // Sparks
      for (int i = 0; i < 12; i++) {
        float fi = float(i);
        vec2 sparkPos = vec2(
          sin(fi * 73.2 + t * (1.0 + fi * 0.1)) * 0.4,
          mod(fi * 0.1 + t * (0.3 + fi * 0.02) - t * 0.5, 1.0) - 0.2
        );
        float spark = 1.0 - smoothstep(0.0, 0.015, length(p - sparkPos));
        spark *= (1.0 - sparkPos.y); // Fade near bottom
        vec3 sparkColor = mix(hotColor, whiteColor, random(vec2(fi, fi * 2.0)));
        col += sparkColor * spark * 2.0;
      }

      // Vignette
      float vig = 1.0 - pow(length(uv - 0.5) * 1.2, 2.0);
      col *= vig;

      gl_FragColor = vec4(col, 1.0);
    }

    float random(vec2 st) {
      return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123);
    }
  `, `
    precision highp float;
    attribute vec3 aPosition;
    attribute vec2 aTexCoord;
    varying vec2 vTexCoord;
    void main() {
      vTexCoord = aTexCoord;
      vec4 positionVec4 = vec4(aPosition, 1.0);
      positionVec4.xy = positionVec4.xy * 2.0 - 1.0;
      gl_Position = positionVec4;
    }
  `);
}

function draw() {
  t += 0.016;

  shader.setUniform('uResolution', [width, height]);
  shader.setUniform('uTime', t);

  shader.setUniform('uResolution', [width, height]);
  shader.setUniform('uTime', t);

  // Draw full-screen quad with shader
  push();
  resetShader();
  shader(shader);
  rect(0, 0, width, height);
  pop();

  // Add sparks overlay using p5
  drawSparks();
}

function drawSparks() {
  // Additional spark particles
  randomSeed(frameCount);
  noStroke();

  for (let i = 0; i < 8; i++) {
    let x = random(width);
    let y = map(frameCount % 120 + random(30), 0, 150, height * 0.9, height * 0.3);
    let s = random(2, 5);
    let alpha = map(y, height * 0.3, height * 0.9, 255, 0);

    // Spark glow
    fill(255, 150 + random(100), 50, alpha * 0.3);
    ellipse(x, y, s * 3, s * 3);
    fill(255, 200, 100, alpha);
    ellipse(x, y, s, s);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  // Click creates burst of sparks
}
</script>
</body>
</html>
