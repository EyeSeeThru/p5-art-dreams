<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinodal Decomposition</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let gShader;
    let width = 600;
    let height = 600;

    const vertSrc = `
      attribute vec3 aPosition;
      attribute vec2 aTexCoord;
      varying vec2 vTexCoord;
      void main() {
        vTexCoord = aTexCoord;
        vec4 positionVec4 = vec4(aPosition, 1.0);
        positionVec4.xy = positionVec4.xy * 2.0 - 1.0;
        gl_Position = positionVec4;
      }
    `;

    const fragSrc = `
      precision highp float;
      varying vec2 vTexCoord;
      uniform vec2 uResolution;
      uniform float uTime;
      
      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
      }
      
      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        float a = hash(i);
        float b = hash(i + vec2(1.0, 0.0));
        float c = hash(i + vec2(0.0, 1.0));
        float d = hash(i + vec2(1.0, 1.0));
        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
      }
      
      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        for (int i = 0; i < 6; i++) {
          v += a * noise(p);
          p *= 2.0;
          a *= 0.5;
        }
        return v;
      }
      
      void main() {
        vec2 uv = vTexCoord;
        vec2 p = uv * 4.0;
        
        float t = uTime * 0.08;
        
        // Spinodal decomposition pattern - early stage
        float early = fbm(p + t * 0.5);
        
        // Interfacial pattern - late stage phase separation
        vec2 q = p * 1.5;
        float late1 = fbm(q + vec2(t * 0.3, -t * 0.2));
        float late2 = fbm(q * 1.3 + vec2(-t * 0.25, t * 0.35) + 5.0);
        
        // Blend based on time
        float blend = smoothstep(0.3, 0.7, sin(t * 0.5) * 0.5 + 0.5);
        float pattern = mix(early, late1 * late2, blend);
        
        // Create domain structure
        float domain1 = sin(pattern * 8.0 + t) * 0.5 + 0.5;
        float domain2 = cos(pattern * 6.0 - t * 0.7) * 0.5 + 0.5;
        
        // Phase separation coloring
        vec3 blue = vec3(0.05, 0.2, 0.5);
        vec3 teal = vec3(0.1, 0.5, 0.6);
        vec3 orange = vec3(0.8, 0.3, 0.1);
        vec3 amber = vec3(0.9, 0.6, 0.2);
        
        float phase = domain1 * domain2;
        vec3 color = mix(blue, teal, phase);
        color = mix(color, orange, smoothstep(0.3, 0.7, domain1));
        color = mix(color, amber, smoothstep(0.4, 0.8, domain2 * (1.0 - phase)));
        
        // Interfacial highlight
        float interface = abs(sin(pattern * 12.0 + t * 0.3));
        interface = pow(interface, 3.0);
        color += vec3(0.9, 0.7, 0.4) * interface * 0.3;
        
        // Subtle glow at domain boundaries
        float glow = fbm(p * 0.5 + t * 0.2);
        color += vec3(0.3, 0.5, 0.6) * glow * 0.15;
        
        // Vignette
        float vig = 1.0 - length(vTexCoord - 0.5) * 0.8;
        color *= vig;
        
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    function setup() {
      createCanvas(width, height, WEBGL);
      noStroke();
      
      gShader = createShader(vertSrc, fragSrc);
    }

    function draw() {
      shader(gShader);
      gShader.setUniform('uResolution', [width, height]);
      gShader.setUniform('uTime', millis() / 1000.0);
      
      rect(0, 0, width, height);
    }
  </script>
</body>
</html>
