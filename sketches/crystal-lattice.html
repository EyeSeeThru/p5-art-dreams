<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Crystal Lattice Vibrations</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let gridSize = 12;
let spacing = 35;
let atoms = [];
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  let offsetX = (width - (gridSize - 1) * spacing) / 2;
  let offsetY = (height - (gridSize - 1) * spacing) / 2;
  
  for (let i = 0; i < gridSize; i++) {
    atoms[i] = [];
    for (let j = 0; j < gridSize; j++) {
      atoms[i][j] = {
        x: offsetX + i * spacing,
        y: offsetY + j * spacing,
        baseX: offsetX + i * spacing,
        baseY: offsetY + j * spacing,
        vx: 0,
        vy: 0,
        hue: map(i + j, 0, gridSize * 2, 180, 300)
      };
    }
  }
}

function draw() {
  background(10, 8, 15);
  time += 0.02;
  
  // Draw connections
  strokeWeight(1);
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let a = atoms[i][j];
      
      // Horizontal connection
      if (i < gridSize - 1) {
        let neighbor = atoms[i + 1][j];
        let dist = dist2D(a.x, a.y, neighbor.x, neighbor.y);
        let alpha = map(dist, spacing, spacing * 1.5, 0.4, 0);
        stroke(a.hue, 70, 80, alpha);
        line(a.x, a.y, neighbor.x, neighbor.y);
      }
      
      // Vertical connection
      if (j < gridSize - 1) {
        let neighbor = atoms[i][j + 1];
        let dist = dist2D(a.x, a.y, neighbor.x, neighbor.y);
        let alpha = map(dist, spacing, spacing * 1.5, 0.4, 0);
        stroke(a.hue, 70, 80, alpha);
        line(a.x, a.y, neighbor.x, neighbor.y);
      }
    }
  }
  
  // Update and draw atoms
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let a = atoms[i][j];
      
      // Multiple wave functions for resonant vibrations
      let wave1 = sin(time * 2 + i * 0.5 + j * 0.3) * 15;
      let wave2 = sin(time * 3 + i * 0.8 - j * 0.6) * 10;
      let wave3 = cos(time * 1.5 + (i + j) * 0.4) * 8;
      
      // Center pull toward rest position
      let dx = a.baseX - a.x;
      let dy = a.baseY - a.y;
      
      a.vx += dx * 0.05 + wave1 * 0.1;
      a.vy += dy * 0.05 + wave2 * 0.1;
      
      // Damping
      a.vx *= 0.92;
      a.vy *= 0.92;
      
      a.x += a.vx;
      a.y += a.vy;
      
      // Draw atom glow
      let speed = sqrt(a.vx * a.vx + a.vy * a.vy);
      let brightness = map(speed, 0, 5, 60, 100);
      let size = map(speed, 0, 5, 8, 16);
      
      // Outer glow
      noStroke();
      for (let r = size * 3; r > 0; r -= 3) {
        let alpha = map(r, 0, size * 3, 0.3, 0);
        fill(a.hue, 80, brightness, alpha);
        ellipse(a.x, a.y, r * 2);
      }
      
      // Core
      fill(a.hue, 60, brightness);
      ellipse(a.x, a.y, size);
    }
  }
  
  // Add floating particles
  noStroke();
  for (let k = 0; k < 50; k++) {
    let px = (sin(time * 0.5 + k * 0.7) * 0.5 + 0.5) * width;
    let py = (cos(time * 0.3 + k * 1.1) * 0.5 + 0.5) * height;
    let size = 2 + sin(time + k) * 1;
    let hue = 200 + sin(k * 0.3) * 60;
    fill(hue, 40, 80, 0.4);
    ellipse(px, py, size * 2);
  }
}

function dist2D(x1, y1, x2, y2) {
  return sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  setup();
}
</script>
</body>
</html>
