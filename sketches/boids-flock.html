<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boids Flock</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const boids = [];
const NUM_BOIDS = 180;
const PERCEPTION_RADIUS = 60;
const MAX_FORCE = 0.15;
const MAX_SPEED = 4;

function setup() {
  createCanvas(windowWidth, windowHeight);
  for (let i = 0; i < NUM_BOIDS; i++) {
    boids.push(new Boid(random(width), random(height)));
  }
}

function draw() {
  background(10, 8, 12, 40);
  
  for (let boid of boids) {
    boid.flock(boids);
    boid.update();
    boid.edges();
    boid.show();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

class Boid {
  constructor(x, y) {
    this.position = createVector(x, y);
    this.velocity = p5.Vector.random2D().mult(random(2, 4));
    this.acceleration = createVector(0, 0);
    this.maxForce = MAX_FORCE;
    this.maxSpeed = MAX_SPEED;
    this.hue = random(340, 380);
  }

  flock(boids) {
    let alignment = createVector(0, 0);
    let cohesion = createVector(0, 0);
    let separation = createVector(0, 0);
    let total = 0;

    for (let other of boids) {
      let d = dist(this.position.x, this.position.y, other.position.x, other.position.y);
      if (other !== this && d < PERCEPTION_RADIUS) {
        alignment.add(other.velocity);
        cohesion.add(other.position);
        
        let diff = p5.Vector.sub(this.position, other.position);
        diff.div(d * d);
        separation.add(diff);
        total++;
      }
    }

    if (total > 0) {
      alignment.div(total);
      alignment.setMag(this.maxSpeed);
      alignment.sub(this.velocity);
      alignment.limit(this.maxForce);

      cohesion.div(total);
      cohesion.sub(this.position);
      cohesion.setMag(this.maxSpeed);
      cohesion.sub(this.velocity);
      cohesion.limit(this.maxForce);

      separation.div(total);
      separation.setMag(this.maxSpeed);
      separation.sub(this.velocity);
      separation.limit(this.maxForce * 1.5);
    }

    alignment.mult(1.0);
    cohesion.mult(0.8);
    separation.mult(1.2);

    this.acceleration.add(alignment);
    this.acceleration.add(cohesion);
    this.acceleration.add(separation);
  }

  update() {
    this.velocity.add(this.acceleration);
    this.velocity.limit(this.maxSpeed);
    this.position.add(this.velocity);
    this.acceleration.mult(0);
  }

  edges() {
    let margin = 50;
    let turned = false;
    
    if (this.position.x < -margin) { this.position.x = width + margin; turned = true; }
    if (this.position.y < -margin) { this.position.y = height + margin; turned = true; }
    if (this.position.x > width + margin) { this.position.x = -margin; turned = true; }
    if (this.position.y > height + margin) { this.position.y = -margin; turned = true; }
    
    if (turned) {
      this.velocity = p5.Vector.random2D().mult(random(2, 4));
    }
  }

  show() {
    let angle = this.velocity.heading();
    colorMode(HSB, 360, 100, 100, 100);
    
    let speed = this.velocity.mag();
    let brightness = map(speed, 0, this.maxSpeed, 60, 100);
    
    push();
    translate(this.position.x, this.position.y);
    rotate(angle);
    
    noStroke();
    fill(this.hue, 70, brightness, 80);
    
    beginShape();
    vertex(12, 0);
    vertex(-8, -5);
    vertex(-4, 0);
    vertex(-8, 5);
    endShape(CLOSE);
    
    fill(this.hue, 50, 100, 50);
    ellipse(0, 0, 3, 3);
    
    pop();
  }
}
</script>
</body>
</html>
