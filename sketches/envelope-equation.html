<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Envelope Equation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050508; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Envelope Equation — Modulated wave with Gaussian envelope
// Visualizes a carrier wave multiplied by a slowly-varying Gaussian envelope
// u(x,t) = A(x-ct) * cos(kx - ωt) — the "envelope equation" of nonlinear optics
let t = 0;
const RES = 120;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
}

function draw() {
  background(5, 5, 7);

  let cw = width / RES, ch = height / RES;
  let carrierK = map(mouseX, 0, width, 15, 60);
  let envelopeK = map(mouseY, 0, height, 1, 8);
  let speed = 0.6 + 0.5 * sin(t * 0.2);

  // Drift the envelope
  let envPhase = t * speed * 0.4;
  let carrierPhase = t * speed * 2.0;

  for (let i = 0; i < RES; i++) {
    for (let j = 0; j < RES; j++) {
      let nx = i / RES;
      let ny = j / RES - 0.5; // center vertically

      // Carrier wave
      let carrier = cos(carrierK * nx * TWO_PI - carrierPhase * TWO_PI);

      // Multiple Gaussian envelopes
      let env1 = exp(-50 * pow(nx - (0.3 + 0.15 * sin(envPhase)), 2) - 50 * pow(ny - 0.1 * sin(envPhase * 0.7), 2));
      let env2 = exp(-40 * pow(nx - (0.7 + 0.15 * cos(envPhase * 0.8)), 2) - 40 * pow(ny + 0.15 * cos(envPhase * 0.6), 2));
      let env3 = exp(-60 * pow(nx - (0.5 + 0.1 * cos(envPhase * 0.5)), 2) - 60 * pow(ny - 0.2 * sin(envPhase * 0.9), 2));
      let env = env1 + 0.7 * env2 + 0.5 * env3;

      // Combined signal
      let amp = env * carrier;

      // Color: amplitude → hue, carrier oscillations → brightness bands
      let h = map(amp, -1, 1, 200, 320) % 360;
      if (h < 0) h += 360;
      let s = 70 + 20 * abs(amp);
      let b = 75 + 25 * abs(env * cos(carrierK * nx * TWO_PI * 0.5));
      let a = 50 + 50 * abs(amp);

      fill(h, s, b, a);

      let sz = min(cw, ch) * 0.85;
      rect(i * cw, j * ch, sz, sz);
    }
  }

  // Labels
  fill(255, 0, 80, 60);
  textSize(12);
  textAlign(LEFT, TOP);
  text('Envelope Equation: A(x-ct) · cos(kx - ωt)', 20, 20);
  text('Move mouse to adjust carrier k and envelope k', 20, 36);

  t += deltaTime() * 0.001;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
