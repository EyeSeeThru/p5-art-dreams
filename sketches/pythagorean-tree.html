<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pythagorean Tree</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Pythagorean Tree Fractal
// Recursive branching structure based on the Pythagorean theorem

let angle = 0;
let time = 0;
let branchAngle;

function setup() {
  createCanvas(windowWidth, windowHeight);
  branchAngle = PI / 6; // 30 degrees
  colorMode(HSB, 360, 100, 100, 1);
}

function draw() {
  background(240, 30, 8);
  
  // Center and grow from bottom
  translate(width / 2, height);
  
  // Animated branch angle
  branchAngle = PI / 5 + sin(time * 0.5) * 0.1;
  
  // Starting branch length based on screen size
  let startLen = min(width, height) * 0.22;
  
  // Draw the tree
  drawBranch(startLen, 0);
  
  time += 0.02;
}

function drawBranch(len, depth) {
  // Golden hour color palette
  let hue = (30 + depth * 8 + time * 20) % 360;
  let sat = 70 - depth * 3;
  let bri = 80 - depth * 4;
  
  // Trunk color (warm browns to golden)
  if (depth < 3) {
    stroke(25 + depth * 5, 60, 40 + depth * 10);
  } else {
    stroke(hue, sat, bri);
  }
  
  strokeWeight(map(len, 5, 200, 1, 12));
  strokeJoin(ROUND);
  
  // Draw branch
  line(0, 0, 0, -len);
  
  // Move to end of branch
  translate(0, -len);
  
  // Recursion limit
  if (len > 8) {
    // Right branch
    push();
    rotate(branchAngle + sin(time + depth) * 0.1);
    drawBranch(len * 0.7, depth + 1);
    pop();
    
    // Left branch
    push();
    rotate(-branchAngle + cos(time + depth) * 0.1);
    drawBranch(len * 0.7, depth + 1);
    pop();
  } else {
    // Add leaf tips at the end
    noStroke();
    fill(120 + depth * 10, 60, 70, 0.8);
    ellipse(0, 0, 6, 8);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
