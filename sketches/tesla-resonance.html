<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tesla Resonance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let branches = [];
let particles = [];
let time = 0;
const NUM_BRANCHES = 5;

class Branch {
  constructor(x, y, angle, level, parentAngle) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.level = level;
    this.length = random(60, 120) * pow(0.65, level);
    this.prevX = x;
    this.prevY = y;
    this.life = 255;
    this.maxLife = random(80, 160);
    this.thickness = map(level, 0, 8, 3, 0.5);
    this.hue = random(180, 280);
    this.parentAngle = parentAngle || angle;
    this.wobble = 0;
    this.wobbleSpeed = random(0.05, 0.15);
    this.oscPhase = random(TWO_PI);
  }

  update() {
    this.prevX = this.x;
    this.prevY = this.y;
    let noiseAngle = (noise(this.x * 0.003, this.y * 0.003, time * 0.8 + this.oscPhase) - 0.5) * 0.4;
    this.angle += noiseAngle * 0.08;
    let speed = this.length * 0.06;
    this.x += cos(this.angle) * speed;
    this.y += sin(this.angle) * speed;
    this.life -= 2.5;
  }

  draw() {
    let alpha = map(this.life, 0, this.maxLife, 0, 255);
    let col = color(this.hue, 100, 100, alpha * 0.8);
    stroke(col);
    strokeWeight(this.thickness);
    line(this.prevX, this.prevY, this.x, this.y);

    if (this.level < 6 && random() < 0.008 && this.life > this.maxLife * 0.5) {
      let childAngle = this.angle + random(-0.8, 0.8);
      branches.push(new Branch(this.x, this.y, childAngle, this.level + 1, this.angle));
    }

    if (random() < 0.03 && this.life > 20) {
      particles.push(new Spark(this.x, this.y, this.hue));
    }
  }
}

class Spark {
  constructor(x, y, hue) {
    this.x = x;
    this.y = y;
    let a = random(TWO_PI);
    let s = random(1, 4);
    this.vx = cos(a) * s;
    this.vy = sin(a) * s;
    this.life = random(40, 100);
    this.maxLife = this.life;
    this.hue = hue + random(-20, 20);
    this.size = random(1.5, 3.5);
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.04;
    this.vx *= 0.98;
    this.vy *= 0.98;
    this.life--;
  }

  draw() {
    let alpha = map(this.life, 0, this.maxLife, 0, 255);
    let col = color(this.hue, 80, 100, alpha);
    noStroke();
    fill(col);
    circle(this.x, this.y, this.size * (this.life / this.maxLife));
  }

  isDead() { return this.life <= 0; }
}

class Coil {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.radius = 14;
    this.phase = 0;
    this.rumblePhase = 0;
  }

  update() {
    this.phase += 0.06;
    this.rumblePhase += 0.03;
  }

  draw() {
    let pulse = sin(this.phase) * 0.3 + 0.7;
    let rumble = sin(this.rumblePhase * 8) * 3;

    noFill();
    for (let i = 4; i >= 0; i--) {
      let r = this.radius + i * 5 + rumble * (5 - i) * 0.5;
      let alpha = map(i, 0, 4, 255, 30) * pulse;
      stroke(200, 150, 255, alpha);
      strokeWeight(2);
      circle(this.x, this.y, r * 2);
    }

    fill(200, 150, 255, 255 * pulse);
    noStroke();
    circle(this.x, this.y, this.radius * 1.5);

    let glowR = 40 + sin(this.phase * 2) * 10;
    for (let i = 3; i >= 0; i--) {
      fill(200, 150, 255, 20 * pulse * (3 - i) / 3);
      circle(this.x, this.y, glowR * 2 * (i + 1) * 0.4);
    }
  }
}

let coil;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 255);
  coil = new Coil(width / 2, height / 2);
  background(0);
}

function draw() {
  background(0, 0, 0, 25);

  coil.update();
  coil.draw();

  let cx = coil.x;
  let cy = coil.y - 10;

  if (frameCount % 3 === 0) {
    for (let i = 0; i < 3; i++) {
      let angle = random(-PI * 0.15, PI * 1.15);
      branches.push(new Branch(cx, cy, angle - HALF_PI, 0));
    }
  }

  for (let i = branches.length - 1; i >= 0; i--) {
    branches[i].update();
    branches[i].draw();
    if (branches[i].life <= 0) {
      branches.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].isDead()) {
      particles.splice(i, 1);
    }
  }

  for (let i = 0; i < 3; i++) {
    let angle = random(TWO_PI);
    let dist = random(20, 60);
    let px = cx + cos(angle) * dist;
    let py = cy + sin(angle) * dist;
    particles.push(new Spark(px, py, random(180, 280)));
  }

  time += 0.016;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  coil.x = width / 2;
  coil.y = height / 2;
  background(0);
}
</script>
</body>
</html>
