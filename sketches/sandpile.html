<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sandpile — Self-Organized Criticality</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Sandpile Model — Self-Organized Criticality
// RED AND BLACK VERSION
// Background: pure black (0,0,0)
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100

let grid = [];
let nextGrid = [];
let gridSize = 80;
let cellSize;
let t = 0;
let totalGrains = 0;
let avalancheSizes = [];
let currentAvalanche = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  cellSize = max(5, floor(width / gridSize));
  
  for (let i = 0; i < gridSize; i++) {
    grid[i] = [];
    nextGrid[i] = [];
    for (let j = 0; j < gridSize; j++) {
      grid[i][j] = 0;
      nextGrid[i][j] = 0;
    }
  }
}

function draw() {
  background(0, 0, 0);
  
  let mode = floor(t / 500) % 3;
  
  if (mode !== 2) {
    let i = floor(random(1, gridSize - 1));
    let j = floor(random(1, gridSize - 1));
    grid[i][j]++;
    totalGrains++;
    currentAvalanche = 0;
    
    let changed = true;
    while (changed) {
      changed = false;
      for (let ii = 0; ii < gridSize; ii++) {
        for (let jj = 0; jj < gridSize; jj++) {
          if (grid[ii][jj] >= 4) {
            grid[ii][jj] -= 4;
            if (ii > 0) grid[ii-1][jj]++;
            if (ii < gridSize - 1) grid[ii+1][jj]++;
            if (jj > 0) grid[ii][jj-1]++;
            if (jj < gridSize - 1) grid[ii][jj+1]++;
            currentAvalanche++;
            changed = true;
          }
        }
      }
    }
    
    if (currentAvalanche > 0) {
      avalancheSizes.push(currentAvalanche);
      if (avalancheSizes.length > 500) {
        avalancheSizes.shift();
      }
    }
  }
  
  if (mode === 0) {
    drawHeights();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Sandpile — Self-Organized Criticality", 10, 10);
    text("Grains added: " + totalGrains, 10, 26);
    text("Toppling threshold: 4 grains", 10, 42);
    text("Click to add grains, Space to reset", 10, 58);
    text("Last avalanche: " + currentAvalanche, 10, 74);
    
  } else if (mode === 1) {
    drawAvalancheHistogram();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Avalanche Size Distribution", 10, 10);
    text("Log-log plot — power law P(S) ~ S^(-τ)", 10, 26);
    text("τ ≈ 1.0 for BTW sandpile", 10, 42);
    text("Scale invariance: avalanches of all sizes", 10, 58);
    text("Criticality without parameter tuning", 10, 74);
    
  } else {
    drawTopplingActivity();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Toppling Activity", 10, 10);
    text("Bright = frequent toppling", 10, 26);
    text("Dim = occasional toppling", 10, 42);
    text("System self-organizes to critical state", 10, 58);
  }
  
  fill(10, 50, 70);
  textAlign(RIGHT, TOP);
  text("Mode " + (mode + 1) + "/3 — cycles automatically", width - 10, 10);
  
  t++;
}

function drawHeights() {
  noStroke();
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let h = grid[i][j];
      
      // RED palette: 0=dim, 4=bright
      let bright = map(h, 0, 4, 30, 90);
      let sat = map(h, 0, 4, 40, 80);
      
      fill(5, sat, bright);
      rect(i * cellSize, j * cellSize, cellSize, cellSize);
    }
  }
}

function drawAvalancheHistogram() {
  if (avalancheSizes.length < 2) {
    fill(10, 50, 70);
    textSize(12);
    textAlign(CENTER, CENTER);
    text("Collecting avalanche data...", width/2, height/2);
    return;
  }
  
  let minS = 1;
  let maxS = Math.max(...avalancheSizes);
  let bins = {};
  
  for (let s of avalancheSizes) {
    let logS = Math.floor(Math.log(s) / Math.log(1.5));
    bins[logS] = (bins[logS] || 0) + 1;
  }
  
  let graphTop = 100;
  let graphBottom = height - 100;
  let graphLeft = 80;
  let graphRight = width - 50;
  
  stroke(10, 30, 40);
  strokeWeight(1);
  line(graphLeft, graphBottom, graphRight, graphBottom);
  line(graphLeft, graphTop, graphLeft, graphBottom);
  
  noStroke();
  fill(10, 60, 85);
  textSize(11);
  textAlign(LEFT, BOTTOM);
  text("P(S)", graphLeft - 5, graphTop);
  textAlign(CENTER, TOP);
  text("S (avalanche size)", (graphLeft + graphRight) / 2, graphBottom + 15);
  
  let logMax = Math.ceil(Math.log(maxS) / Math.log(1.5));
  
  for (let logBin = 0; logBin < logMax; logBin++) {
    let count = bins[logBin] || 0;
    if (count > 0) {
      let x1 = map(logBin, 0, logMax, graphLeft, graphRight);
      let x2 = map(logBin + 1, 0, logMax, graphLeft, graphRight);
      let y1 = map(Math.log(count) / Math.log(1.5), 0, Math.log(avalancheSizes.length) / Math.log(1.5), graphBottom, graphTop);
      let y2 = graphBottom;
      
      fill(5, 50, 70);
      noStroke();
      rect(x1, y1, x2 - x1 - 1, y2 - y1);
    }
  }
  
  stroke(10, 30, 40);
  strokeWeight(1);
  let refY1 = graphTop + 50;
  let refY2 = graphBottom - 20;
  line(graphLeft, refY1, graphRight, refY2);
}

function drawTopplingActivity() {
  if (!window.activityGrid) {
    window.activityGrid = [];
    for (let i = 0; i < gridSize; i++) {
      window.activityGrid[i] = [];
      for (let j = 0; j < gridSize; j++) {
        window.activityGrid[i][j] = 0;
      }
    }
  }
  
  noStroke();
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      if (grid[i][j] >= 4) {
        window.activityGrid[i][j] = min(window.activityGrid[i][j] + 5, 100);
      } else {
        window.activityGrid[i][j] = max(window.activityGrid[i][j] - 1, 0);
      }
      
      let act = window.activityGrid[i][j];
      let bright = map(act, 0, 100, 20, 90);
      let sat = map(act, 0, 100, 30, 70);
      
      fill(5, sat, bright);
      rect(i * cellSize, j * cellSize, cellSize, cellSize);
    }
  }
}

function mousePressed() {
  let i = floor(mouseX / cellSize);
  let j = floor(mouseY / cellSize);
  
  for (let di = -1; di <= 1; di++) {
    for (let dj = -1; dj <= 1; dj++) {
      let ni = i + di;
      let nj = j + dj;
      if (ni > 0 && ni < gridSize - 1 && nj > 0 && nj < gridSize - 1) {
        grid[ni][nj] += 3;
        totalGrains += 3;
      }
    }
  }
}

function keyPressed() {
  if (key === ' ') {
    for (let i = 0; i < gridSize; i++) {
      for (let j = 0; j < gridSize; j++) {
        grid[i][j] = 0;
      }
    }
    if (window.activityGrid) {
      for (let i = 0; i < gridSize; i++) {
        for (let j = 0; j < gridSize; j++) {
          window.activityGrid[i][j] = 0;
        }
      }
    }
    totalGrains = 0;
    avalancheSizes = [];
  }
}
</script>
</body>
</html>
