<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cahn-Hilliard — Phase Separation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Cahn-Hilliard Equation — Phase Separation and Spinodal Decomposition
// RED AND BLACK VERSION
// Background: pure black (0,0,0)
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100

let grid = [];
let nextGrid = [];
let gridSize = 100;
let cellSize;
let t = 0;
let mobility = 0.5;
let kappa = 0.5;
let dt = 0.5;

function setup() {
  createCanvas(windowWidth, windowHeight);
  cellSize = max(4, floor(width / gridSize));
  
  for (let i = 0; i < gridSize; i++) {
    grid[i] = [];
    nextGrid[i] = [];
    for (let j = 0; j < gridSize; j++) {
      grid[i][j] = random(-0.1, 0.1);
      nextGrid[i][j] = grid[i][j];
    }
  }
}

function draw() {
  background(0, 0, 0);
  
  let mode = floor(t / 600) % 3;
  
  if (mode !== 2) {
    updateCahnHilliard();
  }
  
  if (mode === 0) {
    drawConcentration();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Cahn-Hilliard — Phase Separation", 10, 10);
    text("∂c/∂t = M∇²(c³ - c - κ∇²c)", 10, 26);
    text("Spinodal decomposition: separating from mixed state", 10, 42);
    text("Click to add concentration perturbation", 10, 58);
    text("Space to reset to random initial state", 10, 74);
    
  } else if (mode === 1) {
    drawLaplacian();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Chemical Potential ∇²(c³ - c - κ∇²c)", 10, 10);
    text("Drives system toward minimum free energy", 10, 26);
    text("Sharp interfaces develop (Gibbs-Thomson effect)", 10, 42);
    text("Domain coarsening: L ~ t^(1/3)", 10, 58);
    
  } else {
    drawNoiseInput();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Continuous Noise Input", 10, 10);
    text("System driven away from equilibrium", 10, 26);
    text("Dynamical scaling and pattern formation", 10, 42);
  }
  
  fill(10, 50, 70);
  textAlign(RIGHT, TOP);
  text("Mode " + (mode + 1) + "/3 — cycles automatically", width - 10, 10);
  
  t++;
}

function updateCahnHilliard() {
  let mu = [];
  
  for (let i = 0; i < gridSize; i++) {
    mu[i] = [];
    for (let j = 0; j < gridSize; j++) {
      let c = grid[i][j];
      let laplacianC = laplacian(i, j);
      mu[i][j] = c * c * c - c - kappa * laplacianC;
    }
  }
  
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let lapMu = laplacianOf(mu, i, j);
      nextGrid[i][j] = grid[i][j] + dt * mobility * lapMu;
      nextGrid[i][j] = constrain(nextGrid[i][j], -1, 1);
    }
  }
  
  if (floor(t / 600) % 3 === 2) {
    for (let i = 0; i < gridSize; i++) {
      for (let j = 0; j < gridSize; j++) {
        nextGrid[i][j] += random(-0.05, 0.05);
        nextGrid[i][j] = constrain(nextGrid[i][j], -1, 1);
      }
    }
  }
  
  [grid, nextGrid] = [nextGrid, grid];
}

function laplacian(i, j) {
  let sum = 0;
  let cCenter = grid[i][j];
  
  sum += grid[(i+1) % gridSize][j];
  sum += grid[(i-1+gridSize) % gridSize][j];
  sum += grid[i][(j+1) % gridSize];
  sum += grid[i][(j-1+gridSize) % gridSize];
  sum -= 4 * cCenter;
  
  return sum;
}

function laplacianOf(field, i, j) {
  let sum = 0;
  let fCenter = field[i][j];
  
  sum += field[(i+1) % gridSize][j];
  sum += field[(i-1+gridSize) % gridSize][j];
  sum += field[i][(j+1) % gridSize];
  sum += field[i][(j-1+gridSize) % gridSize];
  sum -= 4 * fCenter;
  
  return sum;
}

function drawConcentration() {
  noStroke();
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let c = grid[i][j];
      
      // RED palette: c near -1 = dim red, c near +1 = bright red
      let bright = map(abs(c), 0, 1, 30, 90);
      let sat = map(abs(c), 0, 1, 40, 80);
      
      fill(5, sat, bright);
      rect(i * cellSize, j * cellSize, cellSize, cellSize);
    }
  }
}

function drawLaplacian() {
  noStroke();
  
  let minMu = Infinity, maxMu = -Infinity;
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let c = grid[i][j];
      let laplacianC = laplacian(i, j);
      let mu = c * c * c - c - kappa * laplacianC;
      minMu = min(minMu, mu);
      maxMu = max(maxMu, mu);
    }
  }
  
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let c = grid[i][j];
      let laplacianC = laplacian(i, j);
      let mu = c * c * c - c - kappa * laplacianC;
      
      let normMu = map(mu, minMu, maxMu, 0, 1);
      
      // Red palette for potential
      let bright = map(abs(normMu - 0.5), 0, 0.5, 20, 85);
      let sat = map(abs(normMu - 0.5), 0, 0.5, 30, 70);
      
      fill(5, sat, bright);
      rect(i * cellSize, j * cellSize, cellSize, cellSize);
    }
  }
}

function drawNoiseInput() {
  drawConcentration();
}

function mousePressed() {
  let i = floor(mouseX / cellSize);
  let j = floor(mouseY / cellSize);
  
  for (let di = -3; di <= 3; di++) {
    for (let dj = -3; dj <= 3; dj++) {
      let ni = (i + di + gridSize) % gridSize;
      let nj = (j + dj + gridSize) % gridSize;
      let dist = sqrt(di*di + dj*dj);
      if (dist < 3) {
        grid[ni][nj] = random(-0.5, 0.5);
      }
    }
  }
}

function keyPressed() {
  if (key === ' ') {
    for (let i = 0; i < gridSize; i++) {
      for (let j = 0; j < gridSize; j++) {
        grid[i][j] = random(-0.1, 0.1);
      }
    }
  }
}
</script>
</body>
</html>
