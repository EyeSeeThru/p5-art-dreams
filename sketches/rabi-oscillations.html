<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabi Oscillations</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noStroke();
}

function draw() {
  background(10, 20, 8);
  
  let cx = width / 2;
  let cy = height / 2;
  
  // Rabi oscillation parameters
  let omega = 0.02; // Rabi frequency
  let detuning = 0.001; // Detuning
  let coupling = 0.015;
  
  // Probability amplitudes
  let Omega = 2 * coupling * 150;
  let Delta = detuning * 5000;
  let Rabi_freq = sqrt(Omega * Omega + Delta * Delta);
  
  // Draw quantum state visualization
  for (let i = 0; i < 80; i++) {
    let angle = map(i, 0, 80, 0, TWO_PI * 4);
    let radius = 80 + i * 3;
    
    // Probability amplitude oscillates
    let prob_up = sq(cos(Rabi_freq * t / 2));
    let prob_down = sin(Rabi_freq * t / 2);
    
    // Phase factor
    let phase = Delta * t - Omega * t * 0.5;
    
    let x = cx + cos(angle + phase * 0.1) * radius;
    let y = cy + sin(angle + phase * 0.1) * radius;
    
    // Color based on state probability
    let hue = map(prob_up, 0, 1, 180, 320);
    let sat = 70 + prob_up * 30;
    let bri = 40 + prob_up * 50;
    
    fill(hue, sat, bri, 0.6);
    ellipse(x, y, 4 + prob_up * 8, 4 + prob_up * 8);
  }
  
  // Draw rotating probability sphere (Bloch sphere projection)
  let sphereRadius = min(width, height) * 0.25;
  
  // Bloch sphere wireframe
  stroke(280, 60, 40, 0.3);
  noFill();
  ellipse(cx, cy, sphereRadius * 2, sphereRadius * 2);
  ellipse(cx, cy, sphereRadius * 2 * 0.7, sphereRadius * 2);
  ellipse(cx, cy, sphereRadius * 2, sphereRadius * 2 * 0.7);
  
  // State vector (Bloch vector)
  let theta = PI * (0.5 + 0.5 * sin(Rabi_freq * t));
  let phi = Delta * t * 0.5;
  
  let bx = sphereRadius * sin(theta) * cos(phi);
  let by = sphereRadius * sin(theta) * sin(phi);
  let bz = sphereRadius * cos(theta);
  
  // Project to 2D
  let px = cx + bx;
  let py = cy - bz * 0.5 + by * 0.3;
  
  // Draw state vector
  stroke(320, 80, 90, 0.8);
  strokeWeight(2);
  line(cx, cy, px, py);
  
  // State point
  fill(320, 80, 100, 0.9);
  noStroke();
  ellipse(px, py, 12, 12);
  
  // Draw energy levels
  let levelY = cy + sphereRadius + 80;
  let levelSpacing = 60;
  
  // Ground state
  fill(200, 60, 60, 0.8);
  ellipse(cx - 100, levelY, 30, 30);
  fill(0, 0, 90);
  textSize(10);
  textAlign(CENTER);
  text("|0⟩", cx - 100, levelY + 4);
  
  // Excited state  
  fill(320, 60, 60, 0.8);
  ellipse(cx + 100, levelY, 30, 30);
  fill(0, 0, 90);
  text("|1⟩", cx + 100, levelY + 4);
  
  // Transition arrow with oscillation
  let arrowAlpha = 0.3 + 0.7 * prob_up;
  fill(280, 70, 80, arrowAlpha);
  let arrowY = levelY - 20 + sin(Rabi_freq * t) * 10;
  ellipse(cx, arrowY, 20 + prob_up * 15, 20 + prob_up * 15);
  
  // Probability bars
  let barY = height - 80;
  let barWidth = 200;
  let barHeight = 20;
  
  // Ground state probability
  fill(200, 60, 50);
  rect(cx - barWidth - 20, barY, barWidth * prob_down, barHeight);
  fill(0, 0, 90);
  textAlign(LEFT);
  text("P(0): " + nf(prob_down, 0, 2), cx - barWidth - 20, barY - 8);
  
  // Excited state probability
  fill(320, 60, 50);
  rect(cx + 20, barY, barWidth * prob_up, barHeight);
  fill(0, 0, 90);
  text("P(1): " + nf(prob_up, 0, 2), cx + 20, barY - 8);
  
  // Title
  fill(0, 0, 70);
  textSize(16);
  textAlign(CENTER);
  text("Quantum Rabi Oscillations", cx, 40);
  textSize(10);
  text("|ψ⟩ = cos(θ/2)|0⟩ + sin(θ/2)e^(iφ)|1⟩", cx, 60);
  
  t += 0.03;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
