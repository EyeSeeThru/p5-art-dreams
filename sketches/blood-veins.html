<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blood Veins</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Blood Veins — Turing pattern reaction-diffusion in red and black
// Painterly, organic, alive
// Like watching blood flow through veins

let cols, rows;
let state = [];
let nextState = [];

const DA = 1.0;
const DB = 0.5;
const f = 0.055;
const k = 0.062;

let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);

  cols = floor(width);
  rows = floor(height);

  for (let i = 0; i < cols; i++) {
    state[i] = [];
    nextState[i] = [];
    for (let j = 0; j < rows; j++) {
      state[i][j] = { a: 1, b: 0 };
      nextState[i][j] = { a: 1, b: 0 };
    }
  }

  // Seed from edges - like veins growing from boundaries
  let r = min(width, height) * 0.12;
  let cx = floor(cols / 2);
  let cy = floor(rows / 2);

  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let d = dist(i, j, cx, cy);
      if (d < r) {
        let angle = atan2(j - cy, i - cx);
        let noiseVal = noise(i * 0.05 + j * 0.05 + 1000);
        state[i][j].b = 0.7 + noiseVal * 0.3;
        state[i][j].a = 1 - state[i][j].b;
      }
    }
  }
}

function draw() {
  for (let step = 0; step < 8; step++) {
    for (let i = 1; i < cols - 1; i++) {
      for (let j = 1; j < rows - 1; j++) {
        let s = state[i][j];
        let a = s.a;
        let b = s.b;

        let la = (state[i-1][j].a + state[i+1][j].a + state[i][j-1].a + state[i][j+1].a) - 4*a;
        let lb = (state[i-1][j].b + state[i+1][j].b + state[i][j-1].b + state[i][j+1].b) - 4*b;

        let newA = a + (DA * la - a * b * b + f * (1 - a));
        let newB = b + (DB * lb + a * b * b - (k + f) * b);

        newA = constrain(newA, 0, 1);
        newB = constrain(newB, 0, 1);

        nextState[i][j].a = newA;
        nextState[i][j].b = newB;
      }
    }

    let temp = state;
    state = nextState;
    nextState = temp;

    // Inject fresh at edges occasionally
    if (t % 100 === 0) {
      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < 3; j++) {
          if (random() < 0.1) {
            state[i][j].b = 0.8;
            state[i][j].a = 0.2;
            state[i][rows-1-j].b = 0.8;
            state[i][rows-1-j].a = 0.2;
          }
        }
        for (let i = 0; i < 3; i++) {
          for (let j = 0; j < rows; j++) {
            if (random() < 0.1) {
              state[i][j].b = 0.8;
              state[i][j].a = 0.2;
              state[cols-1-i][j].b = 0.8;
              state[cols-1-i][j].a = 0.2;
            }
          }
        }
      }
    }
  }

  t++;

  loadPixels();
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let idx = (i + j * cols) * 4;
      let s = state[i][j];

      let b = s.b;
      let r, g, bl;

      if (b > 0.25) {
        // Dark blood red
        r = 80 + b * 120;
        g = 5 + b * 15;
        bl = 10 + b * 15;
      } else if (b > 0.1) {
        // Deep maroon
        r = 40 + b * 200;
        g = 3 + b * 20;
        bl = 5 + b * 25;
      } else {
        // Near black with warmth
        r = 10 + random(8);
        g = 2 + random(4);
        bl = 5 + random(5);
      }

      pixels[idx] = r;
      pixels[idx+1] = g;
      pixels[idx+2] = bl;
      pixels[idx+3] = 255;
    }
  }
  updatePixels();
}

function windowResized() {}

function mousePressed() {
  let cx = mouseX;
  let cy = mouseY;
  let r = 25;

  for (let i = -r; i <= r; i++) {
    for (let j = -r; j <= r; j++) {
      let x = (cx + i + cols) % cols;
      let y = (cy + j + rows) % rows;
      if (dist(0, 0, i, j) < r) {
        state[x][y].b = 0.9;
        state[x][y].a = 0.1;
      }
    }
  }
}
</script>
</body>
</html>
