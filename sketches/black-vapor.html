<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Black Vapor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020202; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Black Vapor — Dark atmospheric vapor/mist using layered noise
// Very dark, subtle, with visible texture
// The feeling of deep shadow and shadow-veiled shadow

let t = 0;
let vaporLayers = [];
let vaporBuffer;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  vaporBuffer = createGraphics(width, height);

  // Create vapor layers at different depths
  for (let i = 0; i < 5; i++) {
    vaporLayers.push({
      sc: 0.002 + i * 0.001,
      spd: 0.0003 + i * 0.0001,
      offset: i * 137.5, // golden angle for variety
      darkness: 25 + i * 5, // controls color brightness
      alpha: 40 + i * 12  // controls max alpha (40-96)
    });
  }
}

function draw() {
  // Dark visible background - charcoal, not pure black
  background(18, 16, 20);

  t += 0.008;

  // Draw layered vapor
  drawVaporLayers();

  // Add very subtle vignette
  drawVignette();
}

function drawVaporLayers() {
  // Draw vapor into offscreen buffer using standard p5 drawing
  vaporBuffer.clear();
  
  // Use many semi-transparent ellipses at varying positions
  // Each "vapor layer" = a field of soft blurred circles
  for (let layer = 0; layer < vaporLayers.length; layer++) {
    let v = vaporLayers[layer];
    
    // Draw soft blurred circles across the screen
    let numCircles = 80 + layer * 20;
    
    for (let i = 0; i < numCircles; i++) {
      // Position based on noise so it shifts slowly
      let nx = noise(i * 0.03 + layer * 10 + t * v.spd);
      let ny = noise(i * 0.03 + layer * 10 + t * v.spd + 200);
      let x = nx * width * 1.5 - width * 0.25;
      let y = ny * height * 1.5 - height * 0.25;
      
      // Size varies with noise
      let ns = noise(i * 0.05 + layer * 5 + t * 0.02);
      let sz = (80 + ns * 250) * (0.8 + layer * 0.15);
      
      // Alpha based on noise density, scaled by layer alpha
      let na = noise(i * 0.02 + layer * 3);
      // Map to visible alpha range using layer's alpha as max
      let a = map(na, 0, 1, 15, v.alpha);
      a = constrain(a, 0, v.alpha);
      
      // Color: dark purple-gray with warmth
      // darkness 25-45 maps to rgb(50-90) range
      let baseGray = map(v.darkness, 25, 45, 50, 90);
      let colR = baseGray + 15;  // warm undertone
      let colG = baseGray + 5;
      let colB = baseGray;
      
      vaporBuffer.noStroke();
      vaporBuffer.fill(colR, colG, colB, a);
      vaporBuffer.ellipse(x, y, sz, sz * 0.7);
      
      // Add a second slightly-offset ellipse for fluffiness
      let x2 = x + cos(t * 0.05 + i) * sz * 0.2;
      let y2 = y + sin(t * 0.05 + i) * sz * 0.2;
      vaporBuffer.fill(colR - 5, colG - 5, colB - 3, a * 0.6);
      vaporBuffer.ellipse(x2, y2, sz * 0.7, sz * 0.5);
    }
  }
  
  // Draw buffer to main canvas
  image(vaporBuffer, 0, 0);
  
  // Add wispy tendrils overlay
  drawWispyTendrils();
}

function drawWispyTendrils() {
  // Draw thin wispy lines of vapor
  noStroke();
  
  for (let i = 0; i < 20; i++) {
    // Each tendril follows a curved path
    let startX = noise(i * 50, t * 0.05) * width;
    let startY = noise(i * 100, t * 0.05 + 500) * height;
    
    let tendrilLength = 150 + noise(i * 30) * 250;
    let angle = noise(i * 20, t * 0.03) * TWO_PI;
    
    // Draw as a series of connected ellipses
    let prevX = startX;
    let prevY = startY;
    
    for (let j = 0; j < 25; j++) {
      let progress = j / 25;
      let offset = progress * tendrilLength;
      
      // Add curve to path
      angle += noise(i * 10 + j * 5, t * 0.02) * 0.15 - 0.075;
      
      let tx = prevX + cos(angle) * (offset - (progress - 1) * tendrilLength) * 0.3;
      let ty = prevY + sin(angle) * (offset - (progress - 1) * tendrilLength) * 0.3;
      
      // Fade out at ends
      let fade = sin(progress * PI);
      let alpha = fade * 90 * noise(i, j);
      
      // Visible warm gray - brighter so it reads against dark bg
      fill(70, 55, 45, alpha);
      
      let w = (4 - progress * 3) * fade + 1.5;
      ellipse(tx, ty, w, w * 0.4);
      
      prevX = tx;
      prevY = ty;
    }
  }
}

function drawVignette() {
  // Very subtle vignette to enhance depth
  noStroke();
  
  // Draw a radial gradient vignette
  let cx = width / 2;
  let cy = height / 2;
  let maxDist = sqrt(cx * cx + cy * cy);
  
  // Multiple concentric ellipses for soft vignette
  for (let i = 0; i < 10; i++) {
    let d = maxDist * (1 - i / 10);
    let alpha = i * 8; // visible edge darkening
    
    fill(0, 0, 0, alpha);
    ellipse(cx, cy, d * 2, d * 2);
  }
}

function windowResized() {
  // Will maintain effect
}

function mousePressed() {
  // Click creates a subtle disturbance in the vapor
  // Just adds visual interest without changing the calm nature
  drawVaporBurst(mouseX, mouseY);
}

function drawVaporBurst(x, y) {
  // Subtle ripple of vapor at click point
  noStroke();
  
  for (let r = 0; r < 10; r++) {
    let radius = r * 20;
    let alpha = (10 - r) * 5;
    fill(50, 40, 32, alpha);
    ellipse(x, y, radius, radius * 0.7);
  }
}
</script>
</body>
</html>
