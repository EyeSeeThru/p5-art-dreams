<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Percolation Network</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #191919; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Percolation Network — Statistical physics phase transition visualization
// RED AND BLACK version - cluster connectivity and phase transitions
// Background: rgb(25,25,25) minimum
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100

const BG_R = 25, BG_G = 25, BG_B = 25;

let cols, rows;
let scale = 4;
let grid;
let occupied = [];
let clusters = [];
let spanningCluster = -1;
let currentP = 0.3;
let phase = 0;
let timer = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  cols = floor(width / scale);
  rows = floor(height / scale);
  
  initGrid();
}

function initGrid() {
  occupied = [];
  clusters = [];
  
  for (let i = 0; i < cols; i++) {
    occupied[i] = [];
    for (let j = 0; j < rows; j++) {
      occupied[i][j] = false;
      clusters.push(-1);
    }
  }
  
  spanningCluster = -1;
  timer = 0;
  phase = 0;
}

function draw() {
  background(BG_R, BG_G, BG_B);
  
  if (phase === 0) {
    if (currentP < 0.7) {
      currentP += 0.0003;
    } else {
      currentP = 0.3;
    }
    
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        if (!occupied[i][j] && random() < 0.05) {
          occupied[i][j] = (random() < currentP);
        }
      }
    }
    
    timer++;
    if (timer > 1800) {
      phase = 1;
      findClusters();
    }
  }
  
  drawGrid();
  drawUI();
}

function findClusters() {
  let label = 0;
  let labels = [];
  
  for (let i = 0; i < cols; i++) {
    labels[i] = [];
    for (let j = 0; j < rows; j++) {
      labels[i][j] = -1;
    }
  }
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      if (!occupied[i][j]) continue;
      
      let up = (j > 0) ? labels[i][j-1] : -1;
      let left = (i > 0) ? labels[i-1][j] : -1;
      
      if (up === -1 && left === -1) {
        labels[i][j] = label;
        label++;
      } else if (up !== -1 && left !== -1 && up !== left) {
        labels[i][j] = min(up, left);
        mergeLabels(labels, max(up, left), min(up, left));
      } else {
        labels[i][j] = (up !== -1) ? up : left;
      }
    }
  }
  
  let topLabels = new Set();
  let bottomLabels = new Set();
  
  for (let i = 0; i < cols; i++) {
    if (labels[i][0] !== -1) topLabels.add(labels[i][0]);
    if (labels[i][rows-1] !== -1) bottomLabels.add(labels[i][rows-1]);
  }
  
  let spanningLabels = [...topLabels].filter(l => bottomLabels.has(l));
  if (spanningLabels.length > 0) {
    spanningCluster = spanningLabels[0];
  }
  
  clusters = labels;
}

function mergeLabels(labels, from, to) {
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      if (labels[i][j] === from) {
        labels[i][j] = to;
      }
    }
  }
}

function drawGrid() {
  noStroke();
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      if (!occupied[i][j]) continue;
      
      let x = i * scale;
      let y = j * scale;
      
      if (phase === 0) {
        // Growing phase - all same red
        fill(10, 70, 80, 90);
      } else {
        if (clusters[i][j] === spanningCluster) {
          // Spanning cluster - brightest red
          fill(5, 75, 95, 95);
        } else {
          // Other clusters - varying saturation
          let sat = 50 + (clusters[i][j] % 5) * 8;
          fill(12, sat, 70, 80);
        }
      }
      
      rect(x, y, scale - 1, scale - 1);
    }
  }
  
  // Draw connections for spanning cluster
  if (phase === 1 && spanningCluster !== -1) {
    stroke(5, 80, 100, 40);
    strokeWeight(0.5);
    
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < rows; j++) {
        if (clusters[i][j] !== spanningCluster) continue;
        
        let x = i * scale + scale/2;
        let y = j * scale + scale/2;
        
        if (i < cols - 1 && clusters[i+1][j] === spanningCluster) {
          line(x, y, (i+1) * scale + scale/2, y);
        }
        if (j < rows - 1 && clusters[i][j+1] === spanningCluster) {
          line(x, y, x, (j+1) * scale + scale/2);
        }
      }
    }
  }
}

function drawUI() {
  fill(10, 30, 80);
  textSize(12);
  textAlign(RIGHT, TOP);
  
  let status = phase === 0 ? "Growing" : "Clustered";
  text("Percolation Network — p = " + nf(currentP, 1, 3) + " — " + status, width - 15, 15);
  
  fill(10, 30, 70);
  text("Critical threshold p ≈ 0.5927", width - 15, 32);
  text("Spanning cluster: " + (spanningCluster !== -1 ? "YES" : "NO"), width - 15, 49);
  
  fill(10, 30, 60);
  textAlign(LEFT, TOP);
  text("Click to reset and vary p manually", 15, 15);
}

function mousePressed() {
  initGrid();
  currentP = 0.3;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / scale);
  rows = floor(height / scale);
  initGrid();
}
</script>
</body>
</html>
