<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferrofluid</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const cols = 60;
const rows = 40;
let field = [];
let particles = [];
const numParticles = 800;

function setup() {
  createCanvas(windowWidth, windowHeight);
  
  // Initialize magnetic field grid
  for (let i = 0; i < cols; i++) {
    field[i] = [];
    for (let j = 0; j < rows; j++) {
      field[i][j] = createVector(0, 0);
    }
  }
  
  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      pos: createVector(random(width), random(height)),
      vel: createVector(0, 0),
      acc: createVector(0, 0),
      hue: random(360),
      size: random(2, 5)
    });
  }
}

function draw() {
  background(5, 5, 15, 30);
  
  // Update magnetic field - multiple attractors
  let t = frameCount * 0.01;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let x = (i / cols) * width;
      let y = (j / rows) * height;
      
      let fx = 0, fy = 0;
      
      // Central oscillating magnet
      let cx = width / 2 + sin(t * 0.7) * 100;
      let cy = height / 2 + cos(t * 0.5) * 80;
      let d = dist(x, y, cx, cy);
      let force = 5000 / (d * d + 100);
      fx += (cx - x) / d * force;
      fy += (cy - y) / d * force;
      
      // Orbiting magnets
      for (let m = 0; m < 3; m++) {
        let angle = t * (m + 1) * 0.3 + m * TWO_PI / 3;
        let mx = width / 2 + cos(angle) * 250;
        let my = height / 2 + sin(angle * 1.3) * 180;
        let dm = dist(x, y, mx, my);
        let mf = 3000 / (dm * dm + 80);
        fx += (mx - x) / dm * mf * (m % 2 === 0 ? 1 : -1);
        fy += (my - y) / dm * mf * (m % 2 === 0 ? 1 : -1);
      }
      
      field[i][j].set(fx * 0.15, fy * 0.15);
    }
  }
  
  // Draw field lines
  strokeWeight(1);
  for (let i = 0; i < cols; i += 2) {
    for (let j = 0; j < rows; j += 2) {
      let x = (i / cols) * width;
      let y = (j / rows) * height;
      let f = field[i][j];
      let mag = f.mag();
      if (mag > 0.5) {
        let alpha = map(mag, 0, 5, 20, 80);
        stroke(200, 50, 50, alpha);
        line(x, y, x + f.x * 3, y + f.y * 3);
      }
    }
  }
  
  // Update and draw particles
  for (let p of particles) {
    // Get field at particle position
    let ci = floor(p.pos.x / width * cols);
    let ri = floor(p.pos.y / height * rows);
    ci = constrain(ci, 0, cols - 1);
    ri = constrain(ri, 0, rows - 1);
    
    let force = field[ci][ri].copy();
    p.acc.add(force);
    
    p.vel.add(p.acc);
    p.vel.limit(8);
    p.pos.add(p.vel);
    p.acc.mult(0);
    
    // Damping
    p.vel.mult(0.98);
    
    // Wrap around edges
    if (p.pos.x < 0) p.pos.x = width;
    if (p.pos.x > width) p.pos.x = 0;
    if (p.pos.y < 0) p.pos.y = height;
    if (p.pos.y > height) p.pos.y = 0;
    
    // Draw particle with glow
    let speed = p.vel.mag();
    let hue = (p.hue + frameCount * 0.2) % 360;
    
    // Outer glow
    noStroke();
    for (let r = p.size * 3; r > 0; r -= 1) {
      let alpha = map(r, 0, p.size * 3, 30, 0);
      fill(hue, 80, 80, alpha);
      ellipse(p.pos.x, p.pos.y, r * 2);
    }
    
    // Core
    fill(hue, 70, 90, 250);
    ellipse(p.pos.x, p.pos.y, p.size);
  }
  
  // Draw magnet centers
  noStroke();
  for (let m = 0; m < 4; m++) {
    let angle = m < 3 ? t * (m + 1) * 0.3 + m * TWO_PI / 3 : t * 0.7;
    let mx = m < 3 ? width / 2 + cos(angle) * 250 : width / 2 + sin(t * 0.7) * 100;
    let my = m < 3 ? height / 2 + sin(angle * 1.3) * 180 : height / 2 + cos(t * 0.5) * 80;
    
    // Glow
    for (let r = 40; r > 0; r -= 2) {
      let alpha = map(r, 0, 40, 40, 0);
      fill(255, 80, 60, alpha);
      ellipse(mx, my, r * 2);
    }
    fill(255, 150, 100);
    ellipse(mx, my, 20);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
