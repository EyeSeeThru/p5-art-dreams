<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duffing Oscillator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0a0a0a; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Duffing Oscillator - Chaotic dynamics in a double-well potential
// dx/dt = y
// dy/dt = x - x³ - δy + γcos(ωt)

let t = 0;
let dt = 0.01;

// Parameters
let gamma = 0.3;  // Driving amplitude
let delta = 0.2;  // Damping
let omega = 1.0; // Driving frequency

// Initial conditions
let x = 0.1;
let y = 0.0;

// Trail
let trail = [];
let maxTrail = 800;

// Phase space grid
let gridScale = 40;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(0);
}

function draw() {
  // Multiple integration steps per frame for smoothness
  for (let i = 0; i < 5; i++) {
    // Duffing equations
    let dx = y;
    let dy = x - x*x*x - delta*y + gamma*cos(omega*t);
    
    x += dx * dt;
    y += dy * dt;
    t += dt;
  }
  
  // Fade effect
  background(0, 0, 0, 3);
  
  // Map to screen
  let screenX = map(x, -2.5, 2.5, width * 0.15, width * 0.85);
  let screenY = map(y, -2.5, 2.5, height * 0.85, height * 0.15);
  
  // Add to trail
  trail.push({x: screenX, y: screenY, phase: (t / (TWO_PI / omega)) % 1});
  if (trail.length > maxTrail) trail.shift();
  
  // Draw potential well visualization (subtle background)
  drawPotentialWell();
  
  // Draw attractors
  drawAttractor(-1, 0, 'left');
  drawAttractor(1, 0, 'right');
  
  // Draw trail with gradient colors
  noFill();
  beginShape();
  for (let i = 0; i < trail.length; i++) {
    let hue = map(i, 0, trail.length, 180, 320);
    let sat = 80;
    let bri = map(i, 0, trail.length, 40, 100);
    stroke(hue, sat, bri, map(i, 0, trail.length, 20, 90));
    strokeWeight(map(i, 0, trail.length, 0.5, 2.5));
    vertex(trail[i].x, trail[i].y);
  }
  endShape();
  
  // Draw current position
  let hue = (frameCount * 2) % 360;
  noStroke();
  fill(hue, 70, 100, 90);
  ellipse(screenX, screenY, 12, 12);
  
  // Glow
  fill(hue, 70, 100, 20);
  ellipse(screenX, screenY, 30, 30);
  
  // Reset if escaping too far
  if (x*x + y*y > 20) {
    x = random(-0.5, 0.5);
    y = random(-0.5, 0.5);
    trail = [];
  }
}

function drawPotentialWell() {
  // Visualize the double-well potential V(x) = -x²/2 + x⁴/4
  let wellCenterX = width * 0.5;
  let wellCenterY = height * 0.7;
  let wellScale = min(width, height) * 0.3;
  
  noFill();
  stroke(0, 0, 20, 30);
  strokeWeight(1);
  
  beginShape();
  for (let px = -2; px <= 2; px += 0.05) {
    let potential = -px*px/2 + px*px*px*px/4;
    let sx = wellCenterX + px * wellScale * 0.4;
    let sy = wellCenterY - potential * wellScale * 0.5;
    vertex(sx, sy);
  }
  endShape();
  
  // Draw wells
  fill(0, 0, 15, 20);
  noStroke();
  ellipse(wellCenterX - wellScale * 0.35, wellCenterY, 20, 20);
  ellipse(wellCenterX + wellScale * 0.35, wellCenterY, 20, 20);
}

function drawAttractor(px, py, label) {
  let screenX = map(px, -2.5, 2.5, width * 0.15, width * 0.85);
  let screenY = map(py, -2.5, 2.5, height * 0.85, height * 0.15);
  
  noStroke();
  fill(0, 0, 30, 15);
  ellipse(screenX, screenY, 40, 40);
  fill(0, 0, 50, 40);
  ellipse(screenX, screenY, 15, 15);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
  trail = [];
}
</script>
</body>
</html>
