<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Black Moss</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030302; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Black Moss — Velvety dark surface like moss or velvet in darkness
// Subtle moisture sheen, very organic and lush
// Near-black with very subtle warm undertones

let mossPatch = [];
let numPatches = 25;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);

  // Initialize moss patches
  for (let i = 0; i < numPatches; i++) {
    mossPatch.push(createMossPatch());
  }
}

function createMossPatch() {
  return {
    x: random(width),
    y: random(height),
    sz: random(40, 120),
    ph: random(TWO_PI),
    spd: random(0.002, 0.008),
    // Color variation
    baseDark: random(8, 18), // very dark
    warmUndertone: random(-5, 15), // subtle red/warm shift
    // Texture
    texScale: random(0.03, 0.08),
    complexity: floor(random(3, 6)),
    // Sheen (moisture reflection)
    sheenAmount: random(0.1, 0.4),
    sheenPh: random(TWO_PI),
    // Movement
    breatheSpd: random(0.005, 0.015),
    breatheAmt: random(0.02, 0.06)
  };
}

function draw() {
  // Dark background - visible dark gray-green, not true black
  background(12, 10, 8);

  t += 0.01;

  // Draw base moss texture layer
  drawMossBase();

  // Draw individual moss patches
  for (let i = 0; i < mossPatch.length; i++) {
    let p = mossPatch[i];

    // Slow drift
    p.x += sin(t * p.spd + p.ph) * 0.2;
    p.y += cos(t * p.spd * 0.7 + p.ph) * 0.15;

    // Wrap
    if (p.x < -p.sz) p.x = width + p.sz;
    if (p.x > width + p.sz) p.x = -p.sz;
    if (p.y < -p.sz) p.y = height + p.sz;
    if (p.y > height + p.sz) p.y = -p.sz;

    // Draw this moss patch
    drawMossPatch(p);
  }

  // Add moisture sheen overlay
  drawMoistureSheen();

  // Add fine detail fuzz
  drawFuzzLayer();
}

function drawMossBase() {
  // Create a textured dark background that looks like moss/carpet
  loadPixels();
  for (let y = 0; y < height; y += 2) {
    for (let x = 0; x < width; x += 2) {
      let idx = (y * width + x) * 4;

      // Multi-octave noise for organic texture
      let n = noise(x * 0.02, y * 0.02, t * 0.1) * 0.4;
      n += noise(x * 0.05, y * 0.05, t * 0.15) * 0.3;
      n += noise(x * 0.1, y * 0.1, t * 0.2) * 0.2;
      n += noise(x * 0.2, y * 0.2, t * 0.3) * 0.1;

      // Warm undertone in the darks
      let warmth = noise(x * 0.01 + 100, y * 0.01 + 100) * 12;

      // Brighter base range so moss is actually visible
      let base = 18 + n * 35 + warmth * 0.4;
      base = min(base, 55); // dark but visible

      // Gamma correction for better contrast in darks
      base = pow(base / 255, 0.6) * 255;

      pixels[idx] = base + warmth * 0.4; // R
      pixels[idx+1] = base * 0.88;        // G (green undertone)
      pixels[idx+2] = base * 0.80;       // B
      pixels[idx+3] = 255;
    }
  }
  updatePixels();
}

function drawMossPatch(p) {
  // Individual organic moss cluster
  push();
  translate(p.x, p.y);

  // Breathing scale
  let breathe = 1 + sin(t * p.breatheSpd + p.sheenPh) * p.breatheAmt;
  scale(breathe);

  // Draw fractal-like moss strands
  noStroke();

  for (let layer = 0; layer < p.complexity; layer++) {
    let layerSz = p.sz * (1 - layer * 0.2);
    let alpha = 50 + layer * 20;

    // Base cluster shape - dark but visible
    fill(p.baseDark * 2 + p.warmUndertone, p.baseDark * 1.5, p.baseDark, alpha);

    beginShape();
    for (let a = 0; a < TWO_PI; a += PI / 8) {
      let r = layerSz * (0.5 + noise(cos(a) * 2, sin(a) * 2, layer + t * 0.1) * 0.5);
      let x = cos(a) * r;
      let y = sin(a) * r;
      vertex(x, y);
    }
    endShape(CLOSE);

    // Add smaller detail clusters within
    for (let i = 0; i < 5; i++) {
      let angle = noise(i * 10, layer + t * 0.1) * TWO_PI;
      let dist = noise(i * 5, layer + t * 0.1 + 50) * layerSz * 0.4;
      let dx = cos(angle) * dist;
      let dy = sin(angle) * dist;
      let ds = noise(i * 20, layer + t * 0.2) * layerSz * 0.15 + 5;

      fill(p.baseDark * 2 + 10 + p.warmUndertone, p.baseDark * 1.5 + 5, p.baseDark + 3, alpha * 0.7);
      ellipse(dx, dy, ds, ds * 0.8);
    }
  }

  // Add sheen (moisture reflection) highlights
  if (p.sheenAmount > 0.15) {
    let sheenAngle = t * 0.2 + p.sheenPh;
    let sheenX = cos(sheenAngle) * p.sz * 0.2;
    let sheenY = sin(sheenAngle) * p.sz * 0.15;

    // Bright sheen spot — lifted so it's actually visible
    fill(100 + p.warmUndertone * 3, 80, 65, 80 * p.sheenAmount);
    ellipse(sheenX, sheenY, p.sz * 0.35, p.sz * 0.25);

    // Secondary sheen
    fill(70 + p.warmUndertone * 2, 55, 45, 50 * p.sheenAmount);
    ellipse(sheenX * 0.5, sheenY * 0.7, p.sz * 0.18, p.sz * 0.12);
  }

  pop();
}

function drawMoistureSheen() {
  // Overall subtle moisture sheen that shifts slowly
  noStroke();

  // Create moving sheen spots
  for (let i = 0; i < 5; i++) {
    let sx = noise(t * 0.1 + i * 100, i * 50) * width;
    let sy = noise(t * 0.1 + i * 200, i * 100 + 500) * height;
    let ss = noise(t * 0.05 + i * 300) * 200 + 50;
    let sa = noise(t * 0.2 + i * 400) * 40 + 10;

    // Warm subtle sheen - visible dark gray
    fill(50, 40, 32, sa);
    ellipse(sx, sy, ss, ss * 0.6);
  }
}

function drawFuzzLayer() {
  // Fine fuzz/details on top of moss texture
  noStroke();
  for (let i = 0; i < 200; i++) {
    let fx = noise(i * 5, t * 0.1) * width;
    let fy = noise(i * 10, t * 0.1 + 200) * height;
    let fs = noise(i * 30) * 3 + 1;
    let fa = noise(i * 40) * 50 + 15;

    // Slight warm tint - visible dark olive
    fill(30, 25, 18, fa);
    ellipse(fx, fy, fs, fs * 0.7);
  }
}

function windowResized() {
  // Will maintain aspect ratio
}

function mousePressed() {
  // Add new moss patch at click location
  let newPatch = createMossPatch();
  newPatch.x = mouseX;
  newPatch.y = mouseY;
  newPatch.sheenAmount = random(0.2, 0.5);
  mossPatch.push(newPatch);

  // Limit patches
  if (mossPatch.length > 35) {
    mossPatch.shift();
  }
}
</script>
</body>
</html>
