<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helicon Flutes</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let particles = [];
let time = 0;
const NUM_PARTICLES = 800;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  for (let i = 0; i < NUM_PARTICLES; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      angle: random(TWO_PI),
      radius: random(50, 300),
      speed: random(0.5, 2),
      phase: random(TWO_PI),
      helixOffset: random(100)
    });
  }
}

function draw() {
  background(0, 0, 0, 0.08);
  
  let t = time * 0.01;
  
  for (let p of particles) {
    let angle = p.angle + t * p.speed;
    
    // Helicon wave equation influence
    let helixX = sin(angle + p.helixOffset * 0.01) * p.radius * (1 + 0.3 * sin(t + p.phase));
    let helixY = cos(angle - p.helixOffset * 0.01) * p.radius * (1 + 0.3 * cos(t + p.phase));
    
    // Add wave modulation
    let waveX = sin(t * 2 + p.y * 0.01) * 50;
    let waveY = cos(t * 1.5 + p.x * 0.01) * 50;
    
    let x = width/2 + helixX + waveX;
    let y = height/2 + helixY + waveY;
    
    // Distance-based color
    let dist = dist(width/2, height/2, x, y);
    let hue = (dist * 0.5 + t * 20 + p.phase * 10) % 360;
    let sat = 70 + 30 * sin(t + p.phase);
    let bri = 80 + 20 * sin(dist * 0.02 + t);
    
    // Flute-like resonance glow
    let alpha = map(dist, 0, 400, 0.8, 0.2);
    alpha *= 0.5 + 0.5 * sin(t * 3 + p.phase);
    
    noStroke();
    fill(hue, sat, bri, alpha);
    
    let size = map(dist, 0, 400, 4, 1);
    ellipse(x, y, size, size);
    
    // Connection lines for nearby particles
    for (let other of particles) {
      if (other === p) continue;
      let otherAngle = other.angle + t * other.speed;
      let otherHelixX = sin(otherAngle + other.helixOffset * 0.01) * other.radius * (1 + 0.3 * sin(t + other.phase));
      let otherHelixY = cos(otherAngle - other.helixOffset * 0.01) * other.radius * (1 + 0.3 * cos(t + other.phase));
      let otherWaveX = sin(t * 2 + other.y * 0.01) * 50;
      let otherWaveY = cos(t * 1.5 + other.x * 0.01) * 50;
      let ox = width/2 + otherHelixX + otherWaveX;
      let oy = height/2 + otherHelixY + otherWaveY;
      
      let d = dist(x, y, ox, oy);
      if (d < 40) {
        let lineAlpha = map(d, 0, 40, 0.3, 0);
        stroke(hue, sat - 20, bri, lineAlpha);
        strokeWeight(0.5);
        line(x, y, ox, oy);
      }
    }
  }
  
  time++;
  
  // Central glow
  noStroke();
  for (let r = 100; r > 0; r -= 10) {
    let alpha = map(r, 100, 0, 0, 0.3);
    fill(200, 80, 100, alpha * (0.5 + 0.5 * sin(t * 0.5)));
    ellipse(width/2, height/2, r * 2, r * 2);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
