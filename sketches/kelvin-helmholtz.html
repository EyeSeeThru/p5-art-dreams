<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelvin-Helmholtz Instability</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; }
  </style>
</head>
<body>
<script>
const SCALE = 4;
let cols, rows;
let u, v, u_prev, v_prev;
let dt = 0.1;
let diff = 0.0001;
let visc = 0.0001;

function setup() {
  createCanvas(windowWidth, windowHeight);
  cols = floor(width / SCALE);
  rows = floor(height / SCALE);
  
  u = new Array(cols * rows).fill(0);
  v = new Array(cols * rows).fill(0);
  u_prev = new Array(cols * rows).fill(0);
  v_prev = new Array(cols * rows).fill(0);
  
  initKelvinHelmholtz();
  
  noStroke();
}

function initKelvinHelmholtz() {
  let midY = rows / 2;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let idx = i + j * cols;
      
      // Two layers moving in opposite directions
      if (j < midY) {
        u[idx] = 1.5;
        v[idx] = 0;
      } else {
        u[idx] = -1.5;
        v[idx] = 0;
      }
      
      // Add perturbation at the interface
      let distFromMid = abs(j - midY);
      if (distFromMid < 5) {
        let noiseVal = noise(i * 0.1, frameCount * 0.01);
        v[idx] += (noiseVal - 0.5) * 2;
        u[idx] += (noise(i * 0.1 + 100, frameCount * 0.01) - 0.5);
      }
    }
  }
}

function IX(x, y) {
  x = constrain(x, 0, cols - 1);
  y = constrain(y, 0, rows - 1);
  return x + y * cols;
}

function diffuse(b, x, x0, diff, dt) {
  let a = dt * diff * (cols - 2) * (rows - 2);
  lin_solve(b, x, x0, a, 1 + 6 * a);
}

function lin_solve(b, x, x0, a, c) {
  let cRecip = 1.0 / c;
  for (let k = 0; k < 4; k++) {
    for (let i = 1; i < cols - 1; i++) {
      for (let j = 1; j < rows - 1; j++) {
        x[IX(i, j)] = (x0[IX(i, j)] + a * (
          x[IX(i + 1, j)] + x[IX(i - 1, j)] +
          x[IX(i, j + 1)] + x[IX(i, j - 1)]
        )) * cRecip;
      }
    }
  }
  set_bnd(b, x);
}

function project(u, v, p, div) {
  let h = 1.0 / min(cols, rows);
  
  for (let i = 1; i < cols - 1; i++) {
    for (let j = 1; j < rows - 1; j++) {
      div[IX(i, j)] = -0.5 * h * (
        u[IX(i + 1, j)] - u[IX(i - 1, j)] +
        v[IX(i, j + 1)] - v[IX(i, j - 1)]
      );
      p[IX(i, j)] = 0;
    }
  }
  
  set_bnd(0, div);
  set_bnd(0, p);
  lin_solve(0, p, div, 1, 6);
  
  for (let i = 1; i < cols - 1; i++) {
    for (let j = 1; j < rows - 1; j++) {
      u[IX(i, j)] -= 0.5 * (p[IX(i + 1, j)] - p[IX(i - 1, j)]) / h;
      v[IX(i, j)] -= 0.5 * (p[IX(i, j + 1)] - p[IX(i, j - 1)]) / h;
    }
  }
  
  set_bnd(1, u);
  set_bnd(2, v);
}

function advect(b, d, d0, u, v, dt) {
  let i0, i1, j0, j1;
  let x, y, s0, t0, s1, t1;
  let dt0 = dt * min(cols, rows);
  
  for (let i = 1; i < cols - 1; i++) {
    for (let j = 1; j < rows - 1; j++) {
      x = i - dt0 * u[IX(i, j)];
      y = j - dt0 * v[IX(i, j)];
      
      if (x < 0.5) x = 0.5;
      if (x > cols - 1.5) x = cols - 1.5;
      i0 = floor(x);
      i1 = i0 + 1;
      
      if (y < 0.5) y = 0.5;
      if (y > rows - 1.5) y = rows - 1.5;
      j0 = floor(y);
      j1 = j0 + 1;
      
      s1 = x - i0;
      s0 = 1 - s1;
      t1 = y - j0;
      t0 = 1 - t1;
      
      d[IX(i, j)] = s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
                    s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
    }
  }
  
  set_bnd(b, d);
}

function set_bnd(b, x) {
  for (let i = 1; i < cols - 1; i++) {
    x[IX(i, 0)] = b == 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
    x[IX(i, rows - 1)] = b == 2 ? -x[IX(i, rows - 2)] : x[IX(i, rows - 2)];
  }
  for (let j = 1; j < rows - 1; j++) {
    x[IX(0, j)] = b == 1 ? -x[IX(1, j)] : x[IX(1, j)];
    x[IX(cols - 1, j)] = b == 1 ? -x[IX(cols - 2, j)] : x[IX(cols - 2, j)];
  }
  
  x[IX(0, 0)] = 0.5 * (x[IX(1, 0)] + x[IX(0, 1)]);
  x[IX(0, rows - 1)] = 0.5 * (x[IX(1, rows - 1)] + x[IX(0, rows - 2)]);
  x[IX(cols - 1, 0)] = 0.5 * (x[IX(cols - 2, 0)] + x[IX(cols - 1, 1)]);
  x[IX(cols - 1, rows - 1)] = 0.5 * (x[IX(cols - 2, rows - 1)] + x[IX(cols - 1, rows - 2)]);
}

function vel_step(u, v, u0, v0, visc, dt) {
  diffuse(1, u0, u, visc, dt);
  diffuse(2, v0, v, visc, dt);
  
  project(u0, v0, u, v);
  
  advect(1, u, u0, u0, v0, dt);
  advect(2, v, v0, u0, v0, dt);
  
  project(u, v, u0, v0);
}

function draw() {
  // Add continuous perturbation at interface
  let midY = rows / 2;
  for (let i = 0; i < cols; i++) {
    let noiseVal = noise(i * 0.05 + frameCount * 0.02, frameCount * 0.01);
    let perturbation = (noiseVal - 0.5) * 0.8;
    for (let dj = -3; dj <= 3; dj++) {
      let j = floor(midY + dj);
      if (j >= 0 && j < rows) {
        let idx = IX(i, j);
        v[idx] += perturbation * (1 - abs(dj) / 4);
      }
    }
  }
  
  vel_step(u, v, u_prev, v_prev, visc, dt);
  
  background(5, 5, 15);
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let idx = IX(i, j);
      let vel = sqrt(u[idx] * u[idx] + v[idx] * v[idx]);
      let speed = constrain(vel * 0.3, 0, 1);
      
      let angle = atan2(v[idx], u[idx]);
      let hue = map(angle, -PI, PI, 0.3, 0.9);
      let sat = map(speed, 0, 1, 0.3, 0.9);
      let bri = map(speed, 0, 1, 0.1, 0.95);
      
      colorMode(HSB, 1);
      fill(hue, sat, bri);
      rect(i * SCALE, j * SCALE, SCALE, SCALE);
    }
  }
  
  colorMode(RGB);
  fill(255, 59, 59, 15);
  rect(0, 0, width, height);
}

function mousePressed() {
  let mx = floor(mouseX / SCALE);
  let my = floor(mouseY / SCALE);
  
  for (let di = -3; di <= 3; di++) {
    for (let dj = -3; dj <= 3; dj++) {
      let i = constrain(mx + di, 1, cols - 2);
      let j = constrain(my + dj, 1, rows - 2);
      u[IX(i, j)] += random(-2, 2);
      v[IX(i, j)] += random(-2, 2);
    }
  }
}
</script>
</body>
</html>
