<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Red Veins</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050302; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Red Veins — Branching red lines on black like circulatory system or roots
// Organic, flowing, with subtle pulsing
// The feeling of life flowing through darkness

let veins = [];
let numVeins = 12;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  colorMode(RGB);

  // Initialize vein systems
  for (let i = 0; i < numVeins; i++) {
    veins.push(createVein());
  }
}

function createVein() {
  return {
    // Starting point
    x: random(width),
    y: random(height),
    // Direction
    angle: random(TWO_PI),
    // Growth
    length: 0,
    maxLength: random(200, 500),
    speed: random(0.5, 1.5),
    // Branching
    branches: [],
    branchChance: random(0.02, 0.06),
    branchDepth: 0,
    maxDepth: 3,
    // Visual
    thickness: random(3, 8),
    baseHue: random(350, 380), // deep red
    // Pulse
    pulsePhase: random(TWO_PI),
    pulseSpeed: random(0.01, 0.03),
    // Movement
    driftX: random(-0.1, 0.1),
    driftY: random(-0.1, 0.1),
    // Segments for smooth curve
    segments: [{x: 0, y: 0}]
  };
}

function draw() {
  // Near-black background with slight warmth
  background(5, 3, 2);

  t += 0.016;

  // Draw all veins
  for (let vein of veins) {
    // Grow the main vein
    growVein(vein);
    
    // Draw the vein
    drawVein(vein);
    
    // Draw branches
    for (let branch of vein.branches) {
      growVein(branch);
      drawVein(branch);
    }
    
    // Occasionally spawn new branches
    if (random() < vein.branchChance && vein.branchDepth < vein.maxDepth) {
      if (vein.segments.length > 10) {
        let segIdx = floor(random(5, vein.segments.length));
        let seg = vein.segments[segIdx];
        let parentAngle = vein.angle + random(-0.8, 0.8);
        
        let newBranch = {
          x: vein.x + seg.x,
          y: vein.y + seg.y,
          angle: parentAngle,
          length: 0,
          maxLength: vein.maxLength * random(0.3, 0.6),
          speed: vein.speed * random(0.8, 1.2),
          branches: [],
          branchChance: vein.branchChance * 0.7,
          branchDepth: vein.branchDepth + 1,
          thickness: vein.thickness * random(0.5, 0.7),
          baseHue: vein.baseHue + random(-10, 10),
          pulsePhase: random(TWO_PI),
          pulseSpeed: random(0.01, 0.03),
          driftX: vein.driftX + random(-0.05, 0.05),
          driftY: vein.driftY + random(-0.05, 0.05),
          segments: [{x: 0, y: 0}]
        };
        vein.branches.push(newBranch);
      }
    }
    
    // Slowly drift
    vein.x += vein.driftX;
    vein.y += vein.driftY;
    
    // Wrap around
    if (vein.x < -200) vein.x = width + 200;
    if (vein.x > width + 200) vein.x = -200;
    if (vein.y < -200) vein.y = height + 200;
    if (vein.y > height + 200) vein.y = -200;
  }
  
  // Add subtle glow overlay
  drawGlow();
}

function growVein(vein) {
  if (vein.length < vein.maxLength) {
    // Add new segment
    let stepSize = vein.speed;
    let dx = cos(vein.angle) * stepSize;
    let dy = sin(vein.angle) * stepSize;
    
    // Add some wobble
    vein.angle += random(-0.1, 0.1);
    
    let lastSeg = vein.segments[vein.segments.length - 1];
    vein.segments.push({
      x: lastSeg.x + dx,
      y: lastSeg.y + dy
    });
    
    vein.length += stepSize;
  }
}

function drawVein(vein) {
  if (vein.segments.length < 2) return;
  
  let pulse = sin(t * vein.pulseSpeed + vein.pulsePhase) * 0.3 + 0.7;
  
  // Draw as a smooth curve with varying thickness
  noFill();
  
  // Glow layer (softer)
  stroke(80 * pulse, 20, 15, 40);
  strokeWeight(vein.thickness * 3 * pulse);
  drawVeinCurve(vein.segments);
  
  // Main vein
  let hue = vein.baseHue;
  let sat = 70 + pulse * 20;
  let bri = 40 + pulse * 25;
  
  stroke(hue, sat, bri, 180);
  strokeWeight(vein.thickness * pulse);
  drawVeinCurve(vein.segments);
  
  // Bright core
  stroke(hue, 50, 80, 100 * pulse);
  strokeWeight(vein.thickness * 0.3 * pulse);
  drawVeinCurve(vein.segments);
}

function drawVeinCurve(segments) {
  if (segments.length < 2) return;
  
  beginShape();
  for (let i = 0; i < segments.length; i++) {
    let seg = segments[i];
    // Use slight curve smoothing
    if (i > 0 && i < segments.length - 1) {
      let prev = segments[i - 1];
      let next = segments[i + 1];
      let cx = seg.x;
      let cy = seg.y;
      // Simple smoothing
      curveVertex(cx, cy);
    } else {
      curveVertex(seg.x, seg.y);
    }
  }
  endShape();
}

function drawGlow() {
  // Add overall subtle red glow
  noStroke();
  
  // Find center of all veins
  let cx = 0, cy = 0, count = 0;
  for (let vein of veins) {
    cx += vein.x;
    cy += vein.y;
    count++;
  }
  if (count > 0) {
    cx /= count;
    cy /= count;
    
    // Soft glow at center
    for (let r = 300; r > 0; r -= 50) {
      let alpha = map(r, 300, 0, 0, 15);
      fill(60, 20, 15, alpha);
      ellipse(cx, cy, r, r * 0.8);
    }
  }
}

function windowResized() {
  // Will reinitialize on next run
}

function mousePressed() {
  // Click adds a new vein at the click position
  let newVein = createVein();
  newVein.x = mouseX;
  newVein.y = mouseY;
  newVein.thickness = random(4, 10);
  veins.push(newVein);
  
  // Limit total veins
  if (veins.length > 20) {
    veins.shift();
  }
}
</script>
</body>
</html>
