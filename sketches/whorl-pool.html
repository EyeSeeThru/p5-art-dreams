<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whorl Pool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const PARTICLE_COUNT = 600;
const VORTEX_RINGS = 5;
let particles = [];
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  background(0, 0, 5, 25);
  
  translate(width / 2, height / 2);
  
  // Draw vortex rings
  for (let ring = 0; ring < VORTEX_RINGS; ring++) {
    let ringRadius = (ring + 1) * min(width, height) * 0.15;
    let ringAngle = frameCount * 0.003 + ring * TWO_PI / VORTEX_RINGS;
    
    push();
    rotate(ringAngle);
    noFill();
    stroke(200 + ring * 15, 60, 40, 30);
    strokeWeight(0.5);
    
    for (let a = 0; a < TWO_PI; a += 0.1) {
      let r = ringRadius + sin(a * 6 + t) * 15;
      let px = cos(a) * r;
      let py = sin(a) * r * 0.3;
      ellipse(px, py, 3, 3);
    }
    pop();
  }
  
  // Draw particles
  for (let p of particles) {
    p.update();
    p.display();
  }
  
  // Center glow
  let glowSize = 80 + sin(t * 2) * 20;
  for (let r = glowSize; r > 0; r -= 10) {
    fill(220, 80, 20, (1 - r / glowSize) * 20);
    ellipse(0, 0, r, r);
  }
  
  t += 0.02;
}

class Particle {
  constructor() {
    this.reset();
  }
  
  reset() {
    let angle = random(TWO_PI);
    let dist = random(50, min(width, height) * 0.45);
    this.x = cos(angle) * dist;
    this.y = sin(angle) * dist;
    this.prevX = this.x;
    this.prevY = this.y;
    this.hue = random(180, 280);
    this.size = random(1.5, 4);
    this.speed = random(0.5, 2.5);
    this.life = random(100, 300);
    this.maxLife = this.life;
    this.spiral = random(0.02, 0.06);
    this.wobble = random(0.5, 2);
    this.wobbleOffset = random(TWO_PI);
  }
  
  update() {
    this.prevX = this.x;
    this.prevY = this.y;
    
    let centerDist = dist(this.x, this.y, 0, 0);
    let pull = map(centerDist, 0, min(width, height) * 0.45, 0.1, 0.8);
    
    // Spiral inward
    let angle = atan2(this.y, this.x);
    let newAngle = angle + this.spiral + sin(t * this.wobble + this.wobbleOffset) * 0.02;
    let speed = this.speed * pull;
    
    this.x += cos(newAngle) * speed;
    this.y += sin(newAngle) * speed + sin(t + this.wobbleOffset) * 0.3;
    
    // Slight outward drift at center
    if (centerDist < 20) {
      this.x *= 1.02;
      this.y *= 1.02;
    }
    
    this.life--;
    
    if (this.life <= 0 || centerDist < 5) {
      this.reset();
    }
  }
  
  display() {
    let lifeRatio = this.life / this.maxLife;
    let alpha = lifeRatio * 80;
    
    // Trail
    stroke(this.hue, 70, 90, alpha * 0.5);
    strokeWeight(this.size * 0.5);
    line(this.prevX, this.prevY, this.x, this.y);
    
    // Particle
    noStroke();
    fill(this.hue, 60, 95, alpha);
    ellipse(this.x, this.y, this.size, this.size);
    
    // Glow at center particles
    if (dist(this.x, this.y, 0, 0) < 60) {
      fill(this.hue, 40, 100, alpha * 0.3);
      ellipse(this.x, this.y, this.size * 3, this.size * 3);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
