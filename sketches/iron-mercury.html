<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Iron Mercury</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #050000; overflow: hidden; }
    canvas { display: block; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
// Iron Mercury — flowing liquid metal, deep red mercury-like substance
// Shaders & GLSL: procedural liquid metal with metaball-like flowing

let metaBalls = [];
const NUM_BALLS = 7;

const vertexShader = `
precision highp float;
attribute vec3 aPosition;
void main() {
  vec4 vec4Position = vec4(aPosition, 1.0);
  vec4Position.xy = vec4Position.xy * 2.0 - 1.0;
  gl_Position = vec4Position;
}`;

const fragmentShader = `
precision highp float;
uniform vec2 uResolution;
uniform float uTime;

float metaball(vec2 p, vec2 center, float radius) {
  float d = length(p - center);
  return radius * radius / (d * d + 0.001);
}

void main() {
  vec2 uv = gl_FragCoord.xy / uResolution;
  vec2 p = (gl_FragCoord.xy - uResolution * 0.5) / min(uResolution.x, uResolution.y);
  p *= 2.5;
  
  float time = uTime * 0.4;
  
  // Metaball positions (flowing)
  vec2 balls[7];
  balls[0] = vec2(sin(time * 0.7) * 0.8, cos(time * 0.5) * 0.6);
  balls[1] = vec2(cos(time * 0.9 + 1.0) * 0.9, sin(time * 0.7 + 2.0) * 0.7);
  balls[2] = vec2(sin(time * 0.5 + 2.0) * 0.6, cos(time * 0.8 + 1.0) * 0.8);
  balls[3] = vec2(cos(time * 0.6 + 3.0) * 0.7, sin(time * 0.9 + 0.5) * 0.5);
  balls[4] = vec2(sin(time * 0.8 + 4.0) * 0.85, cos(time * 0.6 + 1.5) * 0.65);
  balls[5] = vec2(cos(time * 0.4 + 5.0) * 0.55, sin(time * 0.7 + 2.5) * 0.75);
  balls[6] = vec2(sin(time * 0.65 + 6.0) * 0.75, cos(time * 0.75 + 3.5) * 0.6);
  
  float radii[7];
  radii[0] = 0.35 + sin(time * 1.2) * 0.08;
  radii[1] = 0.30 + cos(time * 1.1) * 0.1;
  radii[2] = 0.28 + sin(time * 0.9) * 0.12;
  radii[3] = 0.32 + cos(time * 1.3) * 0.07;
  radii[4] = 0.25 + sin(time * 0.8) * 0.1;
  radii[5] = 0.33 + cos(time * 1.0) * 0.09;
  radii[6] = 0.27 + sin(time * 1.15) * 0.11;
  
  // Sum metaballs
  float sum = 0.0;
  for (int i = 0; i < 7; i++) {
    sum += metaball(p, balls[i], radii[i]);
  }
  
  // Threshold for blob shape
  float threshold = 1.8;
  float edge = 0.3;
  
  float blob = smoothstep(threshold - edge, threshold + edge, sum);
  
  // Colors - deep red mercury
  vec3 deepRed = vec3(0.0, 0.0, 0.02);  // Near black
  vec3 mercuryRed = vec3(0.0, 0.85, 0.35);  // Deep red mercury
  vec3 highlight = vec3(0.02, 0.5, 0.5);  // Red highlight
  vec3 brightRed = vec3(0.0, 0.9, 0.6);  // Bright red for highlights
  
  // Calculate normal-like direction for shading
  vec2 normal = vec2(0.0);
  for (int i = 0; i < 7; i++) {
    vec2 dir = p - balls[i];
    float d = length(dir);
    float influence = radii[i] * radii[i] / (d * d * d + 0.01);
    normal += dir * influence;
  }
  normal = normalize(normal + vec2(0.001));
  
  // Fresnel-like edge effect
  float fresnel = pow(1.0 - dot(normal, vec2(0.0, 1.0)), 2.0);
  
  // Shading based on metaball sum and position
  float shade = smoothstep(threshold * 0.5, threshold * 2.0, sum);
  shade = shade * 0.7 + 0.3;
  
  // Base color
  vec3 col = mix(deepRed, mercuryRed, shade);
  
  // Add highlight based on normal
  float highlightStrength = max(0.0, dot(normal, vec2(0.3, 0.7)));
  col = mix(col, highlight, highlightStrength * 0.4 * blob);
  
  // Edge brightening (mercury reflection)
  col = mix(col, brightRed, fresnel * 0.5 * blob);
  
  // Interior glow
  float interiorGlow = smoothstep(threshold + edge * 2.0, threshold + edge * 5.0, sum);
  col = mix(col, mercuryRed * 0.7, interiorGlow * 0.3);
  
  // Dark background
  vec3 bgColor = vec3(0.02, 0.0, 0.01);
  col = mix(bgColor, col, blob);
  
  // Subtle vignette
  float vignette = 1.0 - length(uv - 0.5) * 0.8;
  col *= vignette;
  
  // Add subtle noise texture
  float noiseVal = fract(sin(dot(p * 100.0, vec2(12.9898, 78.233))) * 43758.5453);
  col += noiseVal * 0.015 - 0.0075;
  
  gl_FragColor = vec4(col, 1.0);
}`;

let shader;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  
  shader = createShader(vertexShader, fragmentShader);
  
  noStroke();
}

function draw() {
  shader.setUniform('uResolution', [width, height]);
  shader.setUniform('uTime', millis() / 1000.0);
  
  shader.setRect(0, 0, width, height);
}

// No stroke needed - shader handles all rendering

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
