<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiral Wave</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #191919; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Spiral Wave — Belousov-Zhabotinsky (BZ) reaction simulation
// RED AND BLACK version - spiral waves in chemical oscillator system
// Background: rgb(25,25,25) minimum
// Elements: vivid red rgb(100,100,100) minimum

const BG_R = 25, BG_G = 25, BG_B = 25;

// Grid parameters
let cols, rows;
let resolution = 4; // Each cell is 4x4 pixels
let gridA, gridB, gridC; // Three chemical concentrations

// BZ reaction parameters
let feed = 0.04;     // Rate of feeding A
let kill = 0.06;      // Rate of killing B
let diffuseA = 1.0;   // Diffusion rate of A
let diffuseB = 0.5;   // Diffusion rate of B

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(RGB, 255);
  background(BG_R, BG_G, BG_B);
  
  cols = floor(width / resolution);
  rows = floor(height / resolution);
  
  // Initialize grids
  gridA = [];
  gridB = [];
  gridC = [];
  
  for (let i = 0; i < cols; i++) {
    gridA[i] = [];
    gridB[i] = [];
    gridC[i] = [];
    for (let j = 0; j < rows; j++) {
      gridA[i][j] = 1.0;
      gridB[i][j] = 0.0;
      gridC[i][j] = 0.0;
    }
  }
  
  // Initialize with spiral wave pattern
  initSpiral();
}

function initSpiral() {
  let centerX = cols / 2;
  let centerY = rows / 2;
  let radius = min(cols, rows) * 0.3;
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let d = dist(i, j, centerX, centerY);
      
      // Create spiral arm
      let angle = atan2(j - centerY, i - centerX);
      let spiralPhase = (d / 20.0) + angle * 3.0;
      
      if (sin(spiralPhase) > 0.3 && d < radius && d > radius * 0.1) {
        gridB[i][j] = 1.0;
        gridC[i][j] = 0.5;
      }
      
      // Add some noise
      if (random() < 0.01) {
        gridB[i][j] = random(0.5, 1.0);
      }
    }
  }
}

function draw() {
  background(BG_R, BG_G, BG_B);
  
  // Run BZ reaction simulation
  let nextB = [];
  let nextC = [];
  
  for (let i = 0; i < cols; i++) {
    nextB[i] = [];
    nextC[i] = [];
    for (let j = 0; j < rows; j++) {
      let a = gridA[i][j];
      let b = gridB[i][j];
      
      // Laplacian for diffusion (simplified)
      let laplacianB = 0;
      let neighbors = 0;
      
      for (let di = -1; di <= 1; di++) {
        for (let dj = -1; dj <= 1; dj++) {
          if (di !== 0 || dj !== 0) {
            let ni = (i + di + cols) % cols;
            let nj = (j + dj + rows) % rows;
            laplacianB += gridB[ni][nj] - b;
            neighbors++;
          }
        }
      }
      laplacianB /= neighbors;
      
      // BZ reaction equations
      let ab2 = a * b * b;
      let dbdt = ab2 - (kill + feed) * b + diffuseB * laplacianB * 2;
      let newB = b + dbdt;
      newB = constrain(newB, 0, 1);
      
      // C follows B with delay
      let newC = b * 0.8 + gridC[i][j] * 0.2;
      
      nextB[i][j] = newB;
      nextC[i][j] = newC;
    }
  }
  
  // Update grids
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      gridB[i][j] = nextB[i][j];
      gridC[i][j] = nextC[i][j];
    }
  }
  
  // Draw the grid - RED AND BLACK
  noStroke();
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let b = gridB[i][j];
      let c = gridC[i][j];
      
      // Color based on B and C concentrations - RED VERSION
      // Higher concentrations = brighter red
      if (b > 0.1 || c > 0.1) {
        let intensity = max(b, c);
        
        // Red gradient: dark maroon to vivid red
        let r = 80 + intensity * 175;
        let g = 15 + intensity * 50;
        let bv = 15 + intensity * 30;
        
        fill(r, g, bv);
        rect(i * resolution, j * resolution, resolution, resolution);
      }
    }
  }
  
  // Draw label
  fill(100);
  textSize(12);
  textAlign(RIGHT, TOP);
  text("BZ Reaction - Spiral Waves", width - 10, 10);
}

function mousePressed() {
  // Add perturbation at mouse position
  let i = floor(mouseX / resolution);
  let j = floor(mouseY / resolution);
  
  for (let di = -3; di <= 3; di++) {
    for (let dj = -3; dj <= 3; dj++) {
      let ni = (i + di + cols) % cols;
      let nj = (j + dj + rows) % rows;
      let d = dist(di, dj, 0, 0);
      if (d < 3) {
        gridB[ni][nj] = 1.0;
        gridC[ni][nj] = 1.0;
      }
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / resolution);
  rows = floor(height / resolution);
  
  // Reinitialize grids
  gridA = [];
  gridB = [];
  gridC = [];
  
  for (let i = 0; i < cols; i++) {
    gridA[i] = [];
    gridB[i] = [];
    gridC[i] = [];
    for (let j = 0; j < rows; j++) {
      gridA[i][j] = 1.0;
      gridB[i][j] = 0.0;
      gridC[i][j] = 0.0;
    }
  }
  
  initSpiral();
}
</script>
</body>
</html>
