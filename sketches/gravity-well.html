<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Well — p5.js Art</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Gravity Well - Particles spiraling into a central mass
let particles = [];
const numParticles = 800;
const G = 800;
let centerMass;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  centerMass = createVector(width / 2, height / 2);
  
  // Initialize particles at random positions
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      pos: createVector(random(width), random(height)),
      vel: createVector(0, 0),
      acc: createVector(0, 0),
      hue: random(180, 280),
      life: random(100, 255),
      size: random(2, 5)
    });
  }
}

function draw() {
  // Semi-transparent background for trail effect
  background(10, 5, 8, 15);
  
  // Draw central mass (gravity well)
  let wellSize = 60 + sin(frameCount * 0.02) * 10;
  
  // Outer glow
  noStroke();
  for (let r = wellSize * 3; r > wellSize; r -= 20) {
    let alpha = map(r, wellSize, wellSize * 3, 40, 0);
    fill(260, 80, 80, alpha);
    ellipse(centerMass.x, centerMass.y, r * 2);
  }
  
  // Core
  fill(280, 90, 100);
  ellipse(centerMass.x, centerMass.y, wellSize);
  
  // Inner bright core
  fill(320, 30, 100);
  ellipse(centerMass.x, centerMass.y, wellSize * 0.4);
  
  // Update and draw particles
  for (let p of particles) {
    // Calculate gravitational force
    let dir = p5.Vector.sub(centerMass, p.pos);
    let dist = dir.mag();
    dist = constrain(dist, 20, 400);
    
    dir.normalize();
    let force = (G * 15) / (dist * dist);
    p.acc = dir.mult(force);
    
    // Add some tangential velocity for spiral effect
    let tangent = createVector(-dir.y, dir.x);
    tangent.mult(0.3);
    p.acc.add(tangent);
    
    // Update physics
    p.vel.add(p.acc);
    p.vel.limit(12);
    p.pos.add(p.vel);
    
    // Draw particle
    let speed = p.vel.mag();
    let hue = map(dist, 0, 400, 320, 180);
    let brightness = map(speed, 0, 12, 60, 100);
    
    noStroke();
    fill(hue, 70, brightness, p.life * 0.4);
    ellipse(p.pos.x, p.pos.y, p.size);
    
    // Reset particle if it gets too close to center or goes off screen
    if (dist < 25 || p.pos.x < -50 || p.pos.x > width + 50 || 
        p.pos.y < -50 || p.pos.y > height + 50) {
      // Respawn at edge
      let angle = random(TWO_PI);
      let radius = max(width, height) * 0.6;
      p.pos.x = centerMass.x + cos(angle) * radius;
      p.pos.y = centerMass.y + sin(angle) * radius;
      p.vel = createVector(0, 0);
      p.life = random(100, 255);
    }
  }
  
  // Draw accretion disk particles
  for (let i = 0; i < 50; i++) {
    let angle = frameCount * 0.02 + (TWO_PI / 50) * i;
    let radius = 80 + sin(frameCount * 0.05 + i) * 15;
    let x = centerMass.x + cos(angle) * radius;
    let y = centerMass.y + sin(angle) * radius;
    
    fill(40, 80, 100, 50);
    ellipse(x, y, 3);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  centerMass = createVector(width / 2, height / 2);
}
</script>
</body>
</html>
