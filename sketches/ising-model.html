<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ising Model</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Ising Model — Phase transition and criticality
// RED AND BLACK version
// Background: pure black (0,0,0)
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100
// Mathematical concept: spins on lattice with nearest-neighbor coupling
// At critical temperature Tc, system exhibits long-range correlations and spontaneous magnetization

const LATTICE_SIZE = 100;
const J = 1.0; // Coupling constant
const H = 0.0; // External field
const TC = 2.269; // Critical temperature (Onsager solution)
let temperature = 2.5;
let spins = [];
let energy = 0;
let magnetization = 0;
let steps = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  initLattice();
  noSmooth();
}

function initLattice() {
  spins = [];
  for (let i = 0; i < LATTICE_SIZE * LATTICE_SIZE; i++) {
    // Start random
    spins[i] = random() < 0.5 ? 1 : -1;
  }
  calculateEnergy();
  calculateMagnetization();
}

function getSpin(x, y) {
  // Periodic boundary conditions
  x = ((x % LATTICE_SIZE) + LATTICE_SIZE) % LATTICE_SIZE;
  y = ((y % LATTICE_SIZE) + LATTICE_SIZE) % LATTICE_SIZE;
  return spins[y * LATTICE_SIZE + x];
}

function setSpin(x, y, val) {
  x = ((x % LATTICE_SIZE) + LATTICE_SIZE) % LATTICE_SIZE;
  y = ((y % LATTICE_SIZE) + LATTICE_SIZE) % LATTICE_SIZE;
  spins[y * LATTICE_SIZE + x] = val;
}

function calculateEnergy() {
  energy = 0;
  for (let y = 0; y < LATTICE_SIZE; y++) {
    for (let x = 0; x < LATTICE_SIZE; x++) {
      let s = getSpin(x, y);
      // Nearest neighbors
      let right = getSpin(x + 1, y);
      let down = getSpin(x, y + 1);
      energy -= J * s * (right + down);
    }
  }
  // Each pair counted once
  energy /= 2;
}

function calculateMagnetization() {
  let sum = 0;
  for (let i = 0; i < spins.length; i++) {
    sum += spins[i];
  }
  magnetization = sum / spins.length;
}

function metropolisStep() {
  // Pick random spin
  let x = floor(random(LATTICE_SIZE));
  let y = floor(random(LATTICE_SIZE));
  let s = getSpin(x, y);
  
  // Calculate energy change if we flip this spin
  let right = getSpin(x + 1, y);
  let left = getSpin(x - 1, y);
  let up = getSpin(x, y - 1);
  let down = getSpin(x, y + 1);
  
  let deltaE = 2 * J * s * (right + left + up + down) + 2 * H * s;
  
  // Metropolis acceptance
  if (deltaE <= 0) {
    setSpin(x, y, -s);
  } else {
    if (random() < exp(-deltaE / temperature)) {
      setSpin(x, y, -s);
    }
  }
}

function drawLattice() {
  let cellW = width / LATTICE_SIZE;
  let cellH = height / LATTICE_SIZE;
  
  noStroke();
  
  for (let y = 0; y < LATTICE_SIZE; y++) {
    for (let x = 0; x < LATTICE_SIZE; x++) {
      let s = getSpin(x, y);
      
      // RED VERSION: both spins are red, different brightness for distinction
      // Spin up: brighter red (aligned with field at low T)
      // Spin down: dimmer red
      if (s > 0) {
        fill(10, 75, 95); // Bright vivid red
      } else {
        fill(10, 45, 60); // Dimmer red (but still vivid, not near-black)
      }
      
      rect(x * cellW + 0.5, y * cellH + 0.5, cellW - 1, cellH - 1);
    }
  }
}

function draw() {
  background(0, 0, 0);
  
  // Run multiple MC steps per frame
  let stepsPerFrame = 500;
  for (let i = 0; i < stepsPerFrame; i++) {
    metropolisStep();
    steps++;
  }
  
  // Recalculate every 10 frames
  if (frameCount % 10 === 0) {
    calculateEnergy();
    calculateMagnetization();
  }
  
  drawLattice();
  
  // Stats
  let energyPerSpin = energy / (LATTICE_SIZE * LATTICE_SIZE);
  
  noStroke();
  fill(10, 60, 85);
  textSize(11);
  textAlign(LEFT, TOP);
  text("Ising Model — Phase Transition", 10, 10);
  text("Temperature: " + temperature.toFixed(3) + " (Tc = " + TC.toFixed(3) + ")", 10, 24);
  text("Energy/spin: " + energyPerSpin.toFixed(4), 10, 38);
  text("Magnetization: " + magnetization.toFixed(4), 10, 52);
  text("MC steps: " + steps, 10, 66);
  
  fill(10, 40, 70);
  textAlign(RIGHT, TOP);
  text("UP/DOWN to change T | Click to randomize", width - 10, 10);
  
  // Temperature bar
  let barX = 10;
  let barY = height - 30;
  let barW = width - 20;
  let barH = 10;
  
  fill(10, 30, 20);
  rect(barX, barY, barW, barH);
  
  // Critical temperature marker
  let tcX = barX + map(TC, 0, 5, 0, barW);
  fill(10, 80, 90);
  rect(tcX - 1, barY - 3, 2, barH + 6);
  
  // Current temperature marker
  let tX = barX + map(temperature, 0, 5, 0, barW);
  fill(10, 60, 80);
  ellipse(tX, barY + barH / 2, 8, 8);
  
  // Legend
  let legendX = width - 100;
  let legendY = 30;
  fill(10, 75, 95);
  rect(legendX, legendY, 12, 12);
  fill(10, 60, 85);
  textAlign(LEFT, TOP);
  text("Spin +1 (aligned)", legendX + 18, legendY);
  
  fill(10, 45, 60);
  rect(legendX, legendY + 18, 12, 12);
  fill(10, 60, 85);
  text("Spin -1 (opposed)", legendX + 18, legendY + 18);
}

function keyPressed() {
  if (keyCode === UP_ARROW) {
    temperature = min(5, temperature + 0.05);
  } else if (keyCode === DOWN_ARROW) {
    temperature = max(0.1, temperature - 0.05);
  }
}

function mousePressed() {
  initLattice();
  steps = 0;
}
</script>
</body>
</html>
