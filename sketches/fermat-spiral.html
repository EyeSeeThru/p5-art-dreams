<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fermat Spiral</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050508; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const dots = [];
const numDots = 800;
const goldenAngle = PI * (3 - sqrt(5));

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noLoop();
  
  for (let i = 0; i < numDots; i++) {
    dots.push({
      index: i,
      hue: (i * 2) % 360,
      size: 2 + random(3)
    });
  }
}

function draw() {
  background(5, 5, 8);
  
  const centerX = width / 2;
  const centerY = height / 2;
  const maxRadius = min(width, height) * 0.45;
  
  for (let i = 0; i < numDots; i++) {
    let dot = dots[i];
    
    // Fermat's spiral: r = c * sqrt(n), theta = n * golden angle
    let r = 8 * sqrt(i + 1);
    let theta = i * goldenAngle;
    
    // Add subtle animation
    let animOffset = sin(frameCount * 0.02 + i * 0.05) * 3;
    let animAngle = theta + cos(frameCount * 0.01 + i * 0.02) * 0.1;
    
    let x = centerX + (r + animOffset) * cos(animAngle);
    let y = centerY + (r + animOffset) * sin(animAngle);
    
    // Color with cycling
    let hue = (dot.hue + frameCount * 0.3) % 360;
    let sat = map(r, 0, maxRadius, 80, 40);
    let bri = map(r, 0, maxRadius, 100, 60);
    let alpha = map(r, 0, maxRadius, 0.9, 0.4);
    
    // Glow effect
    noStroke();
    for (let g = 20; g > 0; g -= 4) {
      fill(hue, sat * 0.6, bri, alpha * 0.03);
      ellipse(x, y, dot.size + g, dot.size + g);
    }
    
    // Core dot
    fill(hue, sat, bri, alpha);
    ellipse(x, y, dot.size, dot.size);
    
    // Bright center
    if (i < 50) {
      fill((hue + 30) % 360, 30, 100, 0.8);
      ellipse(x, y, dot.size * 0.6, dot.size * 0.6);
    }
  }
  
  // Connecting lines between nearby dots
  stroke(200, 30, 80, 0.03);
  strokeWeight(0.5);
  for (let i = 0; i < numDots; i += 3) {
    let r1 = 8 * sqrt(i + 1);
    let theta1 = i * goldenAngle;
    let x1 = centerX + r1 * cos(theta1);
    let y1 = centerY + r1 * sin(theta1);
    
    for (let j = i + 1; j < min(i + 15, numDots); j++) {
      let r2 = 8 * sqrt(j + 1);
      let theta2 = j * goldenAngle;
      let x2 = centerX + r2 * cos(theta2);
      let y2 = centerY + r2 * sin(theta2);
      
      let d = dist(x1, y1, x2, y2);
      if (d < 25) {
        let alpha = map(d, 0, 25, 0.08, 0);
        stroke(200, 30, 80, alpha);
        line(x1, y1, x2, y2);
      }
    }
  }
  
  // Radial breathing rings
  noFill();
  for (let i = 0; i < 5; i++) {
    let ringR = (100 + i * 80 + sin(frameCount * 0.03 + i) * 20);
    let ringHue = (frameCount + i * 40) % 360;
    stroke(ringHue, 40, 60, 0.15);
    strokeWeight(1);
    ellipse(centerX, centerY, ringR * 2, ringR * 2);
  }
  
  // Outer decorative arc
  for (let a = 0; a < TWO_PI; a += 0.02) {
    let r = maxRadius * 1.1 + sin(a * 12 + frameCount * 0.02) * 15;
    let hue = map(a, 0, TWO_PI, 180, 300);
    stroke(hue, 50, 70, 0.3);
    strokeWeight(2);
    point(centerX + cos(a) * r, centerY + sin(a) * r);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
