<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entangled Particles</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Entangled Particles - Quantum entanglement visualization
// Paired particles that remain connected regardless of distance

let particles = [];
let entanglementLinks = [];
const NUM_PAIRS = 12;
const PARTICLES_PER_PAIR = 2;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  noCursor();
  
  // Create entangled particle pairs
  for (let i = 0; i < NUM_PAIRS; i++) {
    let hue = random(360);
    let x1 = random(width);
    let y1 = random(height);
    let x2 = random(width);
    let y2 = random(height);
    
    let p1 = new EntangledParticle(x1, y1, hue, i);
    let p2 = new EntangledParticle(x2, y2, (hue + 180) % 360, i);
    
    particles.push(p1, p2);
    entanglementLinks.push({ a: p1, b: p2, id: i });
  }
}

function draw() {
  // Dark background with slight trail
  background(240, 20, 5, 0.15);
  
  // Draw entanglement links first
  for (let link of entanglementLinks) {
    drawEntanglementLink(link);
  }
  
  // Update and draw particles
  for (let p of particles) {
    p.update();
    p.display();
  }
  
  // Draw measurement effect
  if (frameCount % 120 === 0) {
    let pair = random(entanglementLinks);
    pair.a.measure();
    pair.b.measure();
  }
}

function drawEntanglementLink(link) {
  let d = dist(link.a.pos.x, link.a.pos.y, link.b.pos.x, link.b.pos.y);
  let alpha = map(d, 0, width, 0.6, 0.1);
  let weight = map(d, 0, width, 2, 0.5);
  
  // Pulsing link
  let pulse = sin(frameCount * 0.05 + link.id) * 0.2 + 0.8;
  
  stroke((link.a.hue + link.b.hue) / 2, 70, 80, alpha * pulse);
  strokeWeight(weight);
  line(link.a.pos.x, link.a.pos.y, link.b.pos.x, link.b.pos.y);
  
  // Draw correlation indicators
  let midX = (link.a.pos.x + link.b.pos.x) / 2;
  let midY = (link.a.pos.y + link.b.pos.y) / 2;
  
  noStroke();
  fill((link.a.hue + link.b.hue) / 2, 60, 100, alpha * pulse * 0.5);
  ellipse(midX, midY, 8 + sin(frameCount * 0.1 + link.id) * 4);
}

class EntangledParticle {
  constructor(x, y, hue, pairId) {
    this.pos = createVector(x, y);
    this.vel = p5.Vector.random2D().mult(random(0.5, 2));
    this.acc = createVector(0, 0);
    this.hue = hue;
    this.pairId = pairId;
    this.size = random(8, 16);
    this.phase = random(TWO_PI);
    this.spin = random() > 0.5 ? 1 : -1; // Quantum spin state
    this.measured = false;
    this.measureTime = 0;
    this.noiseOffset = random(1000);
  }
  
  update() {
    // Perlin noise flow
    let noiseScale = 0.003;
    let angle = noise(this.pos.x * noiseScale, this.pos.y * noiseScale, frameCount * 0.01) * TWO_PI * 2;
    let flowForce = p5.Vector.fromAngle(angle).mult(0.15);
    
    // Attraction to center
    let center = createVector(width / 2, height / 2);
    let toCenter = p5.Vector.sub(center, this.pos);
    let distToCenter = toCenter.mag();
    toCenter.normalize().mult(0.02 * distToCenter * 0.01);
    
    // Boundary avoidance
    let margin = 50;
    let avoid = createVector(0, 0);
    if (this.pos.x < margin) avoid.x = 1;
    if (this.pos.x > width - margin) avoid.x = -1;
    if (this.pos.y < margin) avoid.y = 1;
    if (this.pos.y > height - margin) avoid.y = -1;
    avoid.mult(0.5);
    
    this.acc.add(flowForce);
    this.acc.add(toCenter);
    this.acc.add(avoid);
    
    this.vel.add(this.acc);
    this.vel.limit(3);
    this.pos.add(this.vel);
    this.acc.mult(0);
    
    // Decay measurement state
    if (this.measured && frameCount - this.measureTime > 30) {
      this.measured = false;
    }
  }
  
  measure() {
    this.measured = true;
    this.measureTime = frameCount;
    this.spin *= -1; // Collapse spin state
    
    // Measurement burst effect
    this.vel.add(p5.Vector.random2D().mult(3));
  }
  
  display() {
    let pulse = sin(frameCount * 0.1 + this.phase) * 0.3 + 1;
    let glowSize = this.size * pulse * (this.measured ? 1.5 : 1);
    
    // Outer glow
    for (let i = 3; i > 0; i--) {
      noStroke();
      fill(this.hue, 70, 80, 0.15 / i);
      ellipse(this.pos.x, this.pos.y, glowSize * (i + 1) * 2);
    }
    
    // Core
    noStroke();
    fill(this.hue, 60, 100, 0.9);
    ellipse(this.pos.x, this.pos.y, glowSize);
    
    // Spin indicator
    if (this.measured) {
      push();
      translate(this.pos.x, this.pos.y);
      rotate(frameCount * 0.2 * this.spin);
      stroke(this.hue, 40, 100, 0.8);
      strokeWeight(2);
      noFill();
      ellipse(0, 0, glowSize * 1.5, glowSize * 0.8);
      pop();
    }
    
    // Phase ring
    noFill();
    stroke(this.hue, 50, 80, 0.3);
    strokeWeight(1);
    arc(this.pos.x, this.pos.y, glowSize * 2.5, glowSize * 2.5, 
        frameCount * 0.05 + this.phase, frameCount * 0.05 + this.phase + PI);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
