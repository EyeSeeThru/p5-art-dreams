<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Degenerate Hypersphere</title>
  <style>
    * * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020208; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Degenerate Hypersphere — Volume of n-dimensional spheres
// V_n(R) = π^(n/2) / Γ(n/2 + 1) * R^n
// Peaks at n ≈ 5.2, then paradoxically goes to 0 as n → ∞
let time = 0;
const MAX_DIMS = 20;
const BAR_COUNT = 16;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  textSize(10);
}

function draw() {
  background(240, 25, 3);

  let cx = width / 2;
  let cy = height * 0.45;

  // Draw the hypersphere volume formula
  drawFormula(cx, cy - height * 0.38, width * 0.8, 50);

  // Draw 2D-4D sphere cross-sections (left side)
  drawSphereCrossSections(cx - width * 0.22, cy + 20, width * 0.38);

  // Draw volume chart (right side)
  drawVolumeChart(cx + width * 0.08, cy + 20, width * 0.38);

  // Draw dimension cycle animation (bottom)
  drawDimensionCycle(cx, cy + height * 0.28, width * 0.85);

  // Labels
  fill(195, 15, 80, 85);
  textAlign(LEFT, TOP);
  text('Degenerate Hypersphere — the volume of an n-dimensional ball peaks at dim ≈ 5.2, then goes to 0', 16, 16);
  fill(165, 12, 60, 70);
  text('Left: 2D circle → 3D sphere → 4D hypersphere cross-sections. Each slice reveals different structure.', 16, 34);
  text('Right: V_n(R) = π^(n/2) / Γ(n/2+1) × R^n. Blue line = exact, white bars = Monte Carlo estimate.', 16, 52);
  text('Bottom: Cross-section as dimension increases. In high dimensions, most volume is near the "shell" (surface).', 16, 70);

  time += 0.012;
}

// Exact volume of n-ball
function ballVolume(n, R) {
  if (n <= 0) return 0;
  if (n === 1) return 2 * R;
  let halfN = n / 2;
  return Math.pow(Math.PI, halfN) / gamma(halfN + 1) * Math.pow(R, n);
}

function gamma(z) {
  // Lanczos approximation (simplified)
  if (z < 0.5) {
    return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
  }
  z -= 1;
  let g = 7;
  let c = [0.99999999999980993, 676.5203681218851, -1259.1392167224028,
    771.32342877765313, -176.61502916214059, 12.507343278686905,
    -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
  let x = c[0];
  for (let i = 1; i < g + 2; i++) {
    x += c[i] / (z + i);
  }
  let t = z + g + 0.5;
  return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
}

function drawFormula(x0, y0, w, h) {
  // Draw the volume formula
  let midY = y0 + h * 0.5;

  fill(0, 0, 90, 80);
  textSize(14);
  textAlign(CENTER, CENTER);
  text('V_n(R) = π^(n/2) / Γ(n/2 + 1) × R^n', x0 + w/2, midY);

  // Label the paradox
  fill(40, 80, 90, 70);
  textSize(11);
  text('Peak at n ≈ 5.2 → ∞ dims: "almost all volume is near the surface"', x0 + w/2, midY + 22);
}

function drawSphereCrossSections(x0, y0, w) {
  let R = min(w, height * 0.38) * 0.35;
  let dims = [2, 3, 4, 5];
  let spacing = w / 4;

  for (let i = 0; i < dims.length; i++) {
    let d = dims[i];
    let cx = x0 + spacing * (i + 0.5);
    let cy = y0 + R + 15;

    // Draw sphere/dim ball
    if (d === 2) {
      // Circle
      noFill();
      stroke(180, 60, 90, 80);
      strokeWeight(2);
      ellipse(cx, cy, R * 2, R * 2);
      // Fill hint
      fill(180, 40, 60, 20);
      noStroke();
      ellipse(cx, cy, R * 2, R * 2);
    } else if (d === 3) {
      // Sphere — draw with slight 3D illusion
      noFill();
      stroke(200, 70, 90, 80);
      strokeWeight(1.5);
      // Main circle
      ellipse(cx, cy, R * 2, R * 2);
      // Equator
      stroke(200, 50, 80, 50);
      ellipse(cx, cy, R * 2, R * 0.6);
      // Meridian
      ellipse(cx, cy, R * 0.6, R * 2);
      // Fill
      fill(200, 50, 50, 15);
      noStroke();
      ellipse(cx, cy, R * 2, R * 2);
    } else if (d === 4) {
      // 4D sphere — draw two cross-sections
      noFill();
      stroke(30, 80, 90, 80);
      strokeWeight(1.5);
      ellipse(cx, cy - R * 0.3, R * 1.5, R * 1.5);
      stroke(180, 80, 90, 60);
      ellipse(cx, cy + R * 0.3, R * 1.8, R * 1.8);
      // Label
      fill(0, 0, 80, 60);
      textSize(9);
      textAlign(CENTER, TOP);
      text('4D slice 1', cx, cy - R * 0.3 - 10);
      textAlign(CENTER, TOP);
      text('4D slice 2', cx, cy + R * 0.3 + R * 0.9 + 2);
    } else if (d === 5) {
      // 5D hypersphere — multiple nested slices
      noFill();
      stroke(300, 70, 90, 70);
      strokeWeight(1.5);
      for (let s = 0; s < 4; s++) {
        let t = (s / 3) * 2 - 1; // -1 to 1
        let r = R * cos(t * PI / 4) * 1.4;
        ellipse(cx, cy, r * 2, r * 2);
      }
    }

    // Label
    fill(195, 15, 80, 80);
    textSize(12);
    textAlign(CENTER, TOP);
    text(d + 'D', cx, cy + R + 5);
  }
}

function drawVolumeChart(x0, y0, w) {
  let chartH = height * 0.35;
  let chartY0 = y0;
  let chartY1 = y0 + chartH;

  // Background
  fill(0, 0, 8, 40);
  rect(x0, chartY0, w, chartH);

  // Grid
  stroke(210, 15, 15, 20);
  strokeWeight(0.5);
  for (let n = 0; n <= MAX_DIMS; n++) {
    let x = map(n, 0, MAX_DIMS, x0, x0 + w);
    line(x, chartY0, x, chartY1);
  }
  let volMax = ballVolume(5, 1);
  for (let v = 0; v <= 4; v++) {
    let y = map(v / 4, 0, 1, chartY1, chartY0);
    line(x0, y, x0 + w, y);
  }
  noStroke();

  // Find peak
  let peakDim = 0;
  let peakVol = 0;
  for (let n = 1; n <= MAX_DIMS; n++) {
    let v = ballVolume(n, 1);
    if (v > peakVol) { peakVol = v; peakDim = n; }
  }

  // Draw exact volume curve
  stroke(200, 70, 90, 80);
  strokeWeight(2);
  noFill();
  beginShape();
  for (let n = 0; n <= MAX_DIMS; n++) {
    let v = ballVolume(n, 1);
    let px = map(n, 0, MAX_DIMS, x0, x0 + w);
    let py = map(v / volMax, 0, 1, chartY1, chartY0);
    vertex(px, py);
  }
  endShape();

  // Draw bars (Monte Carlo estimate)
  let barW = w / BAR_COUNT - 2;
  for (let i = 0; i < BAR_COUNT; i++) {
    let n = Math.floor(map(i, 0, BAR_COUNT, 1, MAX_DIMS - 1));
    let exact = ballVolume(n, 1);
    let mc = monteCarloVolume(n, 200);
    let bx = map(n, 0, MAX_DIMS, x0, x0 + w) - barW/2;
    let bh = map(mc / volMax, 0, 1, 0, chartH);
    // Bar (Monte Carlo = white-ish)
    fill(0, 0, 70, 50);
    rect(bx, chartY1 - bh, barW, bh);
    // Exact marker (dot on curve)
    let ex = map(n, 0, MAX_DIMS, x0, x0 + w);
    let ey = map(exact / volMax, 0, 1, chartY1, chartY0);
    fill(200, 80, 95, 80);
    ellipse(ex, ey, 4, 4);
  }

  // Mark peak
  let peakX = map(peakDim, 0, MAX_DIMS, x0, x0 + w);
  stroke(50, 90, 90, 60);
  strokeWeight(1);
  drawingContext.setLineDash([4, 4]);
  line(peakX, chartY0, peakX, chartY1);
  drawingContext.setLineDash([]);
  noStroke();

  // Peak label
  fill(50, 90, 90, 80);
  textSize(10);
  textAlign(CENTER, TOP);
  text('peak: n=' + peakDim.toFixed(1), peakX, chartY0 + 4);

  // Axis labels
  fill(165, 10, 60, 60);
  textSize(9);
  textAlign(CENTER, BOTTOM);
  text('Dimension n', x0 + w/2, chartY1 - 4);
  textAlign(LEFT, CENTER);
  text('V_n(R)/V_5', x0 - 4, chartY0 + chartH/2);

  // X axis labels
  for (let n = 0; n <= MAX_DIMS; n += 4) {
    let px = map(n, 0, MAX_DIMS, x0, x0 + w);
    fill(165, 10, 55, 50);
    textAlign(CENTER, TOP);
    text(n, px, chartY1 + 3);
  }
}

// Monte Carlo estimate of n-ball volume
function monteCarloVolume(n, N) {
  let count = 0;
  for (let i = 0; i < N; i++) {
    let r2 = 0;
    for (let j = 0; j < n; j++) {
      let x = random(-1, 1);
      r2 += x * x;
    }
    if (r2 <= 1) count++;
  }
  // Volume of hypercube is 2^n, ball volume is count/N * 2^n
  return count / N;
}

function drawDimensionCycle(x0, y0, w) {
  // Show how cross-section changes with dimension
  let n = Math.floor((Math.sin(time * 0.4) + 1) / 2 * 12) + 2;
  let R = 60;

  let cx = x0 + w * 0.25;
  let cy = y0 + R + 10;

  // Title
  fill(195, 15, 80, 85);
  textSize(13);
  textAlign(CENTER, TOP);
  text('Cross-section at n = ' + n, cx, y0);

  // Draw nD hyperball projection
  let hue = (n * 25) % 360;
  fill(hue, 50, 80, 30);
  noStroke();
  ellipse(cx, cy, R * 2, R * 2);

  // Show random points inside
  for (let i = 0; i < 80; i++) {
    // Random point in n-ball
    let pt = randomInNBall(n);
    // Project to 2D (just show first 2 coords scaled)
    let px = cx + pt[0] * R;
    let py = cy + pt[1] * R;

    let r2 = 0;
    for (let j = 0; j < n; j++) {
      r2 += pt[j] * pt[j];
    }

    if (r2 <= 1) {
      let brightness = map(r2, 0, 1, 90, 30);
      fill(hue, 40, brightness, 70);
      ellipse(px, py, 3, 3);
    }
  }

  // Draw unit circle outline
  noFill();
  stroke(hue, 60, 80, 50);
  strokeWeight(1.5);
  ellipse(cx, cy, R * 2, R * 2);

  // Stats on right
  let statsX = x0 + w * 0.55;
  fill(0, 0, 80, 80);
  textSize(11);
  textAlign(LEFT, TOP);
  let exact = ballVolume(n, 1);
  let mc = monteCarloVolume(n, 1000);
  text('n = ' + n + ' dimensions', statsX, y0);
  text('V_n(1) = ' + exact.toFixed(4) + ' (exact)', statsX, y0 + 20);
  text('V_n(1) ≈ ' + mc.toFixed(4) + ' (Monte Carlo, 1000 pts)', statsX, y0 + 38);
  text('Γ(' + (n/2+1).toFixed(2) + ') = ' + gamma(n/2+1).toFixed(4), statsX, y0 + 56);

  // Volume bar comparison
  let barMax = ballVolume(5, 1);
  let barW = 20;
  let barH = 80;
  let barX = statsX + 200;
  let barY = y0 + 10;

  fill(0, 0, 15, 40);
  rect(barX, barY, barW * 3 + 4, barH + 30);

  let dimsToShow = [n, 5, 10];
  let colors = [hue, 200, 300];
  for (let i = 0; i < dimsToShow.length; i++) {
    let d = dimsToShow[i];
    let v = ballVolume(d, 1);
    let bh = map(v / barMax, 0, 1, 0, barH);
    fill(colors[i], 60, 80, 70);
    rect(barX + i * (barW + 2), barY + barH - bh, barW, bh);
    fill(0, 0, 80, 70);
    textSize(9);
    textAlign(CENTER, TOP);
    text('n=' + d, barX + i * (barW + 2), barY + barH + 3);
  }

  // Explanation
  fill(165, 10, 60, 65);
  textSize(10);
  textAlign(LEFT, TOP);
  text('High-dim paradox: "almost all volume is near the surface" — in high dimensions,', x0 + w * 0.55, y0 + 85);
  text('a random point in a ball is almost always on the outer shell (r ≈ R).', x0 + w * 0.55, y0 + 98);
}

function randomInNBall(n) {
  // Generate uniform random point in n-ball using Gaussian normal
  let coords = [];
  let r2 = 0;
  for (let i = 0; i < n; i++) {
    // Box-Muller for Gaussian
    let u = random(), v = random();
    let z = sqrt(-2 * log(u)) * cos(2 * PI * v);
    coords.push(z);
    r2 += z * z;
  }
  // Normalize to unit ball
  let r = sqrt(r2);
  if (r > 0) {
    for (let i = 0; i < n; i++) {
      coords[i] /= r;
    }
  }
  return coords;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
