<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lattice Fields</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Lattice Fields - Coupled oscillator wave interference
// Each node in a 2D lattice oscillates and couples with neighbors

let cols, rows;
let grid = [];
let spacing = 20;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  cols = Math.floor(width / spacing);
  rows = Math.floor(height / spacing);
  
  // Initialize grid with small random values
  for (let i = 0; i < cols; i++) {
    grid[i] = [];
    for (let j = 0; j < rows; j++) {
      grid[i][j] = {
        value: 0,
        velocity: 0,
        baseFreq: random(0.5, 1.5)
      };
    }
  }
}

function draw() {
  background(10, 20, 8);
  
  let dt = 0.1;
  let coupling = 0.3;
  let damping = 0.98;
  
  // Create wave sources
  let sources = [
    { x: cols * 0.3, y: rows * 0.3, freq: 0.08, phase: 0 },
    { x: cols * 0.7, y: rows * 0.4, freq: 0.12, phase: PI/3 },
    { x: cols * 0.5, y: rows * 0.7, freq: 0.1, phase: PI/2 },
    { x: cols * 0.2, y: rows * 0.8, freq: 0.07, phase: PI }
  ];
  
  // Calculate forces and update
  let newGrid = [];
  for (let i = 0; i < cols; i++) {
    newGrid[i] = [];
    for (let j = 0; j < rows; j++) {
      let cell = grid[i][j];
      
      // Wave source influence
      let sourceInfluence = 0;
      for (let s of sources) {
        let d = dist(i, j, s.x, s.y);
        let wave = sin(d * 0.3 - time * s.freq * 60 + s.phase);
        sourceInfluence += wave * exp(-d * 0.02) * 2;
      }
      
      // Neighbor coupling (Laplacian)
      let laplacian = 0;
      let neighbors = 0;
      if (i > 0) { laplacian += grid[i-1][j].value - cell.value; neighbors++; }
      if (i < cols-1) { laplacian += grid[i+1][j].value - cell.value; neighbors++; }
      if (j > 0) { laplacian += grid[i][j-1].value - cell.value; neighbors++; }
      if (j < rows-1) { laplacian += grid[i][j+1].value - cell.value; neighbors++; }
      laplacian /= neighbors;
      
      // Update physics
      let acceleration = coupling * laplacian + sourceInfluence * cell.baseFreq;
      cell.velocity += acceleration * dt;
      cell.velocity *= damping;
      cell.value += cell.velocity * dt;
      
      newGrid[i][j] = {
        value: cell.value,
        velocity: cell.velocity,
        baseFreq: cell.baseFreq
      };
    }
  }
  grid = newGrid;
  
  // Render with glow effect
  loadPixels();
  
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      let val = grid[i][j].value;
      let x = i * spacing;
      let y = j * spacing;
      
      // Color based on value and position
      let hue = map(sin(val * 2 + time * 0.5), -1, 1, 180, 300);
      let sat = map(abs(val), 0, 3, 40, 90);
      let bri = map(abs(val), 0, 3, 20, 100);
      
      // Glow falloff
      let glowSize = map(abs(val), 0, 3, 1, 4);
      
      noStroke();
      fill(hue, sat, bri, 0.6);
      ellipse(x, y, spacing * glowSize * 0.8, spacing * glowSize * 0.8);
      
      // Core bright point
      if (abs(val) > 1) {
        fill(hue, 20, 100, 0.9);
        ellipse(x, y, spacing * 0.3, spacing * 0.3);
      }
    }
  }
  
  // Add connecting lines between high-energy points
  stroke(200, 60, 80, 0.15);
  strokeWeight(0.5);
  for (let i = 0; i < cols - 1; i++) {
    for (let j = 0; j < rows - 1; j++) {
      let val1 = grid[i][j].value;
      let val2 = grid[i+1][j].value;
      let val3 = grid[i][j+1].value;
      
      if (abs(val1) > 1.5 && abs(val2) > 1.5) {
        line(i * spacing, j * spacing, (i+1) * spacing, j * spacing);
      }
      if (abs(val1) > 1.5 && abs(val3) > 1.5) {
        line(i * spacing, j * spacing, i * spacing, (j+1) * spacing);
      }
    }
  }
  
  time += 0.016;
  
  // Fade effect
  noStroke();
  fill(10, 20, 8, 0.05);
  rect(0, 0, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  setup();
}
</script>
</body>
</html>
