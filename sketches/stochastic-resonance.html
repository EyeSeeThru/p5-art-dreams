<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stochastic Resonance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Stochastic Resonance - Noise-enhanced signal detection
// Visualizing how adding noise can improve signal detection in nonlinear systems

let particles = [];
let numParticles = 800;
let noiseScale = 0.02;
let signalFreq = 0.003;
let time = 0;
let noiseLevel = 0;
let targetNoise = 50;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  
  for (let i = 0; i < numParticles; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  background(230, 20, 5, 0.15);
  
  // Oscillating threshold signal
  let signal = sin(time * signalFreq * TWO_PI);
  let threshold = signal * 150;
  
  // Dynamic noise level - oscillates to show stochastic resonance
  noiseLevel = map(sin(time * 0.001), -1, 1, 10, 120);
  
  // Draw signal visualization
  push();
  translate(width / 2, height / 2 - 200);
  
  // Signal wave
  noFill();
  strokeWeight(2);
  for (let x = -200; x < 200; x += 4) {
    let y = sin((x + time * 2) * 0.02) * 80;
    let alpha = map(abs(x), 0, 200, 1, 0.1);
    stroke(200, 80, 90, alpha);
    point(x, y);
  }
  
  // Threshold lines
  stroke(0, 0, 100, 0.3);
  line(-200, threshold, 200, threshold);
  line(-200, -threshold, 200, -threshold);
  
  // Threshold zone
  fill(280, 60, 80, 0.05);
  noStroke();
  rect(-200, -threshold, 400, threshold * 2);
  pop();
  
  // Update and draw particles
  for (let p of particles) {
    p.update(signal, threshold, noiseLevel);
    p.display();
  }
  
  // Noise visualization
  drawNoiseIndicator();
  
  time += 1;
}

function drawNoiseIndicator() {
  push();
  translate(60, height - 60);
  
  // Background
  fill(0, 0, 10, 0.7);
  noStroke();
  rect(-40, -30, 80, 60, 10);
  
  // Noise level bar
  fill(0, 0, 30);
  rect(-30, 10, 60, 8, 4);
  
  let barWidth = map(noiseLevel, 0, 150, 0, 60);
  let hue = map(noiseLevel, 0, 150, 120, 0);
  fill(hue, 70, 90);
  rect(-30, 10, barWidth, 8, 4);
  
  // Label
  fill(0, 0, 80);
  textAlign(CENTER);
  textSize(10);
  text('NOISE', 0, -8);
  textSize(8);
  text('← signal emerges', 0, 35);
  pop();
}

class Particle {
  constructor() {
    this.reset();
  }
  
  reset() {
    this.x = random(-width, width);
    this.y = random(-height, height);
    this.baseX = this.x;
    this.baseY = this.y;
    this.size = random(1, 4);
    this.speed = random(0.5, 2);
    this.hue = random(160, 260);
    this.noiseOffset = random(1000);
  }
  
  update(signal, threshold, noiseLevel) {
    // Noise-driven movement
    let nx = (noise(this.noiseOffset + time * 0.01) - 0.5) * noiseLevel;
    let ny = (noise(this.noiseOffset + 1000 + time * 0.01) - 0.5) * noiseLevel;
    
    // Signal influence
    let signalForce = signal * this.speed * 2;
    
    // Check if particle crosses threshold (stochastic resonance)
    let inResonance = abs(this.y - height/2) < abs(threshold);
    
    if (inResonance) {
      // Particles in threshold zone get "amplified"
      this.hue = lerp(this.hue, 300, 0.1); // Shift to magenta
      this.size = lerp(this.size, 5, 0.05);
    } else {
      this.hue = lerp(this.hue, random(160, 260), 0.02);
      this.size = lerp(this.size, random(1, 4), 0.02);
    }
    
    // Apply forces
    this.x += nx * 0.5 + sin(time * 0.02 + this.noiseOffset) * 0.3;
    this.y += ny * 0.5 + signalForce;
    
    // Wrap around
    if (this.x < -width/2) this.x = width/2;
    if (this.x > width/2) this.x = -width/2;
    if (this.y < -height/2) this.y = height/2;
    if (this.y > height/2) this.y = -height/2;
  }
  
  display() {
    push();
    translate(width/2 + this.x, height/2 + this.y);
    
    let alpha = map(abs(this.y), 0, height/2, 0.8, 0.1);
    fill(this.hue, 70, 100, alpha);
    noStroke();
    ellipse(0, 0, this.size);
    
    // Glow effect for resonant particles
    if (alpha > 0.5) {
      fill(this.hue, 50, 100, alpha * 0.3);
      ellipse(0, 0, this.size * 3);
    }
    pop();
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
