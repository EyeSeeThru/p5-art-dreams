<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandelbulb Fractal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  noStroke();
}

function draw() {
  background(0);
  
  let t = millis() / 1000.0;
  
  push();
  rotateY(t * 0.3);
  rotateX(t * 0.2);
  
  // Mandelbulb-inspired sphere
  ambientLight(100);
  pointLight(255, 255, 255, 200, 200, 200);
  
  // Wireframe sphere with displacement
  stroke(100, 200, 255);
  strokeWeight(1);
  sphere(100, 24, 24);
  
  // Inner glowing sphere
  noStroke();
  emissiveMaterial(0, 100, 200);
  sphere(60, 16, 16);
  
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
