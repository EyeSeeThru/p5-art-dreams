<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandelbulb Fractal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Use p5's built-in 3D for a mandelbulb-inspired fractal
let angle = 0;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  noStroke();
}

function draw() {
  background(5, 5, 15);
  
  let t = millis() / 1000.0;
  
  ambientLight(50);
  pointLight(255, 200, 150, 300, 300, 300);
  pointLight(100, 150, 255, -300, -300, 300);
  
  // Rotating mandelbulb-like structure
  push();
  rotateY(t * 0.2);
  rotateX(t * 0.15);
  
  // Create fractal-like shape using nested spheres with scale
  for (let i = 0; i < 8; i++) {
    push();
    rotateY(i * PI / 4 + t * 0.1);
    rotateZ(i * PI / 6);
    
    let scale_factor = 1 - i * 0.12;
    let hue_val = map(i, 0, 8, 0, 360);
    
    fill(hue_val, 70, 80);
    sphere(80 * scale_factor, 12, 12);
    
    // Add smaller orbiting spheres
    push();
    translate(60 * scale_factor, 0, 0);
    rotateY(t * 0.5 + i);
    fill(hue_val + 30, 60, 90);
    sphere(20 * scale_factor, 8, 8);
    pop();
    
    pop();
  }
  
  pop();
  
  // Background stars
  push();
  translate(0, 0, -500);
  fill(255);
  for (let i = 0; i < 50; i++) {
    let x = random(-width, width);
    let y = random(-height, height);
    ellipse(x, y, random(1, 3));
  }
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
