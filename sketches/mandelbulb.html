<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandelbulb Fractal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
let myShader;

const vert = `
precision highp float;

attribute vec3 aPosition;
attribute vec2 aTexCoord;

varying vec2 vTexCoord;

void main() {
  vTexCoord = aTexCoord;

  // p5 passes geometry in model space, so convert to clip space directly
  vec4 positionVec4 = vec4(aPosition, 1.0);
  positionVec4.xy = positionVec4.xy * 2.0 - 1.0;

  gl_Position = positionVec4;
}
`;

const frag = `
precision highp float;

varying vec2 vTexCoord;
uniform vec2 uResolution;
uniform float uTime;

#define MAX_STEPS 64
#define MAX_DIST 50.0
#define SURF_DIST 0.002
#define POWER 8.0

mat2 rot(float a) {
  float s = sin(a);
  float c = cos(a);
  return mat2(c, -s, s, c);
}

vec3 hsv2rgb(vec3 c) {
  vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

float mandelbulb(vec3 pos) {
  vec3 z = pos;
  float dr = 1.0;
  float r = 0.0;

  for (int i = 0; i < 8; i++) {
    r = length(z);
    if (r > 2.0) break;

    // Prevent division by zero / NaNs at the center
    float safeR = max(r, 0.0001);

    float theta = acos(clamp(z.z / safeR, -1.0, 1.0));
    float phi = atan(z.y, z.x);

    dr = pow(safeR, POWER - 1.0) * POWER * dr + 1.0;

    float zr = pow(safeR, POWER);
    theta *= POWER;
    phi *= POWER;

    z = zr * vec3(
      sin(theta) * cos(phi),
      sin(theta) * sin(phi),
      cos(theta)
    );
    z += pos;
  }

  r = max(r, 0.0001);
  return 0.5 * log(r) * r / dr;
}

float scene(vec3 p) {
  float t = uTime * 0.1;
  p.xz *= rot(t * 0.3);
  p.xy *= rot(t * 0.2);
  return mandelbulb(p) * 0.7;
}

vec3 getNormal(vec3 p) {
  vec2 e = vec2(0.001, 0.0);
  float d = scene(p);

  vec3 n = d - vec3(
    scene(p - e.xyy),
    scene(p - e.yxy),
    scene(p - e.yyx)
  );

  return normalize(n);
}

float rayMarch(vec3 ro, vec3 rd) {
  float d = 0.0;

  for (int i = 0; i < MAX_STEPS; i++) {
    vec3 p = ro + rd * d;
    float ds = scene(p);

    if (ds < SURF_DIST || d > MAX_DIST) break;

    // Prevent tiny/negative march steps from causing artifacts
    d += max(ds, 0.001);
  }

  return d;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution.xy) / uResolution.y;

  float t = uTime * 0.1;

  vec3 ro = vec3(0.0, 0.0, -2.8);
  vec3 rd = normalize(vec3(uv, 1.2));

  // Rotate camera origin AND view direction together
  ro.xz *= rot(t);
  rd.xz *= rot(t);

  float d = rayMarch(ro, rd);

  vec3 col = vec3(0.0);

  if (d < MAX_DIST) {
    vec3 p = ro + rd * d;
    vec3 n = getNormal(p);

    vec3 lightDir = normalize(vec3(1.0, 1.0, -1.0));
    float diff = max(dot(n, lightDir), 0.0);
    float amb = 0.15;
    float fresnel = pow(1.0 - max(dot(-rd, n), 0.0), 3.0);

    vec3 baseCol = hsv2rgb(vec3(fract(fresnel * 0.8 + t * 0.1), 0.7, 0.9));
    col = baseCol * (diff + amb) + vec3(1.0) * fresnel * 0.4;

    float glow = exp(-d * 0.3);
    col += hsv2rgb(vec3(fract(t * 0.15), 0.5, 0.5)) * glow * 0.2;
  } else {
    float stars = smoothstep(
      0.98,
      1.0,
      fract(sin(dot(floor(uv * 120.0), vec2(12.9898, 78.233))) * 43758.5453)
    );

    col = vec3(stars * 0.2);
    col += vec3(0.01, 0.005, 0.02) * (1.0 - length(uv));
  }

  col = pow(col, vec3(0.85));
  gl_FragColor = vec4(col, 1.0);
}
`;

function setup() {
  createCanvas(windowWidth, windowHeight, WEBGL);
  noStroke();
  myShader = createShader(vert, frag);
}

function draw() {
  shader(myShader);
  myShader.setUniform("uResolution", [width, height]);
  myShader.setUniform("uTime", millis() / 1000.0);

  // Fullscreen quad in WEBGL mode
  rect(-width / 2, -height / 2, width, height);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
