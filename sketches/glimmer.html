<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Glimmer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Glimmer — Twinkling scattered lights like fireflies in warm hues
// Artistic, dreamy, intimate
// Each glimmer fades in and out independently

let glimmers = [];
const MAX_GLIMMS = 150;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Initialize glimmers
  for (let i = 0; i < MAX_GLIMMS; i++) {
    glimmers.push(createGlimmer());
  }
}

function createGlimmer(startAlive = false) {
  let hue = random(0, 35); // Warm red to orange
  return {
    x: random(width),
    y: random(height),
    baseSize: random(1.5, 5),
    hue: hue,
    sat: random(60, 100),
    brightness: random(70, 100),
    alpha: startAlive ? random(30, 70) : 0,
    fadeInSpeed: random(0.5, 2),
    fadeOutSpeed: random(0.3, 1.2),
    flickerSpeed: random(0.02, 0.08),
    flickerAmp: random(10, 30),
    life: startAlive ? random(0.3, 1) : 0,
    growing: startAlive,
    driftX: random(-0.15, 0.15),
    driftY: random(-0.2, 0.05),
    pulsePhase: random(TWO_PI),
    pulseSpeed: random(0.03, 0.1)
  };
}

function draw() {
  // Dark fade for trails
  background(5, 20, 2, 40);

  time += 0.016;

  // Update and draw glimmers
  for (let i = 0; i < glimmers.length; i++) {
    let g = glimmers[i];

    // Drift
    g.x += g.driftX + sin(time * 0.3 + g.pulsePhase) * 0.2;
    g.y += g.driftY + cos(time * 0.2 + g.pulsePhase) * 0.15;

    // Wrap around edges
    if (g.x < -20) g.x = width + 20;
    if (g.x > width + 20) g.x = -20;
    if (g.y < -20) g.y = height + 20;
    if (g.y > height + 20) g.y = -20;

    // Life cycle
    if (g.growing) {
      g.life += g.fadeInSpeed * 0.02;
      if (g.life >= 1) {
        g.life = 1;
        g.growing = false;
      }
    } else {
      g.life -= g.fadeOutSpeed * 0.015;
      if (g.life <= 0) {
        // Respawn
        glimmers[i] = createGlimmer(true);
        continue;
      }
    }

    // Flicker
    let flicker = sin(time * g.flickerSpeed * 60 + g.pulsePhase) * g.flickerAmp;
    g.alpha = g.life * (50 + flicker);

    // Pulse size
    let pulse = 1 + sin(time * g.pulseSpeed * 60 + g.pulsePhase) * 0.2;
    let size = g.baseSize * pulse * (0.5 + g.life * 0.5);

    // Draw glimmer
    drawGlimmer(g, size);
  }

  // Spawn new glimmers
  if (random() < 0.15 && glimmers.filter(g => g.life < 0.1).length > 5) {
    let deadIdx = glimmers.findIndex(g => g.life < 0.1);
    if (deadIdx >= 0) {
      glimmers[deadIdx] = createGlimmer(true);
    }
  }

  // Mouse aura - nearby glimmers pulse brighter
  drawMouseInfluence();

  // Occasional wave
  if (frameCount % 180 === 0 && random() < 0.4) {
    spawnWave();
  }
}

function drawGlimmer(g, size) {
  noStroke();

  // Outer glow
  fill(g.hue, g.sat * 0.5, g.brightness, g.alpha * 0.15);
  ellipse(g.x, g.y, size * 8, size * 8);

  // Middle
  fill(g.hue, g.sat * 0.7, g.brightness, g.alpha * 0.4);
  ellipse(g.x, g.y, size * 4, size * 4);

  // Core
  fill(g.hue, g.sat * 0.3, min(g.brightness + 20, 100), g.alpha * 0.8);
  ellipse(g.x, g.y, size * 2, size * 2);

  // Hot center
  fill(min(g.hue + 20, 50), 20, 100, g.alpha * 0.6);
  ellipse(g.x, g.y, size * 0.8, size * 0.8);
}

function drawMouseInfluence() {
  let mx = mouseX;
  let my = mouseY;

  for (let g of glimmers) {
    let d = dist(g.x, g.y, mx, my);
    if (d < 150) {
      let influence = map(d, 0, 150, 0.3, 0);
      g.alpha = min(g.alpha + influence * 2, 100);
      g.baseSize *= (1 + influence * 0.1);
    }
  }

  // Draw subtle mouse glow
  noStroke();
  for (let r = 80; r > 10; r -= 15) {
    let alpha = map(r, 10, 80, 5, 0);
    fill(25, 50, 40, alpha);
    ellipse(mx, my, r, r * 0.7);
  }
}

function spawnWave() {
  // Spawn a wave of glimmers from a random point
  let wx = random(width);
  let wy = random(height);

  for (let i = 0; i < 20; i++) {
    let deadIdx = glimmers.findIndex(g => g.life < 0.2);
    if (deadIdx >= 0) {
      let g = createGlimmer(true);
      g.x = wx + random(-30, 30);
      g.y = wy + random(-30, 30);
      g.alpha = 80;
      glimmers[deadIdx] = g;
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mousePressed() {
  // Burst of glimmers at mouse
  for (let i = 0; i < 15; i++) {
    let deadIdx = glimmers.findIndex(g => g.life < 0.3);
    if (deadIdx >= 0) {
      let g = createGlimmer(true);
      g.x = mouseX + random(-40, 40);
      g.y = mouseY + random(-40, 40);
      g.alpha = 70;
      g.baseSize *= random(1.2, 2);
      glimmers[deadIdx] = g;
    }
  }
}
</script>
</body>
</html>
