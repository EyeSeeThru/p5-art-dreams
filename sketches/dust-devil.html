<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dust Devil — p5.js Generative Art</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0806; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Dust Devil — Spiraling particle vortex simulation
let particles = [];
let numParticles = 800;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  
  for (let i = 0; i < numParticles; i++) {
    particles.push(createParticle());
  }
}

function createParticle() {
  let angle = random(TWO_PI);
  let radius = random(3, 150);
  return {
    angle: angle,
    radius: radius,
    y: random(-height/2, height/2),
    speed: random(0.02, 0.06),
    riseSpeed: random(0.3, 0.8),
    size: random(1.5, 4),
    hue: random(20, 50),
    brightness: random(70, 100),
    opacity: random(30, 80)
  };
}

function draw() {
  background(20, 8, 4, 25);
  translate(width/2, height/2);
  
  // Center glow
  for (let r = 100; r > 0; r -= 10) {
    fill(30, 80, 60, map(r, 100, 0, 0, 8));
    ellipse(0, 0, r * 2);
  }
  
  // Update and draw particles
  for (let p of particles) {
    // Spiral motion
    p.angle += p.speed * (1 + 50 / (p.radius + 20));
    p.radius += random(-0.3, 0.3);
    p.y -= p.riseSpeed;
    
    // Add some turbulence
    let turbulence = noise(p.angle * 0.1, p.y * 0.01, time * 0.01) * 2 - 1;
    p.radius += turbulence * 0.5;
    
    // Keep in bounds
    if (p.radius < 5) p.radius = random(100, 150);
    if (p.radius > 180) p.radius = random(5, 30);
    if (p.y < -height/2 - 50) {
      p.y = height/2 + 50;
      p.radius = random(20, 100);
    }
    
    // Calculate position
    let x = cos(p.angle) * p.radius;
    let y = p.y + sin(p.angle * 3) * 10;
    
    // Height-based coloring (bottom = warm, top = cooler)
    let heightFactor = map(p.y, -height/2, height/2, 0, 1);
    let hue = lerp(25, 45, heightFactor);
    let sat = lerp(70, 30, heightFactor);
    
    // Size based on radius (larger at edges)
    let size = p.size * map(p.radius, 0, 180, 0.5, 1.5);
    
    // Draw particle with glow
    fill(hue, sat, p.brightness, p.opacity * 0.4);
    ellipse(x, y, size * 3);
    fill(hue, sat - 10, p.brightness, p.opacity);
    ellipse(x, y, size);
  }
  
  // Rising dust trails
  for (let i = 0; i < 3; i++) {
    let r = random(50, 150);
    let a = random(TWO_PI);
    let x = cos(a) * r;
    let y = random(-height/2, height/2);
    fill(40, 40, 80, 5);
    ellipse(x, y, random(20, 60));
  }
  
  time += 0.016;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
