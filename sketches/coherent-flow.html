<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coherent Flow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Coherent Flow - Lagrangian Coherent Structures Visualization
// Demonstrates flow field coherence through particle advection

let particles = [];
let flowField;
let cols, rows;
let resolution = 12;
let time = 0;
let palette;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  cols = floor(width / resolution);
  rows = floor(height / resolution);
  
  // Warm ember palette
  palette = [
    color(15, 90, 90),
    color(30, 85, 95),
    color(45, 80, 100),
    color(60, 70, 90),
    color(180, 60, 80),
    color(200, 50, 70),
  ];
  
  // Initialize particles
  for (let i = 0; i < 3000; i++) {
    particles.push(new Particle());
  }
  
  // Precompute flow field
  computeFlowField();
}

function computeFlowField() {
  flowField = [];
  for (let y = 0; y < rows; y++) {
    flowField[y] = [];
    for (let x = 0; x < cols; x++) {
      let angle = computeAngle(x * resolution, y * resolution, time);
      let v = p5.Vector.fromAngle(angle);
      flowField[y][x] = v;
    }
  }
}

function computeAngle(x, y, t) {
  // Double gyre-inspired coherent flow
  let scale = 0.003;
  let ax = x * scale;
  let ay = y * scale;
  
  let eps = 0.25;
  let a = eps * sin(t * 0.3);
  let b = 1 - 2 * eps * sin(t * 0.3);
  
  // Gyre functions
  let f1 = a * ax * ax + b * ax;
  let f2 = a * ax * ax + (b + 1) * ax;
  
  // Stream function
  let psi = sin(PI * f1) * sin(PI * ay);
  let dpsi_dx = PI * (2 * a * ax + b) * cos(PI * f1) * sin(PI * ay);
  let dpsi_dy = PI * sin(PI * f1) * cos(PI * ay);
  
  // Velocity (perpendicular to gradient of stream function)
  let vx = dpsi_dy;
  let vy = -dpsi_dx;
  
  // Add some noise
  let noiseScale = 0.02;
  let nx = (noise(x * noiseScale + t, y * noiseScale) - 0.5) * 0.5;
  let ny = (noise(x * noiseScale, y * noiseScale + t) - 0.5) * 0.5;
  
  return atan2(vy + ny, vx + nx);
}

function draw() {
  // Semi-transparent background for trails
  background(10, 8, 15, 15);
  
  // Update flow field periodically
  if (frameCount % 3 === 0) {
    time += 0.01;
    computeFlowField();
  }
  
  // Update and draw particles
  for (let p of particles) {
    p.follow(flowField);
    p.update();
    p.edges();
    p.show();
  }
  
  // Draw flow field hints
  drawFlowHints();
  
  time += 0.005;
}

function drawFlowHints() {
  stroke(200, 30, 40, 8);
  strokeWeight(0.5);
  
  let step = 8;
  for (let y = 0; y < rows; y += step) {
    for (let x = 0; x < cols; x += step) {
      let angle = computeAngle(x * resolution, y * resolution, time);
      let cx = x * resolution + resolution / 2;
      let cy = y * resolution + resolution / 2;
      
      let len = 8;
      let x2 = cx + cos(angle) * len;
      let y2 = cy + sin(angle) * len;
      
      line(cx, cy, x2, y2);
    }
  }
}

class Particle {
  constructor() {
    this.pos = createVector(random(width), random(height));
    this.vel = createVector(0, 0);
    this.acc = createVector(0, 0);
    this.maxSpeed = 2.5;
    this.prevPos = this.pos.copy();
    this.hue = random(360);
    this.sat = random(60, 90);
    this.brightness = random(70, 100);
    this.life = random(100, 255);
    this.decay = random(0.3, 0.8);
  }
  
  follow(field) {
    let x = floor(this.pos.x / resolution);
    let y = floor(this.pos.y / resolution);
    
    if (x >= 0 && x < cols && y >= 0 && y < rows) {
      let force = field[y][x].copy();
      force.setMag(0.15);
      this.applyForce(force);
    }
  }
  
  applyForce(force) {
    this.acc.add(force);
  }
  
  update() {
    this.prevPos = this.pos.copy();
    
    this.vel.add(this.acc);
    this.vel.limit(this.maxSpeed);
    this.pos.add(this.vel);
    this.acc.mult(0);
    
    this.life -= this.decay;
  }
  
  edges() {
    let wrapped = false;
    
    if (this.pos.x > width) {
      this.pos.x = 0;
      wrapped = true;
    }
    if (this.pos.x < 0) {
      this.pos.x = width;
      wrapped = true;
    }
    if (this.pos.y > height) {
      this.pos.y = 0;
      wrapped = true;
    }
    if (this.pos.y < 0) {
      this.pos.y = height;
      wrapped = true;
    }
    
    if (wrapped) {
      this.prevPos = this.pos.copy();
    }
    
    // Respawn if dead
    if (this.life <= 0) {
      this.pos = createVector(random(width), random(height));
      this.prevPos = this.pos.copy();
      this.life = random(100, 255);
      this.vel.mult(0);
    }
  }
  
  show() {
    // Color based on velocity
    let speed = this.vel.mag();
    let h = map(speed, 0, this.maxSpeed, this.hue, (this.hue + 40) % 360);
    let s = map(speed, 0, this.maxSpeed, this.sat * 0.5, this.sat);
    let b = map(speed, 0, this.maxSpeed, this.brightness * 0.6, this.brightness);
    
    stroke(h, s, b, this.life * 0.4);
    strokeWeight(map(speed, 0, this.maxSpeed, 1, 2.5));
    line(this.prevPos.x, this.prevPos.y, this.pos.x, this.pos.y);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / resolution);
  rows = floor(height / resolution);
  computeFlowField();
}
</script>
</body>
</html>
