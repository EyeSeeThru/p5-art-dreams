<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dempster-Shafer Theory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020208; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Dempster-Shafer Theory — Belief Functions
// Evidence theory: generalize Bayesian with imprecise probabilities
// Mass function m(A): belief assigned to exact proposition A
// Bel(A) = sum of m(B) for all B ⊆ A
// Pl(A) = 1 - Bel(¬A) = sum of m(B) for all B ∩ A ≠ ∅

let time = 0;
const N = 3; // number of propositions: {A, B, C}
let propositions = ['A', 'B', 'C'];
let sources = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Initialize two evidence sources
  sources.push(createSource(0, 'Source 1', [0.4, 0.3, 0.15], [0.0, 0.05]));
  sources.push(createSource(1, 'Source 2', [0.2, 0.35, 0.25], [0.1, 0.0]));
  sources.push(createSource(2, 'Source 3', [0.25, 0.25, 0.3], [0.05, 0.05]));
  
  textSize(11);
}

function createSource(idx, name, focal, uncertainty) {
  return {
    idx,
    name,
    massA: focal[0],
    massB: focal[1],
    massC: focal[2],
    massAB: uncertainty[0],
    massAC: uncertainty[1],
    massABC: max(0, 1 - focal[0] - focal[1] - focal[2] - uncertainty[0] - uncertainty[1] - 0.1)
  };
}

function draw() {
  background(240, 20, 3);
  time += 0.02;

  // Animate source masses slightly
  for (let s of sources) {
    s.massA = constrain(s.massA + sin(time * 0.7 + s.idx) * 0.01, 0.1, 0.6);
    s.massB = constrain(s.massB + sin(time * 0.5 + s.idx * 2) * 0.01, 0.1, 0.6);
    s.massC = constrain(s.massC + sin(time * 0.6 + s.idx * 3) * 0.01, 0.1, 0.6);
  }

  let cx = width / 2;
  let cy = height * 0.42;

  // Draw belief bar charts for each source (left side)
  let barStartX = 60;
  let barW = 160;
  let barH = 12;
  let barSpacing = 28;
  let sourceY = cy - 150;

  fill(195, 10, 80, 85);
  textSize(13);
  textAlign(LEFT, TOP);
  text('Dempster-Shafer Theory — Belief Functions', 16, 16);
  fill(165, 8, 65, 75);
  textSize(10);
  text('Mass m(X): belief committed exactly to proposition X (ignores subsets).', 16, 38);
  text('Bel(A) = Σ m(B) for all B ⊆ A. Pl(A) = 1 − Bel(¬A).', 16, 52);
  text('Combine evidence via Dempster\'s rule: m₁ ⊕ m₂ normalizes over conflict.', 16, 66);
  text('Drag sliders or press SPACE to randomize.', 16, 80);

  // Draw each source
  for (let si = 0; si < sources.length; si++) {
    let s = sources[si];
    let sy = sourceY + si * 105;
    let sx = barStartX + si * 200;

    // Label
    fill(195, 15, 85, 90);
    textSize(12);
    textAlign(LEFT, TOP);
    text(s.name, sx, sy);

    // Mass bars
    let masses = [
      { label: 'A', value: s.massA, hue: 180 },
      { label: 'B', value: s.massB, hue: 300 },
      { label: 'C', value: s.massC, hue: 50 },
      { label: 'A∪B', value: s.massAB, hue: 240 },
      { label: 'A∪C', value: s.massAC, hue: 120 },
      { label: 'Θ', value: s.massABC, hue: 0 }
    ];

    for (let mi = 0; mi < masses.length; mi++) {
      let m = masses[mi];
      let my = sy + 18 + mi * barSpacing;
      let bw = m.value * barW;

      // Label
      fill(165, 10, 70, 80);
      textSize(10);
      textAlign(RIGHT, TOP);
      text(m.label, sx + barW - 4, my);

      // Bar background
      fill(0, 0, 15, 40);
      noStroke();
      rect(sx, my, barW, barH, 2);

      // Bar fill
      fill(m.hue, 60, 85, 80);
      if (bw > 2) rect(sx, my, bw, barH, 2);

      // Value
      fill(0, 0, 90, 90);
      textAlign(LEFT, TOP);
      text(m.value.toFixed(2), sx + bw + 4, my);
    }

    // Calculate belief and plausibility
    let belA = s.massA + s.massAB + s.massAC + s.massABC;
    let belB = s.massB + s.massAB + s.massABC;
    let belC = s.massC + s.massAC + s.massABC;
    let plA = 1 - s.massB - s.massC - s.massAB - s.massAC;
    let plB = 1 - s.massA - s.massC - s.massAB - s.massAC;
    let plC = 1 - s.massA - s.massB - s.massAB - s.massAC;

    // Draw belief interval for A
    let iy = sy + 18 + 6 * barSpacing + 10;
    drawBeliefInterval(sx, iy, barW, belA, plA, 'A', 180);
    drawBeliefInterval(sx, iy + 22, barW, belB, plB, 'B', 300);
    drawBeliefInterval(sx, iy + 44, barW, belC, plC, 'C', 50);
  }

  // Draw combined evidence (right side)
  let combinedX = barStartX + 3 * 200 + 40;
  drawCombinedEvidence(combinedX, sourceY, 280, 320);

  // Draw probability simplex (bottom right)
  drawSimplex(cx - 20, cy + 180, min(width * 0.3, 260));
}

function drawBeliefInterval(x, y, w, bel, pl, label, hue) {
  // Belief interval: [Bel, Pl] — the range of possible belief in label
  let belW = bel * w;
  let plW = pl * w;

  // Plausibility bar (lighter)
  fill(hue, 40, 80, 30);
  noStroke();
  rect(x, y, plW, 8, 2);

  // Belief bar (darker)
  fill(hue, 60, 85, 80);
  rect(x, y, belW, 8, 2);

  // Interval marker
  fill(hue, 30, 100, 90);
  rect(x + belW - 1, y - 2, plW - belW + 2, 12, 2);

  // Labels
  fill(165, 10, 65, 70);
  textSize(9);
  textAlign(RIGHT, TOP);
  text(label + ': [' + bel.toFixed(2) + ', ' + pl.toFixed(2) + ']', x + w, y);
}

function drawCombinedEvidence(x, y, w, h) {
  // Combine all sources with Dempster's rule
  let combined = combineAllSources();

  // Header
  fill(195, 15, 85, 90);
  textSize(13);
  textAlign(CENTER, TOP);
  text('Combined Evidence (⊕)', x + w / 2, y);

  // Calculate combined belief/plausibility
  let bel = {
    A: combined.mA + combined.mAB + combined.mAC + combined.mABC,
    B: combined.mB + combined.mAB + combined.mABC,
    C: combined.mC + combined.mAC + combined.mABC
  };
  let pl = {
    A: 1 - combined.mB - combined.mC - combined.mAB - combined.mAC,
    B: 1 - combined.mA - combined.mC - combined.mAB - combined.mAC,
    C: 1 - combined.mA - combined.mB - combined.mAB - combined.mAC
  };

  // Draw combined masses as pie chart
  let pieX = x + 80;
  let pieY = y + 100;
  let pieR = 70;

  let masses = [
    { label: 'A', value: combined.mA, hue: 180 },
    { label: 'B', value: combined.mB, hue: 300 },
    { label: 'C', value: combined.mC, hue: 50 },
    { label: 'A∪B', value: combined.mAB, hue: 240 },
    { label: 'A∪C', value: combined.mAC, hue: 120 },
    { label: 'Θ', value: combined.mABC, hue: 0 }
  ];

  let startAngle = -PI / 2;
  for (let m of masses) {
    if (m.value < 0.01) continue;
    let sweep = m.value * TWO_PI;
    fill(m.hue, 60, 85, 80);
    stroke(0, 0, 10, 80);
    strokeWeight(1);
    arc(pieX, pieY, pieR * 2, pieR * 2, startAngle, startAngle + sweep);
    
    // Label
    if (m.value > 0.05) {
      let midAngle = startAngle + sweep / 2;
      let labelR = pieR * 0.65;
      fill(0, 0, 100, 95);
      noStroke();
      textSize(10);
      textAlign(CENTER, CENTER);
      text(m.label, pieX + labelR * cos(midAngle), pieY + labelR * sin(midAngle));
    }
    startAngle += sweep;
  }

  // Belief intervals
  let intY = pieY + pieR + 30;
  fill(165, 10, 65, 70);
  textSize(10);
  textAlign(LEFT, TOP);
  text('Belief intervals:', x + w / 2, intY);

  let hues = [180, 300, 50];
  let labels = ['A', 'B', 'C'];
  for (let i = 0; i < 3; i++) {
    let iy = intY + 18 + i * 20;
    drawBeliefInterval(x, iy, w - 20, bel[labels[i]], pl[labels[i]], labels[i], hues[i]);
  }

  // Conflict indicator
  let conflict = combined.conflict;
  let confY = intY + 18 + 3 * 20 + 15;
  fill(0, 80, 80, 80);
  textSize(10);
  textAlign(CENTER, TOP);
  text('Conflict (1−K): ' + conflict.toFixed(3), x + w / 2, confY);

  // Conflict visualization
  fill(0, 80, 60, 40);
  noStroke();
  rect(x + 20, confY + 16, (w - 40) * conflict, 6, 2);
  fill(0, 0, 15, 40);
  stroke(0, 0, 20, 30);
  strokeWeight(1);
  rect(x + 20, confY + 16, w - 40, 6, 2);
}

function combineAllSources() {
  // Dempster's rule: m₁ ⊕ m₂
  // m(A) = (1/K) × Σ m₁(B) × m₂(C) where B ∩ C = A
  // K = Σ m₁(B) × m₂(C) where B ∩ C = ∅ (conflict)

  // Start with first source
  let result = { mA: sources[0].massA, mB: sources[0].massB, mC: sources[0].massC,
                 mAB: sources[0].massAB, mAC: sources[0].massAC, mABC: sources[0].massABC };

  for (let si = 1; si < sources.length; si++) {
    let s = sources[si];
    let newResult = { mA: 0, mB: 0, mC: 0, mAB: 0, mAC: 0, mABC: 0 };
    let conflict = 0;

    let all1 = [result.mA, result.mB, result.mC, result.mAB, result.mAC, result.mABC];
    let all2 = [s.massA, s.massB, s.massC, s.massAB, s.massAC, s.massABC];

    // Mass assignments index: 0=A, 1=B, 2=C, 3=AB, 4=AC, 5=ABC
    let sets = [['A'], ['B'], ['C'], ['A', 'B'], ['A', 'C'], ['A', 'B', 'C']];

    let totalMass = 0;
    for (let i = 0; i < 6; i++) {
      for (let j = 0; j < 6; j++) {
        let inter = sets[i].filter(x => sets[j].includes(x));
        let product = all1[i] * all2[j];

        if (inter.length === 0) {
          // Empty intersection — conflict
          conflict += product;
        } else if (inter.length === 1) {
          // Single element
          if (inter[0] === 'A') newResult.mA += product;
          else if (inter[0] === 'B') newResult.mB += product;
          else if (inter[0] === 'C') newResult.mC += product;
        } else if (inter.length === 2) {
          if (inter.includes('A') && inter.includes('B')) newResult.mAB += product;
          else if (inter.includes('A') && inter.includes('C')) newResult.mAC += product;
        } else {
          // ABC
          newResult.mABC += product;
        }
        totalMass += product;
      }
    }

    // Normalize
    let norm = 1 - conflict;
    if (norm > 0.001) {
      newResult.mA /= norm; newResult.mB /= norm; newResult.mC /= norm;
      newResult.mAB /= norm; newResult.mAC /= norm; newResult.mABC /= norm;
    }

    result = newResult;
    result.conflict = conflict;
  }

  return result;
}

function drawSimplex(cx, cy, sz) {
  // Draw ternary/probability simplex for 3 hypotheses
  let h = sz * sqrt(3) / 2;

  // Corner labels
  let corners = [
    { x: cx, y: cy - h * 2 / 3, label: 'A' },
    { x: cx - sz / 2, y: cy + h / 3, label: 'B' },
    { x: cx + sz / 2, y: cy + h / 3, label: 'C' }
  ];

  // Triangle outline
  stroke(210, 20, 30, 40);
  strokeWeight(1.5);
  noFill();
  beginShape();
  for (let c of corners) vertex(c.x, c.y);
  endShape(CLOSE);

  // Grid lines
  for (let t = 0.2; t < 1; t += 0.2) {
    // A side
    let a1 = corners[0].x + t * (corners[1].x - corners[0].x);
    let a1y = corners[0].y + t * (corners[1].y - corners[0].y);
    let a2 = corners[0].x + t * (corners[2].x - corners[0].x);
    let a2y = corners[0].y + t * (corners[2].y - corners[0].y);
    stroke(210, 15, 20, 25);
    line(a1, a1y, a2, a2y);

    // B side
    let b1 = corners[1].x + t * (corners[2].x - corners[1].x);
    let b1y = corners[1].y + t * (corners[2].y - corners[1].y);
    let b2 = corners[1].x + t * (corners[0].x - corners[1].x);
    let b2y = corners[1].y + t * (corners[0].y - corners[1].y);
    line(b1, b1y, b2, b2y);
  }

  // Corner labels
  fill(165, 15, 80, 85);
  textSize(11);
  textAlign(CENTER, CENTER);
  for (let c of corners) text(c.label + ' (100%)', c.x, c.y - 12);

  // Plot combined evidence as point
  let combined = combineAllSources();
  // Convert mass to probability (simplified: just bel)
  let pA = combined.mA + combined.mAB * 0.5 + combined.mAC * 0.5;
  let pB = combined.mB + combined.mAB * 0.5 + combined.mABC * 0.33;
  let pC = combined.mC + combined.mAC * 0.5 + combined.mABC * 0.33;

  let pt = simplexPoint(pA, pB, pC, corners, h);
  fill(50, 90, 100, 85);
  noStroke();
  ellipse(pt.x, pt.y, 10 + sin(time * 3) * 3, 10 + sin(time * 3) * 3);
  fill(50, 50, 100, 95);
  ellipse(pt.x, pt.y, 4, 4);

  // Title
  fill(195, 10, 70, 75);
  textSize(10);
  textAlign(CENTER, TOP);
  text('Belief Simplex', cx, cy + h / 3 + 12);
}

function simplexPoint(pA, pB, pC, corners, h) {
  // Map (pA, pB, pC) to simplex coordinates
  let total = pA + pB + pC;
  if (total < 0.001) return { x: corners[1].x, y: corners[1].y };
  let x = (pB * corners[2].x + pC * corners[1].x + pA * corners[0].x) / total;
  let y = (pB * corners[2].y + pC * corners[1].y + pA * corners[0].y) / total;
  return { x, y };
}

function keyPressed() {
  if (key === ' ') {
    for (let s of sources) {
      let total = random(0.6, 1.2);
      s.massA = random(0.1, 0.5);
      s.massB = random(0.1, 0.5);
      s.massC = random(0.1, 0.5);
      s.massAB = random(0, 0.15);
      s.massAC = random(0, 0.15);
      s.massABC = max(0, 1 - s.massA - s.massB - s.massC - s.massAB - s.massAC - random(0, 0.1));
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
