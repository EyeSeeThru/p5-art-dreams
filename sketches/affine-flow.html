<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affine Flow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a12; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let t = 0;
    let shapes = [];
    const NUM_SHAPES = 80;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      for (let i = 0; i < NUM_SHAPES; i++) {
        shapes.push({
          x: random(width),
          y: random(height),
          size: random(30, 120),
          hue: random(360),
          phase: random(TWO_PI),
          type: floor(random(3))
        });
      }
    }

    function draw() {
      background(230, 30, 5, 8);
      t += 0.003;

      for (let i = 0; i < shapes.length; i++) {
        let s = shapes[i];
        let af = getAffineFactor(s, t);
        let ax = af.a * (s.x - width / 2) + af.b * (s.y - height / 2) + width / 2 + af.tx;
        let ay = af.c * (s.x - width / 2) + af.d * (s.y - height / 2) + height / 2 + af.ty;

        let pulse = sin(t * 2 + s.phase) * 0.3 + 1;
        let sz = s.size * pulse;

        push();
        translate(ax, ay);
        rotate(af.theta);

        noStroke();
        let alpha = 60 + 40 * sin(t + s.phase);
        let b = 70 + 20 * sin(t * 1.5 + s.hue / 360 * TWO_PI);
        fill((s.hue + t * 50) % 360, 70, b, alpha);

        if (s.type === 0) {
          rectMode(CENTER);
          rotate(af.theta * 0.7);
          rect(0, 0, sz, sz * 0.6);
        } else if (s.type === 1) {
          ellipse(0, 0, sz, sz * 0.7);
        } else {
          triangle(0, -sz / 2, -sz / 2, sz / 2, sz / 2, sz / 2);
        }
        pop();
      }
    }

    function getAffineFactor(s, t) {
      let a = cos(t * 0.7 + s.phase);
      let b = sin(t * 0.5 + s.phase) * 0.5;
      let c = -sin(t * 0.6 + s.phase) * 0.3;
      let d = cos(t * 0.8 + s.phase * 1.3);
      let tx = sin(t * 0.4 + s.phase) * 100;
      let ty = cos(t * 0.3 + s.phase) * 80;
      let theta = t + s.phase;
      return { a, b, c, d, tx, ty, theta };
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
