<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Dynamics</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Network Dynamics - Force-directed graph with evolving topology
let nodes = [];
let edges = [];
let numNodes = 60;
let repulsionStrength = 800;
let attractionStrength = 0.02;
let damping = 0.92;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Initialize nodes in a circular layout
  for (let i = 0; i < numNodes; i++) {
    let angle = map(i, 0, numNodes, 0, TWO_PI);
    let radius = min(width, height) * 0.25;
    nodes.push({
      x: width/2 + cos(angle) * radius + random(-30, 30),
      y: height/2 + sin(angle) * radius + random(-30, 30),
      vx: 0,
      vy: 0,
      hue: random(180, 280),
      size: random(4, 12),
      phase: random(TWO_PI)
    });
  }
  
  // Create initial edges (nearest neighbors)
  for (let i = 0; i < numNodes; i++) {
    let nearest = getNearestNeighbors(i, 3);
    for (let n of nearest) {
      if (!edgeExists(i, n)) {
        edges.push({ a: i, b: n, life: 1 });
      }
    }
  }
}

function getNearestNeighbors(idx, count) {
  let distances = [];
  for (let i = 0; i < nodes.length; i++) {
    if (i !== idx) {
      let d = dist(nodes[idx].x, nodes[idx].y, nodes[i].x, nodes[i].y);
      distances.push({ idx: i, dist: d });
    }
  }
  distances.sort((a, b) => a.dist - b.dist);
  return distances.slice(0, count).map(d => d.idx);
}

function edgeExists(a, b) {
  return edges.some(e => (e.a === a && e.b === b) || (e.a === b && e.b === a));
}

function draw() {
  background(240, 20, 5, 25);
  
  let time = millis() * 0.001;
  
  // Update physics
  for (let i = 0; i < nodes.length; i++) {
    let node = nodes[i];
    
    // Repulsion from all other nodes
    for (let j = 0; j < nodes.length; j++) {
      if (i !== j) {
        let other = nodes[j];
        let dx = node.x - other.x;
        let dy = node.y - other.y;
        let d = sqrt(dx*dx + dy*dy) + 1;
        let force = repulsionStrength / (d * d);
        node.vx += (dx / d) * force;
        node.vy += (dy / d) * force;
      }
    }
    
    // Attraction to connected nodes
    for (let e of edges) {
      if (e.a === i || e.b === i) {
        let otherIdx = e.a === i ? e.b : e.a;
        let other = nodes[otherIdx];
        let dx = other.x - node.x;
        let dy = other.y - node.y;
        node.vx += dx * attractionStrength * e.life;
        node.vy += dy * attractionStrength * e.life;
      }
    }
    
    // Center gravity
    let cx = width/2 + sin(time * 0.3 + node.phase) * 50;
    let cy = height/2 + cos(time * 0.2 + node.phase * 1.3) * 50;
    node.vx += (cx - node.x) * 0.001;
    node.vy += (cy - node.y) * 0.001;
    
    // Damping
    node.vx *= damping;
    node.vy *= damping;
    
    // Update position
    node.x += node.vx;
    node.y += node.vy;
    
    // Boundary
    node.x = constrain(node.x, 50, width - 50);
    node.y = constrain(node.y, 50, height - 50);
  }
  
  // Evolve edges - add new connections occasionally
  if (frameCount % 10 === 0 && edges.length < numNodes * 3) {
    let i = floor(random(numNodes));
    let nearest = getNearestNeighbors(i, 2);
    for (let n of nearest) {
      if (!edgeExists(i, n) && random() < 0.3) {
        edges.push({ a: i, b: n, life: 1 });
      }
    }
  }
  
  // Fade edges
  for (let e of edges) {
    if (random() < 0.002) {
      e.life -= 0.1;
    }
  }
  edges = edges.filter(e => e.life > 0);
  
  // Draw edges
  for (let e of edges) {
    let a = nodes[e.a];
    let b = nodes[e.b];
    let avgHue = (a.hue + b.hue) / 2;
    let alpha = e.life * 40;
    stroke(avgHue, 70, 80, alpha);
    strokeWeight(1);
    line(a.x, a.y, b.x, b.y);
  }
  
  // Draw nodes
  noStroke();
  for (let i = 0; i < nodes.length; i++) {
    let node = nodes[i];
    let pulse = sin(time * 2 + node.phase) * 0.3 + 0.7;
    let size = node.size * pulse;
    
    // Glow
    fill(node.hue, 60, 90, 15);
    ellipse(node.x, node.y, size * 4);
    fill(node.hue, 50, 100, 40);
    ellipse(node.x, node.y, size * 2);
    
    // Core
    fill(node.hue, 40, 100, 100);
    ellipse(node.x, node.y, size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
