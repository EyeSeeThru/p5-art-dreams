<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Brush</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Fractal Brush - Recursive brush strokes creating organic fractal patterns

let branches = [];
let palette;
let t = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Warm earthy palette with hints of gold and copper
  palette = [
    color(25, 70, 90),    // Deep sienna
    color(35, 80, 95),    // Golden amber
    color(15, 60, 70),    // Burnt umber
    color(45, 75, 85),    // Ochre
    color(5, 65, 80),     // Rust
    color(55, 50, 90),    // Pale gold
    color(20, 85, 60),    // Dark mahogany
  ];
  
  // Initialize root branches
  for (let i = 0; i < 6; i++) {
    let angle = TWO_PI / 6 * i + random(-0.2, 0.2);
    let len = random(80, 150);
    let startX = width/2 + cos(angle) * 50;
    let startY = height/2 + sin(angle) * 50;
    branches.push(new Branch(startX, startY, angle, len, 0, 12));
  }
}

function draw() {
  // Semi-transparent overlay for trails
  noStroke();
  fill(10, 8, 12, 3);
  rect(0, 0, width, height);
  
  // Update and draw branches
  for (let b of branches) {
    b.update();
    b.display();
  }
  
  t += 0.005;
}

class Branch {
  constructor(x, y, angle, len, depth, maxDepth) {
    this.x = x;
    this.y = y;
    this.angle = angle;
    this.len = len;
    this.depth = depth;
    this.maxDepth = maxDepth;
    this.vel = p5.Vector.fromAngle(angle).mult(len * 0.02);
    this.noiseOffset = random(1000);
    this.thickness = map(depth, 0, maxDepth, 8, 1);
    this.col = random(palette);
    this.children = [];
    this.grown = false;
    this.growthProgress = 0;
  }
  
  update() {
    // Grow the branch
    if (this.growthProgress < 1) {
      this.growthProgress += 0.02;
    }
    
    // Add noise-based movement
    let noiseVal = noise(this.noiseOffset + t * 2);
    this.angle += map(noiseVal, 0, 1, -0.02, 0.02);
    
    // Move endpoint
    this.vel = p5.Vector.fromAngle(this.angle).mult(this.len * 0.015);
    
    // Branch out at certain points
    if (this.growthProgress > 0.7 && !this.grown && this.depth < this.maxDepth) {
      if (random() < 0.03) {
        this.branchOut();
      }
    }
    
    // Update children
    for (let c of this.children) {
      c.update();
    }
  }
  
  branchOut() {
    this.grown = true;
    let numBranches = floor(random(2, 4));
    for (let i = 0; i < numBranches; i++) {
      let newAngle = this.angle + random(-PI/3, PI/3);
      let newLen = this.len * random(0.5, 0.75);
      let endX = this.x + cos(this.angle) * this.len * this.growthProgress;
      let endY = this.y + sin(this.angle) * this.len * this.growthProgress;
      this.children.push(new Branch(endX, endY, newAngle, newLen, this.depth + 1, this.maxDepth));
    }
  }
  
  display() {
    let currentLen = this.len * this.growthProgress;
    let endX = this.x + cos(this.angle) * currentLen;
    let endY = this.y + sin(this.angle) * currentLen;
    
    // Draw main stroke with varying thickness
    strokeWeight(this.thickness * this.growthProgress);
    
    // Color with slight variation
    let hueShift = noise(this.noiseOffset * 0.1 + t) * 20 - 10;
    let c = color(hue(this.col) + hueShift, saturation(this.col), brightness(this.col), 80 * this.growthProgress);
    stroke(c);
    
    line(this.x, this.y, endX, endY);
    
    // Draw decorative particles along branch
    if (this.growthProgress > 0.3) {
      let numParticles = floor(currentLen / 20);
      for (let i = 0; i < numParticles; i++) {
        if (random() < 0.1) {
          let p = i / numParticles;
          let px = lerp(this.x, endX, p) + random(-3, 3);
          let py = lerp(this.y, endY, p) + random(-3, 3);
          noStroke();
          fill(hue(this.col) + hueShift, saturation(this.col) - 20, brightness(this.col), 40);
          circle(px, py, random(1, 3));
        }
      }
    }
    
    // Draw children
    for (let c of this.children) {
      c.display();
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(10, 8, 12);
}
</script>
</body>
</html>
