<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Inferno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020101; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
// Inferno — Intense, overwhelming fire visualization
// Artistic, dramatic, all-consuming
// Fire as overwhelming force

let time = 0;
let flames = [];
const NUM_FLAMES = 25;
let heatDistortion = [];

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  for (let i = 0; i < NUM_FLAMES; i++) {
    flames.push(createFlame());
  }

  // Initialize heat distortion grid
  for (let x = 0; x < width; x += 20) {
    for (let y = 0; y < height; y += 20) {
      heatDistortion.push({ x, y, offset: 0 });
    }
  }
}

function createFlame() {
  return {
    x: random(width),
    baseY: height + random(50, 200),
    width: random(80, 200),
    height: random(300, 600),
    hue: random(0, 35), // Red to orange
    speed: random(2, 5),
    phase: random(TWO_PI),
    turbulence: random(0.02, 0.06),
    turbulenceAmp: random(20, 50),
    layers: floor(random(4, 8)),
    flickerPhase: random(TWO_PI),
    flickerSpeed: random(0.1, 0.3)
  };
}

function draw() {
  // Dark background with heat glow at bottom
  background(2, 20, 1);

  // Update heat distortion
  for (let cell of heatDistortion) {
    let dy = height - cell.y;
    if (dy > 0 && dy < height * 0.7) {
      cell.offset = sin(time * 0.05 * 60 + cell.x * 0.01) * map(dy, 0, height * 0.7, 8, 0);
    } else {
      cell.offset = 0;
    }
  }

  // Draw heat shimmer effect
  noStroke();
  for (let y = height * 0.3; y < height; y += 4) {
    let alpha = map(y, height * 0.3, height, 0, 6);
    fill(20, 40, 30, alpha);
    rect(0, y, width, 1);
  }

  // Draw flames from back to front
  flames.sort((a, b) => a.layers - b.layers);

  for (let flame of flames) {
    drawFlame(flame);
  }

  // Draw floating embers/ashes
  drawEmbers();

  // Central intense glow
  let glowSize = width * 0.4;
  noStroke();
  for (let r = glowSize; r > 0; r -= glowSize / 10) {
    let alpha = map(r, 0, glowSize, 20, 0);
    fill(25, 80, 60, alpha);
    ellipse(width / 2, height * 0.85, r, r * 0.5);
  }

  time += 0.016;
}

function drawFlame(flame) {
  let flicker = sin(time * flame.flickerSpeed * 60 + flame.flickerPhase) * 0.2 + 0.8;

  for (let layer = 0; layer < flame.layers; layer++) {
    let layerRatio = layer / flame.layers;
    let layerHeight = flame.height * (1 - layerRatio * 0.7) * flicker;
    let layerWidth = flame.width * (1 - layerRatio * 0.5);

    let hue = flame.hue + layerRatio * 15;
    let sat = 100 - layerRatio * 30;
    let bright = 80 + layerRatio * 20;
    let alpha = (70 - layerRatio * 50) * flicker;

    // Calculate flame shape with turbulence
    let points = [];
    let numPoints = 50;

    for (let i = 0; i <= numPoints; i++) {
      let t = i / numPoints;
      let y = flame.baseY - t * layerHeight;

      // Turbulence increases toward top
      let turbFactor = t * t;
      let turb = sin(t * 10 + time * flame.turbulence * 60 + flame.phase) * flame.turbulenceAmp * turbFactor;

      // Width narrows toward top
      let w = layerWidth * (1 - t * 0.8) * (1 + turb * 0.1);
      let x = flame.x + turb;

      // Slight curve
      let curve = sin(t * PI) * w * 0.2;

      points.push({ x: x + curve, y, w: w * flicker });
    }

    // Draw flame as layered shape
    noStroke();

    // Outer glow
    fill(hue, sat * 0.3, bright * 0.5, alpha * 0.3);
    beginShape();
    for (let i = 0; i < points.length; i++) {
      let p = points[i];
      let expand = map(i, 0, points.length - 1, 1.3, 2);
      curveVertex(p.x - p.w * expand * 0.5, p.y);
    }
    for (let i = points.length - 1; i >= 0; i--) {
      let p = points[i];
      let expand = map(i, 0, points.length - 1, 1.3, 2);
      curveVertex(p.x + p.w * expand * 0.5, p.y);
    }
    endShape(CLOSE);

    // Main flame body
    fill(hue, sat, bright, alpha);
    beginShape();
    for (let p of points) {
      curveVertex(p.x - p.w * 0.5, p.y);
    }
    for (let i = points.length - 1; i >= 0; i--) {
      let p = points[i];
      curveVertex(p.x + p.w * 0.5, p.y);
    }
    endShape(CLOSE);

    // Hot white/yellow core at base
    if (layer < 2) {
      let coreHeight = layerHeight * 0.15;
      fill(50, 20, 100, alpha * 0.8);
      beginShape();
      for (let i = 0; i <= numPoints * 0.3; i++) {
        let t = i / numPoints;
        let y = flame.baseY - t * coreHeight;
        let w = layerWidth * 0.5 * (1 - t) * flicker;
        curveVertex(flame.x - w * 0.5 + sin(t * 10) * 5, y);
      }
      for (let i = numPoints * 0.3; i >= 0; i--) {
        let t = i / numPoints;
        let y = flame.baseY - t * coreHeight;
        let w = layerWidth * 0.5 * (1 - t) * flicker;
        curveVertex(flame.x + w * 0.5 + sin(t * 10) * 5, y);
      }
      endShape(CLOSE);
    }
  }
}

let embers = [];
const MAX_EMBERS = 80;

function drawEmbers() {
  // Add new embers
  for (let flame of flames) {
    if (random() < 0.3) {
      let ember = {
        x: flame.x + random(-flame.width * 0.3, flame.width * 0.3),
        y: flame.baseY - random(flame.height * 0.3, flame.height * 0.8),
        size: random(0.5, 3),
        speedX: random(-1, 1),
        speedY: random(-2, -0.5),
        alpha: random(60, 100),
        hue: flame.hue + random(-10, 20),
        life: 0,
        maxLife: random(100, 250),
        wobble: random(0.05, 0.15)
      };
      embers.push(ember);
      if (embers.length > MAX_EMBERS) {
        embers.shift();
      }
    }
  }

  // Update and draw embers
  for (let i = embers.length - 1; i >= 0; i--) {
    let e = embers[i];

    e.x += e.speedX + sin(time * e.wobble * 60 + e.life * 0.1) * 0.5;
    e.y += e.speedY;
    e.life++;

    // Fade in and out
    let drawAlpha = e.alpha;
    if (e.life < 20) {
      drawAlpha = map(e.life, 0, 20, 0, e.alpha);
    } else if (e.life > e.maxLife - 30) {
      drawAlpha = map(e.life, e.maxLife - 30, e.maxLife, e.alpha, 0);
    }

    if (e.life >= e.maxLife || e.y < 0) {
      embers.splice(i, 1);
      continue;
    }

    // Draw ember with glow
    noStroke();
    fill(e.hue, 70, 80, drawAlpha * 0.3);
    ellipse(e.x, e.y, e.size * 4, e.size * 4);
    fill(e.hue, 50, 100, drawAlpha);
    ellipse(e.x, e.y, e.size * 2, e.size * 2);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  flames = [];
  for (let i = 0; i < NUM_FLAMES; i++) {
    flames.push(createFlame());
  }
  heatDistortion = [];
  for (let x = 0; x < width; x += 20) {
    for (let y = 0; y < height; y += 20) {
      heatDistortion.push({ x, y, offset: 0 });
    }
  }
}

function mousePressed() {
  // Add new flame at mouse position
  let flame = createFlame();
  flame.x = mouseX;
  flames.push(flame);
  if (flames.length > NUM_FLAMES * 1.5) {
    flames.shift();
  }
}
</script>
</body>
</html>
