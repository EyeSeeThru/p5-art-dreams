<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butterfly Curve</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0f; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const tMax = 12 * 3.14159265;
let t = 0;
let shapes = [];
let colorOffset = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  background(0);
}

function draw() {
  // Semi-transparent overlay for trail effect
  background(0, 0, 5, 0.03);
  
  translate(width / 2, height / 2);
  
  let scaleFactor = min(width, height) / 7;
  
  // Butterfly curve parametric equations
  // Based on Temple H. Fay's butterfly curve
  let a = 1;
  let n = 2;
  
  // Multiple layered butterflies
  for (let layer = 0; layer < 3; layer++) {
    let layerOffset = layer * 0.3;
    let layerScale = 1 - layer * 0.25;
    
    for (let i = 0; i < 8; i++) {
      push();
      rotate(TWO_PI * i / 8 + t * 0.2 + layerOffset);
      scale(layerScale);
      
      beginShape();
      for (let angle = 0; angle <= tMax; angle += 0.05) {
        // Butterfly parametric equations
        let r = exp(cos(angle)) - 2 * cos(4 * angle) + pow(sin(angle / 12), 5);
        
        // Convert to Cartesian
        let x = scaleFactor * r * sin(angle);
        let y = scaleFactor * r * cos(angle);
        
        // Color based on angle and time
        let hue = (angle * 10 + t * 20 + colorOffset + layer * 40) % 360;
        let sat = 80 - layer * 20;
        let bri = 100;
        
        stroke(hue, sat, bri, 0.6 - layer * 0.15);
        strokeWeight(2 - layer * 0.5);
        noFill();
        
        vertex(x, y);
      }
      endShape();
      
      pop();
    }
  }
  
  // Central glowing orb
  noStroke();
  for (let r = 50; r > 0; r -= 5) {
    let hue = (colorOffset * 2) % 360;
    fill(hue, 60, 80, 0.1);
    ellipse(0, 0, r * scaleFactor / 3);
  }
  
  // Outer ring particles
  for (let i = 0; i < 60; i++) {
    let angle = TWO_PI * i / 60 + t * 0.5;
    let radius = scaleFactor * 2.5 + sin(t + i) * 20;
    let x = cos(angle) * radius;
    let y = sin(angle) * radius;
    
    let hue = (i * 6 + colorOffset) % 360;
    fill(hue, 70, 100, 0.8);
    noStroke();
    ellipse(x, y, 4 + sin(t * 2 + i) * 2);
  }
  
  t += 0.01;
  colorOffset += 0.5;
  
  // Reset t to prevent floating point issues
  if (t > 1000) t = 0;
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
}
</script>
</body>
</html>
