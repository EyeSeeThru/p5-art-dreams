<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riemann Zeta</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Riemann Zeta Function Visualization
// Inspired by the famous nontrivial zeros on the critical line Re(s) = 1/2

let zeros = [];
let particles = [];
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);

  // Known nontrivial zeros (imaginary parts) - first few
  // Im(zeta(0.5 + i*t)) = 0
  zeros = [14.135, 21.022, 25.011, 30.425, 32.935, 37.586, 40.919, 43.327, 48.005, 49.744,
           52.970, 56.446, 59.347, 61.161, 65.113, 67.080, 70.150, 72.068, 75.704, 77.145];

  for (let i = 0; i < 600; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  background(0, 0, 5, 40);

  // Draw the critical line Re(s) = 1/2 as a glowing axis
  drawCriticalLine();

  // Draw the zeta plane with gradient
  drawZetaPlane();

  // Draw zero markers and their influence
  drawZeros();

  // Update and draw particles
  for (let p of particles) {
    p.update();
    p.display();
  }

  // Draw the Euler product spiral
  drawEulerSpiral();

  time += 0.008;
}

function drawCriticalLine() {
  // Vertical critical line at x = width/2
  let cx = width / 2;
  let yoff = (time * 30) % height;

  for (let i = 0; i < height; i += 2) {
    let alpha = map(sin((i + yoff) * 0.02 + time * 2), -1, 1, 20, 80);
    stroke(200, 80, 100, alpha);
    strokeWeight(1.5);
    point(cx, i);
  }

  // Label
  noStroke();
  fill(200, 60, 80, 150);
  textSize(10);
  textAlign(CENTER);
  text("Re(s) = 1/2  (critical line)", cx, 30);
}

function drawZetaPlane() {
  // Draw faint horizontal lines representing Im(s) values
  let cy = height / 2;
  for (let i = 0; i < 12; i++) {
    let offset = map(i, 0, 11, 0, height) - height / 2;
    let alpha = map(abs(offset), 0, height / 2, 5, 20);
    stroke(180, 30, 80, alpha);
    strokeWeight(1);
    line(0, cy + offset, width, cy + offset);
  }
}

function drawZeros() {
  let cx = width / 2;

  for (let i = 0; i < zeros.length; i++) {
    let z = zeros[i];
    let normZ = map(z, 0, 80, 0, height);

    // Pulsing rings around each zero on the critical line
    let pulse = (sin(time * 2 + z * 0.1) + 1) * 0.5;
    let ringR = map(pulse, 0, 1, 30, 120);

    noFill();
    stroke(320, 90, 100, 30 + pulse * 40);
    strokeWeight(1);
    ellipse(cx, normZ, ringR, ringR);

    // Glowing core
    let coreBrightness = 60 + pulse * 40;
    fill(320, 100, coreBrightness, 80);
    noStroke();
    ellipse(cx, normZ, 4, 4);

    // Tiny label for first few zeros
    if (i < 5) {
      fill(320, 60, 70, 150);
      textSize(9);
      textAlign(LEFT);
      text("t ≈ " + z.toFixed(2), cx + 10, normZ + 3);
    }
  }
}

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.pos = createVector(random(width), random(height));
    this.vel = createVector(0, 0);
    this.acc = createVector(0, 0);
    this.life = random(100, 255);
    this.maxLife = this.life;
    this.hue = random(300, 340); // Magenta to red tones
    this.trail = [];
  }

  update() {
    let cx = width / 2;
    let cy = height / 2;

    // Attraction toward the critical line with zeta-influenced curvature
    let toLine = cx - this.pos.x;
    let lineForce = toLine * 0.0008;

    // Influence from nearby zeros (repulsion from zeros creates "gaps")
    let zeroForceY = 0;
    let zeroForceX = 0;

    for (let z of zeros) {
      let normZ = map(z, 0, 80, 0, height);
      let d = dist(this.pos.x, this.pos.y, cx, normZ);
      if (d < 200 && d > 5) {
        let strength = 2.0 / (d * 0.5);
        zeroForceY += (this.pos.y - normZ) * strength * 0.01;
        zeroForceX += (this.pos.x - cx) * strength * 0.005;
      }
    }

    // Perlin noise field
    let noiseScale = 0.003;
    let noiseVal = noise(this.pos.x * noiseScale, this.pos.y * noiseScale, time);
    let angle = noiseVal * TWO_PI * 4;
    let noiseForce = p5.Vector.fromAngle(angle);
    noiseForce.mult(0.3);

    // Spiral motion
    let toCenter = p5.Vector.sub(createVector(cx, cy), this.pos);
    let spiralForce = toCenter.copy().rotate(HALF_PI).mult(0.1);
    let pullForce = toCenter.copy().mult(-0.05);

    this.acc.set(0, 0);
    this.acc.add(lineForce + zeroForceX, zeroForceY);
    this.acc.add(noiseForce);
    this.acc.add(spiralForce);
    this.acc.add(pullForce);

    this.vel.add(this.acc);
    this.vel.limit(2.5);

    this.trail.push(this.pos.copy());
    if (this.trail.length > 40) this.trail.shift();

    this.pos.add(this.vel);
    this.life -= 0.5;

    if (this.life <= 0 || this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
      this.reset();
    }
  }

  display() {
    let lifeRatio = this.life / this.maxLife;
    noFill();

    // Draw trail
    beginShape();
    for (let i = 0; i < this.trail.length; i++) {
      let alpha = map(i, 0, this.trail.length, 0, lifeRatio * 80);
      let bright = map(i, 0, this.trail.length, 40, 100);
      stroke(this.hue, 80, bright, alpha);
      strokeWeight(map(i, 0, this.trail.length, 0.5, 2));
      vertex(this.trail[i].x, this.trail[i].y);
    }
    endShape();

    // Head
    fill(this.hue, 90, 100, lifeRatio * 100);
    noStroke();
    ellipse(this.pos.x, this.pos.y, 3, 3);
  }
}

function drawEulerSpiral() {
  // Animated Euler spiral / Cornu spiral showing the relationship to zeta
  push();
  translate(width * 0.15, height * 0.5);
  noFill();

  let steps = 100;
  let a = 0, b = 0;
  beginShape();
  for (let i = 0; i < steps; i++) {
    let t = i * 0.02 + time;
    let dx = cos(t * t);
    let dy = sin(t * t);
    a += dx * 0.5;
    b += dy * 0.5;

    let alpha = map(i, 0, steps, 5, 60);
    stroke(200, 50, 80, alpha);
    strokeWeight(1);
    vertex(a * 2, b * 2);
  }
  endShape();

  // Label
  fill(200, 40, 60, 100);
  noStroke();
  textSize(9);
  textAlign(LEFT);
  text("Euler Spiral", 5, -60);

  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
