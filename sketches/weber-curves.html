<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weber Curves</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #050505; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const curves = [];
const numCurves = 12;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  for (let i = 0; i < numCurves; i++) {
    curves.push({
      angle: map(i, 0, numCurves, 10, 170),
      offset: random(50, 200),
      phase: random(TWO_PI),
      hue: random(320, 400) % 360
    });
  }
}

function draw() {
  background(5, 10, 8);
  
  const cx = width / 2;
  const cy = height / 2;
  const time = frameCount * 0.008;
  
  translate(cx, cy);
  
  for (let c of curves) {
    drawWeberCurve(c, time);
  }
  
  // Central glow
  noStroke();
  for (let r = 0; r < 150; r += 10) {
    fill(0, 0, 100, map(r, 0, 150, 30, 0));
    ellipse(0, 0, r * 2);
  }
}

function drawWeberCurve(c, t) {
  const points = [];
  const segments = 200;
  
  for (let i = 0; i <= segments; i++) {
    const theta = map(i, 0, segments, -PI, PI);
    const thetaRad = radians(c.angle);
    
    // Weber curve equation: r = a / (1 - e*cos(theta))
    const e = 0.6 + 0.3 * sin(t * 0.5 + c.phase);
    const r = c.offset * 2 / (1 - e * cos(theta));
    
    const wobble = sin(theta * 3 + t + c.phase) * 15;
    const x = (r + wobble) * cos(theta);
    const y = (r + wobble) * sin(theta);
    
    points.push({ x, y });
  }
  
  noFill();
  strokeWeight(1.5);
  
  for (let i = 0; i < points.length - 1; i++) {
    const alpha = map(sin(i * 0.1 + t), -1, 1, 20, 80);
    stroke((c.hue + i * 0.5) % 360, 70, 90, alpha);
    line(points[i].x, points[i].y, points[i + 1].x, points[i + 1].y);
  }
  
  // Draw glow points
  for (let i = 0; i < points.length; i += 15) {
    const glow = sin(i * 0.1 + t * 2) * 0.5 + 0.5;
    fill((c.hue + i * 0.3) % 360, 60, 100, 60 * glow);
    noStroke();
    ellipse(points[i].x, points[i].y, 3 + glow * 4);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
