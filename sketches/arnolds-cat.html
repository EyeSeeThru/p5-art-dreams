<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arnold's Cat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const SCALE = 400;
let catImage;
let imgBuffer;
let iteration = 0;
let iterations = 0;
let showText = true;
let phase = 0;

function setup() {
  createCanvas(800, 800);
  pixelDensity(1);
  imgBuffer = createGraphics(SCALE, SCALE);
  imgBuffer.pixelDensity(1);
  
  // Create cat image procedurally
  catImage = createGraphics(SCALE, SCALE);
  catImage.pixelDensity(1);
  drawCatTexture();
}

function drawCatTexture() {
  catImage.loadPixels();
  for (let y = 0; y < SCALE; y++) {
    for (let x = 0; x < SCALE; x++) {
      let idx = 4 * (y * SCALE + x);
      
      // Multiple sine waves to create cat-like pattern
      let nx = x / SCALE;
      let ny = y / SCALE;
      
      // Base fur texture
      let fur = sin(nx * 60 + ny * 40) * 0.5 + 0.5;
      fur *= sin(ny * 80 + nx * 30) * 0.5 + 0.5;
      
      // Stripes
      let stripes = sin(nx * 120 + fur * 5) * 0.5 + 0.5;
      stripes = pow(stripes, 3);
      
      // Orange/black tabby pattern
      let r = 220 + fur * 30 - stripes * 140;
      let g = 140 + fur * 20 - stripes * 80;
      let b = 60 + fur * 10;
      
      // Eyes
      let dx = nx - 0.3;
      let dy = ny - 0.35;
      let eye1 = dx * dx + dy * dy;
      dx = nx - 0.7;
      dy = ny - 0.35;
      let eye2 = dx * dx + dy * dy;
      
      if (eye1 < 0.008) {
        r = 80; g = 200; b = 80;
      } else if (eye2 < 0.008) {
        r = 80; g = 200; b = 80;
      } else if (eye1 < 0.015) {
        r = 40; g = 30; b = 20;
      } else if (eye2 < 0.015) {
        r = 40; g = 30; b = 20;
      }
      
      // Nose
      dx = nx - 0.5;
      dy = ny - 0.5;
      let nose = dx * dx + dy * dy;
      if (nose < 0.003) {
        r = 200; g = 120; b = 120;
      }
      
      // Whiskers (darker regions)
      if ((ny > 0.48 && ny < 0.52) && (nx < 0.15 || nx > 0.85)) {
        r *= 0.7; g *= 0.7; b *= 0.7;
      }
      
      catImage.pixels[idx] = r;
      catImage.pixels[idx + 1] = g;
      catImage.pixels[idx + 2] = b;
      catImage.pixels[idx + 3] = 255;
    }
  }
  catImage.updatePixels();
}

function arnoldCatMap(x, y, n) {
  // Apply n iterations of Arnold's cat map: (2x+y, x+y) mod 1
  let px = x, py = y;
  for (let i = 0; i < n; i++) {
    let newX = (2 * px + py) % 1;
    let newY = (px + py) % 1;
    px = newX;
    py = newY;
  }
  return { x: px, y: py };
}

function draw() {
  background(10, 5, 20);
  
  // Iterations increase over time, then reset
  iterations = floor(sin(frameCount * 0.02) * 15 + 16);
  if (iterations < 0) iterations = 0;
  
  // Draw the cat map visualization
  let cellSize = SCALE / 40;
  noStroke();
  
  for (let cy = 0; cy < 40; cy++) {
    for (let cx = 0; cx < 40; cx++) {
      let sx = cx / 40;
      let sy = cy / 40;
      
      // Apply Arnold's cat map
      let mapped = arnoldCatMap(sx, sy, iterations);
      let mx = mapped.x * SCALE;
      let my = mapped.y * SCALE;
      
      // Sample color from cat texture
      let sc = catImage.get(floor(mx), floor(my));
      
      // Calculate position with wave animation
      let waveAmp = sin(frameCount * 0.05 + cx * 0.3 + cy * 0.3) * 3;
      let px = 200 + cx * cellSize + waveAmp;
      let py = 200 + cy * cellSize + waveAmp * 0.5;
      
      // Color cycling based on iterations
      let hueShift = iterations * 8 + frameCount * 2;
      let r = (sc[0] + hueShift) % 255;
      let g = (sc[1] + hueShift * 0.7) % 255;
      let b = (sc[2] + hueShift * 1.3) % 255;
      
      // Glow effect
      let glow = sin(frameCount * 0.1 + cx * 0.5 + cy * 0.5) * 0.3 + 0.7;
      
      fill(r * glow, g * glow, b * glow);
      rect(px, py, cellSize + 0.5, cellSize + 0.5);
    }
  }
  
  // Draw flowing trails
  let numTrails = 50;
  for (let t = 0; t < numTrails; t++) {
    let tx = sin(t * 0.5 + frameCount * 0.02) * 0.5 + 0.5;
    let ty = cos(t * 0.7 + frameCount * 0.015) * 0.5 + 0.5;
    
    let mapped = arnoldCatMap(tx, ty, iterations);
    
    let px = 200 + mapped.x * 400;
    let py = 200 + mapped.y * 400;
    
    let trailColor = color(
      (t * 5 + frameCount * 3) % 255,
      (t * 7 + frameCount * 2) % 255,
      (t * 11 + frameCount * 4) % 255,
      150
    );
    fill(trailColor);
    circle(px, py, 4 + sin(frameCount * 0.1 + t) * 2);
  }
  
  // Info text
  if (showText) {
    fill(255, 255, 255, 150);
    textSize(14);
    textAlign(LEFT, BOTTOM);
    text(`Iterations: ${iterations}`, 20, height - 20);
    
    textAlign(RIGHT, BOTTOM);
    text("Arnold's Cat Map — chaotic stretching & folding", width - 20, height - 20);
  }
}
</script>
</body>
</html>
