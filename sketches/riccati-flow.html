<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riccati Flow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #030308; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
const paths = [];
const numPaths = 80;
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  background(240, 20, 5);
  
  for (let i = 0; i < numPaths; i++) {
    paths.push({
      x: random(width),
      y: random(height),
      vx: random(-1, 1),
      vy: random(-1, 1),
      hue: random(360),
      life: random(1000, 3000),
      maxLife: 0,
      history: []
    });
    paths[i].maxLife = paths[i].life;
  }
}

function draw() {
  background(240, 30, 3, 8);
  
  for (let p of paths) {
    // Riccati-style differential equation
    // dx/dt = a*x² + b*x + c
    const a = 0.0001 * sin(time * 0.3);
    const b = 0.002 * cos(time * 0.2);
    const c = 0.001;
    
    const dxdt = a * p.vx * p.vx + b * p.vx + c;
    const dydt = a * p.vy * p.vy + b * p.vy + c;
    
    p.vx += dxdt * 0.5;
    p.vy += dydt * 0.5;
    
    // Add some curl
    const curl = 0.01;
    const oldVx = p.vx;
    p.vx += -curl * p.vy;
    p.vy += curl * oldVx;
    
    // Damping
    p.vx *= 0.995;
    p.vy *= 0.995;
    
    p.x += p.vx;
    p.y += p.vy;
    
    p.history.push({ x: p.x, y: p.y });
    if (p.history.length > 150) p.history.shift();
    
    p.life--;
    
    // Draw trail
    noFill();
    beginShape();
    for (let i = 0; i < p.history.length; i++) {
      const alpha = map(i, 0, p.history.length, 0, 80);
      const bri = map(i, 0, p.history.length, 20, 90);
      const hueShift = (p.hue + i * 0.5) % 360;
      stroke(hueShift, 70, bri, alpha);
      strokeWeight(map(i, 0, p.history.length, 0.5, 2.5));
      vertex(p.history[i].x, p.history[i].y);
    }
    endShape();
    
    // Draw head
    noStroke();
    fill(p.hue, 60, 100, 90);
    circle(p.x, p.y, 3);
    
    // Reset if dead or out of bounds
    if (p.life <= 0 || p.x < -50 || p.x > width + 50 || p.y < -50 || p.y > height + 50) {
      p.x = random(width);
      p.y = random(height);
      p.vx = random(-1, 1);
      p.vy = random(-1, 1);
      p.hue = random(360);
      p.life = random(1000, 3000);
      p.maxLife = p.life;
      p.history = [];
    }
  }
  
  time += 0.016;
  
  // Add some glowing particles
  if (frameCount % 3 === 0) {
    const px = random(width);
    const py = random(height);
    noStroke();
    for (let r = 20; r > 0; r -= 2) {
      fill(random(360), 60, 80, 3);
      circle(px, py, r);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(240, 20, 5);
}
</script>
</body>
</html>
