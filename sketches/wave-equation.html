<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Wave Equation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: #000; width: 100%; height: 100%; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// 2D Wave Equation — Finite Difference Method
// RED AND BLACK VERSION
// Background: pure black (0,0,0)
// Elements: vivid red hue 0-20, saturation 70-100, brightness 70-100

let grid = [];
let prevGrid = [];
let gridSize = 80;
let cellSize;
let t = 0;
let courant = 0.4;
let damping = 0.998;

function setup() {
  createCanvas(windowWidth, windowHeight);
  cellSize = floor(width / gridSize);
  
  for (let i = 0; i < gridSize; i++) {
    grid[i] = [];
    prevGrid[i] = [];
    for (let j = 0; j < gridSize; j++) {
      grid[i][j] = 0;
      prevGrid[i][j] = 0;
    }
  }
}

function draw() {
  background(0, 0, 0);
  
  let mode = floor(t / 800) % 4;
  
  if (mode !== 3) {
    updateWave();
  }
  
  if (mode === 0) {
    drawWaveField();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("2D Wave Equation — Finite Difference Method", 10, 10);
    text("∂²u/∂t² = c²(∂²u/∂x² + ∂²u/∂y²)", 10, 26);
    text("Courant number r = " + courant.toFixed(2), 10, 42);
    text("Click to add ripples, drag to create waves", 10, 58);
    text("Space to reset", 10, 74);
    
  } else if (mode === 1) {
    drawInterference();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Wave Interference — Multiple Sources", 10, 10);
    text("Superposition: u_total = u1 + u2 + ...", 10, 26);
    text("Constructive and destructive interference patterns", 10, 42);
    text("Standing waves form at resonant frequencies", 10, 58);
    
  } else if (mode === 2) {
    drawReflection();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Boundary Reflection — Fixed Edges", 10, 10);
    text("Waves reflect off boundaries with phase inversion", 10, 26);
    text("u = 0 boundary condition (Dirichlet)", 10, 42);
    text("Creates complex interference patterns", 10, 58);
    
  } else {
    drawSources();
    
    fill(10, 60, 85);
    textSize(12);
    textAlign(LEFT, TOP);
    text("Driving Frequencies — Resonance", 10, 10);
    text("Oscillating sources at different frequencies", 10, 26);
    text("Resonance when driving matches natural frequency", 10, 42);
    text("Beats and standing wave patterns", 10, 58);
  }
  
  fill(10, 50, 70);
  textAlign(RIGHT, TOP);
  text("Mode " + (mode + 1) + "/4 — cycles automatically", width - 10, 10);
  
  t++;
}

function updateWave() {
  let r2 = courant * courant;
  let newGrid = [];
  
  for (let i = 0; i < gridSize; i++) {
    newGrid[i] = [];
    for (let j = 0; j < gridSize; j++) {
      if (i === 0 || i === gridSize - 1 || j === 0 || j === gridSize - 1) {
        newGrid[i][j] = 0;
        continue;
      }
      
      let laplacian = grid[i+1][j] + grid[i-1][j] + grid[i][j+1] + grid[i][j-1] - 4 * grid[i][j];
      let val = 2 * grid[i][j] - prevGrid[i][j] + r2 * laplacian;
      val *= damping;
      
      newGrid[i][j] = val;
    }
  }
  
  let mode = floor(t / 800) % 4;
  if (mode === 1) {
    let x1 = floor(gridSize * 0.3);
    let y1 = floor(gridSize * 0.5);
    let x2 = floor(gridSize * 0.7);
    let y2 = floor(gridSize * 0.5);
    newGrid[x1][y1] = 30 * Math.sin(t * 0.1);
    newGrid[x2][y2] = 30 * Math.sin(t * 0.1);
  } else if (mode === 3) {
    let cx = floor(gridSize * 0.5);
    let cy = floor(gridSize * 0.5);
    newGrid[cx][cy] = 40 * Math.sin(t * 0.05);
  }
  
  prevGrid = grid;
  grid = newGrid;
}

function drawWaveField() {
  noStroke();
  for (let i = 0; i < gridSize; i++) {
    for (let j = 0; j < gridSize; j++) {
      let val = grid[i][j];
      
      // RED palette: positive = bright red, negative = dim red
      let bright = map(Math.abs(val), 0, 50, 30, 95);
      let sat = val > 0 ? 60 : 20;
      fill(5, sat, bright);
      rect(i * cellSize, j * cellSize, cellSize, cellSize);
    }
  }
}

function drawInterference() {
  drawWaveField();
  
  let x1 = floor(gridSize * 0.3);
  let y1 = floor(gridSize * 0.5);
  let x2 = floor(gridSize * 0.7);
  let y2 = floor(gridSize * 0.5);
  
  fill(10, 60, 80);
  noStroke();
  ellipse(x1 * cellSize + cellSize/2, y1 * cellSize + cellSize/2, 15);
  ellipse(x2 * cellSize + cellSize/2, y2 * cellSize + cellSize/2, 15);
}

function drawReflection() {
  drawWaveField();
  
  stroke(10, 30, 40);
  noFill();
  rect(cellSize, cellSize, (gridSize-2) * cellSize, (gridSize-2) * cellSize);
}

function drawSources() {
  drawWaveField();
  
  let cx = floor(gridSize * 0.5);
  let cy = floor(gridSize * 0.5);
  fill(10, 60, 80);
  noStroke();
  ellipse(cx * cellSize + cellSize/2, cy * cellSize + cellSize/2, 20);
}

function mousePressed() {
  let i = floor(mouseX / cellSize);
  let j = floor(mouseY / cellSize);
  if (i > 0 && i < gridSize - 1 && j > 0 && j < gridSize - 1) {
    grid[i][j] = -50;
    prevGrid[i][j] = -50;
  }
}

function mouseDragged() {
  let i = floor(mouseX / cellSize);
  let j = floor(mouseY / cellSize);
  if (i > 0 && i < gridSize - 1 && j > 0 && j < gridSize - 1) {
    grid[i][j] = -30;
  }
}

function keyPressed() {
  if (key === ' ') {
    for (let i = 0; i < gridSize; i++) {
      for (let j = 0; j < gridSize; j++) {
        grid[i][j] = 0;
        prevGrid[i][j] = 0;
      }
    }
  }
}
</script>
</body>
</html>
