<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Penrose Tiling</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #050508; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Penrose P3 Tiling — Kite and Dart deflation
// Animated aperiodic tiling with golden ratio aesthetics

let triangles = [];
let depth = 0;
let maxDepth = 7;
let animProgress = 0;
let animating = false;
let nextDepthTime = 0;

const G = (1 + Math.sqrt(5)) / 2; // Golden ratio ≈ 1.618
const INV_G = 1 / G;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  initTriangles();
}

function initTriangles() {
  triangles = [];
  depth = 0;
  // Five isosceles triangles meeting at origin, pointing outward
  for (let i = 0; i < 5; i++) {
    let a1 = (i * TWO_PI / 5) - PI / 2;
    let a2 = ((i + 1) * TWO_PI / 5) - PI / 2;
    triangles.push({
      p1: { x: 0, y: 0 },
      p2: { x: cos(a1) * 1.0, y: sin(a1) * 1.0 },
      p3: { x: cos(a2) * 1.0, y: sin(a2) * 1.0 },
      type: 'dart', // outer triangles are darts
      color: i % 2 === 0 ? 0 : 36
    });
  }
  // Now inflate: these are the half-tanes — deflate to get kite/dart
  triangles = deflate(triangles);
  depth = 1;
  animProgress = 0;
  animating = true;
  nextDepthTime = millis() + 1800;
}

function deflate(tris) {
  let next = [];
  for (let t of tris) {
    let { p1, p2, p3, type } = t;
    // Golden ratio points
    let q = {
      x: p1.x + (p2.x - p1.x) * INV_G,
      y: p1.y + (p2.y - p1.y) * INV_G
    };
    let r = {
      x: p1.x + (p3.x - p1.x) * INV_G,
      y: p1.y + (p3.y - p1.y) * INV_G
    };

    if (type === 'kite') {
      // Kite inflates to 2 kites + 1 dart
      next.push({ p1: p1, p2: q, p3: r, type: 'kite' });
      next.push({ p1: p2, p2: p3, p3: r, type: 'kite' });
      next.push({ p1: r, p2: p3, p3: q, type: 'dart' });
    } else {
      // Dart inflates to 1 kite + 1 dart
      next.push({ p1: p2, p2: p3, p3: q, type: 'kite' });
      next.push({ p1: q, p2: p3, p3: r, type: 'dart' });
    }
  }
  return next;
}

function drawTriangle(t) {
  let colA = color(t.color, 70, 90, 85);
  let colB = color(t.color, 50, 60, 70);
  let cx = (t.p1.x + t.p2.x + t.p3.x) / 3;
  let cy = (t.p1.y + t.p2.y + t.p3.y) / 3;

  // Radial gradient: lighter near center of each triangle
  let grad = drawingContext.createRadialGradient(
    cx * 600 + width / 2, cy * 600 + height / 2, 0,
    cx * 600 + width / 2, cy * 600 + height / 2, 120
  );
  grad.addColorStop(0, 'rgba(255,255,255,0.12)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  drawingContext.fillStyle = grad;

  fill(colA);
  noStroke();
  triangle(
    t.p1.x * 600 + width / 2,
    t.p1.y * 600 + height / 2,
    t.p2.x * 600 + width / 2,
    t.p2.y * 600 + height / 2,
    t.p3.x * 600 + width / 2,
    t.p3.y * 600 + height / 2
  );

  // Edge glow
  stroke(t.color, 80, 100, 60);
  strokeWeight(0.8);
  line(t.p1.x * 600 + width/2, t.p1.y * 600 + height/2,
       t.p2.x * 600 + width/2, t.p2.y * 600 + height/2);
  line(t.p2.x * 600 + width/2, t.p2.y * 600 + height/2,
       t.p3.x * 600 + width/2, t.p3.y * 600 + height/2);
  line(t.p3.x * 600 + width/2, t.p3.y * 600 + height/2,
       t.p1.x * 600 + width/2, t.p1.y * 600 + height/2);
}

function draw() {
  background(5, 20, 8);

  // Slow rotation
  let rotSpeed = 0.0003;
  translate(width / 2, height / 2);
  rotate(frameCount * rotSpeed);
  translate(-width / 2, -height / 2);

  // Animate subdision
  if (animating) {
    if (millis() > nextDepthTime && depth < maxDepth) {
      triangles = deflate(triangles);
      depth++;
      animProgress = 0;
      nextDepthTime = millis() + 1400;
      if (depth >= maxDepth) {
        animating = false;
        nextDepthTime = millis() + 3000; // hold before restart
      }
    }
  } else {
    if (millis() > nextDepthTime) {
      initTriangles();
    }
  }

  // Depth-based hue shift
  let hueShift = (frameCount * 0.5) % 360;
  for (let t of triangles) {
    let h = (t.color + hueShift) % 360;
    t.color = h;
    drawTriangle(t);
  }

  // Subtle vignette
  noStroke();
  let vg = drawingContext.createRadialGradient(
    width/2, height/2, height * 0.3,
    width/2, height/2, height * 0.75
  );
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.6)');
  drawingContext.fillStyle = vg;
  rect(0, 0, width, height);

  // Title
  push();
  resetMatrix();
  fill(60, 10, 40);
  textSize(10);
  textAlign(RIGHT, BOTTOM);
  textFont('monospace');
  text('PENROSE TILING — P3 DEFLATION', width - 20, height - 20);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
