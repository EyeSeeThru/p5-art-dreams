<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbital Resonance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Orbital Resonance - Gravitational N-body resonance visualization
const bodies = [];
const numBodies = 7;
const G = 0.5; // Gravitational constant (scaled)
let trails = [];
const maxTrailLength = 200;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  
  // Create central massive body
  bodies.push({
    pos: createVector(width/2, height/2),
    vel: createVector(0, 0),
    mass: 800,
    hue: 0,
    radius: 20
  });
  
  // Create orbiting bodies with orbital resonance
  const resonances = [2, 3, 4, 5, 6, 7]; // Orbital period ratios
  for (let i = 0; i < numBodies - 1; i++) {
    let dist = 100 + i * 45;
    let speed = sqrt(G * 800 / dist) / (resonances[i] / 3);
    let angle = TWO_PI * i / (numBodies - 1);
    
    bodies.push({
      pos: createVector(width/2 + cos(angle) * dist, height/2 + sin(angle) * dist),
      vel: createVector(-sin(angle) * speed, cos(angle) * speed),
      mass: random(5, 20),
      hue: (180 + i * 25) % 360,
      radius: 4 + random(3)
    });
  }
  
  background(0);
}

function draw() {
  // Semi-transparent background for trail fade
  background(0, 0, 0, 3);
  
  // Update physics
  for (let i = 0; i < bodies.length; i++) {
    let force = createVector(0, 0);
    for (let j = 0; j < bodies.length; j++) {
      if (i !== j) {
        let dir = p5.Vector.sub(bodies[j].pos, bodies[i].pos);
        let dist = dir.mag();
        dist = constrain(dist, 20, 500);
        let strength = (G * bodies[i].mass * bodies[j].mass) / (dist * dist);
        dir.normalize();
        dir.mult(strength);
        force.add(dir);
      }
    }
    bodies[i].vel.add(force.div(bodies[i].mass));
    bodies[i].pos.add(bodies[i].vel);
  }
  
  // Store trails
  for (let body of bodies) {
    if (!body.trail) body.trail = [];
    body.trail.push(body.pos.copy());
    if (body.trail.length > maxTrailLength) {
      body.trail.shift();
    }
  }
  
  // Draw trails
  for (let i = 0; i < bodies.length; i++) {
    let body = bodies[i];
    if (body.trail && body.trail.length > 1) {
      noFill();
      beginShape();
      for (let j = 0; j < body.trail.length; j++) {
        let alpha = map(j, 0, body.trail.length, 0, 80);
        stroke(body.hue, 80, 100, alpha);
        strokeWeight(2);
        vertex(body.trail[j].x, body.trail[j].y);
      }
      endShape();
    }
  }
  
  // Draw bodies
  for (let body of bodies) {
    // Glow
    noStroke();
    for (let r = body.radius * 4; r > body.radius; r -= 2) {
      let alpha = map(r, body.radius, body.radius * 4, 60, 0);
      fill(body.hue, 80, 100, alpha);
      ellipse(body.pos.x, body.pos.y, r * 2);
    }
    
    // Core
    fill(body.hue, 60, 100);
    ellipse(body.pos.x, body.pos.y, body.radius * 2);
  }
  
  // Draw connecting resonance lines
  stroke(0, 0, 30, 10);
  strokeWeight(1);
  for (let i = 1; i < bodies.length; i++) {
    for (let j = i + 1; j < bodies.length; j++) {
      let d = p5.Vector.dist(bodies[i].pos, bodies[j].pos);
      if (d < 200) {
        let alpha = map(d, 0, 200, 30, 0);
        stroke(0, 0, 100, alpha);
        line(bodies[i].pos.x, bodies[i].pos.y, bodies[j].pos.x, bodies[j].pos.y);
      }
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  bodies[0].pos = createVector(width/2, height/2);
}
</script>
</body>
</html>
