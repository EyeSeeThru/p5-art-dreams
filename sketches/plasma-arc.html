<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plasma Arc</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      overflow: hidden; 
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// Plasma Arc - Electrical discharge simulation with branching lightning
let particles = [];
let branches = [];
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 1);
  background(0);
  
  // Initialize with main discharge point
  createDischarge(width / 2, height * 0.1);
}

function draw() {
  // Semi-transparent background for trail effect
  background(0, 0, 0, 0.08);
  
  // Update and draw branches
  for (let i = branches.length - 1; i >= 0; i--) {
    let b = branches[i];
    b.update();
    b.display();
    
    if (b.dead) {
      branches.splice(i, 1);
    }
  }
  
  // Spawn new discharges occasionally
  if (frameCount % 60 === 0 && branches.length < 3) {
    createDischarge(random(width * 0.3, width * 0.7), height * 0.1);
  }
  
  time += 0.02;
}

function createDischarge(x, y) {
  // Create main lightning channel
  let startPos = createVector(x, y);
  let endPos = createVector(x + random(-100, 100), height);
  
  let branch = new PlasmaBranch(startPos, endPos);
  branches.push(branch);
  
  // Create branching sub-discharges
  for (let i = 0; i < floor(random(3, 6)); i++) {
    let branchPoint = p5.Vector.lerp(startPos, endPos, random(0.2, 0.8));
    let branchDir = createVector(random(-0.5, 0.5), 1).normalize();
    let branchEnd = p5.Vector.add(branchPoint, p5.Vector.mult(branchDir, random(200, 400)));
    let subBranch = new PlasmaBranch(branchPoint, branchEnd);
    subBranch.isSubBranch = true;
    subBranch.hue = (branch.hue + random(-30, 30) + 360) % 360;
    branches.push(subBranch);
  }
}

class PlasmaBranch {
  constructor(start, end) {
    this.start = start.copy();
    this.end = end.copy();
    this.points = [];
    this.generatePath();
    this.progress = 0;
    this.speed = random(0.02, 0.05);
    this.dead = false;
    this.hue = random(280, 340); // Purple to pink range
    this.isSubBranch = false;
    this.thickness = this.isSubBranch ? 1.5 : 3;
  }
  
  generatePath() {
    // Generate jagged lightning path
    let segments = 20;
    for (let i = 0; i <= segments; i++) {
      let t = i / segments;
      let pos = p5.Vector.lerp(this.start, this.end, t);
      
      // Add randomness for lightning effect
      let offset = sin(t * PI) * random(20, 60);
      pos.x += random(-offset, offset);
      
      this.points.push(pos);
    }
  }
  
  update() {
    this.progress += this.speed;
    
    if (this.progress >= 1) {
      this.progress = 1;
      if (frameCount % 3 === 0) {
        this.thickness *= 0.97;
        if (this.thickness < 0.2) {
          this.dead = true;
        }
      }
    }
    
    // Update spark particles
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update();
      particles[i].display();
      
      if (particles[i].dead) {
        particles.splice(i, 1);
      }
    }
  }
  
  display() {
    if (this.points.length < 2) return;
    
    let numPoints = floor(this.progress * this.points.length);
    if (numPoints < 2) return;
    
    // Draw glow layer
    for (let layer = 3; layer >= 0; layer--) {
      let alpha = map(layer, 0, 3, 0.8, 0.1);
      let weight = this.thickness + layer * 4;
      
      stroke(this.hue, 80, 100, alpha);
      strokeWeight(weight);
      noFill();
      
      beginShape();
      for (let i = 0; i < numPoints; i++) {
        let pt = this.points[i];
        // Add slight jitter for energy effect
        let jitter = sin(frameCount * 0.5 + i * 0.5) * (layer + 1);
        vertex(pt.x + jitter, pt.y);
      }
      endShape();
    }
    
    // Core bright line
    stroke(this.hue, 20, 100, 0.9);
    strokeWeight(this.thickness);
    beginShape();
    for (let i = 0; i < numPoints; i++) {
      let pt = this.points[i];
      let jitter = sin(frameCount * 0.5 + i * 0.5);
      vertex(pt.x + jitter, pt.y);
    }
    endShape();
    
    // Spark particles along the path
    if (this.progress < 1 && random() < 0.3) {
      let idx = floor(random(numPoints));
      let pt = this.points[idx];
      particles.push(new Spark(pt.x, pt.y, this.hue));
    }
  }
}

class Spark {
  constructor(x, y, hue) {
    this.pos = createVector(x, y);
    this.vel = p5.Vector.random2D().mult(random(1, 3));
    this.acc = createVector(0, 0.1);
    this.hue = hue;
    this.life = 1;
    this.decay = random(0.02, 0.05);
    this.size = random(1, 3);
    this.dead = false;
  }
  
  update() {
    this.vel.add(this.acc);
    this.pos.add(this.vel);
    this.life -= this.decay;
    if (this.life <= 0) this.dead = true;
  }
  
  display() {
    noStroke();
    // Glow
    fill(this.hue, 60, 100, this.life * 0.3);
    ellipse(this.pos.x, this.pos.y, this.size * 4);
    // Core
    fill(this.hue, 20, 100, this.life);
    ellipse(this.pos.x, this.pos.y, this.size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
  branches = [];
  createDischarge(width / 2, height * 0.1);
}
</script>
</body>
</html>
